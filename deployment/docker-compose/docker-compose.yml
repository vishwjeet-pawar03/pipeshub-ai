# PipesHub AI — unified, profile-driven Docker Compose
#
# Usage: run install.sh (in this directory) to generate .env and launch.
# Manual quick-start:
#   cp env.template .env && $EDITOR .env
#   COMPOSE_PROFILES=graph-neo4j          docker compose -p pipeshub-ai up -d   # slim/neo4j/redis-streams
#   COMPOSE_PROFILES=graph-arango,kv-etcd,broker-kafka \
#     docker compose -p pipeshub-ai up -d                                        # full/arango/etcd/kafka
#
# Profile catalogue
#   graph-neo4j   — start Neo4j (set DATA_STORE=neo4j, GRAPH_DB_TYPE=neo4j in .env)
#   graph-arango  — start ArangoDB (set DATA_STORE=arangodb, GRAPH_DB_TYPE=arangodb in .env)
#   kv-etcd       — start etcd (set KV_STORE_TYPE=etcd in .env; default is redis)
#   broker-kafka  — start Zookeeper + Kafka (set MESSAGE_BROKER=kafka in .env; default is redis)
#
# Always-on: pipeshub-ai, redis, mongodb, qdrant, sandbox-image
#
# Requires Docker Compose v2.20+ for `required: false` on depends_on.

services:

  # ---------------------------------------------------------------------------
  # PipesHub AI — the all-in-one application container
  # ---------------------------------------------------------------------------
  pipeshub-ai:
    image: pipeshubai/pipeshub-ai:${IMAGE_TAG:-latest}
    container_name: pipeshub-ai
    restart: always
    # build: is used only when `docker compose up --build` (or install.sh --build) is run.
    # It is ignored for the default prebuilt-image path. context is the repo root.
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        PYTHON_DEPS_IMAGE: ${PYTHON_DEPS_IMAGE:-pipeshubai/pipeshub-ai-base:python-deps}
        RUNTIME_BASE_IMAGE: ${RUNTIME_BASE_IMAGE:-pipeshubai/pipeshub-ai-base:runtime}
      shm_size: 4gb
      ulimits:
        memlock:
          soft: -1
          hard: -1
    ports:
      - "${APP_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          memory: ${APP_MEMORY_LIMIT:-10G}
    shm_size: 2gb
    init: true
    logging:
      driver: local
      options:
        max-size: "${LOG_MAX_SIZE:-20m}"
        max-file: "${LOG_MAX_FILE:-15}"
        compress: "true"

    environment:
      # Core
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - STRICT_MODE=${STRICT_MODE:-false}
      - SKIP_DOMAIN_CHECK=${SKIP_DOMAIN_CHECK:-false}
      - SAML_SP_ENTITY_ID=${SAML_SP_ENTITY_ID:-}
      - SECRET_KEY=${SECRET_KEY:-}

      # Public endpoints
      - FRONTEND_PUBLIC_URL=${FRONTEND_PUBLIC_URL:-}

      # Internal service URLs (fixed; all services share the container network)
      - QUERY_BACKEND=http://localhost:8000
      - CONNECTOR_BACKEND=http://localhost:8088
      - INDEXING_BACKEND=http://localhost:8091
      - EMBEDDING_SERVER_URL=http://localhost:8002

      # Graph database selection — set by install.sh
      # DATA_STORE accepted values: "arangodb" (default) | "neo4j"
      # GRAPH_DB_TYPE accepted values: "arangodb" (default) | "neo4j"
      - DATA_STORE=${DATA_STORE:-arangodb}
      - GRAPH_DB_TYPE=${GRAPH_DB_TYPE:-arangodb}

      # ArangoDB (active when DATA_STORE=arangodb)
      - ARANGO_URL=http://arango:8529
      - ARANGO_DB_NAME=${ARANGO_DB_NAME:-es}
      - ARANGO_USERNAME=${ARANGO_USERNAME:-root}
      - ARANGO_PASSWORD=${ARANGO_PASSWORD:-}

      # Neo4j (active when DATA_STORE=neo4j)
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}

      # Key-value store: "redis" (default, no extra container) | "etcd"
      - KV_STORE_TYPE=${KV_STORE_TYPE:-redis}

      # etcd (active when KV_STORE_TYPE=etcd)
      - ETCD_URL=http://etcd:2379
      - ETCD_HOST=etcd
      - ETCD_TIMEOUT=${ETCD_TIMEOUT:-5000}

      # Message broker: "redis" (default, uses Redis Streams) | "kafka"
      - MESSAGE_BROKER=${MESSAGE_BROKER:-redis}
      - REDIS_STREAMS_MAXLEN=${REDIS_STREAMS_MAXLEN:-10000}

      # Kafka (active when MESSAGE_BROKER=kafka)
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka-1:9092}
      - KAFKA_SSL=${KAFKA_SSL:-false}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-}

      # Redis (always on)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - REDIS_KV_PREFIX=${REDIS_KV_PREFIX:-pipeshub:kv:}
      - REDIS_TIMEOUT=${REDIS_TIMEOUT:-10000}
      - REDIS_DB=${REDIS_DB:-0}

      # MongoDB
      - MONGO_URI=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-}@mongodb:27017/?authSource=admin
      - MONGO_DB_NAME=${MONGO_DB_NAME:-es}
      - REPLICA_SET_AVAILABLE=false

      # Qdrant
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_HOST=qdrant
      - QDRANT_GRPC_PORT=6334
      - QDRANT_PORT=6333

      # Ollama (local LLM, optional)
      - OLLAMA_API_URL=http://host.docker.internal:11434

      # AWS Bedrock (optional)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}

      # Rate limits
      - MAX_REQUESTS_PER_MINUTE=${MAX_REQUESTS_PER_MINUTE:-2000}
      - MAX_OAUTH_CLIENT_REQUESTS_PER_MINUTE=${MAX_OAUTH_CLIENT_REQUESTS_PER_MINUTE:-1000}

      # Security
      - HIDE_SECRET_CONFIG=${HIDE_SECRET_CONFIG:-true}

      # Auth / tokens
      - MCP_SCOPES=${MCP_SCOPES:-openid,profile,email,offline_access,semantic:write,conversation:write,conversation:chat,kb:read,team:read,user:read,config:read}
      - ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY:-24h}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-720h}

      # ML threading
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-2}

      # Indexing concurrency
      - MAX_CONCURRENT_PARSING=${MAX_CONCURRENT_PARSING:-5}
      - MAX_CONCURRENT_INDEXING=${MAX_CONCURRENT_INDEXING:-7}
      - MAX_PENDING_INDEXING_TASKS=${MAX_PENDING_INDEXING_TASKS:-40}
      - INDEXING_UVICORN_WORKERS=${INDEXING_UVICORN_WORKERS:-1}
      - DOCLING_UVICORN_WORKERS=${DOCLING_UVICORN_WORKERS:-1}
      - LOCAL_DOCLING_PARSE_WORKERS=${LOCAL_DOCLING_PARSE_WORKERS:-1}
      - PDF_OCR_DETECTION_WORKERS=${PDF_OCR_DETECTION_WORKERS:-1}
      - MAX_TABLE_ROWS_FOR_LLM=${MAX_TABLE_ROWS_FOR_LLM:-1000}
      - EXCEL_MAX_TABLE_ROWS_TO_INDEX=${EXCEL_MAX_TABLE_ROWS_TO_INDEX:-20000}
      - EXCEL_HEADER_GENERATION_SAMPLE_SCAN_LIMIT=${EXCEL_HEADER_GENERATION_SAMPLE_SCAN_LIMIT:-500}
      - EMBEDDING_SERVER_ALLOW_REMOTE_CODE=${EMBEDDING_SERVER_ALLOW_REMOTE_CODE:-false}

      # Slack bot (optional)
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - BOT_TOKEN=${BOT_TOKEN:-}
      - SLACK_BOT_PORT=${SLACK_BOT_PORT:-3020}

      # Observability (optional)
      - OPIK_API_KEY=${OPIK_API_KEY:-}
      - OPIK_WORKSPACE=${OPIK_WORKSPACE:-}

      # Code sandbox
      - SANDBOX_MODE=${SANDBOX_MODE:-docker}
      - SANDBOX_DOCKER_IMAGE=${SANDBOX_DOCKER_IMAGE:-pipeshubai/pipeshub-sandbox:${IMAGE_TAG:-latest}}

    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      # Profile-gated deps — required:false means the app starts even when the
      # corresponding profile is inactive. The app itself gates on DATA_STORE /
      # KV_STORE_TYPE / MESSAGE_BROKER at runtime.
      etcd:
        condition: service_healthy
        required: false
      arango:
        condition: service_healthy
        required: false
      neo4j:
        condition: service_healthy
        required: false
      kafka-1:
        condition: service_healthy
        required: false
      sandbox-image:
        condition: service_completed_successfully

    volumes:
      - pipeshub_data:/data/pipeshub
      - pipeshub_root_local:/root/.local
      - pipeshub_hf_cache:/root/.cache/huggingface
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - pipeshub

    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -sf http://localhost:3000/api/v1/health/services -o /tmp/hc.json &&
          python3 -c "import json,sys; d=json.load(open('/tmp/hc.json')); s=d.get('services',{}) or {}; required=('query','connector','indexing','docling'); sys.exit(0 if all(s.get(k)=='healthy' for k in required) and s.get('embedding') in ('healthy','starting') else 1)"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 300s

  # ---------------------------------------------------------------------------
  # Always-on stateful services
  # ---------------------------------------------------------------------------

  mongodb:
    # Pin via MONGO_IMAGE_TAG to recover from host-specific MongoDB 8.x crashes.
    image: mongo:${MONGO_IMAGE_TAG:-8.0.17}
    container_name: mongodb
    restart: always
    # Quickstart targets a 16 GB-class shared Docker host running MongoDB beside
    # the app, Qdrant, graph DB, Redis, and optional broker services. WiredTiger
    # otherwise reserves roughly half of host RAM; cap cache at 1 GB by default
    # and keep the container limit at 2 GB to leave room for process overhead.
    command: ["mongod", "--bind_ip_all", "--wiredTigerCacheSizeGB", "${MONGO_CACHE_GB:-1}"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-}
      # Keep the official image's rseq=0 default for TCMalloc performance; set
      # MONGO_GLIBC_TUNABLES=glibc.pthread.rseq=1 if MongoDB exits 139 on newer kernels.
      - GLIBC_TUNABLES=${MONGO_GLIBC_TUNABLES:-glibc.pthread.rseq=0}
    volumes:
      - mongodb_data:/data/db
    networks:
      - pipeshub
    deploy:
      resources:
        limits:
          memory: ${MONGO_MEMORY_LIMIT:-2G}
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:bookworm
    container_name: redis
    restart: always
    command: >
      sh -c "redis-server
      --appendonly yes
      --appendfsync everysec
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}"
    volumes:
      - redis_data:/data
    networks:
      - pipeshub
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning ${REDIS_PASSWORD:+-a ${REDIS_PASSWORD}} ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.15
    container_name: qdrant
    restart: always
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=64
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=0
      - QDRANT__STORAGE__OPTIMIZERS__DEFAULT_SEGMENT_NUMBER=8
      - QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD=50000
      - QDRANT__STORAGE__WAL__WAL_CAPACITY_MB=256
      - QDRANT__CLUSTER__CONSENSUS__MAX_MESSAGE_QUEUE_SIZE=1000
    volumes:
      - qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    ulimits:
      nofile:
        soft: 50000
        hard: 50000
    networks:
      - pipeshub
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Pull-only helper: ensures the sandbox image exists before pipeshub-ai starts.
  # With --build it builds the sandbox image locally from deployment/sandbox/Dockerfile.
  sandbox-image:
    image: ${SANDBOX_DOCKER_IMAGE:-pipeshubai/pipeshub-sandbox:${IMAGE_TAG:-latest}}
    build:
      context: ../../deployment/sandbox
      dockerfile: Dockerfile
    container_name: sandbox-image
    restart: "no"
    command: ["sh", "-c", "echo 'sandbox image ready'"]
    networks:
      - pipeshub

  # ---------------------------------------------------------------------------
  # Graph DB — profile: graph-arango  (set DATA_STORE=arangodb, GRAPH_DB_TYPE=arangodb)
  # ---------------------------------------------------------------------------
  arango:
    profiles: ["graph-arango"]
    image: arangodb:3.12.4
    container_name: arango
    restart: always
    environment:
      - ARANGO_ROOT_PASSWORD=${ARANGO_PASSWORD:-}
    volumes:
      - arango_data:/var/lib/arangodb3
    networks:
      - pipeshub
    healthcheck:
      test: ["CMD-SHELL", "arangosh --server.endpoint tcp://localhost:8529 --server.password '${ARANGO_PASSWORD:-}' --javascript.execute-string 'db._version()' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Graph DB — profile: graph-neo4j  (set DATA_STORE=neo4j, GRAPH_DB_TYPE=neo4j)
  # ---------------------------------------------------------------------------
  neo4j:
    profiles: ["graph-neo4j"]
    image: neo4j:5.26.0
    container_name: neo4j
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=1G
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - pipeshub
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 3G
        reservations:
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # KV store — profile: kv-etcd  (set KV_STORE_TYPE=etcd)
  # When KV_STORE_TYPE=redis (default), no extra container is needed.
  # ---------------------------------------------------------------------------
  etcd:
    profiles: ["kv-etcd"]
    image: quay.io/coreos/etcd:v3.5.17
    container_name: etcd
    restart: always
    command: >
      etcd
      --name etcd-node
      --data-dir /etcd-data
      --listen-client-urls http://0.0.0.0:2379
      --advertise-client-urls http://etcd:2379
      --listen-peer-urls http://0.0.0.0:2380
      --initial-advertise-peer-urls http://etcd:2380
      --initial-cluster etcd-node=http://etcd:2380
    volumes:
      - etcd_data:/etcd-data
    networks:
      - pipeshub
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Message broker — profile: broker-kafka  (set MESSAGE_BROKER=kafka)
  # When MESSAGE_BROKER=redis (default), Redis Streams are used; no extra containers.
  # ---------------------------------------------------------------------------
  zookeeper:
    profiles: ["broker-kafka"]
    image: confluentinc/cp-zookeeper:7.9.0
    container_name: zookeeper
    restart: always
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - pipeshub
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-1:
    profiles: ["broker-kafka"]
    image: confluentinc/cp-kafka:7.9.0
    container_name: kafka-1
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=ACCESS:PLAINTEXT
      - KAFKA_LISTENERS=ACCESS://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=ACCESS://kafka-1:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=ACCESS
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_CREATE_TOPICS=record-events:1:1,entity-events:1:1,sync-events:1:1
      - KAFKA_LOG_RETENTION_HOURS=24
      - KAFKA_NUM_NETWORK_THREADS=3
      - KAFKA_NUM_IO_THREADS=8
    networks:
      - pipeshub
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  qdrant_storage:
    driver: local
  pipeshub_data:
    driver: local
  pipeshub_root_local:
    driver: local
  pipeshub_hf_cache:
    driver: local
  # Graph DB volumes (only populated by the active profile)
  arango_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  # KV store volume (only populated when kv-etcd profile is active)
  etcd_data:
    driver: local

networks:
  pipeshub:
    driver: bridge
    name: pipeshub-ai_network
