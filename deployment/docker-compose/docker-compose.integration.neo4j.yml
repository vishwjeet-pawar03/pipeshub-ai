services:
  pipeshub-ai:
    image: pipeshub-ai:latest
    restart: always
    build:
      context: ../../
      dockerfile: Dockerfile.integration
      args:
        BUILDKIT_INLINE_CACHE: "1"
        PYTHON_DEPS_IMAGE: ${PYTHON_DEPS_IMAGE:-pipeshubai/pipeshub-ai-base:python-deps}
        RUNTIME_BASE_IMAGE: ${RUNTIME_BASE_IMAGE:-pipeshubai/pipeshub-ai-base:runtime}
      shm_size: 4gb
      ulimits:
        memlock:
          soft: -1
          hard: -1
    ports:
      - "8091:8091"
      - "8081:8081"
      - "8088:8088"
      - "3000:3000"
      - "3020:3020"
      - "8001:8000"
    deploy:
      resources:
        limits:
          memory: 10G
    shm_size: 2gb
    init: true
    logging:
      driver: local
      options:
        max-size: "${LOG_MAX_SIZE:-20m}"
        max-file: "${LOG_MAX_FILE:-15}"
        compress: "true"
    environment:
      # Core environment settings
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - STRICT_MODE=${STRICT_MODE:-false}
      - SKIP_DOMAIN_CHECK=${SKIP_DOMAIN_CHECK:-false}
      # Security settings - allow override with custom secret
      - SECRET_KEY=${SECRET_KEY:-your_random_encryption_secret_key}

      # Public endpoints
      - CONNECTOR_PUBLIC_BACKEND=${CONNECTOR_PUBLIC_BACKEND:-}
      - FRONTEND_PUBLIC_URL=${FRONTEND_PUBLIC_URL:-}

      # Internal service URLs
      - QUERY_BACKEND=http://localhost:8000
      - CONNECTOR_BACKEND=http://localhost:8088
      - INDEXING_BACKEND=http://localhost:8091

      # Key-Value Store Configuration
      - KV_STORE_TYPE=${KV_STORE_TYPE:-redis}

      # Graph Database config
      - GRAPH_DB_TYPE=neo4j
      - DATA_STORE=neo4j

      # Neo4j config
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-your_password}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      
      # Message broker config
      - MESSAGE_BROKER=${MESSAGE_BROKER:-kafka}
      - REDIS_STREAMS_MAXLEN=${REDIS_STREAMS_MAXLEN:-10000}

      # Kafka config
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka-1:9092}
      - KAFKA_SSL=${KAFKA_SSL:-false}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-}

      # Redis config
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - REDIS_KV_PREFIX=${REDIS_KV_PREFIX:-pipeshub:kv:}
      - REDIS_TIMEOUT=${REDIS_TIMEOUT:-10000}
      - REDIS_DB=${REDIS_DB:-0}

      # MongoDB config
      - MONGO_URI=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/?authSource=admin
      - MONGO_DB_NAME=es

      # Qdrant config
      - QDRANT_API_KEY=${QDRANT_API_KEY:-your_qdrant_secret_api_key}
      - QDRANT_HOST=qdrant
      - QDRANT_GRPC_PORT=6334
      - QDRANT_PORT=6333

      - OLLAMA_API_URL=http://host.docker.internal:11434

      # Rate limit config
      - MAX_REQUESTS_PER_MINUTE=${MAX_REQUESTS_PER_MINUTE:-500}
      - MAX_OAUTH_CLIENT_REQUESTS_PER_MINUTE=${MAX_OAUTH_CLIENT_REQUESTS_PER_MINUTE:-1000}

      # Set to true to replace secrets in config API responses with **** markers
      - HIDE_SECRET_CONFIG=${HIDE_SECRET_CONFIG:-false}

      # MCP OAuth scopes
      - MCP_SCOPES=${MCP_SCOPES:-openid,profile,email,offline_access,semantic:write,conversation:write,conversation:chat,kb:read,team:read,user:read,config:read}

      # Token config
      - ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY:-24h}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-720h}
      
      # Indexing service config
      - MAX_CONCURRENT_PARSING=${MAX_CONCURRENT_PARSING:-5}
      - MAX_CONCURRENT_INDEXING=${MAX_CONCURRENT_INDEXING:-5}

      - OPIK_API_KEY=${OPIK_API_KEY:-}
      - OPIK_WORKSPACE=${OPIK_WORKSPACE:-}

      # AWS credentials (for Bedrock IAM role access from inside the container)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}

      # Slack Bot config
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - BOT_TOKEN=${BOT_TOKEN:-}
      - SLACK_BOT_PORT=${SLACK_BOT_PORT:-3020}
    depends_on:
      qdrant:
        condition: service_healthy
      kafka-1:
        condition: service_started
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      neo4j:
        condition: service_healthy
    volumes:
      - pipeshub_data:/data/pipeshub
      - pipeshub_root_local:/root/.local
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mongodb:
    image: mongo:8.0.17
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-password}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:bookworm
    restart: always
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c "redis-server
      --appendonly yes
      --appendfsync everysec
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}"
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5.26.0
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-your_password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=1G
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 3G
        reservations:
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    restart: always
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000

  kafka-1:
    image: confluentinc/cp-kafka:7.9.0
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=ACCESS:PLAINTEXT,HOST:PLAINTEXT
      - KAFKA_LISTENERS=ACCESS://0.0.0.0:9092,HOST://0.0.0.0:29092
      - KAFKA_ADVERTISED_LISTENERS=ACCESS://kafka-1:9092,HOST://localhost:29092
      - KAFKA_INTER_BROKER_LISTENER_NAME=ACCESS
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_CREATE_TOPICS=record-events:1:1,entity-events:1:1,sync-events:1:1
      - KAFKA_LOG_RETENTION_HOURS=24
      - KAFKA_NUM_NETWORK_THREADS=3
      - KAFKA_NUM_IO_THREADS=8

  qdrant:
    image: qdrant/qdrant:v1.15
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-your_qdrant_secret_api_key}
      # Performance optimizations
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=64
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=0  # Use all available CPUs
      - QDRANT__STORAGE__OPTIMIZERS__DEFAULT_SEGMENT_NUMBER=8
      - QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD=50000
      - QDRANT__STORAGE__WAL__WAL_CAPACITY_MB=256
      - QDRANT__CLUSTER__CONSENSUS__MAX_MESSAGE_QUEUE_SIZE=1000
    volumes:
      - qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    ulimits:
      nofile:
        soft: 50000
        hard: 50000
    restart: always
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  qdrant_storage:
    driver: local
  pipeshub_data:
    driver: local
  pipeshub_root_local:
    driver: local
