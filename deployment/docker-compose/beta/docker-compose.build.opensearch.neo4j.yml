services:
  pipeshub-ai:
    image: pipeshub-ai:latest
    restart: always
    build:
      context: ../../../
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        PYTHON_DEPS_IMAGE: ${PYTHON_DEPS_IMAGE:-pipeshubai/pipeshub-ai-base:python-deps}
        RUNTIME_BASE_IMAGE: ${RUNTIME_BASE_IMAGE:-pipeshubai/pipeshub-ai-base:runtime}
      shm_size: 4gb
      ulimits:
        memlock:
          soft: -1
          hard: -1
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 12G
    shm_size: 2gb
    init: true
    logging:
      driver: local
      options:
        max-size: "${LOG_MAX_SIZE:-20m}"
        max-file: "${LOG_MAX_FILE:-15}"
        compress: "true"
    environment:
      # Core environment settings
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001}
      - STRICT_MODE=${STRICT_MODE:-false}
      - SKIP_DOMAIN_CHECK=${SKIP_DOMAIN_CHECK:-false}
      - SAML_SP_ENTITY_ID=${SAML_SP_ENTITY_ID:-}
      # Security settings - allow override with custom secret
      - SECRET_KEY=${SECRET_KEY:-your_random_encryption_secret_key}

      # Public endpoints
      - CONNECTOR_PUBLIC_BACKEND=${CONNECTOR_PUBLIC_BACKEND:-}
      - FRONTEND_PUBLIC_URL=${FRONTEND_PUBLIC_URL:-}

      # Internal service URLs
      - QUERY_BACKEND=http://localhost:8000
      - CONNECTOR_BACKEND=http://localhost:8088
      - INDEXING_BACKEND=http://localhost:8091
      - EMBEDDING_SERVER_URL=http://localhost:8002

      # Vector DB — OpenSearch (security plugin disabled for local dev)
      # For production: remove DISABLE_INSTALL_DEMO_CONFIG + plugins.security.disabled
      # from the opensearch service, set OPENSEARCH_USE_SSL=true, OPENSEARCH_VERIFY_CERTS=true,
      # and provide OPENSEARCH_USERNAME / OPENSEARCH_PASSWORD.
      - VECTOR_DB_TYPE=opensearch
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME:-}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-}
      - OPENSEARCH_USE_SSL=${OPENSEARCH_USE_SSL:-false}
      - OPENSEARCH_VERIFY_CERTS=${OPENSEARCH_VERIFY_CERTS:-false}
      # HNSW index tuning — change these to tune search/indexing performance.
      # OPENSEARCH_HNSW_M: bidirectional links per node (lower = faster insert + less memory;
      - OPENSEARCH_HNSW_M=${OPENSEARCH_HNSW_M:-16}
      # OPENSEARCH_EF_CONSTRUCTION: candidate list size during graph build (higher = better
      #   graph quality but slower indexing). 128 is the OpenSearch recommended default.
      - OPENSEARCH_EF_CONSTRUCTION=${OPENSEARCH_EF_CONSTRUCTION:-128}
      # OPENSEARCH_EF_SEARCH: candidate list size during k-NN search (higher = better recall
      #   at the cost of slightly higher latency)
      - OPENSEARCH_EF_SEARCH=${OPENSEARCH_EF_SEARCH:-100}
      # OPENSEARCH_QUANTIZATION_BITS: Lucene scalar quantization bit depth.
      #   7 = 7-bit SQ (~4x memory reduction, INT8 equivalent); 0 = disabled (full FP32)
      - OPENSEARCH_QUANTIZATION_BITS=${OPENSEARCH_QUANTIZATION_BITS:-7}
      # OPENSEARCH_CONFIDENCE_INTERVAL: fraction of vectors used to compute quantizer bounds
      #   (0.99 clips 1% outliers; lower values trade recall for memory)
      - OPENSEARCH_CONFIDENCE_INTERVAL=${OPENSEARCH_CONFIDENCE_INTERVAL:-0.99}
      # OPENSEARCH_RRF_RANK_CONSTANT: RRF fusion rank constant (higher = smoother ranking
      #   across legs; 60 is the OpenSearch default)
      - OPENSEARCH_RRF_RANK_CONSTANT=${OPENSEARCH_RRF_RANK_CONSTANT:-60}

      # Key-Value Store Configuration
      - KV_STORE_TYPE=${KV_STORE_TYPE:-redis}

      # Graph Database config
      - GRAPH_DB_TYPE=neo4j
      - DATA_STORE=neo4j

      # Neo4j config
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-your_password}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}

      # Message broker config
      - MESSAGE_BROKER=${MESSAGE_BROKER:-redis}
      - REDIS_STREAMS_MAXLEN=${REDIS_STREAMS_MAXLEN:-10000}

      # Kafka config
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka-1:9092}
      - KAFKA_SSL=${KAFKA_SSL:-false}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-}

      # Redis config (used for KV store and message broker)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - REDIS_KV_PREFIX=${REDIS_KV_PREFIX:-pipeshub:kv:}
      - REDIS_TIMEOUT=${REDIS_TIMEOUT:-10000}
      - REDIS_DB=${REDIS_DB:-0}

      # MongoDB config
      - MONGO_URI=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/?authSource=admin
      - MONGO_DB_NAME=es
      # Standalone mongod — multi-document transactions unavailable. App branches on this.
      - REPLICA_SET_AVAILABLE=false

      - OLLAMA_API_URL=http://host.docker.internal:11434

      # Rate limit config
      - MAX_REQUESTS_PER_MINUTE=${MAX_REQUESTS_PER_MINUTE:-2000}
      - MAX_OAUTH_CLIENT_REQUESTS_PER_MINUTE=${MAX_OAUTH_CLIENT_REQUESTS_PER_MINUTE:-1000}

      # Set to true to replace secrets in config API responses with **** markers
      - HIDE_SECRET_CONFIG=${HIDE_SECRET_CONFIG:-true}

      # MCP OAuth scopes
      - MCP_SCOPES=${MCP_SCOPES:-openid,profile,email,offline_access,semantic:write,conversation:write,conversation:chat,kb:read,team:read,user:read,config:read}

      # Token config
      - ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY:-24h}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-720h}

      # ML thread limit — caps PyTorch / OpenBLAS / MKL threads per operation.
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-2}

      # Indexing service config
      - MAX_CONCURRENT_PARSING=${MAX_CONCURRENT_PARSING:-5}
      - MAX_CONCURRENT_INDEXING=${MAX_CONCURRENT_INDEXING:-5}
      - MAX_PENDING_INDEXING_TASKS=${MAX_PENDING_INDEXING_TASKS:-40}
      - INDEXING_UVICORN_WORKERS=${INDEXING_UVICORN_WORKERS:-1}
      - DOCLING_UVICORN_WORKERS=${DOCLING_UVICORN_WORKERS:-1}
      - LOCAL_DOCLING_PARSE_WORKERS=${LOCAL_DOCLING_PARSE_WORKERS:-1}
      - PDF_OCR_DETECTION_WORKERS=${PDF_OCR_DETECTION_WORKERS:-1}
      - MAX_TABLE_ROWS_FOR_LLM=${MAX_TABLE_ROWS_FOR_LLM:-1000}
      - EXCEL_MAX_TABLE_ROWS_TO_INDEX=${EXCEL_MAX_TABLE_ROWS_TO_INDEX:-20000}
      - EXCEL_HEADER_GENERATION_SAMPLE_SCAN_LIMIT=${EXCEL_HEADER_GENERATION_SAMPLE_SCAN_LIMIT:-500}
      - EMBEDDING_SERVER_ALLOW_REMOTE_CODE=${EMBEDDING_SERVER_ALLOW_REMOTE_CODE:-false}

      - OPIK_API_KEY=${OPIK_API_KEY:-}
      - OPIK_WORKSPACE=${OPIK_WORKSPACE:-}

      # AWS credentials (for Bedrock IAM role access from inside the container)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}

      # Slack Bot config
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - BOT_TOKEN=${BOT_TOKEN:-}
      - SLACK_BOT_PORT=${SLACK_BOT_PORT:-3020}

      # Sandbox execution mode (local = subprocess, docker = ephemeral containers).
      # Defaults to "docker" -- the sandbox-image service below builds the required
      # pipeshub/sandbox:latest image before pipeshub-ai starts.
      # Production (docker-compose.prod.yml) pulls pipeshubai/pipeshub-sandbox:${IMAGE_TAG}
      # from the registry instead; build/push from deployment/sandbox alongside pipeshub-ai.
      - SANDBOX_MODE=${SANDBOX_MODE:-docker}

    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      sandbox-image:
        condition: service_completed_successfully

    volumes:
      - pipeshub_data:/data/pipeshub
      - pipeshub_root_local:/root/.local
      # Persist the HuggingFace model cache so models pulled at runtime survive
      # container recreation instead of being re-downloaded on every restart.
      - pipeshub_hf_cache:/root/.cache/huggingface
      - /var/run/docker.sock:/var/run/docker.sock  # Required for SANDBOX_MODE=docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Probe the aggregated /api/v1/health/services endpoint served by the
    # nodejs API. If curl succeeds, the nodejs service itself is up; the JSON
    # body must additionally report every Python application service
    # (query, connector, indexing, docling, embedding) as "healthy" before the container
    # is considered ready. This makes `docker compose up --wait` block until
    # all pipeshub services inside the container have finished starting.
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -sf http://localhost:3000/api/v1/health/services -o /tmp/hc.json &&
          python3 -c "import json,sys; d=json.load(open('/tmp/hc.json')); s=d.get('services',{}) or {}; required=('query','connector','indexing','docling'); sys.exit(0 if all(s.get(k)=='healthy' for k in required) and s.get('embedding') in ('healthy','starting') else 1)"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 300s

  mongodb:
    image: mongo:8.0.17
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-password}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:3.6.0
    restart: always
    environment:
      - cluster.name=pipeshub-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      # JVM heap: 2 GB.  The Lucene HNSW engine uses memory-mapped files
      # (OS page cache) for its graph files, not JVM heap — so free RAM
      # outside the heap also matters.  With a 4 GB container limit, ~2 GB
      # remains for the OS page cache which keeps the HNSW graphs warm and
      # speeds both ingest (graph build) and search (graph traversal).
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      # Skip the demo-config entrypoint script entirely — this also bypasses the
      # OPENSEARCH_INITIAL_ADMIN_PASSWORD strength check that runs before OpenSearch
      # itself starts.  Required when security plugin is disabled for local dev.
      - DISABLE_INSTALL_DEMO_CONFIG=true
      # Disable the security plugin at the OpenSearch config level.
      # For production, remove these two lines and set OPENSEARCH_INITIAL_ADMIN_PASSWORD
      # to a strong password (min 8 chars, upper+lower+digit+special).
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.6.0
    restart: always
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      # Mirror the security-disabled setting from the opensearch service.
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  neo4j:
    image: neo4j:5.26.0
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-your_password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=1G
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 3G
        reservations:
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  zookeeper:
    profiles: ["kafka"]
    image: confluentinc/cp-zookeeper:7.9.0
    restart: always
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-1:
    profiles: ["kafka"]
    image: confluentinc/cp-kafka:7.9.0
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=ACCESS:PLAINTEXT
      - KAFKA_LISTENERS=ACCESS://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=ACCESS://kafka-1:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=ACCESS
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_CREATE_TOPICS=record-events:1:1,entity-events:1:1,sync-events:1:1
      - KAFKA_LOG_RETENTION_HOURS=24
      - KAFKA_NUM_NETWORK_THREADS=3
      - KAFKA_NUM_IO_THREADS=8
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Build-only helper that ensures the pipeshub/sandbox:latest image is
  # available on the host Docker daemon before pipeshub-ai starts.
  # The container itself is a no-op: it prints a message and exits 0, leaving
  # the image in place for SANDBOX_MODE=docker ephemeral execution.
  sandbox-image:
    image: pipeshub/sandbox:latest
    build:
      context: ../../../deployment/sandbox
      dockerfile: Dockerfile
    restart: "no"
    command: ["sh", "-c", "echo 'pipeshub/sandbox:latest image ready'"]

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  opensearch_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  pipeshub_data:
    driver: local
  pipeshub_root_local:
    driver: local
  pipeshub_hf_cache:
    driver: local
