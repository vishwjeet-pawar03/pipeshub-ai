{{- if .Values.neo4j.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pipeshub-ai.fullname" . }}-neo4j-headless
  labels:
    {{- include "pipeshub-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: 7474
      name: http
    - port: 7687
      name: bolt
    - port: 6362
      name: backup
    - port: 7688
      name: discovery
  selector:
    {{- include "pipeshub-ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "pipeshub-ai.fullname" . }}-neo4j
  labels:
    {{- include "pipeshub-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  type: ClusterIP
  ports:
    - port: 7687
      targetPort: bolt
      protocol: TCP
      name: bolt
    - port: 7474
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "pipeshub-ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pipeshub-ai.fullname" . }}-neo4j
  labels:
    {{- include "pipeshub-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  serviceName: {{ include "pipeshub-ai.fullname" . }}-neo4j-headless
  replicas: {{ .Values.neo4j.replicaCount }}
  selector:
    matchLabels:
      {{- include "pipeshub-ai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: neo4j
  template:
    metadata:
      labels:
        {{- include "pipeshub-ai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: neo4j
    spec:
      securityContext:
        {{- toYaml .Values.neo4j.podSecurityContext | nindent 8 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "pipeshub-ai.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: neo4j
                topologyKey: kubernetes.io/hostname
      containers:
        - name: neo4j
          image: "{{ .Values.neo4j.image.repository }}:{{ .Values.neo4j.image.tag }}"
          imagePullPolicy: {{ .Values.neo4j.image.pullPolicy }}
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
            - containerPort: 6362
              name: backup
            - containerPort: 7688
              name: discovery
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # NEO4J_AUTH is composed inside the container so the secret only needs to
            # carry the password (compatible with externalSecrets / existingSecrets modes,
            # which cannot synthesize composite secret keys).
            # Env var name MUST NOT start with NEO4J_ — the Neo4j 5.x entrypoint
            # translates every NEO4J_* env var into a neo4j.conf setting
            # (stripping the prefix), which makes NEO4J_PASSWORD become an
            # invalid config key "PASSWORD" and the container fails to start.
            - name: PIPESHUB_NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.neo4jSecretName" . }}
                  key: neo4j-password
            - name: NEO4J_AUTH
              value: "{{ .Values.neo4j.auth.username }}/$(PIPESHUB_NEO4J_PASSWORD)"
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: "yes"
            - name: NEO4J_dbms_connector_bolt_advertised__address
              value: "$(POD_NAME).{{ include "pipeshub-ai.fullname" . }}-neo4j-headless.{{ .Release.Namespace }}.svc.cluster.local:7687"
            - name: NEO4J_dbms_connector_http_advertised__address
              value: "$(POD_NAME).{{ include "pipeshub-ai.fullname" . }}-neo4j-headless.{{ .Release.Namespace }}.svc.cluster.local:7474"
            {{- range $k, $v := .Values.neo4j.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
          resources:
            {{- toYaml .Values.neo4j.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.neo4j.securityContext | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 60
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.neo4j.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.size }}
        {{- if .Values.neo4j.persistence.storageClass }}
        storageClassName: {{ .Values.neo4j.persistence.storageClass | quote }}
        {{- end }}
    - metadata:
        name: logs
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
        {{- if .Values.neo4j.persistence.storageClass }}
        storageClassName: {{ .Values.neo4j.persistence.storageClass | quote }}
        {{- end }}

---

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "pipeshub-ai.fullname" . }}-neo4j-pdb
  labels:
    {{- include "pipeshub-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "pipeshub-ai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: neo4j
{{- end }}
