{{- /* Validate required secrets before deployment */ -}}
{{- include "pipeshub-ai.validateRequiredSecrets" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pipeshub-ai.fullname" . }}
  labels:
    {{- include "pipeshub-ai.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "pipeshub-ai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pipeshub-ai.labels" . | nindent 8 }}
        app.kubernetes.io/component: main
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pipeshub-ai.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "pipeshub-ai.image" (dict "image" .Values.image "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: main
              containerPort: 8091
              protocol: TCP
            - name: connector
              containerPort: 8088
              protocol: TCP
            - name: backend
              containerPort: 3001
              protocol: TCP
            - name: query
              containerPort: 8000
              protocol: TCP
            - name: indexing
              containerPort: 8081
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          env:
            # Core environment settings
            - name: PORT
              value: {{ .Values.config.backendPort | quote }}
            - name: NODEJS_PORT
              value: {{ .Values.config.backendPort | quote }}
            - name: NODE_ENV
              value: {{ .Values.config.nodeEnv | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: KV_STORE_TYPE
              value: {{ .Values.config.kvStoreType | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.config.allowedOrigins | quote }}
            - name: SAML_SP_ENTITY_ID
              value: {{ .Values.config.samlSpEntityId | default .Values.config.frontendPublicUrl | default "pipeshub" | quote }}
            
            # Security settings
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.secretName" . }}
                  key: secret-key
            
            # Public endpoints
            - name: CONNECTOR_PUBLIC_BACKEND
              value: {{ .Values.config.connectorPublicBackend | quote }}
            - name: FRONTEND_PUBLIC_URL
              value: {{ .Values.config.frontendPublicUrl | quote }}
            
            # Internal service URLs
            - name: QUERY_BACKEND
              value: "http://localhost:8000"
            - name: CONNECTOR_BACKEND
              value: "http://localhost:8088"
            - name: INDEXING_BACKEND
              value: "http://localhost:8091"
            - name: EMBEDDING_SERVER_URL
              value: "http://localhost:8002"
            
            {{- if .Values.etcd.enabled }}
            # ETCD config
            - name: ETCD_URL
              value: "http://{{ include "pipeshub-ai.fullname" . }}-etcd:2379"
            - name: ETCD_HOST
              value: "{{ include "pipeshub-ai.fullname" . }}-etcd"
            {{- end }}
            
            {{- if .Values.arango.enabled }}
            # ArangoDB config
            - name: ARANGO_URL
              value: "http://{{ include "pipeshub-ai.fullname" . }}-arango:8529"
            - name: ARANGO_DB_NAME
              value: "es"
            - name: ARANGO_USERNAME
              value: "root"
            - name: ARANGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.arangoSecretName" . }}
                  key: arango-password
            {{- end }}
            {{- if .Values.neo4j.enabled }}
            # Neo4j config (app uses Neo4j as graph DB when DATA_STORE=neo4j)
            - name: GRAPH_DB_TYPE
              value: "neo4j"
            - name: DATA_STORE
              value: "neo4j"
            - name: NEO4J_URI
              value: "bolt://{{ include "pipeshub-ai.fullname" . }}-neo4j:7687"
            - name: NEO4J_USERNAME
              value: {{ .Values.neo4j.auth.username | quote }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.neo4jSecretName" . }}
                  key: neo4j-password
            - name: NEO4J_DATABASE
              value: {{ .Values.neo4j.auth.database | quote }}
            {{- end }}
            
            # Message broker config
            - name: MESSAGE_BROKER
              value: {{ .Values.messageBroker.type | default "kafka" | quote }}
            - name: REDIS_STREAMS_MAXLEN
              value: {{ .Values.messageBroker.redisStreamsMaxLen | default "500000" | quote }}

            # Kafka config
            - name: KAFKA_BROKERS
              value: "{{ include "pipeshub-ai.fullname" . }}-kafka:9092"
            
            # Redis config
            {{- /*
              Connection target:
                - standalone or replication (no sentinel): use the Bitnami "<release>-redis-master" Service.
                  This is a stable Service that the chart updates to follow the current master pod, so the
                  app does not need Sentinel awareness.
                - sentinel enabled: the app MUST use a Sentinel-aware client. The chart still exposes the
                  master Service for compatibility, but failover updates may lag and stale connections are
                  possible. Enable Sentinel only if the app is migrated to a Sentinel client.
            */}}
            - name: REDIS_HOST
              value: "{{ .Release.Name }}-redis-master"
            - name: REDIS_PORT
              value: "6379"
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.redisSecretName" . }}
                  key: redis-password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Release.Name }}-redis-master:6379"
            {{- else }}
            - name: REDIS_PASSWORD
              value: ""
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379"
            {{- end }}
            
            # MongoDB config
            {{- $isReplicaSet := eq (.Values.mongodb.architecture | default "standalone") "replicaset" }}
            {{- $mongoHost := ternary (printf "%s-mongodb-headless" .Release.Name) (printf "%s-mongodb" .Release.Name) $isReplicaSet }}
            {{- $mongoRsParam := ternary (printf "&replicaSet=%s" (.Values.mongodb.replicaSetName | default "rs0")) "" $isReplicaSet }}
            {{- if .Values.mongodb.auth.enabled }}
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.mongodbSecretName" . }}
                  key: mongodb-username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.mongodbSecretName" . }}
                  key: mongodb-password
            - name: MONGO_URI
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@{{ $mongoHost }}:27017/?authSource=admin{{ $mongoRsParam }}"
            {{- else }}
            - name: MONGO_URI
              value: "mongodb://{{ $mongoHost }}:27017/{{ if $mongoRsParam }}?{{ trimPrefix "&" $mongoRsParam }}{{ end }}"
            {{- end }}
            - name: MONGO_DB_NAME
              value: "es"
            # Single source of truth: tied to mongodb.architecture so this env var
            # cannot drift from the rendered MONGO_URI. Overriding architecture
            # alone (e.g. --set mongodb.architecture=standalone) used to leave
            # REPLICA_SET_AVAILABLE=true and crash the API at first transaction.
            - name: REPLICA_SET_AVAILABLE
              value: {{ ternary "true" "false" $isReplicaSet | quote }}
            
            # Qdrant config
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.qdrantSecretName" . }}
                  key: qdrant-api-key
            - name: QDRANT_HOST
              value: "{{ include "pipeshub-ai.fullname" . }}-qdrant"
            - name: QDRANT_GRPC_PORT
              value: "6334"
            - name: QDRANT_PORT
              value: "6333"
            - name: HOME
              value: /home/user
            
            {{- if .Values.telemetry.enabled }}
            # OpenTelemetry configuration
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ required "telemetry.otlp.endpoint is required when telemetry.enabled is true" .Values.telemetry.otlp.endpoint | quote }}
            {{- if .Values.telemetry.otlp.tls.insecure }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            {{- end }}
            {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Per-pod ephemera (logs, caches, $HOME) — always emptyDir to avoid
            # ReadWriteOnce contention between replicas. Logs should be shipped via
            # the platform log collector (CloudWatch, Loki, etc.) for retention.
            - name: app-logs
              mountPath: /app/python/logs
            - name: app-home
              mountPath: /home/user
            - name: app-rootlocal
              mountPath: /root/.local
            {{- if .Values.persistence.enabled }}
            # Shared persistent data (uploads, local KV state, etc.). With multiple
            # replicas this PVC MUST be ReadWriteMany — validation in _helpers.tpl
            # blocks the install otherwise.
            - name: pipeshub-storage
              mountPath: /data/pipeshub
              subPath: data
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.healthCheck.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: {{ .Values.healthCheck.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.startupProbe.failureThreshold }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: {{ .Values.healthCheck.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: {{ .Values.healthCheck.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.livenessProbe.failureThreshold }}
          {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: cache
          emptyDir: {}
        - name: app-logs
          emptyDir: {}
        - name: app-home
          emptyDir: {}
        - name: app-rootlocal
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: pipeshub-storage
          persistentVolumeClaim:
            claimName: {{ include "pipeshub-ai.fullname" . }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
