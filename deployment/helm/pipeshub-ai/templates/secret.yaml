{{- if include "pipeshub-ai.createSecrets" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pipeshub-ai.fullname" . }}-secrets
  labels:
    {{- include "pipeshub-ai.labels" . | nindent 4 }}
type: Opaque
data:
  secret-key: {{ required "secretKey is required when not using existing secrets or external secrets. Generate with: openssl rand -hex 32" .Values.secretKey | b64enc | quote }}
  {{- if .Values.arango.enabled }}
  arango-password: {{ required "arango.auth.rootPassword is required when ArangoDB is enabled" .Values.arango.auth.rootPassword | b64enc | quote }}
  {{- end }}
  qdrant-api-key: {{ .Values.qdrant.apiKey | default "api_key" | b64enc | quote }}
  {{- if .Values.redis.auth.enabled }}
  redis-password: {{ required "redis.auth.password is required when Redis auth is enabled. Set via --set redis.auth.password=<password>" .Values.redis.auth.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.mongodb.auth.enabled }}
  mongodb-username: {{ .Values.mongodb.auth.rootUser | default "root" | b64enc | quote }}
  mongodb-password: {{ required "mongodb.auth.rootPassword is required when MongoDB auth is enabled. Set via --set mongodb.auth.rootPassword=<password>" .Values.mongodb.auth.rootPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.neo4j.enabled }}
  {{- if eq .Values.neo4j.auth.password "your_password" }}
    {{- fail "neo4j.auth.password must not use default placeholder 'your_password'. Set a secure password via --set neo4j.auth.password=<password>" }}
  {{- end }}
  neo4j-password: {{ required "neo4j.auth.password is required when Neo4j is enabled" .Values.neo4j.auth.password | b64enc | quote }}
  {{- end }}
{{- end }}
