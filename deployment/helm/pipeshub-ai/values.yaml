replicaCount: 2

# Global configuration
global:
  # Image registry and pull policy
  imageRegistry: ""
  imagePullPolicy: "IfNotPresent"
  
  # Common labels applied to all resources
  commonLabels: {}
  
  # Storage class for persistent volumes
  storageClass: ""

# Secret management configuration
secretManagement:
  # External Secrets Operator integration
  # Requires External Secrets Operator to be installed in the cluster
  # See: https://external-secrets.io/latest/introduction/getting-started/
  externalSecrets:
    enabled: false
    apiVersion: "v1"  # Use "v1" for ESO v0.17+ (recommended), "v1beta1" for older versions
    targetSecretName: ""  # Defaults to <release>-pipeshub-ai-secrets
    secretStoreRef:
      name: ""
      kind: "ClusterSecretStore"  # Or "SecretStore" for namespaced
    refreshInterval: "1h"
    # Remote references - map these to your external secret store paths
    remoteRefs:
      secretKey: ""  # Path in external store (e.g., "pipeshub/app/secret-key")
      mongodbUsername: ""
      mongodbPassword: ""
      redisPassword: ""
      neo4jPassword: ""
      arangoPassword: ""
      qdrantApiKey: ""

  # Existing Kubernetes secret references
  # Use this if you pre-create secrets manually or via another tool
  existingSecrets:
    enabled: false
    appSecretName: ""  # Secret containing secretKey, etc.
    mongodbSecretName: ""
    redisSecretName: ""
    neo4jSecretName: ""
    arangoSecretName: ""
    qdrantSecretName: ""

image:
  repository: pipeshubai/pipeshub-ai
  pullPolicy: IfNotPresent
  tag: "latest"  # v0.3.0 is not available on Docker Hub

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP

# Metrics configuration for Prometheus
metrics:
  enabled: true
  port: 9090  # Port for exposing application metrics

# Monitoring configuration
monitoring:
  serviceMonitor:
    enabled: false  # Requires Prometheus Operator CRDs
    labels: {}  # Labels to match Prometheus selector
    annotations: {}
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

# Telemetry configuration (OpenTelemetry)
telemetry:
  enabled: false
  otlp:
    endpoint: ""  # OTLP endpoint URL (e.g., "http://otel-collector:4317")
    headers: {}  # Custom headers for OTLP exporter
    tls:
      enabled: false
      insecure: false

ingress:
  enabled: false
  className: "" # Fill
  annotations: {} # Fill
  # Each path supports `path`, `pathType`, and optionally `port` (defaults to
  # 3001) and `serviceName` (defaults to the chart's rendered fullname Service).
  hosts: [] # Fill
    # - host: pipeshub.example.com
    #   paths:
    #     - path: /
    #       pathType: ImplementationSpecific
    # - host: pipeshub-connector.example.com
    #   paths:
    #     - path: /
    #       pathType: ImplementationSpecific
    #       port: 8088
  tls: [] # Fill
    # - secretName: pipeshub-example-com-tls
    #   hosts:
    #     - pipeshub.example.com
    # - secretName: pipeshub-connector-example-com-tls
    #   hosts:
    #     - pipeshub-connector.example.com
resources:
  limits:
    cpu: 8
    memory: 16Gi
  requests:
    cpu: 4
    memory: 8Gi
  # For small clusters (e.g. kind), use lower requests so the pod can schedule: --set resources.requests.cpu=500m --set resources.requests.memory=1Gi

# Additional volumes for app deployment
# Example:
# extraVolumes:
#   - name: branding
#     configMap:
#       name: pipeshub-branding
extraVolumes: []

# Additional volume mounts for the main container
# Example:
# extraVolumeMounts:
#   - name: branding
#     mountPath: /app/public/branding
extraVolumeMounts: []

volumes: {}

volumeMounts: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Pod Disruption Budget for High Availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1  # Alternative: allow max 1 pod to be unavailable

# Network Policy for pod-to-pod communication control
networkPolicy:
  enabled: false
  ingress:
    # Allow from ingress controller
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-nginx
    # Allow from same namespace
    - from:
      - podSelector: {}
  egress:
    # Allow DNS
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Allow all TCP egress (for external API calls, databases, etc.)
    - to:
      - podSelector: {}
      ports:
        - protocol: TCP

# Health check configuration
healthCheck:
  # Startup probe for slow-starting applications
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30  # Allows up to 5 minutes to start (10s * 30 = 300s)
  
  # Readiness probe configuration
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12
  
  # Liveness probe configuration
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6  # Scale up to 6 pods based on load
  targetCPUUtilizationPercentage: 70  # Scale when CPU > 70%
  targetMemoryUtilizationPercentage: 80  # Scale when Memory > 80%
  # ⚠️  CRITICAL: Metrics Server is REQUIRED for autoscaling!
  #     Without it, HPA will NOT work. Install it first:
  #     ./deployment/helm/local-install-metrics-server.sh
  #
  #     Verify: kubectl get deployment metrics-server -n kube-system
  #
  # behavior:  # Optional: Control scale-up/down speed
  #   scaleDown:
  #     stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
  #     policies:
  #       - type: Percent
  #         value: 50  # Scale down max 50% of current pods
  #         periodSeconds: 60
  #   scaleUp:
  #     stabilizationWindowSeconds: 0  # Scale up immediately
  #     policies:
  #       - type: Percent
  #         value: 100  # Scale up max 100% of current pods
  #         periodSeconds: 60
  #       - type: Pods
  #         value: 2  # Or add max 2 pods at a time
  #         periodSeconds: 60

persistence:
  enabled: true
  storageClass: "" # Fill (uses global.storageClass if not set)
  accessModes:
    - ReadWriteOnce
  size: 10Gi

config:
  nodeEnv: "production"
  logLevel: "info"
  backendPort: 3001  # Backend HTTP port; should match service.port and probe ports
  kvStoreType: "redis"  # Key-value store backend (e.g. "redis")
  allowedOrigins: ""  # SECURITY: Set to specific origins (comma-separated) instead of "*"
  # Example: "https://app.example.com,https://admin.example.com"
  # For development: --set config.allowedOrigins="http://localhost:3001"
  connectorPublicBackend: "" # Fill
  # connectorPublicBackend: "https://pipeshub-connector.example.com"
  frontendPublicUrl: "" # Fill
  # frontendPublicUrl: "https://pipeshub.dyn.example.com"

  # SAML SP Entity ID (Issuer) — must match the Audience URI configured in your IdP.
  # Enter this value in your IdP (e.g. Okta → "Audience URI (SP Entity ID)").
  # Override with --set config.samlSpEntityId="https://app.example.com"
  samlSpEntityId: "pipeshub"

# IMPORTANT: Set a stable secret key for production deployments!
# If not set, a random key is generated on each install. This causes issues
# because encrypted data (OAuth tokens, etc.) cannot be decrypted after restart.
# Example: --set secretKey="your-32-char-secret-key-here"
secretKey: "" # Fill

mongodb:
  architecture: replicaset
  replicaSetName: rs0
  replicaCount: 2  # 2 data nodes + 1 arbiter = quorum with less storage than 3 full copies
  # Note: REPLICA_SET_AVAILABLE for the app is derived from mongodb.architecture
  # in templates/deployment.yaml. Do not add a separate flag here.
  tls:
    enabled: false
    securityContext:
      enabled: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
  auth:
    enabled: true
    rootUser: "root"  # MongoDB root username for application
    # rootPassword: ""  # Set via --set mongodb.auth.rootPassword=<password> or use external secret
    # password: ""  # Set via --set mongodb.auth.password=<password> or use external secret
    # database: pipeshub
  persistence:
    enabled: true
    storageClass: "" # Fill
  arbiter:
    enabled: true  # Provides the quorum vote without storing a full data copy
  podSecurityContext:
    enabled: true
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    enabled: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

redis:
  architecture: replication  # 1 master + 1 replica for minimal read failover
  master:
    count: 1
  replica:
    replicaCount: 1
  # Sentinel is disabled by default because the app client is not Sentinel-aware
  # and connects to <release>-redis-master directly. Enabling Sentinel without
  # a Sentinel-aware client will cause stale connections after a failover.
  sentinel:
    enabled: false
    quorum: 2
  auth:
    enabled: true
    # password: ""  # Set via --set redis.auth.password=<password> or use external secret
  persistence:
    enabled: true
    storageClass: "" # Fill

arango:
  enabled: false
  image:
    repository: arangodb
    tag: 3.12.4
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClass: "" # Fill
  auth:
    enabled: true
    rootPassword: "root"
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

etcd:
  enabled: false
  image:
    repository: quay.io/coreos/etcd
    tag: v3.5.17
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClass: "" # Fill
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

# Message broker: "kafka" (default) or "redis" (uses Redis Streams)
messageBroker:
  type: kafka
  redisStreamsMaxLen: "10000"

zookeeper:
  replicaCount: 3  # Minimum odd number for ZK quorum — 2 nodes cannot elect a leader
  image:
    repository: confluentinc/cp-zookeeper
    tag: 7.9.0
    pullPolicy: IfNotPresent
  config:
    tickTime: "2000"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

kafka:
  replicaCount: 2  # 2 brokers: one can die without data loss (RF=2, minISR=1)
  image:
    repository: confluentinc/cp-kafka
    tag: 7.9.0
    pullPolicy: IfNotPresent
  config:
    offsetsTopicReplicationFactor: "2"
    transactionStateLogMinIsr: "1"
    transactionStateLogReplicationFactor: "2"
    defaultReplicationFactor: "2"
    minInsyncReplicas: "1"
    groupInitialRebalanceDelayMs: "0"
    logRetentionHours: "24"
    numNetworkThreads: "3"
    numIoThreads: "8"
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

qdrant:
  replicaCount: 2  # 2 nodes: one can fail while the other keeps serving
  image:
    repository: qdrant/qdrant
    tag: v1.15
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClass: "" # Fill
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 2Gi
  # Performance tuning — mirrors docker-compose.prod.yml settings.
  # QDRANT__SERVICE__API_KEY is injected separately from the secret; do not duplicate it here.
  env:
    QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: "64"
    QDRANT__SERVICE__GRPC_PORT: "6334"
    QDRANT__SERVICE__HTTP_PORT: "6333"
    QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: "0"  # 0 = use all available CPUs
    QDRANT__STORAGE__OPTIMIZERS__DEFAULT_SEGMENT_NUMBER: "8"
    QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD: "50000"
    QDRANT__STORAGE__WAL__WAL_CAPACITY_MB: "256"
    QDRANT__CLUSTER__CONSENSUS__MAX_MESSAGE_QUEUE_SIZE: "1000"
  # The default qdrant/qdrant image runs as root. fsGroup alone is safe — it
  # chowns the volume so that if the unprivileged image variant is used, it can
  # still write. We do NOT force runAsUser/runAsNonRoot here because that would
  # break the default image; users wanting non-root must switch to the
  # qdrant/qdrant:<ver>-unprivileged image AND opt into runAsUser=1000.
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  apiKey: "api_key"

# Neo4j (enabled by default). When enabled, the app uses Neo4j as the graph database (DATA_STORE=neo4j).
# Override neo4j.auth.password in production (e.g. --set neo4j.auth.password=... or values from secret manager).
neo4j:
  enabled: true
  # Neo4j causal clustering requires the Enterprise edition and a license.
  # The default Community image below does NOT support clustering; running
  # multiple replicas with Community creates independent instances and will
  # cause data divergence behind the load-balanced Service.
  # To run HA: switch image.tag to an enterprise variant (e.g. "5.26.0-enterprise"),
  # accept the license, add clustering env vars, and set replicaCount to 3.
  replicaCount: 1
  image:
    repository: neo4j
    tag: "5.26.0"
    pullPolicy: IfNotPresent
  auth:
    username: "neo4j"
    password: "your_password"
    database: "neo4j"
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClass: "" # Fill
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 2Gi
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  # apoc plugin and memory tuning for production (4Gi K8s limit).
  # heap (2g) + pagecache (1g) + JVM overhead (~500m) fits within 4Gi limit.
  env:
    NEO4J_PLUGINS: '["apoc"]'
    NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    NEO4J_dbms_memory_heap_initial__size: 512m
    NEO4J_dbms_memory_heap_max__size: 2g
    NEO4J_dbms_memory_pagecache_size: 1g
