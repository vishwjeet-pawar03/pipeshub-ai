                          totalPages:
                            type: integer
                          hasNextPage:
                            type: boolean
                            description: True if there are older messages available
                          hasPrevPage:
                            type: boolean
                            description: True if there are newer messages available
                          messageRange:
                            type: object
                            additionalProperties: false
                            properties:
                              start:
                                type: integer
                              end:
                                type: integer
                      access:
                        type: object
                        additionalProperties: false
                        properties:
                          isOwner:
                            type: boolean
                          accessLevel:
                            type: string
                            enum: [read, write]
                  filters:
                    type: object
                    additionalProperties: false
                    description: Summary of which filter/sort/pagination parameters were applied to this request, plus the catalog of options available on this endpoint.
                    properties:
