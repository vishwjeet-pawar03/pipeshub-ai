  # -------------------- Upload Endpoints --------------------
  /knowledgeBase/{kbId}/upload:
    post:
      tags:
        - Upload
      summary: Upload files to knowledge base
      description: |
        Upload one or more files directly to a knowledge base.<br><br>
        <b>Overview:</b><br>
        Batch upload multiple files in a single request. Each file becomes a new record in the KB with automatic content indexing.<br><br>
        <b>Upload Limits:</b><br>
        <ul>
        <li><b>Max files per request:</b> 1000</li>
        <li><b>Default max file size:</b> 30MB (configurable via platform settings)</li>
        <li>Use <code>GET /knowledgeBase/limits</code> to check current limits</li>
        </ul>
        <b>Supported File Types:</b><br>
        Documents (PDF, DOCX, TXT), Images (PNG, JPG), Videos (MP4), and more.<br><br>
        <b>File Metadata:</b><br>
        Use <code>files_metadata</code> to provide additional info like file paths and last modified timestamps.<br><br>
        <b>Versioning:</b><br>
        Set <code>isVersioned: true</code> to enable version tracking for uploaded files.
      operationId: uploadRecordsToKB
      security:
        - bearerAuth: []
        - oauth2: [kb:upload]
      parameters:
        - name: kbId
          in: path
          required: true
          description: Knowledge base ID
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Files to upload (max 1000)
                files_metadata:
                  type: string
                  description: JSON array with file_path and last_modified for each file
                  example: '[{"file_path":"/docs/report.pdf","last_modified":"2024-01-15T10:30:00Z"}]'
                isVersioned:
                  type: boolean
                  default: true
                  description: Enable version tracking
                recordType:
                  type: string
                  default: FILE
                  description: Type of records to create
              required:
                - files
      responses:
        '200':
          description: Files uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '400':
          description: Invalid request - Check file types and sizes
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions (requires WRITER or higher)
        '404':
          description: Knowledge base not found
        '413':
          description: File size exceeds maximum allowed

  /knowledgeBase/{kbId}/folder/{folderId}/upload:
    post:
      tags:
        - Upload
      summary: Upload files to folder
      description: |
        Upload files directly to a specific folder within a knowledge base.<br><br>
        <b>Same as KB upload</b> but files are placed in the specified folder instead of KB root.
      operationId: uploadRecordsToFolder
      security:
        - bearerAuth: []
        - oauth2: [kb:upload]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
        - name: folderId
          in: path
          required: true
          description: Target folder ID
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                files_metadata:
                  type: string
                  description: JSON array with file metadata
                isVersioned:
                  type: boolean
                  default: true
              required:
                - files
      responses:
        '200':
          description: Files uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Folder or knowledge base not found

  /knowledgeBase/limits:
    get:
      tags:
        - Upload
      summary: Get upload limits
      description: |
        Retrieve current upload constraints for the organization.<br><br>
        <b>Use Case:</b><br>
        Call this before uploads to validate file sizes on the client side and display appropriate limits to users.
      operationId: getUploadLimits
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      responses:
        '200':
          description: Upload limits retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  maxFilesPerRequest:
                    type: integer
                    example: 1000
                    description: Maximum number of files per upload request
                  maxFileSizeBytes:
                    type: integer
                    example: 31457280
                    description: Maximum file size in bytes (default 30MB)
        '401':
          description: Unauthorized

  # Same contract as GET /knowledgeBase/limits (clients may use lowercase path under /api/v1)
  /knowledgebase/limits:
    get:
      tags:
        - Upload
      summary: Get upload limits
      description: Alias path for <code>GET /knowledgeBase/limits</code>.
      operationId: getUploadLimitsKnowledgebaseAlias
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      responses:
        '200':
          description: Upload limits retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  maxFilesPerRequest:
                    type: integer
                    example: 1000
                  maxFileSizeBytes:
                    type: integer
                    example: 31457280
        '401':
          description: Unauthorized

  # Local KB connector — router prefix /api/v1/kb (PUT response includes UpdateRecordEnrichment)
  /kb/record/{recordId}:
    put:
      tags:
        - Records
      summary: Update record (Local KB connector)
      description: |
        Python connector route <code>PUT /api/v1/kb/record/{record_id}</code>. Successful JSON body includes
        <code>UpdateRecordEnrichment</code> (<code>timestamp</code>, <code>fileUpdated</code>, etc.).
      operationId: updateRecordKbConnector
      security:
        - bearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: Updated record metadata and content
        content:
          application/json:
            schema:
              type: object
              properties:
                updates:
                  type: object
                  additionalProperties: true
                fileMetadata:
                  type: object
                  nullable: true
                  additionalProperties: true
      responses:
        '200':
          description: Record updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                  - $ref: '#/components/schemas/UpdateRecordEnrichment'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Record not found

  # -------------------- Reindex/Sync Endpoints --------------------
  /knowledgeBase/reindex/record/{recordId}:
    post:
      tags:
        - Connector
      summary: Reindex single record
      description: |
        Trigger reindexing for a specific record.<br><br>
        <b>Overview:</b><br>
        Reprocesses the record's content to update search indexes and AI embeddings. Useful after content changes or to fix indexing failures.<br><br>
        <b>Depth Parameter:</b><br>
        Controls processing depth for complex documents (-1 for full depth, 0-100 for limited).
      operationId: reindexRecord
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                depth:
                  type: integer
                  minimum: -1
                  maximum: 100
                  default: -1
                  description: Processing depth (-1 for unlimited)
      responses:
        '200':
          description: Reindexing triggered successfully
        '401':
          description: Unauthorized
        '404':
          description: Record not found
        '409':
          description: Conflict — the connector instance for this record is disabled. Enable it from Connector Settings and try again.

  /knowledgeBase/reindex/record-group/{recordGroupId}:
    post:
      tags:
        - Connector
      summary: Reindex record group
      description: |
        Trigger reindexing for all records in a folder or knowledge base.<br><br>
        <b>Overview:</b><br>
        Batch reindex operation for entire containers. The recordGroupId can be a folder ID or KB ID.
      operationId: reindexRecordGroup
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: recordGroupId
          in: path
          required: true
          description: Folder ID or KB ID
          schema:
            type: string
      requestBody:
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                depth:
                  type: integer
                  minimum: -1
                  maximum: 100
                  default: -1
      responses:
        '200':
          description: Reindexing triggered for all records in group
        '401':
          description: Unauthorized
        '404':
          description: Record group not found
        '409':
          description: Conflict — the connector instance is disabled. Enable it from Connector Settings and try again.

  /knowledgeBase/resync/connector:
    post:
      tags:
        - Connector
      summary: Resync connector
      description: |
        Trigger a full resync of all records from a connector.<br><br>
        <b>Overview:</b><br>
        Fetches all content from the external source and updates local records. Use when you suspect data is out of sync.<br><br>
        <b>Warning:</b> This can be resource-intensive for large connectors.
      operationId: resyncConnector
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      requestBody:
        required: true
        description: "Request body for Resync connector"
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorName:
                  type: string
                  description: Connector type name
                  example: "GOOGLE_DRIVE"
                connectorId:
                  type: string
                  description: Connector instance ID
              required:
                - connectorName
                - connectorId
      responses:
        '200':
          description: Resync initiated
        '400':
          description: Invalid connector parameters
        '401':
          description: Unauthorized
        '409':
          description: Conflict — the connector instance is disabled. Enable it from Connector Settings and try again.

  /knowledgeBase/stats/{connectorId}:
    get:
      tags:
        - Connector
      summary: Get connector statistics
      description: |
        Retrieve statistics for a specific connector including record counts, indexing status breakdown, and sync information.
      operationId: getConnectorStats
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          description: Connector ID
          schema:
            type: string
      responses:
        '200':
          description: Connector statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorStats'
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  /knowledgeBase/reindex-failed/connector:
    post:
      tags:
        - Knowledge Bases
      summary: Reindex failed records for connector
      description: |
        Trigger reindexing of records that previously failed to index for a specific connector.
      operationId: reindexFailedRecords
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorId:
                  type: string
      responses:
        '200':
          description: Reindex triggered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Reindex of failed records triggered"
        '401':
          description: Unauthorized
        '404':
          description: Connector not found
        '409':
          description: Conflict — the connector instance is disabled. Enable it from Connector Settings and try again.

  /knowledgeBase/{kbId}/record/{recordId}/move:
    put:
      tags:
        - Knowledge Bases
      summary: Move record to another location
      description: |
        Move a record from one location to another within a knowledge base.
      operationId: moveRecord
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Record moved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: Record or knowledge base not found

  # -------------------- Permissions Endpoints --------------------
  /knowledgeBase/{kbId}/permissions:
    post:
      tags:
        - Permissions
      summary: Grant permissions
      description: |
        Grant access permissions to users or teams for a knowledge base.<br><br>
        <b>Required Permission:</b> OWNER or ORGANIZER<br><br>
        <b>Permission Roles (highest to lowest):</b><br>
        <ol>
        <li><b>OWNER:</b> Full control, can delete KB, manage all permissions</li>
        <li><b>ORGANIZER:</b> Can manage permissions (except OWNER), edit KB settings</li>
        <li><b>FILEORGANIZER:</b> Can create/delete folders, organize content</li>
        <li><b>WRITER:</b> Can upload, edit, delete records</li>
        <li><b>COMMENTER:</b> Can add comments (if supported)</li>
        <li><b>READER:</b> View-only access</li>
        </ol>
        <b>Grant to Multiple:</b><br>
        Provide arrays of userIds and/or teamIds to grant the same role to multiple entities.
      operationId: createKBPermission
      security:
        - bearerAuth: []
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                  description: User IDs to grant permission
                teamIds:
                  type: array
                  items:
                    type: string
                  description: Team IDs to grant permission
                role:
                  type: string
                  enum: [OWNER, ORGANIZER, FILEORGANIZER, WRITER, COMMENTER, READER]
                  description: Permission role to grant
              required:
                - role
      responses:
        '200':
          description: Permissions granted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  kbId:
                    type: string
                  permissionResult:
                    type: object
                    properties:
                      grantedCount:
                        type: integer
                      updatedCount:
                        type: integer
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Only OWNER/ORGANIZER can grant permissions

    get:
      tags:
        - Permissions
      summary: List permissions
      description: |
        Retrieve all permissions granted on a knowledge base.<br><br>
        <b>Required Permission:</b> ORGANIZER or higher to see all permissions, others see only their own.
      operationId: listKBPermissions
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Permissions list retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  kbId:
                    type: string
                  permissions:
                    type: array
                    items:
                      $ref: '#/components/schemas/KBPermission'
                  totalCount:
                    type: integer
        '401':
          description: Unauthorized
        '403':
          description: No access to this knowledge base
        '404':
          description: Knowledge base not found

    put:
      tags:
        - Permissions
      summary: Update permissions
      description: |
        Update permission roles for users or teams.<br><br>
        <b>Required Permission:</b> OWNER or ORGANIZER
      operationId: updateKBPermissions
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request body for Update permissions"
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                teamIds:
                  type: array
                  items:
                    type: string
                role:
                  type: string
                  enum: [OWNER, ORGANIZER, FILEORGANIZER, WRITER, COMMENTER, READER]
              required:
                - role
      responses:
        '200':
          description: Permissions updated
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions

    delete:
      tags:
        - Permissions
      summary: Remove permissions
      description: |
        Remove access permissions from users or teams.<br><br>
        <b>Required Permission:</b> OWNER or ORGANIZER<br><br>
        <b>Note:</b> Cannot remove the last OWNER from a KB.
      operationId: deleteKBPermissions
      security:
        - bearerAuth: []
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request body for Remove permissions"
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                teamIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Permissions removed
        '400':
          description: Invalid request or cannot remove last owner
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions

  # -------------------- Knowledge Hub --------------------
  /knowledgeBase/knowledge-hub/nodes:
    get:
      tags:
        - Knowledge Hub
      summary: Get knowledge hub root nodes
      description: |
        Returns root-level nodes (connector apps and Collection apps) or, when
        filters or search are applied, a flat list of matching nodes across the
        entire knowledge hub tree.

        **Overview**

        The Knowledge Hub provides a unified view across all knowledge sources:
        - **Collection** — locally uploaded knowledge bases (`origin: COLLECTION`)
        - **Connector app** — external connector instances such as Google Drive,
          Slack, Confluence, Jira (`origin: CONNECTOR`)

        Use this endpoint to build file-browser UIs and sidebar navigation trees.

        **Browsing vs. searching**

        When no filters or search query are provided, only top-level app nodes
        are returned. Adding `nodeTypes`, `q`, or other filter params triggers a
        search across the full tree, returning matching nodes regardless of depth.

        For children of a specific node, use
        `GET /knowledgeBase/knowledge-hub/nodes/{parentType}/{parentId}`.

        **Pagination and sorting**

        Results are always paginated. Default sort is `updatedAt` descending.
        The `pagination` object in the response contains `hasNext` / `hasPrev`
        flags suitable for infinite-scroll or page-based navigation.

        **Expanding the response**

        Use the `include` parameter to request additional sections:
        - `availableFilters` — adds `filters.available` with all filter options
        - `counts` — adds a `counts` summary broken down by node type
        - `breadcrumbs` — adds the breadcrumb trail (empty at root level)
        - `permissions` — adds the caller's permission flags

        **Access control**

        Requires a valid bearer token. For OAuth tokens the `kb:read` scope
        must be present; regular JWT bearer tokens pass through without scope
        enforcement.
      operationId: getKnowledgeHubRootNodes
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: onlyContainers
          in: query
          required: false
          description: |
            When `true`, only nodes that have children are returned (useful for
            building sidebar / tree navigation). Leaf nodes are excluded.
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          required: false
          description: |
            Page number (1-indexed). Combined with `limit` to paginate results.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of items to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: sortBy
          in: query
          required: false
          description: |
            Field to sort results by. Omitted → default `updatedAt`.
            Unknown value → silently falls back to `name`.
          schema:
            type: string
            enum: [name, createdAt, updatedAt, size, type]
            default: updatedAt
        - name: sortOrder
          in: query
          required: false
          description: |
            Sort direction. Omitted → default `desc`.
            Unknown value → silently falls back to `asc`.
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: q
          in: query
          required: false
          description: |
            Full-text search query. Must be between 2 and 500 characters
            (inclusive). When provided, the endpoint searches across the entire
            node tree regardless of the current browse level.
          schema:
            type: string
            minLength: 2
            maxLength: 500
          example: "quarterly report"
        - name: nodeTypes
          in: query
          required: false
          description: |
            Comma-separated list of node types to include. Invalid values are
            silently ignored. Maximum 100 items.

            Valid values: `folder`, `app`, `recordGroup`, `record`
          schema:
            type: string
          example: "app,recordGroup"
        - name: recordTypes
          in: query
          required: false
          description: |
            Comma-separated list of record types to include. Invalid values are
            silently ignored. Maximum 100 items.

            Valid values: `FILE`, `DRIVE`, `WEBPAGE`, `DATABASE`, `DATASOURCE`,
            `MESSAGE`, `MAIL`, `GROUP_MAIL`, `TICKET`, `COMMENT`,
            `INLINE_COMMENT`, `CONFLUENCE_PAGE`, `CONFLUENCE_BLOGPOST`,
            `SHAREPOINT_PAGE`, `SHAREPOINT_LIST`, `SHAREPOINT_LIST_ITEM`,
            `SHAREPOINT_DOCUMENT_LIBRARY`, `LINK`, `PROJECT`, `PULL_REQUEST`,
            `MEETING`, `PRODUCT`, `DEAL`, `CASE`, `TASK`, `ARTIFACT`,
            `CODE_FILE`, `SQL_TABLE`, `SQL_VIEW`, `OTHERS`
          schema:
            type: string
          example: "FILE,CONFLUENCE_PAGE"
        - name: origins
          in: query
          required: false
          description: |
            Comma-separated list of origin types to include. Invalid values are
            silently ignored. Maximum 100 items.

            Valid values: `COLLECTION`, `CONNECTOR`
          schema:
            type: string
          example: "CONNECTOR"
        - name: connectorIds
          in: query
          required: false
          description: |
            Comma-separated list of connector instance IDs (UUIDs) to filter by.
            Maximum 100 items. No enum validation — any string is accepted, but
            non-existent IDs simply yield zero results.
          schema:
            type: string
          example: "f3a4b5b6-5b6c-4e85-9097-3202cfe696fc"
        - name: indexingStatus
          in: query
          required: false
          description: |
            Comma-separated list of indexing statuses to include. Invalid values
            are silently ignored. Maximum 100 items.

            Valid values: `NOT_STARTED`, `PAUSED`, `IN_PROGRESS`, `COMPLETED`,
            `FAILED`, `FILE_TYPE_NOT_SUPPORTED`, `AUTO_INDEX_OFF`, `EMPTY`,
            `ENABLE_MULTIMODAL_MODELS`, `QUEUED`
          schema:
            type: string
          example: "COMPLETED,FAILED"
        - name: createdAt
          in: query
          required: false
          description: |
            Created-date range filter. Format: `gte:<epochMs>,lte:<epochMs>`.
            Both bounds are optional (you may send just `gte:...` or just
            `lte:...`). Timestamps must be in the range 0 to 9999999999999 and
            `gte` must be less than or equal to `lte` when both are present.
          schema:
            type: string
          example: "gte:1700000000000,lte:1710000000000"
        - name: updatedAt
          in: query
          required: false
          description: |
            Updated-date range filter. Same format and constraints as `createdAt`.
          schema:
            type: string
          example: "gte:1700000000000,lte:1710000000000"
        - name: size
          in: query
          required: false
          description: |
            File-size range filter in bytes. Format: `gte:<bytes>,lte:<bytes>`.
            Both bounds are optional. Values must be non-negative and at most
            1099511627776 (1 TB). `gte` must be less than or equal to `lte`
            when both are present.
          schema:
            type: string
          example: "gte:0,lte:10485760"
        - name: include
          in: query
          required: false
          description: |
            Comma-separated list of additional response sections to include.
            Invalid values are silently ignored. Maximum 100 items.

            Valid values: `breadcrumbs`, `counts`, `availableFilters`, `permissions`
          schema:
            type: string
          example: "availableFilters,counts"
      responses:
        '200':
          description: |
            Paginated list of root hub nodes (connector apps and Collections).
            HTTP 200 returns `success: true` and `error: null`. Field-level detail
            and required keys are defined on `KnowledgeHubNodesResponse`.

            Use `include` for optional sections: `availableFilters`, `counts`,
            `permissions` — each stays JSON `null` when not asked for.
            `breadcrumbs` stays `null` at this route (no parent in the path),
            even if `include` lists `breadcrumbs`; use the child route for trails.
            `id`, `currentNode`, and `parentNode` are `null` here.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeHubNodesResponse'
              examples:
                root_apps:
                  summary: Root-level apps with availableFilters included
                  value:
                    success: true
                    error: null
                    id: null
                    currentNode: null
                    parentNode: null
                    items:
                      - id: "knowledgeBase_org123"
                        name: "Collections"
                        nodeType: "app"
                        parentId: null
                        origin: "COLLECTION"
                        connector: null
                        recordType: null
                        recordGroupType: null
                        indexingStatus: null
                        reason: null
                        createdAt: 1700000000000
                        updatedAt: 1710000000000
                        sizeInBytes: null
                        mimeType: null
                        extension: null
                        webUrl: "/app/knowledgeBase_org123"
                        hasChildren: true
                        previewRenderable: null
                        permission: null
                        sharingStatus: "workspace"
                        isInternal: false
                      - id: "f3a4b5b6-5b6c-4e85-9097-3202cfe696fc"
                        name: "Google Drive"
                        nodeType: "app"
                        parentId: null
                        origin: "CONNECTOR"
                        connector: "drive"
                        recordType: null
                        recordGroupType: null
                        indexingStatus: null
                        reason: null
                        createdAt: 1700000000000
                        updatedAt: 1709000000000
                        sizeInBytes: null
                        mimeType: null
                        extension: null
                        webUrl: "/app/f3a4b5b6-5b6c-4e85-9097-3202cfe696fc"
                        hasChildren: true
                        previewRenderable: null
                        permission: null
                        sharingStatus: null
                        isInternal: false
                    pagination:
                      page: 1
                      limit: 20
                      totalItems: 2
                      totalPages: 1
                      hasNext: false
                      hasPrev: false
                    filters:
                      applied:
                        q: null
                        nodeTypes: null
                        recordTypes: null
                        origins: null
                        connectorIds: null
                        indexingStatus: null
                        createdAt: null
                        updatedAt: null
                        size: null
                        sortBy: "updatedAt"
                        sortOrder: "desc"
                      available:
                        nodeTypes:
                          - id: "app"
                            label: "Apps"
                          - id: "recordGroup"
                            label: "Record Groups"
                        recordTypes: []
                        origins:
                          - id: "COLLECTION"
                            label: "Collection"
                          - id: "CONNECTOR"
                            label: "Connector"
                        connectors:
                          - id: "f3a4b5b6-5b6c-4e85-9097-3202cfe696fc"
                            label: "Google Drive"
                            connectorType: "drive"
                        indexingStatus: []
                        sortBy:
                          - id: "name"
                            label: "Name"
                          - id: "updatedAt"
                            label: "Updated"
                        sortOrder:
                          - id: "asc"
                            label: "Ascending"
                          - id: "desc"
                            label: "Descending"
                    breadcrumbs: null
                    counts: null
                    permissions: null
        '400':
          description: |
            Invalid request parameters. The backend's validation message is
            returned verbatim in `error.message`. See the examples below for
            the common triggers.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_BAD_REQUEST]
                        example: HTTP_BAD_REQUEST
                      message:
                        type: string
                        example: "Search query must be at least 2 characters"
              examples:
                query_too_short:
                  summary: Search query shorter than 2 characters
                  value:
                    error:
                      code: HTTP_BAD_REQUEST
                      message: "Search query must be at least 2 characters"
                comma_list_too_long:
                  summary: Comma-separated parameter exceeds 100 items
                  value:
                    error:
                      code: HTTP_BAD_REQUEST
                      message: "Too many items in comma-separated list (max: 100, got: 142)"
                date_range_inverted:
                  summary: Date range with gte > lte
                  value:
                    error:
                      code: HTTP_BAD_REQUEST
                      message: "Date range invalid: gte must be <= lte"
                size_exceeds_max:
                  summary: Size filter exceeds the 1 TB cap
                  value:
                    error:
                      code: HTTP_BAD_REQUEST
                      message: "Size exceeds maximum (1TB): 2199023255552"
        '401':
          description: |
            Missing or invalid authentication token.

            The bearer token was absent, expired, malformed, or could not be
            verified by the auth middleware.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_UNAUTHORIZED]
                        example: HTTP_UNAUTHORIZED
                      message:
                        type: string
                        example: "Invalid token"
              example:
                error:
                  code: HTTP_UNAUTHORIZED
                  message: "Invalid token"
        '403':
          description: |
            Insufficient OAuth scope.

            Only applies to OAuth tokens. The token did not carry the `kb:read`
            scope required by this endpoint. Regular (non-OAuth) JWT bearer
            tokens are not subject to scope enforcement and will not receive
            this error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_FORBIDDEN]
                        example: HTTP_FORBIDDEN
                      message:
                        type: string
                        example: "Insufficient scope. Required: kb:read"
              example:
                error:
                  code: HTTP_FORBIDDEN
                  message: "Insufficient scope. Required: kb:read"
        '500':
          description: An unexpected error occurred on the server.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_INTERNAL_SERVER_ERROR]
                        example: HTTP_INTERNAL_SERVER_ERROR
                      message:
                        type: string
                        example: "An unexpected error occurred"
              example:
                error:
                  code: HTTP_INTERNAL_SERVER_ERROR
                  message: "An unexpected error occurred"

  /knowledgeBase/knowledge-hub/nodes/{parentType}/{parentId}:
    get:
      tags:
        - Knowledge Hub
      summary: Get knowledge hub child nodes
      description: |
        Returns the children of a specific node in the knowledge hub tree.
        Use this endpoint to drill down into Collections, connector app
        hierarchies, folders, and record groups.

        **Navigation hierarchy**

        The typical drill-down path is:
        1. Root apps (`GET /knowledgeBase/knowledge-hub/nodes`)
        2. Record groups / folders within an app (`parentType=app`)
        3. Records within a record group (`parentType=recordGroup`)
        4. Sub-records or attachments within a record (`parentType=record`)

        **Parent identification**

        - `parentType` must be one of: `app`, `recordGroup`, `folder`, `record`
        - `parentId` is either a standard UUID or the Collection app sentinel
          `knowledgeBase_<orgId>` (e.g. `knowledgeBase_org123`)

        **Filtering and searching**

        All query-param filters from the root endpoint are available here and
        operate within the scope of the parent node's subtree. When `q` is
        provided, the search spans all descendants of the parent node.

        **Response extras**

        When `include=breadcrumbs` is set, the response contains a
        `breadcrumbs` array tracing the path from the root to the current
        node. The `currentNode` and `parentNode` objects are always populated
        for non-root requests.

        **Access control**

        Requires a valid bearer token. For OAuth tokens the `kb:read` scope
        must be present; regular JWT bearer tokens pass through without scope
        enforcement.
      operationId: getKnowledgeHubChildNodes
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: parentType
          in: path
          required: true
          description: |
            Type of the parent node whose children to retrieve.

            Must be one of: `app`, `recordGroup`, `folder`, `record`.
            Any other value returns a 400 error.
          schema:
            type: string
            enum: [app, recordGroup, folder, record]
        - name: parentId
          in: path
          required: true
          description: |
            Identifier of the parent node. Accepts two formats:
            - A standard UUID (e.g. `f3a4b5b6-5b6c-4e85-9097-3202cfe696fc`)
            - The Collection app sentinel `knowledgeBase_<orgId>`
              (e.g. `knowledgeBase_org123`)

            Any value that does not match either format returns a 400 error.
          schema:
            type: string
            pattern: '^(knowledgeBase_[a-zA-Z0-9_-]+|[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})$'
        - name: onlyContainers
          in: query
          required: false
          description: |
            When `true`, only nodes that have children are returned (useful for
            building sidebar / tree navigation). Leaf nodes are excluded.
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          required: false
          description: |
            Page number (1-indexed). Combined with `limit` to paginate results.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of items to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: sortBy
          in: query
          required: false
          description: |
            Field to sort results by. Omitted → default `updatedAt`.
            Unknown value → silently falls back to `name`.
          schema:
            type: string
            enum: [name, createdAt, updatedAt, size, type]
            default: updatedAt
        - name: sortOrder
          in: query
          required: false
          description: |
            Sort direction. Omitted → default `desc`.
            Unknown value → silently falls back to `asc`.
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: q
          in: query
          required: false
          description: |
            Full-text search query. Must be between 2 and 500 characters
            (inclusive). When provided, the endpoint searches across all
            descendants of the parent node.
          schema:
            type: string
            minLength: 2
            maxLength: 500
          example: "quarterly report"
        - name: nodeTypes
          in: query
          required: false
          description: |
            Comma-separated list of node types to include. Invalid values are
            silently ignored. Maximum 100 items.

            Valid values: `folder`, `app`, `recordGroup`, `record`
          schema:
            type: string
          example: "recordGroup"
        - name: recordTypes
          in: query
          required: false
          description: |
            Comma-separated list of record types to include. Invalid values are
            silently ignored. Maximum 100 items.

            Valid values: `FILE`, `DRIVE`, `WEBPAGE`, `DATABASE`, `DATASOURCE`,
            `MESSAGE`, `MAIL`, `GROUP_MAIL`, `TICKET`, `COMMENT`,
            `INLINE_COMMENT`, `CONFLUENCE_PAGE`, `CONFLUENCE_BLOGPOST`,
            `SHAREPOINT_PAGE`, `SHAREPOINT_LIST`, `SHAREPOINT_LIST_ITEM`,
            `SHAREPOINT_DOCUMENT_LIBRARY`, `LINK`, `PROJECT`, `PULL_REQUEST`,
            `MEETING`, `PRODUCT`, `DEAL`, `CASE`, `TASK`, `ARTIFACT`,
            `CODE_FILE`, `SQL_TABLE`, `SQL_VIEW`, `OTHERS`
          schema:
            type: string
          example: "FILE,CONFLUENCE_PAGE"
        - name: origins
          in: query
          required: false
          description: |
            Comma-separated list of origin types to include. Invalid values are
            silently ignored. Maximum 100 items.

            Valid values: `COLLECTION`, `CONNECTOR`
          schema:
            type: string
          example: "CONNECTOR"
        - name: connectorIds
          in: query
          required: false
          description: |
            Comma-separated list of connector instance IDs (UUIDs) to filter by.
            Maximum 100 items. No enum validation — any string is accepted, but
            non-existent IDs simply yield zero results.
          schema:
            type: string
          example: "f3a4b5b6-5b6c-4e85-9097-3202cfe696fc"
        - name: indexingStatus
          in: query
          required: false
          description: |
            Comma-separated list of indexing statuses to include. Invalid values
            are silently ignored. Maximum 100 items.

            Valid values: `NOT_STARTED`, `PAUSED`, `IN_PROGRESS`, `COMPLETED`,
            `FAILED`, `FILE_TYPE_NOT_SUPPORTED`, `AUTO_INDEX_OFF`, `EMPTY`,
            `ENABLE_MULTIMODAL_MODELS`, `QUEUED`
          schema:
            type: string
          example: "COMPLETED,FAILED"
        - name: createdAt
          in: query
          required: false
          description: |
            Created-date range filter. Format: `gte:<epochMs>,lte:<epochMs>`.
            Both bounds are optional (you may send just `gte:...` or just
            `lte:...`). Timestamps must be in the range 0 to 9999999999999 and
            `gte` must be less than or equal to `lte` when both are present.
          schema:
            type: string
          example: "gte:1700000000000,lte:1710000000000"
        - name: updatedAt
          in: query
          required: false
          description: |
            Updated-date range filter. Same format and constraints as `createdAt`.
          schema:
            type: string
          example: "gte:1700000000000,lte:1710000000000"
        - name: size
          in: query
          required: false
          description: |
            File-size range filter in bytes. Format: `gte:<bytes>,lte:<bytes>`.
            Both bounds are optional. Values must be non-negative and at most
            1099511627776 (1 TB). `gte` must be less than or equal to `lte`
            when both are present.
          schema:
            type: string
          example: "gte:0,lte:10485760"
        - name: include
          in: query
          required: false
          description: |
            Comma-separated list of additional response sections to include.
            Invalid values are silently ignored. Maximum 100 items.

            Valid values: `breadcrumbs`, `counts`, `availableFilters`, `permissions`
          schema:
            type: string
          example: "breadcrumbs,availableFilters"
      responses:
        '200':
          description: |
            Paginated children of `{parentType}/{parentId}`. HTTP 200 returns
            `success: true` and `error: null`; see `KnowledgeHubNodesResponse` for
            the full shape.

            `id` and `currentNode` reflect the parent being browsed; `parentNode`
            is set when a grandparent exists. Optional sections (`availableFilters`,
            `counts`, `permissions`, `breadcrumbs`) are JSON `null` unless listed
            in `include` and populated by the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeHubNodesResponse'
              examples:
                collection_record_groups:
                  summary: Record groups inside the Collection app with breadcrumbs
                  value:
                    success: true
                    error: null
                    id: "knowledgeBase_org123"
                    currentNode:
                      id: "knowledgeBase_org123"
                      name: "Collections"
                      nodeType: "app"
                      subType: null
                    parentNode: null
                    items:
                      - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        name: "Engineering Docs"
                        nodeType: "recordGroup"
                        parentId: "knowledgeBase_org123"
                        origin: "COLLECTION"
                        connector: null
                        recordType: null
                        recordGroupType: "KNOWLEDGE_BASE"
                        indexingStatus: null
                        reason: null
                        createdAt: 1700000000000
                        updatedAt: 1709500000000
                        sizeInBytes: null
                        mimeType: null
                        extension: null
                        webUrl: null
                        hasChildren: true
                        previewRenderable: null
                        permission: null
                        sharingStatus: "workspace"
                        isInternal: false
                      - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                        name: "HR Policies"
                        nodeType: "recordGroup"
                        parentId: "knowledgeBase_org123"
                        origin: "COLLECTION"
                        connector: null
                        recordType: null
                        recordGroupType: "KNOWLEDGE_BASE"
                        indexingStatus: null
                        reason: null
                        createdAt: 1700100000000
                        updatedAt: 1709400000000
                        sizeInBytes: null
                        mimeType: null
                        extension: null
                        webUrl: null
                        hasChildren: true
                        previewRenderable: null
                        permission: null
                        sharingStatus: "private"
                        isInternal: false
                    pagination:
                      page: 1
                      limit: 20
                      totalItems: 2
                      totalPages: 1
                      hasNext: false
                      hasPrev: false
                    filters:
                      applied:
                        q: null
                        nodeTypes:
                          - "recordGroup"
                        recordTypes: null
                        origins: null
                        connectorIds: null
                        indexingStatus: null
                        createdAt: null
                        updatedAt: null
                        size: null
                        sortBy: "name"
                        sortOrder: "asc"
                      available: null
                    breadcrumbs:
                      - id: "knowledgeBase_org123"
                        name: "Collections"
                        nodeType: "app"
                        subType: null
                    counts: null
                    permissions: null
        '400':
          description: |
            Invalid request parameters or path values. The backend's validation
            message is returned verbatim in `error.message`. See the examples
            below for the common triggers.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_BAD_REQUEST]
                        example: HTTP_BAD_REQUEST
                      message:
                        type: string
                        example: "Invalid parent_type. Must be one of: app, recordGroup, folder, record"
              examples:
                invalid_parent_type:
                  summary: parentType outside the allowed set
                  value:
                    error:
                      code: HTTP_BAD_REQUEST
                      message: "Invalid parent_type. Must be one of: app, recordGroup, folder, record"
                invalid_parent_id:
                  summary: parentId is neither a UUID nor knowledgeBase_<orgId>
                  value:
                    error:
                      code: HTTP_BAD_REQUEST
                      message: "Invalid UUID format for parent_id: abc"
                query_too_short:
                  summary: Search query shorter than 2 characters
                  value:
                    error:
                      code: HTTP_BAD_REQUEST
                      message: "Search query must be at least 2 characters"
                comma_list_too_long:
                  summary: Comma-separated parameter exceeds 100 items
                  value:
                    error:
                      code: HTTP_BAD_REQUEST
                      message: "Too many items in comma-separated list (max: 100, got: 142)"
                date_range_inverted:
                  summary: Date range with gte > lte
                  value:
                    error:
                      code: HTTP_BAD_REQUEST
                      message: "Date range invalid: gte must be <= lte"
        '401':
          description: |
            Missing or invalid authentication token.

            The bearer token was absent, expired, malformed, or could not be
            verified by the auth middleware.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_UNAUTHORIZED]
                        example: HTTP_UNAUTHORIZED
                      message:
                        type: string
                        example: "Invalid token"
              example:
                error:
                  code: HTTP_UNAUTHORIZED
                  message: "Invalid token"
        '403':
          description: |
            Insufficient OAuth scope.

            Only applies to OAuth tokens. The token did not carry the `kb:read`
            scope required by this endpoint. Regular (non-OAuth) JWT bearer
            tokens are not subject to scope enforcement and will not receive
            this error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_FORBIDDEN]
                        example: HTTP_FORBIDDEN
                      message:
                        type: string
                        example: "Insufficient scope. Required: kb:read"
              example:
                error:
                  code: HTTP_FORBIDDEN
                  message: "Insufficient scope. Required: kb:read"
        '404':
          description: |
            Parent node not found.

            The `parentId` does not correspond to an existing node of the
            specified `parentType`, or the node has been deleted.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_NOT_FOUND]
                        example: HTTP_NOT_FOUND
                      message:
                        type: string
                        example: "Parent node not found"
              example:
                error:
                  code: HTTP_NOT_FOUND
                  message: "Parent node not found"
        '500':
          description: An unexpected error occurred on the server.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_INTERNAL_SERVER_ERROR]
                        example: HTTP_INTERNAL_SERVER_ERROR
                      message:
                        type: string
                        example: "An unexpected error occurred"
              example:
                error:
                  code: HTTP_INTERNAL_SERVER_ERROR
                  message: "An unexpected error occurred"

  # ==================== ENTERPRISE SEARCH ENDPOINTS ====================

  # -------------------- Conversations --------------------
  /conversations/stream:
    post:
      tags:
        - Conversations
      summary: Create conversation with streaming response
      description: |
        Start a new conversation and stream the AI response over Server-Sent
        Events (SSE). Behaves like `POST /conversations` but emits tokens,
        tool activity, and status updates incrementally instead of returning
        a single JSON response at the end.

        **Lifecycle**

        1. The server validates `query`, persists an in-progress
           conversation, then opens the SSE stream with HTTP `200`.
        2. A `connected` event is emitted immediately with the new
           `conversationId` so the client can link the stream (sidebar,
           parallel tabs, deep links) without an extra request.
        3. AI-backend events stream through (token chunks, tool calls,
           status, etc.).
        4. On success a single `complete` event is emitted carrying the
           full persisted conversation.
        5. On failure an `error` event is emitted and the conversation is
           marked FAILED before the stream closes.

        **Event vocabulary**

        Three events have stable, server-defined `data` shapes:

        - `connected` — `{ "message": string, "conversationId": string,
          "title": string }`
        - `complete` — `{ "conversation": Conversation,
          "meta": { "requestId": string, "timestamp": string,
          "duration": number } }`
        - `error` — `{ "error": string, "details"?: string }`

        The forwarded events are `status`, `answer_chunk`, `tool_calls`,
        `restreaming`, `metadata`, and `tool_execution_complete`. Their
        payloads come from the Python query service and may evolve. Note
        that raw `tool_call` / `tool_success` / `tool_error` / `tool_result`
        events emitted by the LLM tool runtime are rewrapped as `status` by
        the upstream wrapper before they reach this route, so clients on
        `/conversations/stream` never see those names directly. Clients
        should ignore unknown event names rather than treating them as
        errors.

        **Agent mode**

        When `chatMode` selects an agent mode (for example `agent:auto`),
        the optional `tools` list restricts which tools the agent may
        invoke for this turn. Outside agent modes the `tools` field is
        ignored.
      operationId: streamChat
      security:
        - bearerAuth: []
        - oauth2: [conversation:chat]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: |
            SSE stream established. The body is a sequence of
            `text/event-stream` frames using the event vocabulary described
            above.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AssistantStreamSSEEvent'
        '400':
          description: |
            Invalid request — `query` is missing, empty, or exceeds the
            100000-character limit, or another field fails validation
            (for example a malformed `recordIds` or `currentTime`).
        '401':
          description: Unauthorized — valid bearer token required.
        '403':
          description: |
            Forbidden — the caller's token does not include the
            `conversation:chat` OAuth scope.
        '500':
          description: |
            Internal error before the SSE stream is established (for
            example, the initial conversation row could not be persisted).
            Once the stream is open, terminal failures are surfaced as an
            `error` SSE event instead of an HTTP status change.

  /conversations:
    get:
      tags:
        - Conversations
      summary: List all conversations
      description: |
        Retrieve paginated conversations for the authenticated user.

        **Overview:**

        Use the optional `source` query parameter to choose which list to return:
        `owned` — only conversations you own (`userId` matches the current user).
        `shared` — conversations where you have recipient access
        (`isShared` and your user appears in `sharedWith`), without the owner-only branch.
        Defaults to `owned` when omitted. Each call returns one list; call twice if you need both.

        **Filtering:**

        - Only non-archived conversations are returned by default
        - Use `/conversations/show/archives` for archived conversations

        **Sorting:**

        Conversations are sorted by last activity timestamp (most recent first) by default.
      operationId: getAllConversations
      security:
        - bearerAuth: []
        - oauth2: [conversation:read]
      parameters:
        - name: source
          in: query
          required: false
          description: |
            `owned` — owner list (`userId` filter only).
            `shared` — explicit share grant list (`isShared` + `sharedWith`).
            Defaults to `owned` when omitted.
          schema:
            type: string
            enum:
              - owned
              - shared
            default: owned
        - name: page
          in: query
          required: false
          description: Page number (1-based). Defaults to 1.
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          required: false
          description: Page size. Defaults to 20; capped by the server (max 100).
          schema:
            type: integer
            minimum: 1
        - name: sortBy
          in: query
          required: false
          description: Sort field. Invalid values fall back to `lastActivityAt`.
          schema:
            type: string
            enum:
              - createdAt
              - lastActivityAt
              - title
        - name: sortOrder
          in: query
          required: false
          description: Sort direction. Defaults to `desc` unless set to `asc`.
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: conversationId
          in: query
          required: false
          description: When set, restricts results to that conversation ID (if visible under the chosen `source`).
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: Case-insensitive match on title and message content (max 1000 characters).
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          description: Filter by `createdAt` ≥ this ISO date.
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          required: false
          description: Filter by `createdAt` ≤ this ISO date.
          schema:
            type: string
            format: date-time
        - name: shared
          in: query
          required: false
          description: |
            When set, filters by `isShared`. Accepts case-insensitive
            `true`/`false`, or `1`/`0`.
          schema:
            type: string
      responses:
        '200':
          description: List of conversations for the requested source
          content:
            application/json:
              schema:
                type: object
                required:
                  - conversations
                  - source
                  - pagination
                  - filters
                  - meta
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConversationListItem'
                  source:
                    type: string
                    enum:
                      - owned
                      - shared
                    description: Echoes the requested `source` query value.
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
                      hasNextPage:
                        type: boolean
                      hasPrevPage:
                        type: boolean
                  filters:
                    type: object
                    additionalProperties: false
                    description: |
                      Filter introspection block. `applied` summarises the
                      filters active on this request; `available` catalogues
                      every supported filter with its current value and whether
                      it is applied.
                    required:
                      - applied
                      - available
                    properties:
                      applied:
                        type: object
                        additionalProperties: false
                        required:
                          - filters
                          - values
                        properties:
                          filters:
                            type: array
                            description: Names of filters currently applied.
                            items:
                              type: string
                          values:
                            type: object
                            additionalProperties: false
                            description: |
                              Current value for each applied filter. Only keys
                              present in `filters` are populated; others are
                              omitted.
                            properties:
                              search:
                                type: string
                              shared:
                                type: string
                              tags:
                                type: string
                              minMessages:
                                type: string
                              sortBy:
                                type: string
                              sortOrder:
                                type: string
                              startDate:
                                type: string
                              endDate:
                                type: string
                              messageType:
                                type: string
                              page:
                                type: integer
                              limit:
                                type: integer
                              dateRange:
                                type: object
                                additionalProperties: false
                                properties:
                                  start:
                                    type: string
                                    nullable: true
                                  end:
                                    type: string
                                    nullable: true
                      available:
                        type: object
                        additionalProperties: false
                        required:
                          - shared
                          - tags
                          - minMessages
                          - search
                          - pagination
                          - sorting
                          - dateFilters
                          - messageFilters
                          - sortingMessages
                        properties:
                          shared:
                            type: object
                            additionalProperties: false
                            properties:
                              values:
                                type: array
                                items:
                                  type: string
                                description: Accepted values for the `shared` query param.
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          tags:
                            type: object
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          minMessages:
                            type: object
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: number
                                nullable: true
                              applied:
                                type: boolean
                          search:
                            type: object
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          pagination:
                            type: object
                            additionalProperties: false
                            properties:
                              page:
                                type: object
                                additionalProperties: false
                                properties:
                                  type:
                                    type: string
                                  current:
                                    type: integer
