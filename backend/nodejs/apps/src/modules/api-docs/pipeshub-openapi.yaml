      description: |
        Envelope returned by `GET /agents/{agentKey}/conversations`.
        `conversations` contains rows owned by the caller for the agent;
        `sharedWithMeConversations` contains rows shared with the caller for
        the same agent. Both arrays use the same pagination and sort inputs,
        but `pagination.totalCount` and `totalPages` are computed only from
