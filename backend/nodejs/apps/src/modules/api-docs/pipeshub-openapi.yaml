        - $ref: '#/components/schemas/AIModelProviderHealthCheckErrorEnvelope'

    DeleteAIModelProviderDetails:
      type: object
      additionalProperties: false
      description: Metadata about the AI model provider entry removed by deleteAIModelProvider
      required:
