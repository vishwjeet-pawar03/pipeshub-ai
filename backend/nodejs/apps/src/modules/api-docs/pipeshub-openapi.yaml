  /agents/{agentKey}/conversations:
    get:
      tags:
        - Agent Conversations
      summary: List agent conversations
      description: |
        Get all conversations with a specific agent.<br><br>
        <b>Overview:</b><br>
        Returns conversations the user has had with this particular agent.
        Agent conversations maintain the agent's context and capabilities.
      operationId: listAgentConversations
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentKey
          in: path
          required: true
          description: Agent identifier
          schema:
            type: string
      responses:
        '200':
          description: List of agent conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Conversation'
                  sharedWithMeConversations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Conversation'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
                      hasNextPage:
                        type: boolean
                      hasPrevPage:
                        type: boolean
                  filters:
                    type: object
                    description: Applied and available filters
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
        '401':
          description: Unauthorized
        '404':
          description: Agent not found

    post:
      tags:
        - Agent Conversations
      summary: Create agent conversation
      description: |
        Start a new conversation with an agent.<br><br>
        <b>Overview:</b><br>
        Creates a conversation using the agent's configuration including
        its system prompt, tools, and knowledge base access.
      operationId: createAgentConversation
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Agent conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversation'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '404':
          description: Agent not found

  /agents/{agentKey}/conversations/stream:
    post:
      tags:
        - Agent Conversations
      summary: Create agent conversation with streaming
      description: |
        Start a new agent conversation with SSE streaming response.<br><br>
