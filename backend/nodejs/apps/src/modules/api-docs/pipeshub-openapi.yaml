      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      responses:
        '200':
          description: Inactive connectors retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
        '401':
