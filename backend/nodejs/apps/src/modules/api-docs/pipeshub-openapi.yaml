  # -------------------- AI Model Registry (Python backend proxy) --------------------
  /configurationManager/ai-models/registry:
    get:
      tags:
        - AI Models Providers
      summary: List registered AI model providers
      description: |
        Returns all registered AI model providers from the Python backend registry.
        Supports optional search and capability filtering.
      operationId: getAIModelRegistry
      security:
        - bearerAuth: []
        - oauth2: [config:read]
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search providers by name or description
        - name: capability
          in: query
          required: false
          schema:
            type: string
            enum:
              - text_generation
              - embedding
              - image_generation
              - tts
              - stt
              - video
              - ocr
              - reasoning
          description: Filter providers by capability
      responses:
        '200':
          description: Providers retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  providers:
                    type: array
                    items:
                      $ref: '#/components/schemas/AIModelRegistryProvider'
                  total:
                    type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin access required
        '503':
          description: AI model registry service is unavailable

  /configurationManager/ai-models/registry/capabilities:
    get:
      tags:
        - AI Models Providers
      summary: List available model capabilities
      description: Returns the list of all model capabilities understood by the registry.
      operationId: getAIModelRegistryCapabilities
      security:
        - bearerAuth: []
        - oauth2: [config:read]
      responses:
        '200':
          description: Capabilities retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  capabilities:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Machine-readable capability identifier
                          example: text_generation
                        name:
                          type: string
                          description: Human-readable capability name
                          example: Text Generation
                        modelType:
                          type: string
                          description: Corresponding model type key used in CRUD APIs
                          example: llm
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin access required
        '503':
          description: AI model registry service is unavailable

  /configurationManager/ai-models/registry/{providerId}/schema:
    get:
      tags:
        - AI Models Providers
      summary: Get provider field schema
      description: |
        Returns the configuration field schema for a specific provider.
        Optionally filtered by capability (e.g. only embedding fields).
      operationId: getAIModelProviderSchema
      security:
        - bearerAuth: []
        - oauth2: [config:read]
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
          description: Provider identifier (e.g. openAI, anthropic, gemini)
        - name: capability
          in: query
          required: false
          schema:
            type: string
          description: Filter fields by capability
      responses:
        '200':
          description: Provider schema retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  provider:
                    type: object
                    properties:
                      providerId:
                        type: string
                      name:
                        type: string
                  schema:
                    type: object
                    description: Map of capability to array of field descriptors
                    additionalProperties:
                      type: array
                      items:
                        $ref: '#/components/schemas/AIModelFieldSchema'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin access required
        '404':
          description: Provider not found
        '503':
          description: AI model registry service is unavailable

  /crawlingManager/{connector}/{connectorId}/schedule:
    post:
      tags:
        - Crawling Jobs
      summary: Schedule a crawling job
      description: |
        Schedule a new crawling job for a specific connector instance.<br><br>

        <b>Overview:</b><br>
        Creates a scheduled crawling job that will sync data from the specified connector into
        PipesHub's search index. The job is added to a BullMQ queue and will execute according
        to the specified schedule configuration.<br><br>

        <b>Schedule Types:</b><br>
        <ul>
        <li><b>hourly:</b> Run every X hours at specified minute (e.g., every 2 hours at :30)</li>
        <li><b>daily:</b> Run once per day at specified time (e.g., 2:00 AM daily)</li>
        <li><b>weekly:</b> Run on specific days of the week (e.g., Mon/Wed/Fri at 3:00 AM)</li>
        <li><b>monthly:</b> Run on specific day of month (e.g., 1st of each month at 4:00 AM)</li>
        <li><b>custom:</b> Use cron expression for complex schedules</li>
        <li><b>once:</b> Run once at a specific future datetime</li>
        </ul>

        <b>Access Control:</b><br>
        <ul>
        <li>Team-scoped connectors: Requires admin privileges</li>
        <li>Personal-scoped connectors: Only the creator can schedule jobs</li>
        </ul>

        <b>Job Behavior:</b><br>
        <ul>
        <li>If a job already exists for this connector, it will be replaced</li>
        <li>Disabled schedules (<code>isEnabled: false</code>) will throw an error</li>
        <li>Jobs use exponential backoff for retries (5s, 10s, 20s, etc.)</li>
        <li>Only last 10 completed/failed jobs are retained per connector</li>
        </ul>

        <b>Related Endpoints:</b><br>
        <ul>
        <li><code>GET /crawlingManager/{connector}/{connectorId}/schedule</code> - Get job status</li>
        <li><code>POST /crawlingManager/{connector}/{connectorId}/pause</code> - Pause job</li>
        <li><code>DELETE /crawlingManager/{connector}/{connectorId}/remove</code> - Remove job</li>
        </ul>
      operationId: scheduleCrawlingJob
      security:
        - bearerAuth: []
        - oauth2: [crawl:write]
      parameters:
        - name: connector
          in: path
          required: true
          description: Connector type identifier (e.g., "drive", "onedrive", "slack", "jira")
          schema:
            type: string
          example: "drive"
        - name: connectorId
          in: path
          required: true
          description: Unique identifier of the connector instance (MongoDB ObjectId)
          schema:
            type: string
          example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                scheduleConfig:
                  $ref: '#/components/schemas/ScheduleConfig'
                priority:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 5
                  description: Job priority (1=highest, 10=lowest). Higher priority jobs are processed first.
                maxRetries:
                  type: integer
                  minimum: 0
                  maximum: 10
                  default: 3
                  description: Maximum number of retry attempts on failure
                timeout:
                  type: integer
                  minimum: 1000
                  maximum: 600000
                  default: 300000
                  description: Job timeout in milliseconds (default 5 minutes)
              required:
                - scheduleConfig
            examples:
              dailySync:
                summary: Daily sync at 2 AM
                description: Schedule daily crawling at 2:00 AM UTC
                value:
                  scheduleConfig:
                    scheduleType: "daily"
                    isEnabled: true
                    timezone: "UTC"
                    hour: 2
                    minute: 0
                  priority: 5
                  maxRetries: 3
              hourlySync:
                summary: Hourly sync every 4 hours
                description: Schedule crawling every 4 hours at minute 30
                value:
                  scheduleConfig:
                    scheduleType: "hourly"
                    isEnabled: true
                    timezone: "America/New_York"
                    minute: 30
                    interval: 4
                  priority: 3
                  maxRetries: 5
              weeklySync:
                summary: Weekly sync on weekdays
                description: Schedule crawling on Monday, Wednesday, Friday at 3 AM
                value:
                  scheduleConfig:
                    scheduleType: "weekly"
                    isEnabled: true
                    timezone: "Europe/London"
                    daysOfWeek: [1, 3, 5]
                    hour: 3
                    minute: 0
                  priority: 5
              customCron:
                summary: Custom cron schedule
                description: Schedule using a custom cron expression
                value:
                  scheduleConfig:
                    scheduleType: "custom"
                    isEnabled: true
                    timezone: "UTC"
                    cronExpression: "0 */6 * * *"
                    description: "Every 6 hours"
                  priority: 5
              oneTimeSync:
                summary: One-time immediate sync
                description: Schedule a one-time crawling job
                value:
                  scheduleConfig:
                    scheduleType: "once"
                    isEnabled: true
                    scheduledTime: "2024-12-25T10:00:00Z"
                  priority: 1
      responses:
        '201':
          description: Crawling job scheduled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Crawling job scheduled successfully"
                  data:
                    type: object
                    properties:
                      jobId:
                        type: string
                        description: Unique job ID assigned by BullMQ
                        example: "crawl-drive-507f1f77bcf86cd799439011-507f1f77bcf86cd799439012"
                      connector:
                        type: string
                        example: "drive"
                      connectorId:
                        type: string
                        example: "507f1f77bcf86cd799439011"
                      scheduleConfig:
                        $ref: '#/components/schemas/ScheduleConfig'
                      scheduledAt:
                        type: string
                        format: date-time
                        example: "2024-01-15T10:30:00Z"
        '400':
          description: |
            Bad request. Possible reasons:<br>
            <ul>
            <li>Missing or invalid <code>scheduleConfig</code></li>
            <li>Schedule is disabled (<code>isEnabled: false</code>)</li>
            <li>Invalid cron expression for custom schedule</li>
            <li>Scheduled time is in the past for one-time jobs</li>
            <li>Missing connector ID</li>
            </ul>
        '401':
          description: Unauthorized - Valid JWT token required
        '403':
          description: |
            Forbidden. Possible reasons:<br>
            <ul>
            <li>Team-scoped connector requires admin privileges</li>
            <li>Personal-scoped connector can only be managed by creator</li>
            </ul>
        '404':
          description: Connector instance not found

    get:
      tags:
        - Crawling Jobs
      summary: Get crawling job status
      description: |
        Retrieve the current status of a scheduled crawling job for a specific connector.<br><br>

        <b>Overview:</b><br>
        Returns detailed information about the most recent crawling job for the specified connector,
        including its current state, progress, timing information, and any error details.<br><br>

        <b>Job States:</b><br>
        <ul>
        <li><b>waiting:</b> Job is queued and waiting to be processed</li>
        <li><b>active:</b> Job is currently being processed by a worker</li>
        <li><b>completed:</b> Job finished successfully</li>
        <li><b>failed:</b> Job failed after exhausting retry attempts</li>
        <li><b>delayed:</b> Job is scheduled for future execution</li>
        <li><b>paused:</b> Job has been manually paused</li>
        </ul>

        <b>Access Control:</b><br>
        Same as scheduling - team connectors require admin, personal connectors require creator.
      operationId: getCrawlingJobStatus
      security:
        - bearerAuth: []
        - oauth2: [crawl:read]
      parameters:
        - name: connector
          in: path
          required: true
          description: Connector type identifier
          schema:
            type: string
          example: "drive"
        - name: connectorId
          in: path
          required: true
          description: Unique identifier of the connector instance
          schema:
            type: string
          example: "507f1f77bcf86cd799439011"
      responses:
        '200':
          description: Job status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Job status retrieved successfully"
                  data:
                    $ref: '#/components/schemas/JobStatus'
        '401':
          description: Unauthorized - Valid JWT token required
        '403':
          description: Forbidden - Insufficient permissions for this connector
        '404':
          description: No scheduled job found for this connector

  /crawlingManager/{connector}/{connectorId}/remove:
    delete:
      tags:
        - Crawling Jobs
      summary: Remove a crawling job
      description: |
        Permanently remove a scheduled crawling job for a specific connector.<br><br>

        <b>Overview:</b><br>
        Removes the crawling job and all associated data from the queue. This includes
        removing repeatable job configurations and cleaning up job history.<br><br>

        <b>What Gets Removed:</b><br>
        <ul>
        <li>Active or waiting job instances</li>
        <li>Repeatable job configuration (for recurring schedules)</li>
        <li>Paused job information</li>
        <li>Job mappings and metadata</li>
        </ul>

        <b>Note:</b> Completed and failed job records may be retained for audit purposes.

        <b>Related Endpoints:</b><br>
        <ul>
        <li><code>DELETE /crawlingManager/schedule/all</code> - Remove all jobs for organization</li>
        </ul>
      operationId: removeCrawlingJob
      security:
        - bearerAuth: []
        - oauth2: [crawl:delete]
      parameters:
        - name: connector
          in: path
          required: true
          description: Connector type identifier
          schema:
            type: string
          example: "drive"
        - name: connectorId
          in: path
          required: true
          description: Unique identifier of the connector instance
          schema:
            type: string
          example: "507f1f77bcf86cd799439011"
      responses:
        '200':
          description: Crawling job removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Crawling job removed successfully"
        '401':
          description: Unauthorized - Valid JWT token required
        '403':
          description: Forbidden - Insufficient permissions for this connector
        '404':
          description: Job not found for this connector

  /crawlingManager/schedule/all:
    get:
      tags:
        - Crawling Jobs
      summary: Get all crawling job statuses
      description: |
        Retrieve the status of all scheduled crawling jobs across the organization.
      operationId: getAllCrawlingJobStatus
      security:
        - bearerAuth: []
        - oauth2: [crawl:read]
      responses:
        '200':
          description: All job statuses retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/JobStatus'
        '401':
          description: Unauthorized - Valid JWT token required

    delete:
      tags:
        - Crawling Jobs
      summary: Remove all crawling jobs
      description: |
        Remove all scheduled crawling jobs for the organization.
      operationId: removeAllCrawlingJob
      security:
        - bearerAuth: []
        - oauth2: [crawl:delete]
      responses:
        '200':
          description: All crawling jobs removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized

  /crawlingManager/{connector}/{connectorId}/pause:
    post:
      tags:
        - Crawling Jobs
      summary: Pause a crawling job
      description: |
        Pause a running or scheduled crawling job for a specific connector.
      operationId: pauseCrawlingJob
      security:
        - bearerAuth: []
        - oauth2: [crawl:write]
      parameters:
        - name: connector
          in: path
          required: true
          schema:
            type: string
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Crawling job paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: Job not found

  /crawlingManager/{connector}/{connectorId}/resume:
    post:
      tags:
        - Crawling Jobs
      summary: Resume a crawling job
      description: |
        Resume a previously paused crawling job for a specific connector.
      operationId: resumeCrawlingJob
      security:
        - bearerAuth: []
        - oauth2: [crawl:write]
      parameters:
        - name: connector
          in: path
          required: true
          schema:
            type: string
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Crawling job resumed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: Job not found

  /crawlingManager/stats:
    get:
      tags:
        - Crawling Jobs
      summary: Get queue statistics
      description: |
        Retrieve statistics for the crawling job queue including active, waiting, and completed job counts.
      operationId: getQueueStats
      security:
        - bearerAuth: []
        - oauth2: [crawl:read]
      responses:
        '200':
          description: Queue statistics retrieved
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized

  # ── Connector Internal Endpoints (Python connector service, port 8088) ──
  /connectors/internal/all-scheduled:
    get:
      tags:
        - Connectors
      summary: List all connectors configured for SCHEDULED sync (internal)
      description: |
        <b>Internal service-to-service endpoint.</b> Used exclusively by the Node.js
        scheduled-jobs backfill migration to enumerate connector instances whose etcd
        sync config has <code>selectedStrategy = SCHEDULED</code>.<br><br>

        <b>Pagination:</b> Callers step through 1-based pages. Each response returns
        up to <code>limit</code> items that are active (<code>isActive: true</code>)
        and have a SCHEDULED strategy, plus a <code>hasMore</code> flag so the caller
        knows when to stop. Database-level <code>LIMIT/OFFSET</code> is used so memory
        stays proportional to <code>limit</code> regardless of total connector count.<br><br>

        <b>Auth:</b> Requires a scoped service JWT with <code>CONNECTOR_READ</code>
        scope. Not intended for end-user clients.
      operationId: getAllScheduledConnectorInstancesInternal
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: 1-based page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          required: false
          description: Maximum active-connector candidates to fetch from the database per call (default 50, max 200)
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          example: 50
      responses:
        '200':
          description: Page of scheduled connector instances
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        connectorId:
                          type: string
                          description: Connector instance UUID (_key in ArangoDB)
                          example: "8f792208-6d61-4e16-9eda-5b1b62f28e8a"
                        type:
                          type: string
                          description: Connector type (e.g. Confluence, Slack)
                          example: "Confluence"
                        orgId:
                          type: string
                          description: Organisation identifier
                          example: "69f4b91882152b165f748e2c"
                        ownerUserId:
                          type: string
                          description: User who created the connector
                          example: "69f4b91882152b165f748e2d"
                        isActive:
                          type: boolean
                          example: true
                        sync:
                          type: object
                          description: Full sync block from etcd config
                          properties:
                            selectedStrategy:
                              type: string
                              example: "SCHEDULED"
                            scheduledConfig:
                              type: object
                              properties:
                                intervalMinutes:
                                  type: integer
                                  example: 5
                                timezone:
                                  type: string
                                  example: "UTC"
                  hasMore:
                    type: boolean
                    description: True if more pages remain; false when this is the last page
                    example: false
        '401':
          description: Unauthorized — missing or invalid JWT
        '404':
          description: No organisations found in the system
        '500':
          description: Internal server error

  # ── MCP (Model Context Protocol) ──────────────────────────────────
  # These endpoints are mounted at /mcp (root-level, NOT under /api/v1).
  # Use the root server URL: {instance_url}/mcp

  /mcp:
    post:
      tags:
        - MCP
      summary: Handle MCP JSON-RPC request
      description: |
        Main MCP endpoint that handles all JSON-RPC requests including:
        - `initialize` — Negotiate capabilities and protocol version
        - `tools/list` — List available tools
        - `tools/call` — Execute a tool (search, conversations, KB management, etc.)

        The server operates in stateless mode with Streamable HTTP transport.
        Each request creates an independent MCP server session.
      operationId: handleMCPRequest
      servers:
        - url: "{instance_url}"
          variables:
            instance_url:
              default: https://app.pipeshub.com
      security:
        - bearerAuth: []
        - oauth2: []
      requestBody:
        required: true
        description: MCP JSON-RPC 2.0 request object with method, params, and id.
        content:
          application/json:
            schema:
              type: object
              description: JSON-RPC 2.0 request object
              properties:
                jsonrpc:
                  type: string
                  enum: ["2.0"]
                id:
                  oneOf:
                    - type: string
                    - type: integer
                method:
                  type: string
                  description: "MCP method (e.g. initialize, tools/list, tools/call)"
                params:
                  type: object
              required:
                - jsonrpc
                - method
      responses:
        '200':
          description: JSON-RPC 2.0 response
          content:
            application/json:
              schema:
                type: object
                properties:
                  jsonrpc:
                    type: string
                    enum: ["2.0"]
                  id:
                    oneOf:
                      - type: string
                      - type: integer
                  result:
                    type: object
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
    get:
      tags:
        - MCP
      summary: MCP SSE streaming endpoint
      description: |
        Used by MCP clients for SSE (Server-Sent Events) streaming.
        In stateless mode, the transport returns 405 Method Not Allowed
        since each request is handled independently via POST.
      operationId: handleMCPStreamingRequest
      servers:
        - url: "{instance_url}"
          variables:
            instance_url:
              default: https://app.pipeshub.com
      security:
        - bearerAuth: []
        - oauth2: []
      responses:
        '200':
          description: SSE event stream (when stateful mode is enabled)
          content:
            text/event-stream:
              schema:
                type: string
        '405':
          description: Method Not Allowed (stateless mode does not support SSE streaming)
        '401':
          description: Unauthorized
