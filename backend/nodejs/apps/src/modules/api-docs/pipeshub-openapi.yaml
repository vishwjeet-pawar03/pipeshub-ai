            pattern: '^[a-fA-F0-9]{24}$'
      responses:
        '200':
          description: Requester has admin access
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - message
                properties:
                  message:
                    type: string
                    example: "User has admin access"
        '400':
          description: |
            Invalid request. Possible reasons:

            - Invalid user ID format (Zod)
            - Requester does not have admin privileges (`userAdminCheck`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: "`userId` or `orgId` missing from token (`userAdminCheck`)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

