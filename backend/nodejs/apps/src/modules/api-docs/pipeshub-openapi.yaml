        - bearerAuth: []
        - oauth2: [team:read]
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Number of teams per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: search
          in: query
          required: false
          description: Search teams by name
          schema:
            type: string
        - name: created_by
          in: query
          required: false
          description: Filter by creator user key
          schema:
            type: string
        - name: created_after
          in: query
          required: false
          description: Filter teams created after this timestamp (ms)
          schema:
            type: integer
        - name: created_before
          in: query
          required: false
          description: Filter teams created before this timestamp (ms)
          schema:
            type: integer
      responses:
        '200':
          description: User's teams retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
