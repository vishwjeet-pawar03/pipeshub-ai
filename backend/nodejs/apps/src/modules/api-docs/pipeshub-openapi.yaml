  # ==================== CONFIGURATION MANAGER ENDPOINTS ====================

  # -------------------- Storage Configuration --------------------
  /configurationManager/storageConfig:
    get:
      tags:
        - Storage Configuration
      summary: Get current storage configuration
      description: Retrieve the current storage backend configuration. Returns the configuration for whichever storage type is currently active (Local, S3, or Azure Blob).
      operationId: getStorageConfig
      security:
        - bearerAuth: []
        - oauth2: [config:read]
      responses:
        '200':
          description: Storage configuration retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  storageType:
                    type: string
                    enum: [local, s3, azureBlob]
                    description: Currently configured storage type
                  mountName:
                    type: string
                    description: Mount point name (Local)
                  baseUrl:
                    type: string
                    description: Base URL for files (Local)
                  accessKeyId:
                    type: string
                    description: AWS access key ID (S3)
                  secretAccessKey:
                    type: string
                    description: AWS secret access key (S3)
                  region:
                    type: string
                    description: AWS region (S3)
                  bucketName:
                    type: string
                    description: S3 bucket name (S3)
                  containerName:
                    type: string
                    description: Container name (Azure Blob)
                  accountName:
                    type: string
                    description: Storage account name (Azure Blob)
                  accountKey:
                    type: string
                    description: Storage account key (Azure Blob)
                  endpointProtocol:
                    type: string
                    enum: [http, https]
                    description: Endpoint protocol (Azure Blob)
                  endpointSuffix:
                    type: string
                    description: Endpoint suffix (Azure Blob)
        '400':
          description: Storage type not found in stored configuration
        '401':
          description: Unauthorized
    post:
      tags:
        - Storage Configuration
      summary: Create or update storage configuration
      description: |
        Save the storage backend configuration. Supported types: Local, S3, Azure Blob.

        For S3 storage, a live health check is performed before saving. The health check
        validates bucket access, upload, read, presigned URL generation (GET and PUT).
        If any capability check fails, the request is rejected with a 400 error containing
        detailed diagnostics per capability.
      operationId: createStorageConfig
      security:
        - bearerAuth: []
        - oauth2: [config:write]
      requestBody:
        required: true
        description: Storage configuration payload (discriminated by storageType)
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [storageType, s3AccessKeyId, s3SecretAccessKey, s3Region, s3BucketName]
                  properties:
                    storageType:
                      type: string
                      enum: [s3]
                    s3AccessKeyId:
                      type: string
                      description: AWS access key ID
                    s3SecretAccessKey:
                      type: string
                      description: AWS secret access key
                    s3Region:
                      type: string
                      description: AWS region (e.g. us-east-1)
                    s3BucketName:
                      type: string
                      description: S3 bucket name
                - type: object
                  required: [storageType, containerName]
                  properties:
                    storageType:
                      type: string
                      enum: [azureBlob]
                    azureBlobConnectionString:
                      type: string
                      description: Full connection string (alternative to individual fields)
                    endpointProtocol:
                      type: string
                      enum: [http, https]
                      default: https
                    accountName:
                      type: string
                    accountKey:
                      type: string
                    endpointSuffix:
                      type: string
                      default: core.windows.net
                    containerName:
                      type: string
                - type: object
                  required: [storageType]
                  properties:
                    storageType:
                      type: string
                      enum: [local]
                    mountName:
                      type: string
                    baseUrl:
                      type: string
                      format: uri
            examples:
              s3:
                summary: Amazon S3
                value:
                  storageType: s3
                  s3AccessKeyId: AKIAIOSFODNN7EXAMPLE
                  s3SecretAccessKey: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
                  s3Region: us-east-1
                  s3BucketName: my-pipeshub-bucket
              azureBlob:
                summary: Azure Blob Storage
                value:
                  storageType: azureBlob
                  accountName: mystorageaccount
                  accountKey: base64-encoded-key
                  containerName: pipeshub
              local:
                summary: Local Storage
                value:
                  storageType: local
                  mountName: PipesHub
      responses:
        '200':
          description: Storage configuration saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Storage configuration saved successfully
        '400':
          description: |
            Validation error or S3 health-check failure. When storageType is s3, a live
            capability check runs before saving. If any check fails, the response includes
            per-capability diagnostics.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: HTTP_BAD_REQUEST
                      message:
                        type: string
                        example: "S3 health check failed. Verify credentials, bucket name, region, and IAM permissions (s3:PutObject, s3:GetObject, s3:DeleteObject). upload: AccessDenied"
                      metadata:
                        type: object
                        description: Present in non-production environments
                        properties:
                          s3HealthCheck:
                            type: array
                            items:
                              type: object
                              properties:
                                capability:
                                  type: string
                                  enum: [bucketAccess, upload, read, signedUrlGet, signedUrlPut]
                                passed:
                                  type: boolean
                                error:
                                  type: string
                                  description: Error message when passed is false
        '401':
          description: Unauthorized

  # -------------------- SMTP Configuration --------------------
  /configurationManager/smtpConfig:
    post:
      tags:
        - SMTP Configuration
      summary: Create or update SMTP configuration
      description: |
        Configure SMTP email server for sending system emails including user invitations, notifications, and password resets.

        Common SMTP providers and their settings:
        - Gmail: host=smtp.gmail.com, port=587 (requires App Password)
        - SendGrid: host=smtp.sendgrid.net, port=587
        - Amazon SES: host=email-smtp.{region}.amazonaws.com, port=587
        - Microsoft 365: host=smtp.office365.com, port=587

        Configuration is encrypted before storage.
      operationId: createSMTPConfig
      security:
        - bearerAuth: []
        - oauth2: [config:write]
      requestBody:
        required: true
        description: "Request body for Create or update SMTP configuration"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SMTPConfig'
            examples:
              gmail:
                summary: Gmail SMTP
                value:
                  host: smtp.gmail.com
                  port: 587
                  username: notifications@yourcompany.com
                  password: your-app-password
                  fromEmail: noreply@yourcompany.com
              sendgrid:
                summary: SendGrid SMTP
                value:
                  host: smtp.sendgrid.net
                  port: 587
                  username: apikey
                  password: SG.your-sendgrid-api-key
                  fromEmail: noreply@yourcompany.com
              amazonSes:
                summary: Amazon SES SMTP
                value:
                  host: email-smtp.us-east-1.amazonaws.com
                  port: 587
                  username: AKIAIOSFODNN7EXAMPLE
                  password: your-ses-smtp-password
                  fromEmail: noreply@yourcompany.com
              office365:
                summary: Microsoft 365 SMTP
                value:
                  host: smtp.office365.com
                  port: 587
                  username: notifications@yourcompany.onmicrosoft.com
                  password: your-password
                  fromEmail: notifications@yourcompany.onmicrosoft.com
      responses:
        '200':
          description: SMTP configuration saved successfully
        '400':
          description: Invalid configuration
        '401':
          description: Unauthorized
        '403':
          description: Admin access required

    get:
      tags:
        - SMTP Configuration
      summary: Get SMTP configuration
      description: Retrieve the current SMTP server configuration. Password is included in the response for admin users.
      operationId: getSMTPConfig
      security:
        - bearerAuth: []
        - oauth2: [config:read]
      responses:
        '200':
          description: SMTP configuration retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SMTPConfig'
        '401':
          description: Unauthorized

