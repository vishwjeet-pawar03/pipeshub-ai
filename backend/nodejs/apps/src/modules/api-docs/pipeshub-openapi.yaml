          properties:
            model:
              type: string
              description: Model name/identifier
              example: "gpt-4"
            apiKey:
              type: string
              description: API key for the provider
            endpoint:
              type: string
              format: uri
              description: Custom endpoint URL (for Azure, self-hosted)
            organizationId:
              type: string
              description: Organization ID (OpenAI)
            deploymentName:
              type: string
              description: Deployment name (Azure OpenAI)
            awsAccessKeyId:
              type: string
              description: AWS access key (Bedrock). Optional - omit to use IAM role credentials.
            awsAccessSecretKey:
              type: string
              description: AWS secret key (Bedrock). Optional - omit to use IAM role credentials.
            region:
              type: string
              description: AWS region (Bedrock)
        isMultimodal:
          type: boolean
          description: Whether the model supports multimodal inputs
          default: false
        isReasoning:
          type: boolean
          description: Whether this is a reasoning model
          default: false
