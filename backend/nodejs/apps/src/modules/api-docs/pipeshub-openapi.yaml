        <b>Admin Only:</b><br>
        Only the creator or another admin can update.
      operationId: updateOAuthConfig
      security:
        - bearerAuth: []
      parameters:
        - name: connectorType
          in: path
          required: true
          schema:
            type: string
        - name: configId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                oauthInstanceName:
                  type: string
                config:
                  type: object
                  properties:
                    clientId:
                      type: string
                    clientSecret:
                      type: string
                    tenantId:
                      type: string
      responses:
        '200':
          description: OAuth configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  oauthConfig:
                    $ref: '#/components/schemas/OAuthConfig'
        '400':
          description: Invalid configuration
        '401':
          description: Unauthorized
        '403':
          description: Admin access required
        '404':
          description: Configuration not found

    delete:
      tags:
        - OAuth Configuration
      summary: Delete OAuth configuration
      description: |
        Delete an OAuth configuration.<br><br>
        <b>Warning:</b><br>
        Cannot delete if the configuration is used by active connectors.
        Disable or delete dependent connectors first.
      operationId: deleteOAuthConfig
      security:
        - bearerAuth: []
      parameters:
        - name: connectorType
          in: path
          required: true
          schema:
            type: string
        - name: configId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OAuth configuration deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Cannot delete - used by active connectors
        '401':
          description: Unauthorized
        '403':
          description: Admin access required
        '404':
          description: Configuration not found

