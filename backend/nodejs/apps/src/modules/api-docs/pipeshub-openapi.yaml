                  message:
                    type: string
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin access required

  /configurationManager/ai-models:
    get:
      tags:
        - Configuration Manager
      summary: Get AI model providers
      description: |
        Retrieve all configured AI model provider entries grouped by model type
        (admin-only). Returns the stored KV shape under `models`, not the flattened
        list from getAvailableModelsByType.
      operationId: getAIModelsProviders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: AI model providers retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAIModelsProvidersResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin access required

  # -------------------- AI Model Role Assignments --------------------
  /configurationManager/ai-models/roles:
    get:
      tags:
        - Configuration Manager
      summary: Get model role assignments
      description: |
        Returns the current role-to-model assignments for the organisation.

        Each key in `modelRoles` is a named role (e.g. `indexing`); the value
        identifies which configured model handles that role via its `modelType`
        bucket and `modelKey` UUID.

        Returns an empty `modelRoles` object when no roles have been configured.
      operationId: getModelRoles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role assignments retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetModelRolesResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — admin access required

    put:
      tags:
        - Configuration Manager
      summary: Update model role assignments
      description: |
        Replaces the entire role-to-model assignment map with the supplied
        `roles` object. Roles absent from the request body are deleted — this
        is how the caller unsets a role (e.g. the frontend omits a key to
        remove a previously assigned indexing model).

        **Validation rules:**
        - `modelType` must be one of: `llm`, `slm`, `embedding`, `ocr`,
          `reasoning`, `multiModal`, `imageGeneration`, `tts`, `stt`.
        - `modelKey` must refer to an existing provider entry within that
          `modelType` bucket. A 400 is returned if the model cannot be found.
        - Both `modelType` and `modelKey` are required for every role entry.
      operationId: updateModelRoles
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModelRolesRequest'
            examples:
              assignIndexingModel:
                summary: Assign a small model for the indexing role
                value:
                  roles:
                    indexing:
                      modelType: slm
                      modelKey: 3f2a1c8e-0000-0000-0000-000000000001
      responses:
        '200':
          description: Role assignments updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateModelRolesResponse'
        '400':
          description: |
            Bad request. Possible causes:
            - `roles` field missing or not an object
            - A role entry is missing `modelType` or `modelKey`
            - `modelType` is not a recognised bucket
            - `modelKey` does not exist within the specified `modelType` bucket
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [error]
                  message:
                    type: string
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — admin access required

  # -------------------- AI Model Registry (Python backend proxy) --------------------
  /configurationManager/ai-models/registry:
