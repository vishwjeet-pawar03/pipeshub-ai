                  totalCount:
                    type: integer
                  counts:
                    type: object
                    properties:
                      folders:
                        type: integer
                      records:
                        type: integer
                      totalItems:
                        type: integer
                      totalFolders:
                        type: integer
                      totalRecords:
                        type: integer
                  availableFilters:
                    type: object
                  paginationMode:
                    type: string
                  userPermission:
                    type: object
                    properties:
                      role:
                        type: string
                      canUpload:
                        type: boolean
                      canCreateFolders:
                        type: boolean
                      canEdit:
                        type: boolean
