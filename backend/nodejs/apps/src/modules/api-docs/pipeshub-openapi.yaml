        provider:
          type: string
          description: Provider registry ID
        model:
          type: string
          description: Model name from `configuration.model`
        contextLength:
          type: integer
          nullable: true
          description: Context length (tokens)
        isMultimodal:
          type: boolean
          description: Whether the model supports multimodal inputs
        isReasoning:
          type: boolean
