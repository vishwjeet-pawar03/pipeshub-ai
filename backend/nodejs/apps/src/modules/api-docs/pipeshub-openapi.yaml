      summary: Get all users with groups
      description: |
        Retrieve all non-deleted users in the organization along with their group memberships,
        using a MongoDB aggregation pipeline.

        Returns an array where each element contains: `_id`, `userId`, `orgId`, `fullName`,
        `hasLoggedIn`, and `groups` (array of `{ name, type }` objects for non-deleted groups
        in the same org).

        Accessible by any authenticated user with `user:read` scope — no admin check.
      operationId: getAllUsersWithGroups
      security:
        - bearerAuth: []
        - oauth2: [user:read]
      responses:
        '200':
          description: Users with group data retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    _id:
                      type: string
                      format: ObjectId
                    userId:
                      type: string
                    orgId:
                      type: string
                      format: ObjectId
                    fullName:
                      type: string
                    hasLoggedIn:
                      type: boolean
                    groups:
                      type: array
                      items:
                        type: object
                        additionalProperties: false
                        required:
