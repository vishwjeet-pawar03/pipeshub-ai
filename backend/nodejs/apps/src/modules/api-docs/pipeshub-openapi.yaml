          required: true
          description: User ID (24-character MongoDB ObjectId)
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
            example: "507f1f77bcf86cd799439011"
      responses:
        '200':
          description: User email retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - email
                properties:
                  email:
                    type: string
                    format: email
                    example: "john.smith@company.com"
        '400':
          description: |
            Invalid request. Possible reasons:

            - Invalid user ID format (Zod validation)
            - Requester does not have admin privileges (`userAdminCheck`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Not found. Possible reasons:

            - `userId` or `orgId` missing from token (`userAdminCheck`)
            - Organization or user not found (`userExists`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - Users
      summary: Update user email
      description: |
        Update the email address of a specific user. The new email is saved directly without a
        uniqueness check. A `UpdateUserEvent` is published to the event bus.

        Use `PUT /users/{id}` instead if you need the full update flow including email uniqueness
        validation and verification email sending.

        **Authorization:** Admin or the user themselves (`userAdminOrSelfCheck` — throws `400`
        not `403` if not authorized).
      operationId: updateEmail
      security:
        - bearerAuth: []
        - oauth2: [user:write]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID (24-character MongoDB ObjectId)
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: |
            Invalid request. Possible reasons:

            - Invalid user ID format or invalid email format (Zod)
            - Requester is not admin and is not the target user (`userAdminOrSelfCheck`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Not found. Possible reasons:

            - `userId` or `orgId` missing from token (`userAdminOrSelfCheck`)
            - Organization or user not found (`userExists`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/dp:
    put:
      tags:
        - Users
      summary: Upload display picture
      description: |
        Upload or replace the display picture for the authenticated user.

        **File requirements** (enforced by `FileProcessorFactory` middleware):

        - **Field name:** `file`
        - **Allowed types:** PNG, JPEG, JPG, WebP, GIF
        - **Maximum size:** 1 MB (1,048,576 bytes)

        The image is compressed to JPEG by `sharp`. If the compressed image still exceeds 100 KB
        after quality reduction, a `413` is returned.

        The response is the compressed binary JPEG data (`Content-Type: image/jpeg`), not JSON.
        The record is upserted in `UserDisplayPicture`.
      operationId: uploadUserDisplayPicture
      security:
        - bearerAuth: []
        - oauth2: [user:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file (PNG, JPEG, WebP, or GIF, max 1 MB)
      responses:
        '201':
          description: Display picture uploaded and compressed successfully — binary JPEG returned
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '400':
          description: |
            Invalid request. Possible reasons:

            - No file uploaded
            - File type not allowed (must be PNG, JPEG, JPG, WebP, or GIF)
            - File exceeds 1 MB limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Compressed image exceeds 100 KB after quality reduction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error (DB upsert or image processing failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Users
      summary: Get display picture
      description: |
        Retrieve the authenticated user's display picture.

        **When a display picture exists:** returns the raw binary image buffer with the stored
        `Content-Type` header (typically `image/jpeg`).

        **When no display picture is set:** returns `200` with a JSON body
        `{ "errorMessage": "User pic not found" }` — not a `404`.
      operationId: getUserDisplayPicture
      security:
        - bearerAuth: []
        - oauth2: [user:read]
      responses:
        '200':
          description: |
            Response varies:
            - If picture exists: binary image data with appropriate `Content-Type`
            - If no picture: `{ "errorMessage": "User pic not found" }`
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - errorMessage
                properties:
                  errorMessage:
                    type: string
                    example: "User pic not found"
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Users
      summary: Remove display picture
      description: |
        Remove the authenticated user's display picture by setting `pic` and `mimeType` to `null`
        in the `UserDisplayPicture` document.

        **When no display picture exists:** returns `200` with
        `{ "errorMessage": "User display picture not found" }` — not a `404`.

        **When a display picture exists:** nullifies the fields and returns the updated
        `UserDisplayPicture` document.
      operationId: removeUserDisplayPicture
      security:
        - bearerAuth: []
        - oauth2: [user:write]
      responses:
        '200':
          description: |
            Response varies:
            - If picture existed: the updated `UserDisplayPicture` document (with `pic: null`)
            - If no picture: `{ "errorMessage": "User display picture not found" }`
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/bulk/invite:
    post:
      tags:
        - Users
      summary: Bulk invite users
      description: |
        Invite multiple users to the organization by email. Handles three cases per email:

        1. **New emails** — creates a `Users` document, publishes `NewUserEvent`, and sends an
           invitation email.
        2. **Previously deleted accounts** — restores the account (`isDeleted: false`) and sends a
           re-invite email.
        3. **Active accounts with `hasLoggedIn: false`** (pending, not blocked) — resends the
           invitation email.
        4. **Active accounts already logged in** — silently skipped; no error.

        Optional `groupIds` adds new/restored users to the specified groups via `$addToSet`.

        **Middleware chain:**

        - `smtpConfigCheck` — verifies SMTP host/port/fromEmail are configured; throws `404` if
          missing fields, `500` if config fetch fails.
        - `userAdminCheck` — requires admin privileges; throws `400` if not admin, `404` if token
          context is missing.
        - `accountTypeCheck` — rejects `individual` account type; throws `400`.

        If all provided emails already have active accounts, returns `200` with
        `{ "errorMessage": "All provided emails already have active accounts" }`.

        If mail sending fails for any email, the loop continues and the final response reflects
        the mail service's HTTP status code.
      operationId: bulkInviteUsers
      security:
        - bearerAuth: []
        - oauth2: [user:invite]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - emails
              properties:
                emails:
                  type: array
                  items:
                    type: string
                    format: email
                  minItems: 1
                  description: Array of email addresses to invite
                  example: ["user1@company.com", "user2@company.com"]
                groupIds:
                  type: array
                  items:
                    type: string
                    pattern: '^[a-fA-F0-9]{24}$'
                  description: Optional group IDs to add invited users to
                  example: ["507f1f77bcf86cd799439011"]
      responses:
        '200':
          description: Invitations processed (including all-skipped case)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: "Invite sent successfully"
                  errorMessage:
                    type: string
                    description: Present when all emails were already active
                    example: "All provided emails already have active accounts"
        '400':
          description: |
            Invalid request. Possible reasons:

            - Missing or empty `emails` field
            - Invalid email format in array
            - Requester does not have admin privileges (`userAdminCheck`)
            - Organization is an individual account (`accountTypeCheck`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Not found. Possible reasons:

            - SMTP configuration missing host, port, or fromEmail (`smtpConfigCheck`)
            - `userId` or `orgId` missing from token (`userAdminCheck`)
            - Organization not found (`accountTypeCheck`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: |
            Internal server error. Possible reasons:

            - SMTP config fetch failed (`smtpConfigCheck`)
            - Auth methods fetch failed
            - User ID missing during invite processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}/resend-invite:
    post:
      tags:
        - Users
      summary: Resend user invite
      description: |
        Resend the invitation email to a pending user who has not yet completed account setup
        (`hasLoggedIn: false`).

        **Middleware chain:**

        - `smtpConfigCheck` — verifies SMTP is configured; throws `404` if fields missing,
          `500` if config fetch fails.
        - `userAdminCheck` — admin only; throws `400` if not admin, `404` if token context missing.
        - `accountTypeCheck` — rejects individual account type; throws `400`.

        **Controller behavior:**

        - Throws `400` if `id` param is missing.
        - Throws `401` if `req.user` is missing.
        - Throws `401` (`UnauthorizedError`) if the target user is not found in the DB.
        - Throws `400` if the user has already logged in (`hasLoggedIn: true`).
        - Throws `500` if auth methods fetch or email sending fails.

        Returns `{ message: 'Invite sent successfully' }` on success.
      operationId: resendUserInvite
      security:
        - bearerAuth: []
        - oauth2: [user:invite]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID of the user to resend invitation to
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
            example: "507f1f77bcf86cd799439011"
      responses:
        '200':
          description: Invitation resent successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - message
                properties:
                  message:
                    type: string
                    example: "Invite sent successfully"
        '400':
          description: |
            Invalid request. Possible reasons:

            - Invalid user ID format (Zod)
            - User has already logged in (`hasLoggedIn: true`)
            - Requester does not have admin privileges (`userAdminCheck`)
            - Organization is an individual account (`accountTypeCheck`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: |
            Unauthorized. Possible reasons:

            - Missing or invalid bearer token
            - Target user not found in DB (controller throws `UnauthorizedError`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Not found. Possible reasons:

            - SMTP configuration missing fields (`smtpConfigCheck`)
            - `userId` or `orgId` missing from token (`userAdminCheck`)
            - Organization not found (`accountTypeCheck`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: |
            Internal server error. Possible reasons:

            - SMTP config fetch failed
            - Auth methods fetch failed
            - Email sending failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/graph/list:
    get:
      tags:
        - Users
      summary: List users (paginated, enriched)
      description: |
        Retrieve a paginated list of users by proxying to the connector backend
        (`/api/v1/entity/user/list`). The response from the connector is then enriched locally
        with profile pictures, `hasLoggedIn` flags, group memberships, and role.

        Only `page`, `limit`, and `search` are forwarded to the connector.

        **Query validation** (Zod at route layer): `page` and `limit` must be positive integer
        strings when provided; `limit` is capped at 100. The `search` parameter is additionally
        validated in the controller for XSS, format specifiers, and a 1000-character maximum.

        Returns the connector's response object directly (including any `users` and `pagination`
        fields it provides), with each user entry enriched.
      operationId: listUsersGraph
      security:
        - bearerAuth: []
        - oauth2: [user:read]
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-based). Must be a positive integer string when provided.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Number of results per page. Must be a positive integer string no greater than 100 when provided.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: search
          in: query
          required: false
          description: Search query (max 1000 characters at controller layer, XSS-validated)
          schema:
            type: string
            maxLength: 1000
            example: "john"
      responses:
        '200':
          description: Paginated list of enriched users from the connector backend
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: Connector-defined response shape with users enriched locally
        '400':
          description: |
            Invalid request. Possible reasons:

            - Invalid `page` or `limit` query parameters (Zod validation — non-numeric, negative, or limit > 100)
            - `orgId` or `userId` missing from token
            - Search parameter too long or contains XSS/format specifiers
            - Connector returned a non-200 status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}/unblock:
    put:
      tags:
        - Users
      summary: Unblock a user in organization
      description: |
        Unblock a previously blocked user. Sets `isBlocked: false` and resets
        `wrongCredentialCount` to `0` on the user's `UserCredentials` document.

        If the `UserCredentials` record is not found (user not blocked or doesn't exist in this
        org), the controller throws a `BadRequestError` — returns `400`, not `404`.

        **Path validation:** `id` must be a 24-character hex MongoDB ObjectId (Zod at route layer).

        **Authorization:** `userAdminCheck` middleware — throws `400` if requester is not admin,
        `404` if `userId`/`orgId` are missing from the token.
      operationId: unblockUser
      security:
        - bearerAuth: []
        - oauth2: [user:write]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID to unblock
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
            example: "507f1f77bcf86cd799439011"
      responses:
        '200':
          description: User unblocked successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - message
                properties:
                  message:
                    type: string
                    example: "User unblocked successfully"
        '400':
          description: |
            Invalid request. Possible reasons:

            - Invalid user ID format in path (Zod validation)
            - `userId` or `orgId` missing from request context (controller check)
            - Requester does not have admin privileges (`userAdminCheck`)
            - User not found or not currently blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: "`userId` or `orgId` missing from token (`userAdminCheck`)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

