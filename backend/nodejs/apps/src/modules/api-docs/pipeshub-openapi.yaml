  # -------------------- Agents --------------------
  /agents:
    get:
      tags:
        - Agents
      summary: List agents
      description: |
        Retrieve all agents available to the authenticated user.<br><br>
        <b>Overview:</b><br>
        Returns agents created by the user plus public agents in the organization.
        Each agent has unique capabilities defined by its tools and knowledge scope.
      operationId: listAgents
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
        '401':
          description: Unauthorized

  /agents/create:
    post:
      tags:
        - Agents
      summary: Create agent
      description: |
        Create a new custom AI agent.<br><br>
        <b>Overview:</b><br>
        Agents are specialized AI assistants configured for specific tasks.
        They can have custom system prompts, access to specific tools, and
        be limited to certain knowledge bases.<br><br>
        <b>Agent Configuration:</b><br>
        <ul>
        <li><b>System prompt:</b> Instructions that define agent behavior</li>
        <li><b>Tools:</b> Capabilities like web search, code execution, etc.</li>
        <li><b>Knowledge bases:</b> Data sources the agent can access</li>
        <li><b>Model config:</b> AI model settings (temperature, max tokens)</li>
        </ul>
        <b>Use Cases:</b><br>
        <ul>
        <li>Customer support bot with product knowledge</li>
        <li>Code review assistant with repository access</li>
        <li>HR assistant with policy documents</li>
        </ul>
      operationId: createAgent
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Agent display name
                  example: "Product Support Agent"
                description:
                  type: string
                  description: What the agent does
                systemPrompt:
                  type: string
                  description: System instructions for the agent
                startMessage:
                  type: string
                  description: Initial greeting shown when conversation starts
                instructions:
                  type: string
                  nullable: true
                  description: Additional agent execution instructions
                models:
                  type: array
                  description: Agent model configuration entries
                  items:
                    oneOf:
                      - type: string
                      - type: object
                        properties:
                          modelKey:
                            type: string
                          modelName:
                            type: string
                          provider:
                            type: string
                          isReasoning:
                            type: boolean
                toolsets:
                  type: array
                  description: Toolsets attached to the agent (instance-aware)
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      displayName:
                        type: string
                      type:
                        type: string
                      instanceId:
                        type: string
                        description: Admin-created toolset instance ID
                      instanceName:
                        type: string
                        description: Human-friendly instance name
                      tools:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            fullName:
                              type: string
                            description:
                              type: string
                knowledge:
                  type: array
                  description: Knowledge sources connected to the agent
                  items:
                    type: object
                    properties:
                      connectorId:
                        type: string
                      filters:
                        oneOf:
                          - type: object
                            additionalProperties: true
                          - type: string
                webSearch:
                  type: object
                  nullable: true
                  description: Web search provider to attach to the agent
                  properties:
                    provider:
                      type: string
                      description: Provider identifier (e.g. "tavily", "serper", "exa", "duckduckgo")
                    providerKey:
                      type: string
                      description: Stored provider document key (empty string for providers that don't require one)
                    providerLabel:
                      type: string
                      description: Human-readable provider label (e.g. "DuckDuckGo")
                  required:
                    - provider
                  example:
                    provider: "duckduckgo"
                    providerKey: ""
                    providerLabel: "DuckDuckGo"
                isPublic:
                  type: boolean
                  default: false
                  description: Make agent available to all org users
                shareWithOrg:
                  type: boolean
                  default: false
                  description: Share agent with the organization
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          description: Invalid agent configuration
        '401':
          description: Unauthorized

  /agents/tools/list:
    get:
      tags:
        - Agents
      summary: List available tools
      description: |
        Get all tools that can be assigned to agents.<br><br>
        <b>Overview:</b><br>
        Tools extend agent capabilities beyond basic Q&A. Each tool
        has specific inputs and outputs defined by its schema.<br><br>
        <b>Common Tools:</b><br>
        <ul>
        <li><b>web-search:</b> Search the internet</li>
        <li><b>code-interpreter:</b> Execute code snippets</li>
        <li><b>file-reader:</b> Read uploaded files</li>
        <li><b>api-caller:</b> Make external API requests</li>
        </ul>
      operationId: listAgentTools
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      responses:
        '200':
          description: List of available tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentTool'
        '401':
          description: Unauthorized

