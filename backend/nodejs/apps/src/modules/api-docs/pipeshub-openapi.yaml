        - Organization reverts to default/placeholder logo
      operationId: deleteOrganizationLogo
      security:
        - bearerAuth: []
        - oauth2: [org:write]
      responses:
        '200':
          description: Logo removed — returns updated logo record
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
