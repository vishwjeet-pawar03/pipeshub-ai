          default: false
        isReasoning:
          type: boolean
          description: Whether this is a reasoning model
          default: false
        isDefault:
          type: boolean
          description: Set as default model for this type
          default: false
        contextLength:
          type: integer
          description: Maximum context length (tokens)
          nullable: true

    UpdateAIModelProviderRequest:
      type: object
      description: Request to update an existing AI model provider
      additionalProperties: false
      required:
        - provider
        - configuration
      properties:
        provider:
          type: string
          minLength: 1
          description: Provider registry ID (e.g. openAI, gemini, azureOpenAI, groq)
        configuration:
          $ref: '#/components/schemas/AIModelProviderConfiguration'
        isMultimodal:
          type: boolean
          description: Whether the model supports multimodal inputs
          default: false
        isReasoning:
          type: boolean
          description: Whether this is a reasoning model
          default: false
        isDefault:
          type: boolean
          description: Set as default model for this type
          default: false
        contextLength:
          type: integer
          description: Maximum context length (tokens)
          nullable: true

    AIModelProviderAddedDetails:
      type: object
      additionalProperties: false
      description: Summary of the provider entry created by addAIModelProvider
      required:
        - modelKey
        - modelType
        - provider
        - isDefault
      properties:
        modelKey:
          type: string
          format: uuid
          description: Unique identifier assigned to the new provider configuration
