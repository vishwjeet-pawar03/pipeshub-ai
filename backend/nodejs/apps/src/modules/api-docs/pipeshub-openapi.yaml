          format: objectId
        __v:
          type: integer
        query:
          type: string
        limit:
          type: integer
        orgId:
          type: string
          format: objectId
        userId:
          type: string
          format: objectId
        citationIds:
          type: array
          items:
            type: string
            format: objectId
        records:
          type: object
          description: |
            Map of source-record id (or `_key`) to `JSON.stringify(<record>)`.
            Clients must `JSON.parse` each value to recover the underlying
            record object. Populated at write-time in the POST `/search` handler.
          additionalProperties:
            type: string
        isShared:
          type: boolean
        shareLink:
          type: string
          description: Set once the search has been shared via `/search/{searchId}/share`.
        sharedWith:
          type: array
          items:
            $ref: '#/components/schemas/PersistedSemanticSearchSharedWithEntry'
        isArchived:
          type: boolean
        archivedBy:
          type: string
          format: objectId
          nullable: true
          description: |
