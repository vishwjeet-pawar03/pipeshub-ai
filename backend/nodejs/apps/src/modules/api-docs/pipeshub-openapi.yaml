  # -------------------- OAuth Configuration (Admin) --------------------
  /oauth/registry:
    get:
      tags:
        - OAuth Configuration
      summary: List OAuth-capable connector types
      description: |
        Get all connector types that support OAuth authentication.<br><br>
        <b>Admin Use:</b><br>
        Admins use this to see which connector types need OAuth credentials
        to be configured before users can authenticate.
      operationId: getOAuthRegistry
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OAuth connector types retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorType'
                  pagination:
                    $ref: '#/components/schemas/ConnectorPagination'
        '401':
          description: Unauthorized

