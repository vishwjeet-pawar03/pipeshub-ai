    UpdateAIModelProviderResponse:
      type: object
      additionalProperties: false
      description: Success response from updateAIModelProvider
      required:
        - status
        - message
        - details
      properties:
        status:
          type: string
          enum: [success]
        message:
          type: string
          example: "LLM provider updated successfully"
        details:
          $ref: '#/components/schemas/UpdateAIModelProviderDetails'

    UpdateAIModelProviderErrorResponse:
      oneOf:
        - $ref: '#/components/schemas/ErrorResponse'
