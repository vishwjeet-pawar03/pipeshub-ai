    AgentRegenerateSSEEvent:
      type: object
      description: |
        SSE event envelope for `POST /agents/{agentKey}/conversations/{conversationId}/message/{messageId}/regenerate`.

        Stable events:

        - `connected` confirms the stream is open.
        - `complete` returns the updated conversation plus request metadata.
        - `error` returns a failure message. Conversation lookup failures and
          regenerate rule failures are reported here after the stream starts.

        Other events are forwarded from the agent backend and should be
        treated as informational updates.
      properties:
        event:
          type: string
          enum:
            - connected
            - status
            - tool_calls
            - tool_call
            - tool_success
            - tool_error
            - tool_result
            - tool_execution_complete
            - answer_chunk
            - restreaming
            - metadata
            - complete
            - error
        data:
          type: string
          description: JSON-encoded event payload. Shape depends on `event`.

    SSEEvent:
      type: object
      description: |
        Server-Sent Event envelope for streaming chat responses.

        `data` is a JSON-encoded string whose shape depends on `event`.
        Three events are emitted by the API layer and have stable shapes
        documented on the streaming routes:

        - `connected` — fired once on connection. Carries the newly created
          `conversationId` and `title` so the client can link the stream to
          a row before any tokens arrive.
        - `complete` — fired once after the AI backend finishes. Carries the
          full persisted `conversation` and a `meta` block with `requestId`,
          `timestamp` and `duration`.
        - `error` — fired when the stream fails. Carries an `error` message
          and optional `details`. The conversation row is marked FAILED
          before the stream closes.

        All other events are forwarded verbatim from the AI backend; their
        payloads are AI-backend defined and may evolve. Currently observed
        names include `status`, `answer_chunk`, `tool_call`, `tool_calls`,
        `tool_result`, `tool_success`, `tool_error`,
        `tool_execution_complete`, `restreaming`, and `metadata`.
      properties:
        event:
          type: string
          enum:
            - connected
            - status
            - answer_chunk
            - tool_call
            - tool_calls
            - tool_result
            - tool_success
            - tool_error
            - tool_execution_complete
            - restreaming
            - metadata
            - complete
            - error
        data:
          type: string
          description: JSON-encoded event payload. Shape depends on `event`.

    AssistantStreamSSEEvent:
      type: object
      description: |
        Server-Sent Event envelope for non-agent assistant chat streams
        (`internal_search` / `web_search` chat modes). `data` is a
        JSON-encoded string whose shape depends on `event`.

        Three events are emitted by the API layer with stable, server-defined
        shapes:

        - `connected` — `{ "message": string, "conversationId": string,
          "title": string }`. Fired once on connection so the client can link
          the stream to the new row before any tokens arrive.
        - `complete` — `{ "conversation": Conversation,
          "meta": { "requestId": string, "timestamp": string,
          "duration": number } }`. Fired once after the AI backend finishes.
        - `error` — `{ "error": string, "details"?: string }`. Fired when the
          stream fails; the conversation row is marked FAILED before close.

        The remaining events are forwarded from the Python query service.
        Their payloads are AI-backend defined and may evolve:

        - `status` — progress message describing the current pipeline stage
          (for example `started`, `searching`, `processing`, `checking_tools`,
          `generating_answer`, `transforming`).
        - `answer_chunk` — incremental token batch with running `accumulated`
          text and any new `citations`.
        - `tool_calls` — the assistant requested one or more tool calls.
          Carries the assistant message that triggered the tool round.
        - `tool_call` — emitted once per individual tool invocation as it
          starts. Payload includes `tool_name`, `tool_args`, and `call_id`.
        - `tool_success` — a tool finished successfully. Payload includes
          `tool_name`, `summary`, `call_id`, and any `record_info`.
        - `tool_error` — a tool invocation failed. Payload includes
          `tool_name`, `error`, and `call_id`.
        - `restreaming` — the LLM is being restarted with new context, for
          example before a citation-verification pass.

        Clients should ignore unknown event names rather than treating them
        as errors.
      properties:
        event:
          type: string
          enum:
            - connected
            - status
            - answer_chunk
            - tool_calls
            - tool_call
            - tool_success
            - tool_error
            - restreaming
            - complete
            - error
        data:
          type: string
          description: JSON-encoded event payload. Shape depends on `event`.

    AssistantMessageStreamSSEEvent:
      type: object
      description: |
        Server-Sent Event envelope for non-agent assistant follow-up message
        streams (`internal_search` / `web_search` chat modes) on an existing
        conversation. `data` is a JSON-encoded string whose shape depends on
        `event`.

        Same event vocabulary as the conversation-creation stream — only the
        `connected` and `complete` payloads differ because the conversation
        already exists when this route is called.

        Three events are emitted by the API layer with stable, server-defined
        shapes:

        - `connected` — `{ "message": string }`. Fired once on connection.
          No `conversationId` or `title` is included because the caller
          already passed the conversation ID in the URL.
        - `complete` — `{ "conversation": Conversation, "recordsUsed": number,
          "meta": { "requestId": string, "timestamp": string,
          "duration": number, "recordsUsed": number } }`. Fired once after
          the AI backend finishes. `recordsUsed` is the count of citations
          attached to the new assistant message.
        - `error` — `{ "error": string, "details"?: string }`. Fired when the
          stream fails; the conversation row is marked FAILED before close.

        The remaining events are forwarded from the Python query service.
        Their payloads are AI-backend defined and may evolve:

        - `status` — progress message describing the current pipeline stage
          (for example `started`, `transforming`, `searching`, `processing`,
          `checking_tools`, `generating_answer`). `transforming` is common on
          this route because follow-up turns always have prior history to
          rewrite the query against.
        - `answer_chunk` — incremental token batch with running `accumulated`
          text and any new `citations`.
        - `tool_calls` — the assistant requested one or more tool calls.
          Carries the assistant message that triggered the tool round.
        - `tool_call` — emitted once per individual tool invocation as it
          starts. Payload includes `tool_name`, `tool_args`, and `call_id`.
        - `tool_success` — a tool finished successfully. Payload includes
          `tool_name`, `summary`, `call_id`, and any `record_info`.
        - `tool_error` — a tool invocation failed. Payload includes
          `tool_name`, `error`, and `call_id`.
        - `restreaming` — the LLM is being restarted with new context, for
          example before a citation-verification pass.

        Clients should ignore unknown event names rather than treating them
        as errors.
      properties:
        event:
          type: string
          enum:
            - connected
            - status
            - answer_chunk
            - tool_calls
            - tool_call
            - tool_success
            - tool_error
            - restreaming
            - complete
            - error
        data:
          type: string
          description: JSON-encoded event payload. Shape depends on `event`.

    AgentStreamSSEEvent:
      type: object
      description: |
        SSE event envelope for `POST /agents/{agentKey}/conversations/stream`.
        Event names are listed in `event`; payload JSON is carried in `data`.
      properties:
        event:
          type: string
          description: |
            SSE event name.
            See the enum for possible values.
          enum:
            - connected
            - status
            - tool_calls
            - tool_call
            - tool_success
            - tool_error
            - tool_result
            - tool_execution_complete
            - answer_chunk
            - restreaming
            - metadata
            - complete
            - error
        data:
          type: string
          description: |
            JSON-encoded event payload.
            Shape depends on `event`.

    AgentMessageStreamSSEEvent:
      type: object
      description: |
        Server-Sent Event envelope for `POST /agents/{agentKey}/conversations/{conversationId}/messages/stream`.
        `data` is a JSON-encoded string whose shape depends on `event`.

        Three events have stable API-defined payloads:

        - `connected` — `{ "message": "SSE connection established" }`. Fired once
          after the SSE stream opens. No `conversationId` is included because it is already
          present in the request path.
        - `complete` — `{ "conversation": AgentConversation, "recordsUsed": number,
          "meta": { "requestId": string, "timestamp": string, "duration": number,
          "recordsUsed": number } }`. Fired once after the upstream AI `complete` payload
          is parsed, citations are saved, and the updated conversation is persisted.
        - `error` — `{ "error": string, "details"?: string }`. Fired for runtime failures
          after the stream has already started, including conversation lookup failures,
          upstream AI startup failures, save failures, and stream transport errors.

        All other events are forwarded from the upstream agent backend. Common event names:

        - `status` — progress update for the current agent phase.
        - `answer_chunk` — incremental token batch with running accumulated text.
        - `tool_calls` / `tool_call` / `tool_success` / `tool_error` / `tool_result` /
          `tool_execution_complete` — tool lifecycle events emitted by the upstream agent.
        - `restreaming` — the upstream agent restarted generation with refreshed context.
        - `metadata` — auxiliary metadata or keep-alive payload from the upstream agent.

        Important wire behavior:

        - The upstream agent's `complete` event is consumed server-side and replaced with the
          API-defined `complete` event above.
        - If the upstream `complete` payload cannot be parsed as JSON, the raw upstream
          `complete` frame is forwarded unchanged instead.
        - Unknown future event names may appear and should be ignored by clients.
      properties:
        event:
          type: string
          enum:
            - connected
            - status
            - tool_calls
            - tool_call
            - tool_success
            - tool_error
            - tool_result
            - tool_execution_complete
            - answer_chunk
            - restreaming
            - metadata
            - complete
            - error
        data:
          type: string
          description: JSON-encoded event payload. Shape depends on `event`.

    # ==================== CONVERSATIONAL SPEECH SCHEMAS ====================
    SpeakRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            UTF-8 text to synthesize. Capped at 4096 characters to match the
            underlying provider limit (OpenAI TTS) and avoid unbounded cost.
          example: "Hello, this is a PipesHub voice test."
        voice:
          type: string
          nullable: true
          description: |
            Provider voice override. If omitted, the voice configured by the
            admin for the active TTS provider is used. For OpenAI: one of
            `alloy`, `echo`, `fable`, `onyx`, `nova`, `shimmer`.
          example: "alloy"
        format:
          type: string
          nullable: true
          enum: [mp3, opus, aac, flac, wav, pcm]
          description: |
            Audio response format. Unknown values are silently coerced to
            `mp3` server-side.
          example: "mp3"
        speed:
          type: number
          format: float
          nullable: true
          minimum: 0.25
          maximum: 4.0
          description: |
            Playback speed multiplier. Values outside the documented range
            are clamped server-side.
          example: 1.0

    TranscriptionResponse:
      type: object
      description: |
        Result of a successful call to `/chat/transcribe`. The server
        always includes the provider and model that handled the request
        so the client can display / log which backend produced the
        transcript.
      required:
        - text
        - provider
        - model
      properties:
        text:
          type: string
          description: |
            Transcribed text. May be an empty string for silence,
            unintelligible audio, or when the provider returned no
            content.
          example: "Turn on the office lights."
        provider:
          type: string
          description: |
            Provider id that handled the transcription. One of
            `openAI`, `whisper` (self-hosted `faster-whisper`),
            `wispr` (Wispr Flow), or `gemini`.
          enum: [openAI, whisper, wispr, gemini]
          example: "openAI"
        model:
          type: string
          description: |
            Model id that handled the transcription. Examples:
            `whisper-1`, `gpt-4o-transcribe`, `gpt-4o-mini-transcribe`,
            `base`/`small`/`medium`/`large-v3` for self-hosted
            `faster-whisper`, `flow` for Wispr, or `gemini-2.5-flash` /
            `gemini-2.5-pro` for Gemini multimodal.
          example: "gpt-4o-mini-transcribe"

    SpeechCapabilitySummary:
      type: object
      description: |
        Public summary of an active speech provider. Secrets (api keys,
        organization ids, etc.) are never included. The server always picks
        the config flagged `isDefault` in `aiModels`; when no entry is
        flagged, the first configured entry is used and `isDefault` is
        reported as `false` so the chat UI can surface the fallback.
      required:
        - provider
      properties:
        provider:
          type: string
          description: Provider id (e.g. `openAI`, `gemini`, `whisper`, `wispr`).
          example: "openAI"
        model:
          type: string
          nullable: true
          description: |
            Active (default) model id the server will dispatch to. Same
            value as `defaultModel`; retained for backwards compatibility
            with older chat clients.
          example: "gpt-4o-mini-tts"
        defaultModel:
          type: string
          nullable: true
          description: |
            Model id the server will use when no explicit `model` is passed
            to `/chat/speak` or `/chat/transcribe`. Chosen as the first
            entry from the configured comma-separated `configuration.model`
            list.
          example: "gpt-4o-mini-tts"
        models:
          type: array
          items:
            type: string
          description: |
            All model ids the active provider config exposes. Order matches
            the admin's comma-separated `configuration.model` value; the
            first entry is the default.
          example: ["gpt-4o-mini-tts", "tts-1"]
        isDefault:
          type: boolean
          description: |
            `true` when the returned config was picked because it is
            flagged `isDefault` in `aiModels`; `false` when no entry was
            flagged and the server fell back to the first configured one.
          example: true
        modelKey:
          type: string
          nullable: true
          description: |
            Stable identifier assigned to the config entry by the admin
            UI. Useful for tying the capability summary back to a specific
            row under `/services/aiModels`.
        friendlyName:
          type: string
          nullable: true
          description: Optional display name configured by the admin.
          example: "Production TTS"

    SpeechCapabilitiesResponse:
      type: object
      description: |
        Reports whether the server has a TTS/STT provider configured. When a
        bucket is `null` the chat UI falls back to the browser's Web Speech
        API for that capability.
      properties:
        tts:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SpeechCapabilitySummary'
        stt:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SpeechCapabilitySummary'

    # ==================== CONNECTOR SCHEMAS ====================
    ConnectorScope:
      type: string
      description: |
        Scope determines visibility and access control for connectors:<br>
        <ul>
        <li><code>team</code> - Available to all users in the organization (admin-only creation)</li>
        <li><code>personal</code> - Private to the creating user only</li>
        </ul>
      enum: [team, personal]
      example: "team"

    ConnectorAuthType:
      type: string
      description: |
        Authentication method required by the connector:<br>
        <ul>
        <li><code>OAUTH</code> - User OAuth consent flow</li>
        <li><code>OAUTH_ADMIN_CONSENT</code> - Admin OAuth with org-wide consent</li>
        <li><code>API_TOKEN</code> - API key or token authentication</li>
        <li><code>USERNAME_PASSWORD</code> - Username/password credentials</li>
        <li><code>NONE</code> - No authentication required</li>
        </ul>
      enum: [OAUTH, OAUTH_ADMIN_CONSENT, API_TOKEN, USERNAME_PASSWORD, NONE]

    ConnectorType:
      type: object
      description: |
        A connector type from the registry. Represents an available integration
        that can be configured as a connector instance.
      properties:
        connectorType:
          type: string
          description: Unique identifier for this connector type
          example: "google-drive"
        displayName:
          type: string
          description: Human-readable name
          example: "Google Drive"
        description:
          type: string
          description: What this connector does
        appGroupId:
          type: string
          description: Application group identifier
        appGroup:
          type: string
          description: Application group name (e.g., "Google Workspace")
        authTypes:
          type: array
          items:
            $ref: '#/components/schemas/ConnectorAuthType'
          description: Supported authentication methods
        supportedScopes:
          type: array
          items:
            $ref: '#/components/schemas/ConnectorScope'
          description: Supported scope types
        supportsSync:
          type: boolean
          description: Whether connector supports data synchronization
        supportsAgent:
          type: boolean
          description: Whether connector supports AI agent integration
        supportsRealtime:
          type: boolean
          description: Whether connector supports real-time updates
        iconPath:
          type: string
          description: Path to connector icon
        categories:
          type: array
          items:
            type: string
          description: Categories (e.g., "Storage", "Communication")
        isBeta:
          type: boolean
          description: Whether this is a beta connector

    ConnectorInstance:
      type: object
      description: |
        A configured connector instance. Represents an active or configured
        connection to an external service.
      properties:
        connectorId:
          type: string
          description: Unique instance identifier
          example: "conn_abc123"
        connectorType:
          type: string
          description: Type of connector (from registry)
          example: "google-drive"
        instanceName:
          type: string
          description: User-defined name for this instance
          example: "Company Google Drive"
        scope:
          $ref: '#/components/schemas/ConnectorScope'
        authType:
          $ref: '#/components/schemas/ConnectorAuthType'
        createdBy:
          type: string
          description: User ID who created this instance
        orgId:
          type: string
          description: Organization ID
        isActive:
          type: boolean
          description: Whether connector is enabled for syncing/agent
        isConfigured:
          type: boolean
          description: Whether all required configuration is complete
        isAuthenticated:
          type: boolean
          description: Whether authentication is complete and valid
        pendingFullSync:
          type: boolean
          description: Whether a full sync is pending due to filter changes or other configuration updates
        syncEnabled:
          type: boolean
          description: Whether sync is enabled
        agentEnabled:
          type: boolean
          description: Whether agent integration is enabled
        lastSyncAt:
          type: string
          format: date-time
          description: Timestamp of last successful sync
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConnectorConfig:
      type: object
      description: Configuration for a connector instance including auth, sync, and filter settings
      properties:
        connectorId:
          type: string
          description: Connector instance ID
        connectorType:
          type: string
          description: Connector type
        instanceName:
          type: string
          description: Instance name
        authType:
          $ref: '#/components/schemas/ConnectorAuthType'
        scope:
          $ref: '#/components/schemas/ConnectorScope'
        config:
          type: object
          description: Configuration sections
          properties:
            auth:
              type: object
              description: Authentication configuration (sensitive data redacted)
            sync:
              type: object
              description: Sync configuration (schedule, options)
            filters:
              type: object
              description: Filter selections for data scope
        baseUrl:
          type: string
          description: Base URL for self-hosted instances
        isActive:
          type: boolean
        isConfigured:
          type: boolean
        isAuthenticated:
          type: boolean

    ConnectorSchema:
      type: object
      description: Schema definition for configuring a connector type
      properties:
        connectorType:
          type: string
        authSchema:
          type: object
          description: JSON Schema for authentication fields
        syncSchema:
          type: object
          description: JSON Schema for sync configuration
        filterSchema:
          type: object
          description: JSON Schema for filter options
        requiredFields:
          type: array
          items:
            type: string
          description: Required field names

    # Sub-schemas for connector configuration
    ConnectorAuthConfig:
      type: object
      description: Authentication configuration for a connector instance
      properties:
        values:
          type: object
          description: Authentication values (keys depend on connector's auth schema)
          additionalProperties: true
          example:
            apiKey: "sk-xxxxx"
            baseUrl: "https://api.example.com"
        oauthConfigId:
          type: string
          description: ID of admin-created OAuth configuration to use
          example: "oauth_config_123"
        customValues:
          type: object
          description: Custom authentication values specific to the connector
          additionalProperties: true

    ConnectorSyncConfig:
      type: object
      description: Synchronization configuration for a connector instance
      properties:
        selectedStrategy:
          type: string
          enum: [MANUAL, SCHEDULED, WEBHOOK, REALTIME]
          description: "Sync strategy: MANUAL (user-triggered), SCHEDULED (interval/cron), WEBHOOK (event-driven), REALTIME (WebSocket)"
          default: MANUAL
        scheduledConfig:
          type: object
          description: Configuration for scheduled sync strategy
          properties:
            intervalMinutes:
              type: integer
              description: Sync interval in minutes
              minimum: 5
              default: 60
              example: 60
            cronExpression:
              type: string
              description: Cron expression for advanced scheduling
              example: "0 */6 * * *"
            timezone:
              type: string
              description: Timezone for scheduled sync
              default: UTC
              example: "America/New_York"
        webhookConfig:
          type: object
          description: Configuration for webhook-based sync
          properties:
            webhookUrl:
              type: string
              description: URL to receive webhook events (auto-generated)
            events:
              type: array
              items:
                type: string
              description: Subscribed event types
              example: ["file.created", "file.modified", "file.deleted"]
        values:
          type: object
          description: Sync setting values specific to the connector
          additionalProperties: true
        customValues:
          type: object
          description: Custom sync values
          additionalProperties: true

    ConnectorFiltersConfig:
      type: object
      description: "Filter configuration to control what data is synced (sync filters and indexing filters)"
      properties:
        sync:
          type: object
          description: Sync filter selections
          properties:
            values:
              type: object
              description: Selected filter values (keys are filter field names)
              additionalProperties: true
              example:
                folders: ["folder_id_1", "folder_id_2"]
                fileTypes: ["pdf", "docx", "xlsx"]
                includeShared: true
        indexing:
          type: object
          description: Indexing filter selections
          properties:
            values:
              type: object
              additionalProperties: true

    CreateConnectorRequest:
      type: object
      description: Request to create a new connector instance
      required:
        - connectorType
        - instanceName
        - scope
      properties:
        connectorType:
          type: string
          description: "Connector type from registry (e.g., google-drive, confluence, slack)"
          example: "google-drive"
        instanceName:
          type: string
          description: Display name for this connector instance
          minLength: 1
          maxLength: 100
          example: "Marketing Team Drive"
        scope:
          $ref: '#/components/schemas/ConnectorScope'
        authType:
          type: string
          description: "Authentication type (required if connector supports multiple auth methods)"
          enum: [OAUTH, OAUTH_ADMIN_CONSENT, API_TOKEN, USERNAME_PASSWORD, SERVICE_ACCOUNT]
          example: "OAUTH"
        oauthConfigId:
          type: string
          description: "ID of admin-created OAuth App to use (required for non-admin users creating OAuth connectors, optional for admins)"
          example: "oauth_config_123"
        config:
          type: object
          description: Initial configuration (can also be set after creation)
          properties:
            auth:
              $ref: '#/components/schemas/ConnectorAuthConfig'
            sync:
              $ref: '#/components/schemas/ConnectorSyncConfig'
            filters:
              $ref: '#/components/schemas/ConnectorFiltersConfig'
        baseUrl:
          type: string
          description: "Base URL for self-hosted instances (e.g., Confluence Server, GitLab Self-Managed)"
          format: uri
          example: "https://confluence.mycompany.com"

    UpdateConnectorConfigRequest:
      type: object
      description: "Request to update connector configuration (partial updates supported)"
      properties:
        auth:
          $ref: '#/components/schemas/ConnectorAuthConfig'
        sync:
          $ref: '#/components/schemas/ConnectorSyncConfig'
        filters:
          $ref: '#/components/schemas/ConnectorFiltersConfig'
        baseUrl:
          type: string
          description: Base URL for self-hosted instances
          format: uri
          example: "https://confluence.mycompany.com"

    UpdateConnectorAuthRequest:
      type: object
      description: "Request to update authentication config (clears OAuth tokens, requires re-auth)"
      required:
        - auth
      properties:
        auth:
          $ref: '#/components/schemas/ConnectorAuthConfig'
        baseUrl:
          type: string
          description: Base URL (if changed with auth update)
          format: uri

    UpdateConnectorFiltersSyncRequest:
      type: object
      description: "Request to update filters and sync config (connector must be authenticated and inactive)"
      properties:
        sync:
          $ref: '#/components/schemas/ConnectorSyncConfig'
        filters:
          $ref: '#/components/schemas/ConnectorFiltersConfig'
        baseUrl:
          type: string
          format: uri

    SaveConnectorFiltersRequest:
      type: object
      description: Request to save filter selections for a connector
      required:
        - filters
      properties:
        filters:
          type: object
          description: "Filter values to save (structure depends on connector's filter schema)"
          additionalProperties: true
          example:
            folders:
              - id: "folder_123"
                name: "Documents"
              - id: "folder_456"
                name: "Reports"
            fileTypes: ["pdf", "docx"]
            modifiedAfter: "2024-01-01"

    UpdateConnectorNameRequest:
      type: object
      description: Request to update connector instance name
      required:
        - instanceName
      properties:
        instanceName:
          type: string
          description: New display name for the connector instance
          minLength: 1
          maxLength: 100
          example: "Sales Team Drive (Updated)"

    ConnectorToggleRequest:
      type: object
      description: Request to toggle connector active status
      required:
        - type
      properties:
        type:
          type: string
          enum: [sync, agent]
          description: "Toggle type: 'sync' for data synchronization, 'agent' for AI agent integration"

    FilterOptions:
      type: object
      description: Available filter options for a connector
      properties:
        filters:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                description: Filter field key
              label:
                type: string
                description: Display label
              type:
                type: string
                enum: [select, multiselect, text, boolean]
                description: Filter input type
              options:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    value:
                      type: string
                    label:
                      type: string
              dynamic:
                type: boolean
                description: Whether options are loaded dynamically

    OAuthConfig:
      type: object
      description: |
        OAuth configuration for a connector type. Created by admins to enable
        OAuth authentication for connectors.
      properties:
        configId:
          type: string
          description: Unique configuration ID
        connectorType:
          type: string
          description: Connector type this config applies to
        oauthInstanceName:
          type: string
          description: Name for this OAuth configuration
          example: "Production Google OAuth"
        orgId:
          type: string
        createdBy:
          type: string
        config:
          type: object
          description: OAuth credentials (admin-only view)
          properties:
            clientId:
              type: string
            clientSecret:
              type: string
              description: Redacted for non-admin users
            tenantId:
              type: string
              description: For Microsoft/Azure connectors
        baseUrl:
          type: string
          description: Base URL for self-hosted instances
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateOAuthConfigRequest:
      type: object
      description: "Request to create OAuth configuration (admin only). Stores credentials that users select when setting up connectors."
      required:
        - oauthInstanceName
        - config
      properties:
        oauthInstanceName:
          type: string
          description: "Display name for this OAuth configuration (e.g., 'Production Google OAuth')"
          minLength: 1
          maxLength: 100
          example: "Production Google OAuth Credentials"
        config:
          type: object
          description: OAuth application credentials
          required:
            - clientId
            - clientSecret
          properties:
            clientId:
              type: string
              description: OAuth client ID from your OAuth application
              example: "123456789-abc.apps.googleusercontent.com"
            clientSecret:
              type: string
              description: OAuth client secret (stored encrypted, never returned in responses)
              example: "GOCSPX-xxxxxxxxxxxxx"
            tenantId:
              type: string
              description: "Azure tenant ID (required only for Microsoft connectors)"
              example: "12345678-1234-1234-1234-123456789abc"
        baseUrl:
          type: string
          description: "Base URL for self-hosted instances (e.g., GitLab Self-Managed)"
          format: uri
          example: "https://gitlab.mycompany.com"

    ConnectorPagination:
      type: object
      description: Pagination information for connector lists
      properties:
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Items per page
        total:
          type: integer
          description: Total number of items
        hasMore:
          type: boolean
          description: Whether more pages exist

    # ==================== CONFIGURATION MANAGER SCHEMAS ====================




    SMTPConfig:
      type: object
      description: SMTP email server configuration for sending system emails (invitations, notifications, password resets)
      required:
        - host
        - port
        - fromEmail
      properties:
        host:
          type: string
          description: SMTP server hostname or IP address
          example: smtp.gmail.com
        port:
          type: integer
          minimum: 1
          maximum: 65535
          description: SMTP server port. Common ports are 25 (unencrypted), 465 (SSL), 587 (TLS/STARTTLS)
          example: 587
        username:
          type: string
          description: SMTP authentication username. Usually an email address for services like Gmail, SendGrid, etc.
          example: notifications@yourcompany.com
        password:
          type: string
          description: SMTP authentication password or app-specific password. For Gmail, use an App Password instead of your account password.
          example: your-app-password
        fromEmail:
          type: string
          format: email
          description: Default sender email address that appears in the "From" field of outgoing emails
          example: noreply@yourcompany.com

    PlatformSettings:
      type: object
      description: Platform-wide configuration settings for file uploads and feature toggles
      properties:
        fileUploadMaxSizeBytes:
          type: integer
          minimum: 1
          maximum: 1073741824
          description: Maximum file upload size in bytes. Default is 30MB (31457280 bytes). Maximum allowed is 1GB.
          example: 31457280
        featureFlags:
          type: object
          additionalProperties:
            type: boolean
          description: |
            Key-value map of feature flags to enable/disable platform features.
            Available flags:
            - ENABLE_BETA_CONNECTORS: Allow usage of beta connector integrations that may be unstable
          example:
            ENABLE_BETA_CONNECTORS: false
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of last settings update (read-only, set automatically). May not be present in the response.
          readOnly: true
          example: "2024-01-15T10:30:00Z"

    ModelType:
      type: string
      enum: [llm, embedding, ocr, slm, reasoning, multiModal, imageGeneration, tts, stt]
      description: Type of AI model

    AIModelProviderConfig:
      type: object
      required:
        - provider
        - configuration
      properties:
        provider:
          type: string
          description: AI provider name
        configuration:
          type: object
          properties:
            model:
              type: string
              description: Model name(s)
            apiKey:
              type: string
              description: API key for the model
            endpoint:
              type: string
              format: uri
              description: Endpoint URL for the model
        isMultimodal:
          type: boolean
          default: false
          description: Whether the model supports multimodal input
        isReasoning:
          type: boolean
          default: false
          description: Whether the model supports reasoning
        isDefault:
          type: boolean
          default: false
          description: Whether this should be the default model
        contextLength:
          type: integer
          nullable: true
          description: Context length for the model
        modelKey:
          type: string
          description: Unique identifier for this model configuration
          readOnly: true

    AIModelsConfig:
      type: object
      properties:
        ocr:
          type: array
          items:
            $ref: '#/components/schemas/AIModelProviderConfig'
        embedding:
          type: array
          items:
            $ref: '#/components/schemas/AIModelProviderConfig'
        slm:
          type: array
          items:
            $ref: '#/components/schemas/AIModelProviderConfig'
        llm:
          type: array
          items:
            $ref: '#/components/schemas/AIModelProviderConfig'
        reasoning:
          type: array
          items:
            $ref: '#/components/schemas/AIModelProviderConfig'
        multiModal:
          type: array
          items:
            $ref: '#/components/schemas/AIModelProviderConfig'
        imageGeneration:
          type: array
          items:
            $ref: '#/components/schemas/AIModelProviderConfig'
        tts:
          type: array
          description: Text-to-Speech providers used to generate chat audio.
          items:
            $ref: '#/components/schemas/AIModelProviderConfig'
        stt:
          type: array
          description: Speech-to-Text providers used to transcribe chat audio.
          items:
            $ref: '#/components/schemas/AIModelProviderConfig'
      description: Must have at least one model type configured

    # AI Model Registry Schemas (Python backend)
    AIModelRegistryProvider:
      type: object
      properties:
        providerId:
          type: string
          description: Unique identifier (e.g. openAI, anthropic)
        name:
          type: string
          description: Human-readable provider name
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
        icon:
          type: string
          description: Path to the provider icon asset
        color:
          type: string
          description: Brand hex colour
        isPopular:
          type: boolean

    AIModelFieldSchema:
      type: object
      properties:
        name:
          type: string
          description: Field key used in configuration payloads
        displayName:
          type: string
          description: Human-readable label
        fieldType:
          type: string
          description: Input type hint (TEXT, SECRET, URL, NUMBER, SELECT, TOGGLE)
        required:
          type: boolean
        defaultValue:
          type: string
          nullable: true
        placeholder:
          type: string
        description:
          type: string
        isSecret:
          type: boolean
        options:
          type: array
          description: Available options when fieldType is SELECT
          items:
            type: object
            properties:
              label:
                type: string
              value:
                type: string
        validation:
          type: object
          description: Validation constraints (e.g. min, max, pattern)
          additionalProperties: true

    # Authentication Configuration Schemas
    AzureAdAuthConfig:
      type: object
      description: Azure Active Directory authentication configuration
      properties:
        clientId:
          type: string
          description: Azure AD application client ID
          example: "12345678-1234-1234-1234-123456789abc"
        tenantId:
          type: string
          description: Azure AD tenant ID (use 'common' for multi-tenant)
          default: "common"
          example: "common"

    MicrosoftAuthConfig:
      type: object
      description: Microsoft authentication configuration
      properties:
        clientId:
          type: string
          description: Microsoft application client ID
          example: "12345678-1234-1234-1234-123456789abc"
        tenantId:
          type: string
          description: Microsoft tenant ID
          default: "common"

    GoogleAuthConfig:
      type: object
      description: Google authentication configuration
      properties:
        clientId:
          type: string
          description: Google OAuth client ID
          example: "123456789-abc.apps.googleusercontent.com"

    SSOAuthConfig:
      type: object
      description: SAML SSO authentication configuration
      properties:
        entryPoint:
          type: string
          format: uri
          description: Identity provider SSO URL
          example: "https://idp.example.com/sso/saml"
        certificate:
          type: string
          description: X.509 certificate for signature validation (PEM format)
        emailKey:
          type: string
          description: SAML attribute name for user email
          example: "email"
        enableJit:
          type: boolean
          description: Enable Just-In-Time (JIT) user provisioning
          default: true
          example: true
        samlPlatform:
          type: string
          description: Name of the SAML platform or provider (e.g., Okta, Azure AD)
          example: "Okta"

    GenericOAuthConfig:
      type: object
      description: Generic OAuth 2.0 provider configuration
      properties:
        providerName:
          type: string
          description: Display name for the OAuth provider
          example: "Custom OAuth Provider"
        clientId:
          type: string
          description: OAuth client ID
        clientSecret:
          type: string
          description: OAuth client secret
        authorizationUrl:
          type: string
          format: uri
          description: Authorization endpoint URL
        tokenEndpoint:
          type: string
          format: uri
          description: Token endpoint URL
        userInfoEndpoint:
          type: string
          format: uri
          description: User info endpoint URL
        scope:
          type: string
          description: OAuth scopes to request
          example: "openid profile email"
        redirectUri:
          type: string
          format: uri
          description: OAuth redirect URI

    # Connector Configuration Schemas
    GoogleWorkspaceCredentials:
      type: object
      description: Google Workspace service account or OAuth credentials
      properties:
        userType:
          type: string
          enum: [individual, business]
          description: "Type of credentials: 'individual' for OAuth, 'business' for service account"
        credentials:
          type: object
          description: Credential data (structure depends on userType)

    GoogleWorkspaceOAuthConfig:
      type: object
      description: Google Workspace OAuth configuration for connectors
      required:
        - clientId
        - clientSecret
      properties:
        clientId:
          type: string
          description: Google OAuth client ID
        clientSecret:
          type: string
          description: Google OAuth client secret
        enableRealTimeUpdates:
          type: boolean
          description: Enable Google Pub/Sub for real-time updates
          default: false
        topicName:
          type: string
          description: Google Pub/Sub topic name (required if enableRealTimeUpdates is true)

    AtlassianConfig:
      type: object
      description: Atlassian (Confluence/Jira) OAuth configuration
      required:
        - clientId
        - clientSecret
      properties:
        clientId:
          type: string
          description: Atlassian OAuth client ID
        clientSecret:
          type: string
          description: Atlassian OAuth client secret

    OneDriveConfig:
      type: object
      description: OneDrive/Microsoft 365 connector configuration
      required:
        - clientId
        - clientSecret
        - tenantId
        - hasAdminConsent
      properties:
        clientId:
          type: string
          description: Microsoft application client ID
        clientSecret:
          type: string
          description: Microsoft application client secret
        tenantId:
          type: string
          description: Microsoft/Azure tenant ID
        hasAdminConsent:
          type: boolean
          description: |
            Must be the literal boolean `true`.
            Microsoft admin consent is required before saving credentials.
          example: true

    SharePointConfig:
      type: object
      description: SharePoint connector configuration
      required:
        - clientId
        - clientSecret
        - tenantId
        - sharepointDomain
        - hasAdminConsent
      properties:
        clientId:
          type: string
          description: Microsoft application client ID
        clientSecret:
          type: string
          description: Microsoft application client secret
        tenantId:
          type: string
          description: Microsoft/Azure tenant ID
        sharepointDomain:
          type: string
          description: SharePoint domain (e.g., 'mycompany.sharepoint.com')
        hasAdminConsent:
          type: boolean
          description: |
            Must be the literal boolean `true`.
            Microsoft admin consent is required before saving credentials.
          example: true

    # URL Configuration Schemas
    URLConfig:
      type: object
      description: URL configuration for frontend or connector
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: Public URL
          example: "https://app.example.com"

    # Web Search Schemas
    WebSearchProviderType:
      type: string
      enum: [duckduckgo, serper, tavily, exa]
      description: Supported web search provider

    WebSearchSettingsUpdate:
      type: object
      description: Web search global settings
