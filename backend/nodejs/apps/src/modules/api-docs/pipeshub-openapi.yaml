      operationId: listAgentArchivedConversationsGrouped
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentPage
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: agentLimit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 5
      responses:
        '200':
          description: Grouped archived conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentArchivedGroupsResponse'
        '401':
          description: Unauthorized

  /agents/{agentKey}/conversations/show/archives:
    get:
      tags:
        - Agents
      summary: List archived conversations for an agent
      description: Paginated list of archived conversations for the given agent key.
      operationId: listAgentConversationArchives
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, lastActivityAt, title]
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: search
          in: query
          schema:
            type: string
            maxLength: 1000
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Archived conversations for the agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentArchivedConversationListResponse'
        '400':
          description: Invalid query parameters (gateway validation)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized

  /agents/{agentKey}/conversations/attachments/upload:
    post:
      tags:
        - Agents
      summary: Upload agent chat attachments
      description: |
        Multipart upload of PDF, JPEG, or PNG files for agent chat. Same limits as assistant
        chat (`POST /conversations/attachments/upload`): up to 10 files, 5 MiB each. Proxies to
        the AI backend. Optional `conversationId` associates uploads with an existing agent thread.
      operationId: uploadAgentConversationChatAttachments
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        description: Multipart form with attachment files and optional `conversationId`.
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                conversationId:
                  type: string
                  pattern: '^$|^[0-9a-fA-F]{24}$'
                  description: >
                    Optional existing agent conversation id. Empty string is treated as unset; any
                    non-empty value must be a 24-character ObjectId.
                files:
                  type: array
                  minItems: 1
                  maxItems: 10
                  description: >
                    One or more files; field name must be `files`. Accepted MIME types:
                    `application/pdf`, `image/jpeg`, `image/jpg`, `image/png`. Max 5 MiB each.
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: >
            Success. The gateway proxies the AI-backend JSON envelope after transforming the
            multipart upload into the backend attachment payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatAttachmentUploadResponse'
        '400':
          description: >
            Invalid `conversationId`, no files, unsupported MIME type (not PDF/JPEG/PNG), or
            Multer rejection (e.g. file too large).
        '401':
          description: Unauthorized
        '403':
          description: Missing `agent:execute` scope
        '500':
          description: >
            Gateway fallback when the upstream call does not return a status
            (implementation default).

  /agents/{agentKey}/conversations/attachments/{recordId}:
    delete:
      tags:
        - Agents
      summary: Delete an agent chat attachment
      description: |
        Deletes a previously uploaded attachment by proxying `DELETE` to the query service
        (`/api/v1/chat/attachments/{recordId}`). The Node handler always ends the response **without
        a JSON body** on success (empty body); the **status code** is the upstream status, or **204**
        if none is returned.

        On validation failure in the gateway (invalid / blank path params), the response is **400**
        with a small JSON error object. Same fire-and-forget semantics as
        `DELETE /conversations/attachments/{recordId}` on the client.
      operationId: deleteAgentConversationChatAttachment
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          description: Agent key path parameter. Must be non-empty.
          schema:
            type: string
            minLength: 1
        - name: recordId
          in: path
          required: true
          description: Attachment record id (from the upload response). Must be non-blank after trim.
          schema:
            type: string
            minLength: 1
      responses:
        '204':
          description: Success with no content (typical when upstream returns 204).
        '400':
          description: Invalid or blank path params (`agentKey` or `recordId`).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: recordId is required
        '401':
          description: Unauthorized
        '403':
          description: Missing `agent:execute` scope
        default:
          description: >
            Other status codes are forwarded from the query service (e.g. 404) with an **empty**
            response body from this route.

  /agents/{agentKey}/conversations/stream:
    post:
      tags:
        - Agents
      summary: Create agent conversation with streaming response
      description: |
        Start a new conversation with the specified agent and stream the AI
        response as Server-Sent Events (SSE). The first user message is saved
        and forwarded to the upstream agent backend; subsequent tokens, tool
        calls, and lifecycle events are emitted on the open SSE connection.
      operationId: streamAgentConversation
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          description: Stable key identifying the agent that owns this conversation.
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        description: Initial turn payload for the new agent conversation stream.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentStreamCreateConversationRequest'
      responses:
        '200':
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AgentStreamSSEEvent'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized

  /agents/{agentKey}/conversations/{conversationId}/messages/stream:
    post:
      tags:
        - Agents
      summary: Add message to agent conversation with streaming response
      description: |
        Append a user message to an existing agent conversation and stream the
        assistant reply over SSE.
      operationId: streamAgentConversationMessage
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: Follow-up message payload for the agent conversation stream.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentAddMessageStreamRequest'
      responses:
        '200':
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AgentMessageStreamSSEEvent'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

  /agents/{agentKey}/conversations/{conversationId}/message/{messageId}/regenerate:
    post:
      tags:
        - Agents
      summary: Regenerate agent conversation message
      description: |
        Regenerate the AI response for a specific message in an agent
        conversation and stream the new answer over Server-Sent Events.

        **Constraints:**

        - Only the last message in the conversation can be regenerated.
        - The target message must be of type `bot_response`.

        **Request body:**

        All request-body fields are optional. When omitted, the server reuses
        the original model/context. The body supports:
        - `filters`
        - `chatMode`
        - `modelKey`
        - `modelName`
        - `modelFriendlyName`
        - `timezone`
        - `currentTime`
        - `tools`

        **Streaming behavior:**

        The response is delivered as `text/event-stream`. Stable events are
        `connected`, `complete`, and `error`. Additional agent/tool lifecycle
        events may be forwarded by the backend and should be treated as
        informational updates.

        Validation failures on params/body are returned as normal HTTP `400`
        responses before the stream starts. Valid-shape requests that fail
        conversation lookup or regenerate rules are reported as SSE `error`
        events after stream initialization.
      operationId: regenerateAgentConversationMessage
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          description: Stable key identifying the agent that owns this conversation.
          schema:
            type: string
            minLength: 1
        - name: conversationId
          in: path
          required: true
          description: ID of the agent conversation containing the target message.
          schema:
            type: string
            format: objectId
        - name: messageId
          in: path
          required: true
          description: ID of the bot-response message to regenerate.
          schema:
            type: string
            format: objectId
      requestBody:
        required: false
        description: |
          Optional regeneration payload. All fields are optional and are
          validated against `RegenerateRequest`.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegenerateRequest'
      responses:
        '200':
          description: |
            SSE stream established.

            Stable event names:
            - `connected` — confirms the stream is open
            - `complete` — returns the updated conversation plus metadata
            - `error` — reports lookup failures, authorization failures on
              the conversation, or regenerate-rule failures after the stream
              has started

            Additional backend-defined agent/tool events may be emitted.
            Clients should ignore unknown event names.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AgentRegenerateSSEEvent'
        '400':
          description: |
            Validation failed for path parameters or request body. Common
            causes include invalid ObjectId formats, empty strings for fields
            that require content, malformed `filters`, invalid `tools`
            entries, or `currentTime` values that are not ISO 8601 datetimes
            with offset information.
        '401':
          description: Unauthorized

  /agents/{agentKey}/conversations/{conversationId}/message/{messageId}/feedback:
    post:
      tags:
        - Agents
      summary: Submit feedback for an agent message
      description: |
        Append structured feedback to a bot-response message in an agent
        conversation. Uses the same request body shape as
        `updateMessageFeedback` (helpfulness, categories, comments). Feedback
        can only be submitted on `bot_response` messages.
      operationId: updateAgentConversationMessageFeedback
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          description: Unique agent identifier (gateway Zod requires non-empty string).
          schema:
            type: string
            minLength: 1
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier.
          schema:
            type: string
            format: objectId
        - name: messageId
          in: path
          required: true
          description: Identifier of the bot-response message being rated.
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: Feedback payload for the agent message.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageFeedbackSubmitRequest'
      responses:
        '200':
          description: Feedback stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageFeedbackUpdateResponse'
        '400':
          description: |
            Invalid request. Possible causes:

            - Feedback target is not a `bot_response` message.
            - A `categories` value is not in the allowed list.
            - `conversationId` or `messageId` is not a valid ObjectId.
        '401':
          description: Unauthorized
        '404':
          description: Conversation or message not found
        '500':
          description: Persistence layer failed to append the feedback entry.

  /agents/{agentKey}/conversations/{conversationId}/messages:
    post:
      tags:
        - Agents
      summary: Add message to agent conversation
      description: Append a user message and wait for the full non-streaming AI response.
      operationId: addAgentConversationMessage
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: Follow-up message body (query required).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMessageRequest'
      responses:
        '200':
          description: Updated conversation with new assistant message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddMessageResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

  /agents/{agentKey}/conversations/{conversationId}/archive:
    post:
      tags:
        - Agents
      summary: Archive an agent conversation
      description: Marks the conversation as archived for the authenticated owner.
      operationId: archiveAgentConversation
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Conversation archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversationArchiveResponse'
        '400':
          description: |
            Invalid path input or the conversation is already archived.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /agents/{agentKey}/conversations/{conversationId}/unarchive:
    post:
      tags:
        - Agents
      summary: Unarchive an agent conversation
      description: Restores an archived agent conversation to the active list.
      operationId: unarchiveAgentConversation
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Conversation unarchived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversationUnarchiveResponse'
        '400':
          description: |
            Invalid path input or the conversation is not currently archived.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /agents/{agentKey}/conversations/{conversationId}/title:
    patch:
      tags:
        - Agents
      summary: Update agent conversation title
      description: |
        Updates the display title for an agent conversation owned by the caller.

        The controller looks up the conversation by `_id`, `orgId`, `userId`,
        `agentKey`, and `isDeleted: false`.

        The request body uses the shared title validator (`1..200` chars), and
        the controller trims the incoming title before saving it. A whitespace-only
        title can therefore still return HTTP 400 even if the raw string is
        non-empty.
      operationId: updateAgentConversationTitle
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: |
          New title for the agent conversation.

          The server trims the provided string before saving it.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationTitleUpdateRequest'
      responses:
        '200':
          description: Title updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversationTitleUpdateResponse'
        '400':
          description: |
            Invalid path or body input.

            This includes Zod validation failures for malformed `conversationId`
            or invalid `title` payloads, plus controller-level bad requests such
            as titles that become empty after trimming.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Agent conversation not found for the authenticated user, organization,
            and agent scope, or the conversation is soft-deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /agents/{agentKey}/conversations/{conversationId}:
    delete:
      tags:
        - Agents
      summary: Delete an agent conversation
      description: |
        Soft-deletes an agent conversation owned by the authenticated user.

        The controller scopes the lookup by `_id`, `orgId`, `userId`, and
        `agentKey`. If no matching writable conversation is found, the route is
        intentionally a no-op and still returns HTTP 200 with `conversation: null`.

        This makes the operation idempotent:

        - deleting a nonexistent conversation returns success with `null`
        - deleting through a different `agentKey` returns success with `null`
        - deleting an already deleted conversation returns success with `null`
      operationId: deleteAgentConversationById
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Conversation deleted or no-op delete completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversationDeleteResponse'
        '400':
          description: Invalid path input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while deleting the agent conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Agents
      summary: Get agent conversation by ID
      description: |
        Returns the conversation with paginated/sorted messages and filter metadata.

        **Message Pagination:**

        Messages are paginated newest-first: `page=1` returns the most recent
        batch. Increment `page` to load older batches (used by the infinite-scroll
        "load older messages" feature).

        - `page`: Page number (default: 1)
        - `limit`: Messages per page (default: 20, max: 100)
      operationId: getAgentConversationById
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
        - name: page
          in: query
          description: Page number for message pagination (1 = most recent batch)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of messages per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          description: Field to sort messages by
          schema:
            type: string
            enum: [createdAt, messageType, content]
            default: createdAt
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: startDate
          in: query
          description: Filter messages created on or after this date
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: Filter messages created on or before this date
          schema:
            type: string
            format: date-time
        - name: messageType
          in: query
          description: Filter messages by type
          schema:
            type: string
            enum: [user_query, bot_response, error, feedback, system]
      responses:
        '200':
          description: Agent conversation detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversationDetailResponse'
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

  /agents/{agentKey}/conversations:
    get:
      tags:
        - Agents
      summary: List agent conversations
      description: |
        Paginated list of conversations for the agent (owned and shared-with-me),
        excluding archived threads.
      operationId: listAgentConversations
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentKey
          in: path
          required: true
          description: Agent identifier used to scope the conversation list.
          schema:
            type: string
        - name: page
          in: query
          description: 1-based page number. Defaults to `1`.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Page size. Defaults to `20`; maximum `100`.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          description: |
            Preferred sort field. Supported values are `createdAt`,
            `lastActivityAt`, and `title`.

            The current gateway validator preserves legacy behavior: unsupported
            values are accepted but ignored, and the handler falls back to
            `lastActivityAt`.
          schema:
            type: string
        - name: sortOrder
          in: query
          description: |
            Preferred sort direction. Supported values are `asc` and `desc`.

            The current gateway validator preserves legacy behavior: unsupported
            values are accepted but ignored, and the handler falls back to
            descending order.
          schema:
            type: string
        - name: search
          in: query
          description: |
            Case-insensitive search term applied to conversation `title` and
            `messages.content`. Maximum length is 1000 characters. HTML/XSS
            payloads and format specifiers are rejected.
          schema:
            type: string
            maxLength: 1000
        - name: startDate
          in: query
          description: |
            Inclusive lower bound on `createdAt`. The handler accepts any
            JavaScript-parseable date string; invalid values return HTTP 400.
          schema:
            type: string
            example: "2026-05-26T00:00:00.000Z"
        - name: endDate
          in: query
          description: |
            Inclusive upper bound on `createdAt`. The handler accepts any
            JavaScript-parseable date string; invalid values return HTTP 400.
          schema:
            type: string
            example: "2026-05-27T00:00:00.000Z"
        - name: status
          in: query
          description: |
            Optional status filter applied to the `sharedWithMeConversations`
            branch of the response. The main `conversations` list ignores this
            parameter.
          schema:
            type: string
        - name: isArchived
          in: query
          description: |
            Optional archived flag applied to the `sharedWithMeConversations`
            branch before the route-level non-archived guard is enforced.
            Accepted values are `true` and `false`.
          schema:
            type: string
            enum: ['true', 'false']
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversationListResponse'
        '400':
          description: |
            Invalid path or query parameter.

            This includes Zod validation failures such as invalid pagination,
            invalid booleans, malformed date values, duplicate `search`
            parameters, or overlong / invalid `search` input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Agents
      summary: Create agent conversation
      description: |
        Create a new conversation with the agent using an initial user query;
        returns the persisted conversation after the first AI response (non-streaming).
      operationId: createAgentConversation
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: Initial user query and optional model or filter context.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                type: object
                required:
                  - conversation
                  - meta
                properties:
                  conversation:
                    $ref: '#/components/schemas/AgentConversation'
                  meta:
                    type: object
                    additionalProperties: true
        '400':
          description: Invalid request
        '401':
          description: Unauthorized

  # ==================== CONNECTOR MANAGER ENDPOINTS ====================

  # -------------------- Connector Registry --------------------
  /connectors/registry:
    get:
      tags:
        - Connector Registry
      summary: List available connector types
      description: |
        Get all available connector types from the registry.<br><br>
        <b>Overview:</b><br>
        The registry contains all connector types that can be configured as instances.
        Each type has specific authentication requirements, supported scopes, and capabilities.<br><br>
        <b>Connector Types Include:</b><br>
        <ul>
        <li><b>Google Workspace:</b> Drive, Gmail, Calendar, etc.</li>
        <li><b>Microsoft 365:</b> OneDrive, Outlook, SharePoint, etc.</li>
        <li><b>Cloud Storage:</b> Dropbox, Box, AWS S3</li>
        <li><b>Collaboration:</b> Slack, Confluence, Notion, Jira</li>
        <li><b>Databases:</b> PostgreSQL, MySQL, MongoDB</li>
        </ul>
        <b>Filtering:</b><br>
        Use <code>scope</code> to filter by team or personal connectors.
        Use <code>search</code> for full-text search across connector names.
      operationId: getConnectorRegistry
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: scope
          in: query
          description: Filter by scope type
          schema:
            $ref: '#/components/schemas/ConnectorScope'
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: search
          in: query
          description: Search term for connector names
          schema:
            type: string
      responses:
        '200':
          description: Connector registry retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorType'
                  pagination:
                    $ref: '#/components/schemas/ConnectorPagination'
        '401':
          description: Unauthorized

  /connectors/registry/{connectorType}/schema:
    get:
      tags:
        - Connector Registry
      summary: Get connector configuration schema
      description: |
        Get the configuration schema for a specific connector type.<br><br>
        <b>Overview:</b><br>
        Returns JSON Schema definitions for authentication, sync settings, and
        filter options. Use this to dynamically build configuration forms.<br><br>
        <b>Schema Sections:</b><br>
        <ul>
        <li><b>authSchema:</b> Fields for authentication (credentials, tokens)</li>
        <li><b>syncSchema:</b> Sync settings (schedule, incremental options)</li>
        <li><b>filterSchema:</b> Filter field definitions</li>
        </ul>
      operationId: getConnectorSchema
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorType
          in: path
          required: true
          description: Connector type identifier
          schema:
            type: string
          example: "google-drive"
      responses:
        '200':
          description: Schema retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  schema:
                    $ref: '#/components/schemas/ConnectorSchema'
        '401':
          description: Unauthorized
        '404':
          description: Connector type not found

  # -------------------- Connector Instances --------------------
  /connectors:
    get:
      tags:
        - Connector Instances
      summary: List connector instances
      description: |
        Get all configured connector instances for your organization.<br><br>
        <b>Overview:</b><br>
        Returns instances created by users, filtered by scope and permissions.
        Team-scope connectors are visible to all org users. Personal connectors
        are only visible to their creators.<br><br>
        <b>Instance States:</b><br>
        <ul>
        <li><b>isConfigured:</b> All required settings are complete</li>
        <li><b>isAuthenticated:</b> OAuth flow complete or credentials valid</li>
        <li><b>isActive:</b> Connector is enabled for sync/agent</li>
        </ul>
      operationId: listConnectorInstances
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: scope
          in: query
          required: false
          description: |
            Filter by scope. Defaults to <code>team</code> when omitted.
          schema:
            $ref: '#/components/schemas/ConnectorScope'
          default: team
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: search
          in: query
          description: Full-text search across instance name, type, and app group
          schema:
            type: string
        - name: isAuthenticated
          in: query
          description: |
            Filter by authentication status.
            <code>true</code> returns only authenticated instances;
            <code>false</code> returns only unauthenticated ones.
            Omit to return all.
          schema:
            type: boolean
        - name: isActive
          in: query
          description: |
            Filter by active status.
            <code>true</code> returns only active instances;
            <code>false</code> returns only inactive ones.
            Omit to return all.
          schema:
            type: boolean
        - name: connectorType
          in: query
          description: |
            Filter by exact connector type string (e.g. <code>Confluence</code>,
            <code>GoogleDrive</code>). Case-sensitive.
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Instances retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
                  pagination:
                    $ref: '#/components/schemas/ConnectorPagination'
        '401':
          description: Unauthorized

    post:
      tags:
        - Connector Instances
      summary: Create connector instance
      description: |
        Create a new connector instance from a registry type.<br><br>
        <b>Overview:</b><br>
        Creates a new connector instance that can then be configured and enabled.
        The instance is created in an unconfigured state and needs authentication
        and filter setup before it can be activated.<br><br>
        <b>Scope Permissions:</b><br>
        <ul>
        <li><code>team</code> scope requires admin privileges</li>
        <li><code>personal</code> scope available to all users</li>
        </ul>
        <b>Next Steps After Creation:</b><br>
        <ol>
        <li>Configure authentication via <code>PUT /{id}/config/auth</code></li>
        <li>Complete OAuth flow if needed via <code>GET /{id}/oauth/authorize</code></li>
        <li>Set up filters via <code>POST /{id}/filters</code></li>
        <li>Enable connector via <code>POST /{id}/toggle</code></li>
        </ol>
      operationId: createConnectorInstance
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConnectorRequest'
            examples:
              googleDrive:
                summary: Google Drive (Team)
                value:
                  connectorType: "google-drive"
                  instanceName: "Company Google Drive"
                  scope: "team"
                  authType: "OAUTH_ADMIN_CONSENT"
              confluence:
                summary: Confluence (Personal)
                value:
                  connectorType: "confluence"
                  instanceName: "My Confluence"
                  scope: "personal"
                  authType: "API_TOKEN"
              slackWithOAuthApp:
                summary: Slack with OAuth App (Non-Admin)
                value:
                  connectorType: "slack"
                  instanceName: "My Team Slack"
                  scope: "personal"
                  authType: "OAUTH"
                  oauthConfigId: "oauth_config_123"
      responses:
        '201':
          description: Instance created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connector:
                    $ref: '#/components/schemas/ConnectorInstance'
        '400':
          description: |
            Invalid request. Possible reasons:<br>
            <ul>
            <li>Invalid connector type</li>
            <li>Scope not supported by connector</li>
            <li>Duplicate instance name</li>
            <li>Non-admin users must select an OAuth App when creating OAuth connectors</li>
            </ul>
        '401':
          description: Unauthorized
        '403':
          description: |
            Forbidden. Possible reasons:<br>
            <ul>
            <li>Admin privileges required for team-scope connectors</li>
            <li>Non-admin users cannot provide OAuth credentials (clientId, clientSecret, etc.)</li>
            </ul>
        '404':
          description: Selected OAuth App not found or not accessible

  /connectors/active:
    get:
      tags:
        - Connector Instances
      summary: List active connector instances
      description: |
        Get all active (enabled) connector instances.<br><br>
        <b>Overview:</b><br>
        Returns only instances where <code>isActive: true</code>.
        These are connectors currently syncing data or available to AI agents.
      operationId: listActiveConnectors
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      responses:
        '200':
          description: Active connectors retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
        '401':
          description: Unauthorized

  /connectors/inactive:
    get:
      tags:
        - Connector Instances
      summary: List inactive connector instances
      description: Get all inactive (disabled) connector instances.
      operationId: listInactiveConnectors
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      responses:
        '200':
          description: Inactive connectors retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
        '401':
          description: Unauthorized

  /connectors/configured:
    get:
      tags:
        - Connector Instances
      summary: List configured connector instances
      description: |
        Get all connector instances that have completed configuration.<br><br>
        <b>Overview:</b><br>
        Returns instances where <code>isConfigured: true</code>.
        These have all required settings but may not be active yet.
      operationId: listConfiguredConnectors
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: scope
          in: query
          schema:
            $ref: '#/components/schemas/ConnectorScope'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Configured connectors retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
                  pagination:
                    $ref: '#/components/schemas/ConnectorPagination'
        '401':
          description: Unauthorized

  /connectors/agents/active:
    get:
      tags:
        - Connector Instances
      summary: List active agent connectors
      description: |
        Get connector instances enabled for AI agent integration.<br><br>
        <b>Overview:</b><br>
        Returns connectors where <code>agentEnabled: true</code>.
        These are available to AI agents for querying and actions.
      operationId: listActiveAgentConnectors
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: scope
          in: query
          schema:
            $ref: '#/components/schemas/ConnectorScope'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Active agent connectors retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
                  pagination:
                    $ref: '#/components/schemas/ConnectorPagination'
        '401':
          description: Unauthorized

  /connectors/{connectorId}:
    get:
      tags:
        - Connector Instances
      summary: Get connector instance
      description: Retrieve a specific connector instance by ID.
      operationId: getConnectorInstance
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          description: Connector instance ID
          schema:
            type: string
          example: "conn_abc123"
      responses:
        '200':
          description: Instance retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connector:
                    $ref: '#/components/schemas/ConnectorInstance'
        '401':
          description: Unauthorized
        '403':
          description: No access to this connector
        '404':
          description: Connector not found

    delete:
      tags:
        - Connector Instances
      summary: Delete connector instance
      description: |
        Delete a connector instance and all associated data.<br><br>
        <b>Warning:</b><br>
        This permanently removes the connector configuration.
        Synced records in knowledge bases are NOT deleted.<br><br>
        <b>Permissions:</b><br>
        <ul>
        <li>Team scope: Requires admin</li>
        <li>Personal scope: Only creator can delete</li>
        </ul>
      operationId: deleteConnectorInstance
      security:
        - bearerAuth: []
        - oauth2: [connector:delete]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Connector deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '404':
          description: Connector not found

  /connectors/{connectorId}/name:
    put:
      tags:
        - Connector Instances
      summary: Update connector instance name
      description: |
        Update the display name of a connector instance.<br><br>
        <b>Note:</b> This only updates the display name, not the connector configuration.
      operationId: updateConnectorName
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
          description: Unique connector instance ID
      requestBody:
        required: true
        description: "Request body for Update connector instance name"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectorNameRequest'
      responses:
        '200':
          description: Name updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connector:
                    $ref: '#/components/schemas/ConnectorInstance'
        '400':
          description: Invalid name
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  # -------------------- Connector Configuration --------------------
  /connectors/{connectorId}/config:
    get:
      tags:
        - Connector Configuration
      summary: Get connector configuration
      description: |
        Get the current configuration for a connector instance.<br><br>
        <b>Security:</b><br>
        Sensitive data (credentials, OAuth tokens) are redacted from the response.
        Only admins can see partial credential information.
      operationId: getConnectorConfig
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Configuration retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  config:
                    $ref: '#/components/schemas/ConnectorConfig'
        '401':
          description: Unauthorized
        '403':
          description: No access to this connector
        '404':
          description: Connector not found

    put:
      tags:
        - Connector Configuration
      summary: Update connector configuration
      description: |
        Update authentication, sync, and filter configuration.<br><br>
        <b>Prerequisites:</b><br>
        Connector must be <b>disabled</b> before updating configuration.
        Disable it first using <code>POST /{id}/toggle</code>.<br><br>
        <b>Partial Updates:</b><br>
        Only provide the sections you want to update. Omitted sections
        are not modified.
      operationId: updateConnectorConfig
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectorConfigRequest'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  config:
                    $ref: '#/components/schemas/ConnectorConfig'
        '400':
          description: |
            Invalid configuration or connector is active.
            Disable connector before updating.
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  /connectors/{connectorId}/config/auth:
    put:
      tags:
        - Connector Configuration
      summary: Update authentication configuration
      description: |
        Update only the authentication configuration.<br><br>
        <b>Use Case:</b><br>
        Use this when you need to update credentials without changing
        sync or filter settings. Useful for credential rotation.<br><br>
        <b>Prerequisites:</b><br>
        Connector must be disabled. This endpoint clears OAuth state,
        requiring re-authentication for OAuth connectors.
      operationId: updateConnectorAuthConfig
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectorAuthRequest'
      responses:
        '200':
          description: Auth configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  config:
                    $ref: '#/components/schemas/ConnectorConfig'
        '400':
          description: Connector must be disabled first
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  /connectors/{connectorId}/config/filters-sync:
    put:
      tags:
        - Connector Configuration
      summary: Update filters and sync configuration
      description: |
        Update filter selections and sync settings without touching auth.<br><br>
        <b>Use Case:</b><br>
        Use this to change what data is synced or adjust sync schedule
        without re-authenticating.
      operationId: updateConnectorFiltersSyncConfig
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectorFiltersSyncRequest'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  config:
                    $ref: '#/components/schemas/ConnectorConfig'
                  message:
                    type: string
                    description: Success message
                  syncFiltersChanged:
                    type: boolean
                    description: Indicates whether sync filters changed, requiring a full resync
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  # -------------------- Connector Control --------------------
  /connectors/{connectorId}/toggle:
    post:
      tags:
        - Connector Control
      summary: Toggle connector sync or agent
      description: |
        Enable or disable a connector for sync or agent functionality.<br><br>
        <b>Toggle Types:</b><br>
        <ul>
        <li><code>sync</code> - Enable/disable data synchronization</li>
        <li><code>agent</code> - Enable/disable AI agent integration</li>
        </ul>
        <b>Prerequisites for Enabling:</b><br>
        <ul>
        <li>Connector must be configured (<code>isConfigured: true</code>)</li>
        <li>For OAuth connectors: Must be authenticated (<code>isAuthenticated: true</code>)</li>
        <li>For agent: Connector must support agent (<code>supportsAgent: true</code>)</li>
        </ul>
        <b>Permissions:</b><br>
        <ul>
        <li>Team scope: Requires admin</li>
        <li>Personal scope: Only creator can toggle</li>
        </ul>
      operationId: toggleConnector
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectorToggleRequest'
      responses:
        '200':
          description: Connector toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Sync enabled successfully"
                  connector:
                    $ref: '#/components/schemas/ConnectorInstance'
        '400':
          description: |
            Cannot toggle. Possible reasons:<br>
            <ul>
            <li>Connector not configured</li>
            <li>OAuth not authenticated</li>
            <li>Agent not supported</li>
            </ul>
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '404':
          description: Connector not found

  /connectors/{connectorId}/file-events:
    post:
      tags:
        - Connector Control
      summary: Submit Local FS file events
      description: |
        Replays a batch of filesystem change events for a **Local FS** connector instance.
        Used by the local CLI to apply incremental changes without a full directory rescan.
        Only Local FS connector instances accept this endpoint; other connector types receive 400.
      operationId: submitConnectorFileEvents
      security:
        - bearerAuth: []
        - oauth2: [connector:sync]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: |
          JSON body: either a `LocalFsFileEventBatchRequest` object, or a bare JSON array of
          `LocalFsFileEvent` objects (the server wraps arrays with a generated batch id).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalFsFileEventBatchRequest'
      responses:
        '200':
          description: File event batch applied
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - connectorId
                  - batchId
                  - stats
                properties:
                  success:
                    type: boolean
                    example: true
                  connectorId:
                    type: string
                  batchId:
                    type: string
                  stats:
                    $ref: '#/components/schemas/LocalFsFileEventStats'
        '400':
          description: Not a Local FS connector, or invalid path or event payload
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '404':
          description: Connector not found
        '422':
          description: Invalid or missing request body

  /connectors/{connectorId}/file-events/upload:
    post:
      tags:
        - Connector Control
      summary: Submit Local FS file events with file bytes
      description: |
        Replays a batch of Local FS desktop sync events and uploads file bytes for created,
        modified, renamed, or moved files. This supports deployed connector backends that
        cannot read the desktop filesystem path directly.
      operationId: submitConnectorFileEventUploads
      security:
        - bearerAuth: []
        - oauth2: [connector:sync]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - manifest
              properties:
                manifest:
                  type: string
                  description: |
                    JSON `LocalFsFileEventBatchRequest`. Upsert events include `contentField`,
                    `sha256`, `mimeType`, `size`, and timestamps. Delete events do not need files.
                file_0:
                  type: string
                  format: binary
                  description: File bytes referenced by an event `contentField`; additional file_N fields are allowed.
      responses:
        '200':
          description: Uploaded file event batch applied
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - connectorId
                  - batchId
                  - stats
                properties:
                  success:
                    type: boolean
                    example: true
                  connectorId:
                    type: string
                  batchId:
                    type: string
                  stats:
                    $ref: '#/components/schemas/LocalFsFileEventStats'
        '400':
          description: Not a Local FS connector, invalid path, or digest mismatch
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '404':
          description: Connector not found
        '413':
          description: Batch or file upload too large
        '422':
          description: Invalid manifest or missing file part

  # -------------------- Connector OAuth --------------------
  /connectors/{connectorId}/oauth/authorize:
    get:
      tags:
        - Connector OAuth
      summary: Get OAuth authorization URL
      description: |
        Generate an OAuth authorization URL to start the OAuth flow.<br><br>
        <b>Flow:</b><br>
        <ol>
        <li>Call this endpoint to get the authorization URL</li>
        <li>Redirect user's browser to the URL</li>
        <li>User authenticates with the provider</li>
        <li>Provider redirects to callback with authorization code</li>
        <li>Callback exchanges code for tokens automatically</li>
        </ol>
        <b>State Parameter:</b><br>
        The response includes a <code>state</code> value that encodes the
        connector ID. This is validated in the callback.
      operationId: getOAuthAuthorizationUrl
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
        - name: baseUrl
          in: query
          description: Base URL for self-hosted instances
          schema:
            type: string
      responses:
        '200':
          description: Authorization URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  authorizationUrl:
                    type: string
                    description: Redirect user to this URL
                  state:
                    type: string
                    description: State parameter for validation
        '400':
          description: Connector doesn't support OAuth
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  /connectors/oauth/callback:
    get:
      tags:
        - Connector OAuth
      summary: OAuth callback handler
      description: |
        Handle the OAuth callback from the identity provider.<br><br>
        <b>Note:</b><br>
        This endpoint is called by the OAuth provider after user authentication.
        The state parameter contains the encoded connector ID.<br><br>
        <b>Success:</b><br>
        On success, tokens are stored and the connector becomes authenticated.
        User is redirected to the frontend success page.<br><br>
        <b>Error:</b><br>
        If the provider returns an error (e.g., user denied access),
        user is redirected with error information.
      operationId: handleOAuthCallback
      security: []
      parameters:
        - name: code
          in: query
          description: Authorization code from provider
          schema:
            type: string
        - name: state
          in: query
          description: State parameter (contains connector ID)
          schema:
            type: string
        - name: error
          in: query
          description: Error code if authorization failed
          schema:
            type: string
        - name: baseUrl
          in: query
          description: Base URL for redirect
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend with result
          headers:
            Location:
              description: Frontend URL with success/error params
              schema:
                type: string
        '400':
          description: Invalid or missing state parameter

  # -------------------- Connector Filters --------------------
  /connectors/{connectorId}/filters:
    get:
      tags:
        - Connector Filters
      summary: Get filter options
      description: |
        Get available filter options for a connector.<br><br>
        <b>Overview:</b><br>
        Returns filter fields that can be used to limit what data is synced.
        For example, a Google Drive connector might offer filters for
        specific folders or file types.<br><br>
        <b>Dynamic Filters:</b><br>
        Some filter fields have <code>dynamic: true</code> (i.e.
        <code>optionSourceType: dynamic</code>), meaning their options are
        loaded separately via the filter options endpoint.
        For such fields, call
        <code>GET /connectors/{connectorId}/filters/{filterKey}/options</code>.
        When scoping options to a specific parent (e.g. GitLab projects within
        a selected group), pass the parent paths via the
        <code>contextGroupPath</code> query parameter on that endpoint.
      operationId: getConnectorFilters
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Filter options retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  filterOptions:
                    $ref: '#/components/schemas/FilterOptions'
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

    post:
      tags:
        - Connector Filters
      summary: Save filter selections
      description: |
        Save the user's filter selections for a connector.<br><br>
        <b>Overview:</b><br>
        After viewing filter options, use this endpoint to save the
        selected values. These determine what data will be synced.
      operationId: saveConnectorFilters
      security:
        - bearerAuth: []
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveConnectorFiltersRequest'
      responses:
        '200':
          description: Filters saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  /connectors/{connectorId}/filters/{filterKey}/options:
    get:
      tags:
        - Connector Filters
      summary: Get dynamic filter options
      description: |
        Get options for a dynamic filter field with pagination.<br><br>
        <b>Overview:</b><br>
        For filters with <code>optionSourceType: dynamic</code>, options are loaded
        from the connected service. This supports pagination and search.<br><br>
        <b>Scoped options (GitLab):</b><br>
        When fetching options for the <code>project_ids</code> filter key, pass
        one or more <code>contextGroupPath</code> query parameters to restrict
        the returned repositories to those that belong to the specified GitLab
        group namespace paths (e.g. <code>myorg/team</code>). This is used to
        populate the project filter after the user has selected groups.<br><br>
        <b>Examples:</b><br>
        <ul>
        <li>Google Drive folders list</li>
        <li>Slack channels list</li>
        <li>Confluence spaces list</li>
        <li>GitLab groups list (<code>filterKey=group_ids</code>)</li>
        <li>GitLab projects scoped to groups (<code>filterKey=project_ids&amp;contextGroupPath=myorg/team</code>)</li>
        </ul>
      operationId: getFilterFieldOptions
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
        - name: filterKey
          in: path
          required: true
          description: Filter field key
          schema:
            type: string
          example: "folders"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: Search term for filtering options
          schema:
            type: string
        - name: cursor
          in: query
          description: Cursor for cursor-based pagination
          schema:
            type: string
        - name: contextGroupPath
          in: query
          description: |
            One or more GitLab group namespace paths (e.g. `myorg/team`).
            When provided for the `project_ids` filter key, the returned
            options are scoped to repositories that belong to those groups.
            Repeat the parameter for multiple groups:
            `?contextGroupPath=groupA&contextGroupPath=groupB`
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: excludeContextGroupPath
          in: query
          description: |
            One or more GitLab group namespace paths to exclude. When provided
            for the `project_ids` filter key, the returned options omit
            repositories that belong to those groups (used when the
            `group_ids` sync filter is `not_in`). Repeat the parameter for
            multiple groups:
            `?excludeContextGroupPath=groupA&excludeContextGroupPath=groupB`
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: Options retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  options:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        value:
                          type: string
                        label:
                          type: string
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      hasMore:
                        type: boolean
                      cursor:
