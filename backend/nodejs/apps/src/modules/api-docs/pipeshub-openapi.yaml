                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      path:
                        type: string
                      type:
                        type: string
                      webUrl:
                        type: string
                      recordGroupId:
                        type: string
                  folders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Folder'
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/Record'
                  level:
