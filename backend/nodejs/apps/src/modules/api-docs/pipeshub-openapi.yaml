  /toolsets/my-toolsets:
    get:
      tags:
        - Toolset Instances
      summary: List my toolsets with auth status
      description: Returns organization toolset instances merged with current user's authentication status.
      operationId: getMyToolsets
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-based).
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Page size (max 200).
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: includeRegistry
          in: query
          required: false
          description: When true, include toolsets from the registry that are not yet configured as synthetic, non-configured entries.
          schema:
            type: boolean
        - name: toolsetType
          in: query
          required: false
          description: When set, only instances for this toolset type (case-insensitive). Registry merge is limited to this type when includeRegistry is true.
          schema:
            type: string
        - name: authStatus
          in: query
          required: false
          description: Filter by user auth state — authenticated or not-authenticated. Omit for all. filterCounts reflect counts before this filter.
          schema:
            type: string
            enum: [authenticated, not-authenticated]
        - name: search
          in: query
          required: false
          description: Optional search filter applied to instance name, toolset type, and registry display name/description.
          schema:
            type: string
      responses:
        '200':
          description: Toolsets retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
                      hasNext:
                        type: boolean
                      hasPrev:
                        type: boolean
                  filterCounts:
                    type: object
                    properties:
                      all:
                        type: integer
                      authenticated:
                        type: integer
                      notAuthenticated:
                        type: integer
                  toolsets:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        instanceId:
                          type: string
                          description: Empty string for registry-only (synthetic) entries.
                        instanceName:
                          type: string
                        toolsetType:
                          type: string
                        authType:
                          type: string
                          enum: [OAUTH, API_TOKEN, BEARER_TOKEN, USERNAME_PASSWORD, NONE]
                        oauthConfigId:
                          type: string
                          nullable: true
                        displayName:
                          type: string
                        description:
