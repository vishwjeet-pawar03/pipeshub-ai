                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          search:
                            type: object
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          pagination:
                            type: object
                            additionalProperties: false
                            properties:
                              page:
                                type: object
                                additionalProperties: false
                                properties:
                                  type:
                                    type: string
                                  current:
                                    type: integer
                                  min:
                                    type: integer
                                  max:
                                    type: integer
                                  default:
                                    type: integer
                                  description:
                                    type: string
                                  applied:
                                    type: boolean
                              limit:
                                type: object
                                additionalProperties: false
                                properties:
                                  type:
                                    type: string
                                  current:
                                    type: integer
                                  min:
                                    type: integer
                                  max:
                                    type: integer
                                  default:
                                    type: integer
                                  description:
