  /users/{id}/adminCheck:
    get:
      tags:
        - Users
      summary: Check if requester is admin
      description: |
        Checks whether the **authenticated requester** has admin privileges in their organization.
        The `{id}` path parameter is validated for ObjectId format but is not used to look up a
        user — the check is performed on `req.user` (the token bearer), not on the target ID.

        Returns `200` if the requester is an admin. Returns `400` if not (from `userAdminCheck`
        which throws `BadRequestError`, not `ForbiddenError`).
      operationId: adminCheck
      security:
        - bearerAuth: []
        - oauth2: [user:read]
      parameters:
        - name: id
          in: path
          required: true
