          description: Agent or conversation not found

  /agents/{agentKey}/conversations/{conversationId}/message/{messageId}/regenerate:
    post:
      tags:
        - Agent Conversations
      summary: Regenerate agent response
      description: |
        Regenerate the agent's response for a specific message.<br><br>
        <b>Overview:</b><br>
        Similar to conversation regeneration but uses the agent's configuration.
      operationId: regenerateAgentAnswer
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      requestBody:
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: '#/components/schemas/Filters'
                modelKey:
                  type: string
                modelName:
                  type: string
                modelFriendlyName:
                  type: string
                chatMode:
                  type: string
                timezone:
                  type: string
                  minLength: 1
                  description: IANA timezone identifier from the client (top-level field).
                  example: "America/New_York"
                currentTime:
                  type: string
                  format: date-time
                  description: ISO 8601 / RFC 3339 datetime (top-level field; UTC `Z` or offset).
                  example: "2026-04-12T16:00:00+05:30"
                tools:
                  type: array
                  items:
                    type: string
                    minLength: 1
                  description: |
                    Optional tool full names the agent may use when regenerating.
      responses:
        '200':
          description: Response regenerated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversation'
        '401':
          description: Unauthorized
        '404':
          description: Agent, conversation, or message not found

  /agents/{agentKey}/conversations/{conversationId}/message/{messageId}/feedback:
    post:
      tags:
        - Agent Conversations
      summary: Submit feedback on an agent response
      description: |
        Provide feedback on an AI-generated response in an agent conversation.<br><br>
        <b>Overview:</b><br>
        Feedback helps improve AI response quality over time. You can indicate
        helpfulness, select issue categories, and provide free-text comments.<br><br>
        <b>Feedback Options:</b><br>
        <ul>
        <li><b>isHelpful:</b> Overall thumbs up/down</li>
        <li><b>ratings:</b> 1-5 scale for accuracy, relevance, completeness, clarity</li>
        <li><b>categories:</b> Issue categories (incorrect info, missing info, etc.)</li>
        <li><b>comments:</b> Free-text positive/negative feedback and suggestions</li>
        </ul>
        <b>Restrictions:</b><br>
        Feedback can only be submitted on <code>bot_response</code> messages,
        not on user queries or system messages.
      operationId: updateAgentMessageFeedback
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageFeedback'
      responses:
        '200':
          description: Feedback submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationId:
                    type: string
                    format: objectId
                  messageId:
                    type: string
                    format: objectId
                  feedback:
                    $ref: '#/components/schemas/MessageFeedback'
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
        '400':
          description: |
            Invalid feedback. Possible reasons:<br>
            <ul>
            <li>Ratings must be 1-5</li>
            <li>Cannot add feedback to user_query messages</li>
            </ul>
        '401':
          description: Unauthorized
        '404':
          description: Agent, conversation, or message not found

  /agents/conversations/show/archives:
    get:
      tags:
        - Agent Conversations
      summary: List all archived agent conversations grouped by agent
      description: |
        Retrieve all archived agent conversations for the authenticated user, grouped by agent.<br><br>
        <b>Overview:</b><br>
        Returns archived conversations from every agent the user has interacted with,
        grouped into per-agent buckets. Each group includes the most recent conversations
        and a total count so the client can load more on demand.<br><br>
        <b>Agent-level pagination:</b><br>
        Use <code>agentPage</code> and <code>agentLimit</code> to page through agent groups
        (defaults: page 1, limit 10).<br><br>
        <b>Note:</b><br>
        Conversations whose agent has been deleted are excluded automatically.
      operationId: listAllAgentsArchivedConversationsGrouped
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentPage
          in: query
          description: Page number for agent-group pagination (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: agentLimit
          in: query
          description: Number of agent groups per page (default 10, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Archived agent conversations grouped by agent
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      type: object
                      properties:
                        agentKey:
                          type: string
                          description: Agent identifier
                        conversations:
                          type: array
                          items:
                            $ref: '#/components/schemas/AgentConversation'
                          description: Initial slice of archived conversations for this agent
                        pagination:
                          type: object
                          description: Pagination metadata for this agent's archived conversations
                          properties:
                            page:
                              type: integer
                            limit:
                              type: integer
                            totalCount:
                              type: integer
                            totalPages:
                              type: integer
                            hasNextPage:
                              type: boolean
                            hasPrevPage:
                              type: boolean
                  agentPagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
                      hasNextPage:
                        type: boolean
                      hasPrevPage:
                        type: boolean
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
        '401':
          description: Unauthorized

  /agents/{agentKey}/conversations/show/archives:
    get:
      tags:
        - Agent Conversations
      summary: List archived conversations for a specific agent
      description: |
        Retrieve all archived conversations the user has had with a specific agent.<br><br>
        <b>Overview:</b><br>
        Returns paginated archived conversations for the given agent. Only conversations
        owned by the authenticated user are returned.<br><br>
        <b>Unarchiving:</b><br>
        Use <code>POST /agents/{agentKey}/conversations/{conversationId}/unarchive</code>
        to restore a conversation to the active list.
      operationId: listAllArchivesAgentConversation
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentKey
          in: path
          required: true
          description: Agent identifier
          schema:
            type: string
        - name: page
          in: query
          description: Page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page (default 20, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          description: Field to sort by (default lastActivityAt)
          schema:
            type: string
            default: lastActivityAt
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: List of archived agent conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentConversation'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
                      hasNextPage:
                        type: boolean
                      hasPrevPage:
                        type: boolean
                  filters:
                    type: object
                    description: Applied and available filters
                  summary:
                    type: object
                    properties:
                      totalArchived:
                        type: integer
                      oldestArchive:
                        type: string
                        format: date-time
                      newestArchive:
                        type: string
                        format: date-time
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
        '401':
          description: Unauthorized
        '404':
          description: Agent not found

  /agents/{agentKey}/conversations/{conversationId}/archive:
    post:
      tags:
        - Agent Conversations
      summary: Archive an agent conversation
      description: |
        Archive an agent conversation to hide it from the active list.<br><br>
        <b>Overview:</b><br>
        Archived conversations are preserved but hidden from the default conversation list.
        Use archiving to clean up your workspace without permanently deleting conversations.<br><br>
        <b>Retrieval:</b><br>
        View archived conversations using
        <code>GET /agents/{agentKey}/conversations/show/archives</code>.
      operationId: archiveAgentConversation
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          description: Agent identifier
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          description: Agent conversation identifier
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Agent conversation archived successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: objectId
                  status:
                    type: string
                    example: archived
                  archivedBy:
                    type: string
                    format: objectId
                  archivedAt:
                    type: string
                    format: date-time
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
        '400':
          description: Conversation is already archived
        '401':
          description: Unauthorized
        '404':
          description: Agent conversation not found

  /agents/{agentKey}/conversations/{conversationId}/unarchive:
    post:
      tags:
        - Agent Conversations
      summary: Unarchive an agent conversation
      description: |
        Restore an archived agent conversation to the active list.<br><br>
        <b>Overview:</b><br>
        Removes the archived flag, making the conversation visible in the main list again.
      operationId: unarchiveAgentConversation
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          description: Agent identifier
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          description: Agent conversation identifier
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Agent conversation unarchived successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: objectId
                  status:
                    type: string
                    example: unarchived
                  unarchivedBy:
                    type: string
                    format: objectId
                  unarchivedAt:
                    type: string
                    format: date-time
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
        '400':
          description: Conversation is not archived
        '401':
          description: Unauthorized
        '404':
          description: Agent conversation not found

  /agents/{agentKey}/conversations/{conversationId}/title:
    patch:
      tags:
        - Agent Conversations
      summary: Update agent conversation title
      description: |
        Update the title of an agent conversation.<br><br>
        <b>Overview:</b><br>
        Agent conversation titles are auto-generated from the first query by default.
        Use this endpoint to set a custom, more descriptive title.<br><br>
        <b>Title Limits:</b><br>
        <ul>
        <li>Minimum: 1 character (non-empty after trimming)</li>
        <li>Maximum: 200 characters</li>
        </ul>
      operationId: updateAgentConversationTitle
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          description: Agent identifier
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          description: Agent conversation identifier
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: New title for the agent conversation
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: New conversation title
                  example: "Q4 Planning with Sales Agent"
      responses:
        '200':
          description: Title updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: '#/components/schemas/AgentConversation'
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
        '400':
          description: Invalid title - must be non-empty
        '401':
          description: Unauthorized
        '404':
          description: Agent conversation not found

  /agents/{agentKey}/unshare:
    post:
      tags:
        - Agents
      summary: Unshare an agent
      description: |
        Revoke sharing for an agent, removing access for specified users or teams.
      operationId: unshareAgent
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                    format: objectId
                teamIds:
                  type: array
                  items:
                    type: string
                    format: objectId
      responses:
        '200':
          description: Agent unshared successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: Agent not found

  # ==================== CONNECTOR MANAGER ENDPOINTS ====================

  # -------------------- Connector Registry --------------------
  /connectors/registry:
    get:
      tags:
        - Connector Registry
      summary: List available connector types
      description: |
        Get all available connector types from the registry.<br><br>
        <b>Overview:</b><br>
        The registry contains all connector types that can be configured as instances.
        Each type has specific authentication requirements, supported scopes, and capabilities.<br><br>
        <b>Connector Types Include:</b><br>
        <ul>
        <li><b>Google Workspace:</b> Drive, Gmail, Calendar, etc.</li>
        <li><b>Microsoft 365:</b> OneDrive, Outlook, SharePoint, etc.</li>
        <li><b>Cloud Storage:</b> Dropbox, Box, AWS S3</li>
        <li><b>Collaboration:</b> Slack, Confluence, Notion, Jira</li>
        <li><b>Databases:</b> PostgreSQL, MySQL, MongoDB</li>
        </ul>
        <b>Filtering:</b><br>
        Use <code>scope</code> to filter by team or personal connectors.
        Use <code>search</code> for full-text search across connector names.
      operationId: getConnectorRegistry
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: scope
          in: query
          description: Filter by scope type
          schema:
            $ref: '#/components/schemas/ConnectorScope'
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: search
          in: query
          description: Search term for connector names
          schema:
            type: string
      responses:
        '200':
          description: Connector registry retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorType'
                  pagination:
                    $ref: '#/components/schemas/ConnectorPagination'
        '401':
          description: Unauthorized

  /connectors/registry/{connectorType}/schema:
    get:
      tags:
        - Connector Registry
      summary: Get connector configuration schema
      description: |
        Get the configuration schema for a specific connector type.<br><br>
        <b>Overview:</b><br>
        Returns JSON Schema definitions for authentication, sync settings, and
        filter options. Use this to dynamically build configuration forms.<br><br>
        <b>Schema Sections:</b><br>
        <ul>
        <li><b>authSchema:</b> Fields for authentication (credentials, tokens)</li>
        <li><b>syncSchema:</b> Sync settings (schedule, incremental options)</li>
        <li><b>filterSchema:</b> Filter field definitions</li>
        </ul>
      operationId: getConnectorSchema
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorType
          in: path
          required: true
          description: Connector type identifier
          schema:
            type: string
          example: "google-drive"
      responses:
        '200':
          description: Schema retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  schema:
                    $ref: '#/components/schemas/ConnectorSchema'
        '401':
          description: Unauthorized
        '404':
          description: Connector type not found

  # -------------------- Connector Instances --------------------
  /connectors:
    get:
      tags:
        - Connector Instances
      summary: List connector instances
      description: |
        Get all configured connector instances for your organization.<br><br>
        <b>Overview:</b><br>
        Returns instances created by users, filtered by scope and permissions.
        Team-scope connectors are visible to all org users. Personal connectors
        are only visible to their creators.<br><br>
        <b>Instance States:</b><br>
        <ul>
        <li><b>isConfigured:</b> All required settings are complete</li>
        <li><b>isAuthenticated:</b> OAuth flow complete or credentials valid</li>
        <li><b>isActive:</b> Connector is enabled for sync/agent</li>
        </ul>
      operationId: listConnectorInstances
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: scope
          in: query
          required: false
          description: Filter by scope (team or personal)
          schema:
            $ref: '#/components/schemas/ConnectorScope'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: search
          in: query
          description: Search by instance name
          schema:
            type: string
      responses:
        '200':
          description: Instances retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
                  pagination:
                    $ref: '#/components/schemas/ConnectorPagination'
        '401':
          description: Unauthorized

    post:
      tags:
        - Connector Instances
      summary: Create connector instance
      description: |
        Create a new connector instance from a registry type.<br><br>
        <b>Overview:</b><br>
        Creates a new connector instance that can then be configured and enabled.
        The instance is created in an unconfigured state and needs authentication
        and filter setup before it can be activated.<br><br>
        <b>Scope Permissions:</b><br>
        <ul>
        <li><code>team</code> scope requires admin privileges</li>
        <li><code>personal</code> scope available to all users</li>
        </ul>
        <b>Next Steps After Creation:</b><br>
        <ol>
        <li>Configure authentication via <code>PUT /{id}/config/auth</code></li>
        <li>Complete OAuth flow if needed via <code>GET /{id}/oauth/authorize</code></li>
        <li>Set up filters via <code>POST /{id}/filters</code></li>
        <li>Enable connector via <code>POST /{id}/toggle</code></li>
        </ol>
      operationId: createConnectorInstance
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConnectorRequest'
            examples:
              googleDrive:
                summary: Google Drive (Team)
                value:
                  connectorType: "google-drive"
                  instanceName: "Company Google Drive"
                  scope: "team"
                  authType: "OAUTH_ADMIN_CONSENT"
              confluence:
                summary: Confluence (Personal)
                value:
                  connectorType: "confluence"
                  instanceName: "My Confluence"
                  scope: "personal"
                  authType: "API_TOKEN"
              slackWithOAuthApp:
                summary: Slack with OAuth App (Non-Admin)
                value:
                  connectorType: "slack"
                  instanceName: "My Team Slack"
                  scope: "personal"
                  authType: "OAUTH"
                  oauthConfigId: "oauth_config_123"
      responses:
        '201':
          description: Instance created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connector:
                    $ref: '#/components/schemas/ConnectorInstance'
        '400':
          description: |
            Invalid request. Possible reasons:<br>
            <ul>
            <li>Invalid connector type</li>
            <li>Scope not supported by connector</li>
            <li>Duplicate instance name</li>
            <li>Non-admin users must select an OAuth App when creating OAuth connectors</li>
            </ul>
        '401':
          description: Unauthorized
        '403':
          description: |
            Forbidden. Possible reasons:<br>
            <ul>
            <li>Admin privileges required for team-scope connectors</li>
            <li>Non-admin users cannot provide OAuth credentials (clientId, clientSecret, etc.)</li>
            </ul>
        '404':
          description: Selected OAuth App not found or not accessible

  /connectors/active:
    get:
      tags:
        - Connector Instances
      summary: List active connector instances
      description: |
        Get all active (enabled) connector instances.<br><br>
        <b>Overview:</b><br>
        Returns only instances where <code>isActive: true</code>.
        These are connectors currently syncing data or available to AI agents.
      operationId: listActiveConnectors
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      responses:
