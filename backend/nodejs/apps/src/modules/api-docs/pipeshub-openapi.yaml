  /knowledgeBase/record/{recordId}:
    get:
      tags:
        - Records
      summary: Get record by ID
      description: |
        Retrieve detailed information about a specific record.<br><br>
        <b>Overview:</b><br>
        Returns complete record metadata including name, type, indexing status, storage information, and version history.<br><br>
        <b>File Conversion:</b><br>
        Use the optional <code>convertTo</code> parameter to request file format conversion (e.g., PDF to text).
      operationId: getRecordById
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: recordId
          in: path
          required: true
          description: Record ID
          schema:
            type: string
        - name: convertTo
          in: query
          description: Optional format to convert the file to
          schema:
            type: string
            example: "txt"
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    $ref: '#/components/schemas/Record'
                  knowledgeBase:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      orgId:
                        type: string
                  folder:
                    type: object
                    nullable: true
                  metadata:
                    type: object
                    properties:
                      departments:
                        type: array
                        items:
                          type: object
                      categories:
                        type: array
                        items:
                          type: object
                      topics:
                        type: array
                        items:
                          type: object
                      languages:
                        type: array
                        items:
                          type: object
                  permissions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        type:
                          type: string
                        relationship:
                          type: string
                        accessType:
                          type: string
        '401':
          description: Unauthorized
        '404':
          description: Record not found

    put:
      tags:
        - Records
      summary: Update record
      description: |
        Update a record's name and/or file content.<br><br>
        <b>Overview:</b><br>
        Allows updating the display name and optionally replacing the file content. Triggers re-indexing when content changes.<br><br>
        <b>Required Permission:</b> WRITER or higher<br><br>
        <b>Updating File Content:</b><br>
        Include a new file in the request to replace the existing content. The file extension must match the original.<br><br>
        <b>Side Effects:</b><br>
        <ul>
        <li>Updates <code>updatedAtTimestamp</code></li>
        <li>Increments version if file content changed</li>
        <li>Triggers re-indexing for content changes</li>
        </ul>
      operationId: updateRecord
      security:
        - bearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          description: Record ID
          schema:
            type: string
      requestBody:
        description: "Request payload"
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                recordName:
                  type: string
                  description: New name for the record
                  maxLength: 255
                file:
                  type: string
                  format: binary
                  description: Replacement file content
      responses:
        '200':
          description: Record updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                      message:
                        type: string
                      record:
                        $ref: '#/components/schemas/Record'
                  - $ref: '#/components/schemas/UpdateRecordEnrichment'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Record not found

    delete:
      tags:
        - Records
      summary: Delete record
      description: |
        Permanently delete a record from the knowledge base.<br><br>
        <b>Required Permission:</b> WRITER or higher<br><br>
        <b>What Gets Deleted:</b><br>
        <ul>
        <li>Record metadata</li>
        <li>Associated storage file</li>
        <li>Indexed content and embeddings</li>
        </ul>
        <b>Warning:</b> This action is irreversible.
      operationId: deleteRecord
      security:
        - bearerAuth: []
        - oauth2: [kb:delete]
      parameters:
        - name: recordId
          in: path
          required: true
          description: Record ID
          schema:
            type: string
      responses:
        '200':
          description: Record deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Record not found

  /knowledgeBase/stream/record/{recordId}:
    get:
      tags:
        - Records
      summary: Stream record content
      description: |
        Stream the binary content of a record's file.<br><br>
        <b>Overview:</b><br>
        Returns the raw file content with appropriate Content-Type and Content-Disposition headers for download or inline viewing.<br><br>
        <b>Use Cases:</b><br>
        <ul>
        <li>File downloads</li>
        <li>Inline document preview</li>
        <li>Content extraction pipelines</li>
        </ul>
        <b>Format Conversion:</b><br>
        Use <code>convertTo</code> parameter to convert between formats (e.g., DOCX to PDF).
      operationId: streamRecordBuffer
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: recordId
          in: path
          required: true
          description: Record ID
          schema:
            type: string
        - name: convertTo
          in: query
          description: Target format for conversion
          schema:
            type: string
      responses:
        '200':
          description: File content stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
        '404':
          description: Record not found
        '409':
          description: |
            Conflict — the connector instance for this record is disabled. Enable it from Connector Settings and try again.
            Response body is JSON with a `detail` string (FastAPI error shape), not a binary stream.

  # -------------------- Folder Endpoints --------------------
  /knowledgeBase/{kbId}/folder:
    post:
      tags:
        - Folders
      summary: Create root folder
      description: |
        Create a new folder at the root level of a knowledge base.<br><br>
        <b>Required Permission:</b> FILEORGANIZER or higher<br><br>
        <b>Folder Features:</b><br>
        <ul>
        <li>Organize records hierarchically</li>
        <li>Support nested subfolders</li>
        <li>Inherit parent KB permissions</li>
        </ul>
        <b>Naming Rules:</b><br>
        <ul>
        <li>1-255 characters</li>
        <li>XSS protection applied</li>
        <li>Can contain spaces and special characters</li>
        </ul>
      operationId: createRootFolder
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: kbId
          in: path
          required: true
          description: Knowledge base ID
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                folderName:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Name of the folder
                  example: "Project Documents"
              required:
                - folderName
      responses:
        '200':
          description: Folder created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Folder'
        '400':
          description: Invalid folder name
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Knowledge base not found

  /knowledgeBase/{kbId}/folder/{folderId}:
    get:
      tags:
        - Folders
      summary: Get folder contents
      description: |
        Retrieve the contents of a folder including subfolders and records.<br><br>
        <b>Overview:</b><br>
        Returns paginated list of records within the folder, with same filtering options as KB-level record listing.<br><br>
        <b>Navigation:</b><br>
        Use this endpoint to browse folder hierarchies. Response includes folder metadata and child items.
      operationId: getFolderContents
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: kbId
          in: path
          required: true
          description: Knowledge base ID
          schema:
            type: string
        - name: folderId
          in: path
          required: true
          description: Folder ID
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            default: createdAtTimestamp
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Folder contents retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordsResponse'
        '401':
          description: Unauthorized
        '404':
          description: Folder or knowledge base not found

    put:
      tags:
        - Folders
      summary: Update folder
      description: |
        Rename a folder.<br><br>
        <b>Required Permission:</b> FILEORGANIZER or higher
      operationId: updateFolder
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                folderName:
                  type: string
                  minLength: 1
                  maxLength: 255
              required:
                - folderName
      responses:
        '200':
          description: Folder updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Folder'
        '400':
          description: Invalid folder name
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Folder not found

    delete:
      tags:
        - Folders
      summary: Delete folder
      description: |
        Delete a folder and all its contents.<br><br>
        <b>Required Permission:</b> FILEORGANIZER or higher<br><br>
        <b>Cascade Delete:</b><br>
        All subfolders and records within will be permanently deleted.<br><br>
        <b>Warning:</b> This action is irreversible.
      operationId: deleteFolder
      security:
        - bearerAuth: []
        - oauth2: [kb:delete]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Folder deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Folder not found

  /knowledgeBase/{kbId}/folder/{folderId}/children:
    get:
      tags:
        - Folders
      summary: Get folder children (alias for folder contents)
      description: |
        Retrieve the children (subfolders and records) of a folder.<br><br>
        <b>Overview:</b><br>
        This is an alias endpoint for <code>/knowledgeBase/{kbId}/folder/{folderId}</code>. Returns paginated list of records within the folder, with same filtering options as KB-level record listing.<br><br>
        <b>Navigation:</b><br>
        Use this endpoint to browse folder hierarchies. Response includes folder metadata and child items.
      operationId: getFolderChildren
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: kbId
          in: path
          required: true
          description: Knowledge base ID
          schema:
            type: string
        - name: folderId
          in: path
          required: true
          description: Folder ID
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            default: createdAtTimestamp
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Folder children retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordsResponse'
        '401':
          description: Unauthorized
        '404':
          description: Folder or knowledge base not found

  /knowledgeBase/{kbId}/folder/{folderId}/subfolder:
    post:
      tags:
        - Folders
      summary: Create subfolder
      description: |
        Create a nested folder within an existing folder.<br><br>
        <b>Required Permission:</b> FILEORGANIZER or higher<br><br>
        <b>Nesting:</b><br>
        Supports unlimited folder nesting depth for complex organizational structures.
      operationId: createSubfolder
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
        - name: folderId
          in: path
          required: true
          description: Parent folder ID
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                folderName:
                  type: string
                  minLength: 1
                  maxLength: 255
              required:
                - folderName
      responses:
        '200':
          description: Subfolder created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Folder'
        '400':
          description: Invalid folder name
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Parent folder not found

  # -------------------- Upload Endpoints --------------------
  /knowledgeBase/{kbId}/upload:
    post:
      tags:
        - Upload
      summary: Upload files to knowledge base
      description: |
        Upload one or more files directly to a knowledge base.<br><br>
        <b>Overview:</b><br>
        Batch upload multiple files in a single request. Each file becomes a new record in the KB with automatic content indexing.<br><br>
        <b>Upload Limits:</b><br>
        <ul>
        <li><b>Max files per request:</b> 1000</li>
        <li><b>Default max file size:</b> 30MB (configurable via platform settings)</li>
        <li>Use <code>GET /knowledgeBase/limits</code> to check current limits</li>
        </ul>
        <b>Supported File Types:</b><br>
        Documents (PDF, DOCX, DOC, XLS, XLSX, PPT, PPTX, TXT, CSV, MD), Images (PNG, JPG, GIF, SVG, WebP, BMP, HEIC), Web (HTML, HTM), and Google Workspace formats.<br><br>
        <b>File Metadata:</b><br>
        Use <code>files_metadata</code> to provide additional info like file paths and last modified timestamps.<br><br>
        <b>Versioning:</b><br>
        Set <code>isVersioned: true</code> to enable version tracking for uploaded files.<br><br>
        <b>Streaming response:</b><br>
        This endpoint responds with <code>Content-Type: text/event-stream</code>.
        The upload and its per-file progress are a single request: the body streams
        a <code>file:succeeded</code> or <code>file:failed</code> event per file
        (including files rejected up front for size/type), followed by a final
        <code>done</code> summary, then closes. See the
        <code>UploadStreamSSEEvent</code> schema for the event/payload contract.
      operationId: uploadRecordsToKB
      security:
        - bearerAuth: []
        - oauth2: [kb:upload]
      parameters:
        - name: kbId
          in: path
          required: true
          description: Knowledge base ID
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Files to upload (max 1000)
                files_metadata:
                  type: string
                  description: JSON array with file_path and last_modified for each file
                  example: '[{"file_path":"/docs/report.pdf","last_modified":"2024-01-15T10:30:00Z"}]'
                isVersioned:
                  type: boolean
                  default: true
                  description: Enable version tracking
                recordType:
                  type: string
                  default: FILE
                  description: Type of records to create
              required:
                - files
      responses:
        '200':
          description: |
            SSE stream (`text/event-stream`) of per-file upload outcomes. The
            stream emits `file:succeeded` / `file:failed` per file and a final
            `done` summary, then closes. See `UploadStreamSSEEvent`.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/UploadStreamSSEEvent'
        '400':
          description: Invalid request - Check file types and sizes
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions (requires WRITER or higher)
        '404':
          description: Knowledge base not found
        '413':
          description: File size exceeds maximum allowed
        '429':
          description: Too many upload requests, or too many concurrent uploads for this user
        '500':
          description: Failed to verify knowledge base access

  /knowledgeBase/{kbId}/folder/{folderId}/upload:
    post:
      tags:
        - Upload
      summary: Upload files to folder
      description: |
        Upload files directly to a specific folder within a knowledge base.<br><br>
        <b>Same as KB upload</b> but files are placed in the specified folder instead of KB root.<br><br>
        <b>Streaming response:</b><br>
        Like <code>POST /knowledgeBase/{kbId}/upload</code>, this endpoint responds
        with <code>Content-Type: text/event-stream</code> and streams a
        <code>file:succeeded</code> / <code>file:failed</code> event per file and a
        final <code>done</code> summary. See the <code>UploadStreamSSEEvent</code>
        schema for the event/payload contract.
      operationId: uploadRecordsToFolder
      security:
        - bearerAuth: []
        - oauth2: [kb:upload]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
        - name: folderId
          in: path
          required: true
          description: Target folder ID
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                files_metadata:
                  type: string
                  description: JSON array with file metadata
                isVersioned:
                  type: boolean
                  default: true
              required:
                - files
      responses:
        '200':
          description: |
            SSE stream (`text/event-stream`) of per-file upload outcomes. The
            stream emits `file:succeeded` / `file:failed` per file and a final
            `done` summary, then closes. See `UploadStreamSSEEvent`.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/UploadStreamSSEEvent'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Folder or knowledge base not found
        '429':
          description: Too many upload requests, or too many concurrent uploads for this user
        '500':
          description: Failed to verify knowledge base or folder access

  /knowledgeBase/limits:
    get:
      tags:
        - Upload
      summary: Get upload limits
      description: |
        Retrieve current upload constraints for the organization.<br><br>
        <b>Use Case:</b><br>
        Call this before uploads to validate file sizes on the client side and display appropriate limits to users.
      operationId: getUploadLimits
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      responses:
        '200':
          description: Upload limits retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  maxFilesPerRequest:
                    type: integer
                    example: 1000
                    description: Maximum number of files per upload request
                  maxFileSizeBytes:
                    type: integer
                    example: 31457280
                    description: Maximum file size in bytes (default 30MB)
        '401':
          description: Unauthorized

  # Same contract as GET /knowledgeBase/limits (clients may use lowercase path under /api/v1)
  /knowledgebase/limits:
    get:
      tags:
        - Upload
      summary: Get upload limits
      description: Alias path for <code>GET /knowledgeBase/limits</code>.
      operationId: getUploadLimitsKnowledgebaseAlias
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      responses:
        '200':
          description: Upload limits retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  maxFilesPerRequest:
                    type: integer
                    example: 1000
                  maxFileSizeBytes:
                    type: integer
                    example: 31457280
        '401':
          description: Unauthorized

  # Local KB connector — router prefix /api/v1/kb (PUT response includes UpdateRecordEnrichment)
  /kb/record/{recordId}:
    put:
      tags:
        - Records
      summary: Update record (Local KB connector)
      description: |
        Python connector route <code>PUT /api/v1/kb/record/{record_id}</code>. Successful JSON body includes
        <code>UpdateRecordEnrichment</code> (<code>timestamp</code>, <code>fileUpdated</code>, etc.).
      operationId: updateRecordKbConnector
      security:
        - bearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: Updated record metadata and content
        content:
          application/json:
            schema:
              type: object
              properties:
                updates:
                  type: object
                  additionalProperties: true
                fileMetadata:
                  type: object
                  nullable: true
                  additionalProperties: true
      responses:
        '200':
          description: Record updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                  - $ref: '#/components/schemas/UpdateRecordEnrichment'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Record not found

  # -------------------- Reindex/Sync Endpoints --------------------
  /knowledgeBase/reindex/record/{recordId}:
    post:
      tags:
        - Connector
      summary: Reindex single record
      description: |
        Trigger reindexing for a specific record.<br><br>
        <b>Overview:</b><br>
        Reprocesses the record's content to update search indexes and AI embeddings. Useful after content changes or to fix indexing failures.<br><br>
        <b>Depth Parameter:</b><br>
        Controls processing depth for complex documents (-1 for full depth, 0-100 for limited).<br><br>
        <b>Status filters:</b><br>
        Optional `statusFilters` array limits reindex to records in matching indexing states
        (e.g. `FAILED`, `AUTO_INDEX_OFF`).
      operationId: reindexRecord
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReindexRecordRequestBody'
      responses:
        '200':
          description: Reindexing triggered successfully
        '401':
          description: Unauthorized
        '404':
          description: Record not found
        '409':
          description: Conflict — the connector instance for this record is disabled. Enable it from Connector Settings and try again.

  /knowledgeBase/reindex/record-group/{recordGroupId}:
    post:
      tags:
        - Connector
      summary: Reindex record group
      description: |
        Trigger reindexing for all records in a folder or knowledge base.<br><br>
        <b>Overview:</b><br>
        Batch reindex operation for entire containers. The recordGroupId can be a folder ID or KB ID.<br><br>
        Optional `statusFilters` limit which child records are queued (e.g. failed-only or manual-indexing).
      operationId: reindexRecordGroup
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: recordGroupId
          in: path
          required: true
          description: Folder ID or KB ID
          schema:
            type: string
      requestBody:
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReindexRecordGroupRequestBody'
      responses:
        '200':
          description: Reindexing triggered for all records in group
        '401':
          description: Unauthorized
        '404':
          description: Record group not found
        '409':
          description: Conflict — the connector instance is disabled. Enable it from Connector Settings and try again.

  /knowledgeBase/resync/connector:
    post:
      tags:
        - Connector
      summary: Resync connector
      description: |
        Trigger a full resync of all records from a connector.<br><br>
        <b>Overview:</b><br>
        Fetches all content from the external source and updates local records. Use when you suspect data is out of sync.<br><br>
        <b>Warning:</b> This can be resource-intensive for large connectors.
      operationId: resyncConnector
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      requestBody:
        required: true
        description: "Request body for Resync connector"
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorName:
                  type: string
                  description: Connector type name
                  example: "GOOGLE_DRIVE"
                connectorId:
                  type: string
                  description: Connector instance ID
              required:
                - connectorName
                - connectorId
      responses:
        '200':
          description: Resync initiated
        '400':
          description: Invalid connector parameters
        '401':
          description: Unauthorized
        '409':
          description: Conflict — the connector instance is disabled. Enable it from Connector Settings and try again.

  /knowledgeBase/stats/{connectorId}:
    get:
      tags:
        - Connector
      summary: Get connector statistics
      description: |
        Retrieve statistics for a specific connector including record counts, indexing status breakdown, and sync information.
      operationId: getConnectorStats
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          description: Connector ID
          schema:
            type: string
      responses:
        '200':
          description: Connector statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorStats'
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  /knowledgeBase/reindex-failed/connector:
    post:
      tags:
        - Knowledge Bases
      summary: Reindex failed records for connector
      description: |
        Trigger reindexing for a connector instance, scoped by indexing status. When
        `statusFilters` is omitted, only `FAILED` records are reindexed.
      operationId: reindexFailedRecords
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReindexFailedConnectorRequestBody'
      responses:
        '200':
          description: Reindex triggered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  reindexResponse:
                    type: object
                    description: Connector reindex job acknowledgement from the relation service.
        '401':
          description: Unauthorized
        '404':
          description: Connector not found
        '409':
          description: Conflict — the connector instance is disabled. Enable it from Connector Settings and try again.

  /knowledgeBase/{kbId}/record/{recordId}/move:
    put:
      tags:
        - Knowledge Bases
      summary: Move record to another location
      description: |
        Move a record from one location to another within a knowledge base.
      operationId: moveRecord
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Record moved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: Record or knowledge base not found

  # -------------------- Permissions Endpoints --------------------
  /knowledgeBase/{kbId}/permissions:
    post:
      tags:
        - Permissions
      summary: Grant permissions
      description: |
        Grant access permissions to users or teams for a knowledge base.<br><br>
        <b>Required Permission:</b> OWNER or ORGANIZER<br><br>
        <b>Permission Roles (highest to lowest):</b><br>
        <ol>
        <li><b>OWNER:</b> Full control, can delete KB, manage all permissions</li>
        <li><b>ORGANIZER:</b> Can manage permissions (except OWNER), edit KB settings</li>
        <li><b>FILEORGANIZER:</b> Can create/delete folders, organize content</li>
        <li><b>WRITER:</b> Can upload, edit, delete records</li>
        <li><b>COMMENTER:</b> Can add comments (if supported)</li>
        <li><b>READER:</b> View-only access</li>
        </ol>
        <b>Grant to Multiple:</b><br>
        Provide arrays of userIds and/or teamIds to grant the same role to multiple entities.
      operationId: createKBPermission
      security:
        - bearerAuth: []
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                  description: User IDs to grant permission
                teamIds:
                  type: array
                  items:
                    type: string
                  description: Team IDs to grant permission
                role:
                  type: string
                  enum: [OWNER, ORGANIZER, FILEORGANIZER, WRITER, COMMENTER, READER]
                  description: Permission role to grant
              required:
                - role
      responses:
        '200':
          description: Permissions granted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  kbId:
                    type: string
                  permissionResult:
                    type: object
                    properties:
                      grantedCount:
                        type: integer
                      updatedCount:
                        type: integer
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Only OWNER/ORGANIZER can grant permissions

    get:
      tags:
        - Permissions
      summary: List permissions
      description: |
        Retrieve all permissions granted on a knowledge base.<br><br>
        <b>Required Permission:</b> ORGANIZER or higher to see all permissions, others see only their own.
      operationId: listKBPermissions
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Permissions list retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  kbId:
                    type: string
                  permissions:
                    type: array
                    items:
                      $ref: '#/components/schemas/KBPermission'
                  totalCount:
                    type: integer
        '401':
          description: Unauthorized
        '403':
          description: No access to this knowledge base
        '404':
          description: Knowledge base not found

    put:
      tags:
        - Permissions
      summary: Update permissions
      description: |
        Update permission roles for users or teams.<br><br>
        <b>Required Permission:</b> OWNER or ORGANIZER
      operationId: updateKBPermissions
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request body for Update permissions"
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                teamIds:
                  type: array
                  items:
                    type: string
                role:
                  type: string
                  enum: [OWNER, ORGANIZER, FILEORGANIZER, WRITER, COMMENTER, READER]
              required:
                - role
      responses:
        '200':
          description: Permissions updated
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions

    delete:
      tags:
        - Permissions
      summary: Remove permissions
      description: |
        Remove access permissions from users or teams.<br><br>
        <b>Required Permission:</b> OWNER or ORGANIZER<br><br>
        <b>Note:</b> Cannot remove the last OWNER from a KB.
      operationId: deleteKBPermissions
      security:
        - bearerAuth: []
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request body for Remove permissions"
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                teamIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Permissions removed
        '400':
          description: Invalid request or cannot remove last owner
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions

  # -------------------- Knowledge Hub --------------------
  /knowledgeBase/knowledge-hub/nodes:
    get:
      tags:
        - Knowledge Hub
      summary: Get knowledge hub root nodes
      description: |
        Returns root-level nodes (connector apps and Collection apps) or, when
        filters or search are applied, a flat list of matching nodes across the
        entire knowledge hub tree.

        **Overview**

        The Knowledge Hub provides a unified view across all knowledge sources:
        - **Collection** — locally uploaded knowledge bases (`origin: COLLECTION`)
        - **Connector app** — external connector instances such as Google Drive,
          Slack, Confluence, Jira (`origin: CONNECTOR`)

        Use this endpoint to build file-browser UIs and sidebar navigation trees.

        **Browsing vs. searching**

        When no filters or search query are provided, only top-level app nodes
        are returned. Adding `nodeTypes`, `q`, or other filter params triggers a
        search across the full tree, returning matching nodes regardless of depth.

        For children of a specific node, use
        `GET /knowledgeBase/knowledge-hub/nodes/{parentType}/{parentId}`.

        **Pagination and sorting**

        Results are always paginated. Default sort is `updatedAt` descending.
        The `pagination` object in the response contains `hasNext` / `hasPrev`
        flags suitable for infinite-scroll or page-based navigation.

        **Expanding the response**

        Use the `include` parameter to request additional sections:
        - `availableFilters` — adds `filters.available` with all filter options
