                            additionalProperties: false
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          pagination:
                            type: object
                            additionalProperties: false
                            properties:
                              page:
                                type: object
                                additionalProperties: false
                                properties:
                                  type:
                                    type: string
                                  current:
                                    type: integer
                                  min:
                                    type: integer
                                  max:
                                    type: integer
                                  default:
                                    type: integer
                                  description:
                                    type: string
                                  applied:
                                    type: boolean
                              limit:
                                type: object
                                additionalProperties: false
                                properties:
                                  type:
                                    type: string
                                  current:
                                    type: integer
                                  min:
                                    type: integer
                                  max:
                                    type: integer
                                  default:
                                    type: integer
                                  description:
                                    type: string
                                  applied:
                                    type: boolean
                          sorting:
                            type: object
                            additionalProperties: false
                            description: Sort applied to the conversation list. Field set echoes back the original list-endpoint sort options even though this endpoint returns a single conversation.
                            properties:
                              sortBy:
                                type: object
                                additionalProperties: false
                                properties:
                                  values:
                                    type: array
                                    items:
                                      type: string
                                  default:
                                    type: string
                                  description:
                                    type: string
                                  current:
                                    type: string
                                  applied:
                                    type: boolean
                              sortOrder:
                                type: object
                                additionalProperties: false
                                properties:
                                  values:
                                    type: array
                                    items:
                                      type: string
                                  default:
                                    type: string
                                  description:
                                    type: string
                                  current:
                                    type: string
                                  applied:
                                    type: boolean
                          dateFilters:
                            type: object
                            additionalProperties: false
                            properties:
                              dateRange:
                                type: object
                                additionalProperties: false
                                properties:
                                  type:
                                    type: string
                                  description:
                                    type: string
                                  format:
                                    type: string
                                  current:
                                    type: object
                                    additionalProperties: false
                                    properties:
                                      start:
                                        type: string
                                        nullable: true
                                      end:
                                        type: string
                                        nullable: true
                                  applied:
                                    type: boolean
                          messageFilters:
                            type: object
                            additionalProperties: false
                            properties:
                              messageType:
                                type: object
                                additionalProperties: false
                                properties:
                                  values:
                                    type: array
                                    items:
                                      type: string
                                  description:
                                    type: string
                                  current:
                                    type: string
                                    nullable: true
                                  applied:
                                    type: boolean
                          sortingMessages:
                            type: object
                            additionalProperties: false
                            description: Sort applied to messages within the conversation (separate from the conversation-list `sorting` block).
                            properties:
                              sortBy:
                                type: object
                                additionalProperties: false
                                properties:
                                  values:
                                    type: array
                                    items:
                                      type: string
                                  default:
                                    type: string
                                  description:
                                    type: string
                                  current:
                                    type: string
                              sortOrder:
                                type: object
                                additionalProperties: false
                                properties:
                                  values:
                                    type: array
                                    items:
                                      type: string
                                  default:
                                    type: string
                                  description:
                                    type: string
                                  current:
                                    type: string
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
                        description: Server processing time in milliseconds
                      conversationId:
                        type: string
                        format: objectId
                      messageCount:
                        type: integer
                        description: Total number of messages in the conversation
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - No access to this conversation
        '404':
          description: Conversation not found

    delete:
      tags:
        - Conversations
      summary: Delete conversation
      description: |
        Delete a conversation by its ID.

        **Overview:**

        Performs a soft delete by setting `isDeleted: true`. The conversation is
        removed from listings but preserved in the database. All citations
        referenced by messages in the conversation are also soft-deleted.

        **Permissions:**

        The conversation initiator can always delete. Users the conversation has
        been shared with may delete it only when their `sharedWith.accessLevel`
        is `write`.
      operationId: deleteConversationById
      security:
        - bearerAuth: []
        - oauth2: [conversation:write]
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Conversation deleted successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Identifier of the conversation that was deleted
                  status:
                    type: string
                    enum: [deleted]
                    description: Outcome of the operation
                  deletedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the conversation was marked deleted
                  deletedBy:
                    type: string
                    format: objectId
                    description: Identifier of the user who performed the delete
                  citationsDeleted:
                    type: integer
                    description: Number of citations soft-deleted alongside the conversation
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      requestId:
                        type: string
                        description: Server-assigned identifier for the request
                      timestamp:
                        type: string
                        format: date-time
                        description: Server time the response was produced
                      duration:
                        type: integer
                        description: Server processing time in milliseconds
        '400':
          description: Invalid `conversationId` path parameter
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - token is missing the `conversation:write` scope
        '404':
          description: Conversation not found, already deleted, or caller has no delete access
        '500':
          description: Internal server error while deleting the conversation

  /conversations/{conversationId}/messages/stream:
    post:
      tags:
        - Conversations
      summary: Add message to a conversation with streaming response
      description: |
        Add a follow-up message to an existing conversation and stream the
        assistant's response over Server-Sent Events.

        Functionally equivalent to `POST /conversations/{conversationId}/messages`
        but the response is delivered as an SSE stream so clients can render
        the answer incrementally.

        The wire vocabulary is described by `AssistantMessageStreamSSEEvent`.
        It is the same event set as `/conversations/stream`; only the
        `connected` and `complete` payloads differ because the conversation
        already exists when this route is called.
      operationId: addMessageStream
      security:
        - bearerAuth: []
        - oauth2: [conversation:chat]
      parameters:
        - name: conversationId
          in: path
          required: true
          description: |
            Identifier of the conversation to append the message to. The
            conversation must belong to the caller and must not be deleted.
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMessageRequest'
      responses:
        '200':
          description: |
            SSE stream established. The body is a sequence of
            `text/event-stream` frames using the event vocabulary described
            on the schema below.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AssistantMessageStreamSSEEvent'
        '400':
          description: |
            Invalid request — `query` is missing or empty, or another field
            fails validation (for example a malformed `currentTime`).
        '401':
          description: Unauthorized — valid bearer token required.
        '403':
          description: |
            Forbidden — the caller's token does not include the
            `conversation:chat` OAuth scope.
        '404':
          description: |
            The conversation does not exist, is deleted, or does not belong
            to the caller.
        '500':
          description: |
            Internal error before the SSE stream is established (for
            example, the user message could not be persisted to the
            conversation). Once the stream is open, terminal failures are
            surfaced as an `error` SSE event instead of an HTTP status
            change.

  /conversations/{conversationId}/share:
    post:
      tags:
        - Conversations
      summary: Share conversation with users
      description: |
        Share a conversation with other users in your organization.

        **Overview:**

        Allows the conversation owner to grant access to other users.
        Shared users can view the conversation and optionally add messages.

        **Access Levels:**

        - `read` - Can view conversation and messages (default)
        - `write` - Can view and add new messages

        **Permissions:**

        Only the conversation initiator (owner) can share. Users must belong
        to the same organization.
      operationId: shareConversation
      security:
        - bearerAuth: []
        - oauth2: [conversation:write]
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareRequest'
      responses:
        '200':
          description: Conversation shared successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - id
                  - isShared
                  - sharedWith
                  - meta
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Conversation identifier
                  isShared:
                    type: boolean
                    description: Always `true` after a successful share
                  sharedWith:
                    type: array
                    description: Full list of users the conversation is now shared with, including pre-existing entries.
                    items:
                      type: object
                      additionalProperties: false
                      required:
                        - userId
                        - accessLevel
                        - _id
                      properties:
                        userId:
                          type: string
                          format: objectId
                        accessLevel:
                          type: string
                          enum: [read, write]
                        _id:
                          type: string
                          format: objectId
                          description: Subdocument identifier auto-assigned by MongoDB.
                  meta:
                    type: object
                    additionalProperties: false
                    required:
                      - requestId
                      - timestamp
                      - duration
                    properties:
                      requestId:
                        type: string
                        description: |
                          Server-side request identifier. Read from the
                          `X-Request-ID` header when supplied, otherwise
                          auto-generated, so this field is always present.
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
                        description: Server-side processing time in milliseconds.
        '400':
          description: Invalid request - userIds array required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Only owner can share
        '404':
          description: Conversation or users not found

  /conversations/{conversationId}/title:
    patch:
      tags:
        - Conversations
      summary: Update conversation title
      description: |
        Update the title of a conversation.

        **Overview:**

        Conversation titles are auto-generated from the first query by default.
        Use this endpoint to set a custom, more descriptive title.

        **Title limits:**

        - Minimum: 1 character
        - Maximum: 200 characters

        **Permissions:**

        The conversation must exist, belong to the calling user's organization,
        be owned by the caller (matched on `userId`), and not be soft-deleted.
      operationId: updateConversationTitle
      security:
        - bearerAuth: []
        - oauth2: [conversation:write]
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - title
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: New conversation title
                  example: "Q4 Sales Analysis Discussion"
      responses:
        '200':
          description: Title updated successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - conversation
                  - meta
                properties:
                  conversation:
                    type: object
                    additionalProperties: false
                    description: |
                      The full conversation document after the title update,
                      returned as stored in MongoDB.
                    required:
                      - _id
                      - userId
                      - orgId
                      - initiator
                      - messages
                      - isShared
                      - isDeleted
                      - isArchived
                      - sharedWith
                      - conversationErrors
                      - lastActivityAt
                      - createdAt
                      - updatedAt
                      - __v
                    properties:
                      _id:
                        type: string
                        format: objectId
                        description: Unique conversation identifier
                      userId:
                        type: string
                        format: objectId
                        description: ID of the user who owns this conversation
                      orgId:
                        type: string
                        format: objectId
                        description: Organization this conversation belongs to
                      title:
                        type: string
                        description: |
                          Conversation title. Present and equal to the value
                          submitted in the request body after a successful
                          update.
                      initiator:
                        type: string
                        format: objectId
                        description: User who started the conversation
                      messages:
                        type: array
                        description: All messages stored on this conversation.
                        items:
                          type: object
                          additionalProperties: false
                          required:
                            - _id
                            - messageType
                            - content
                            - contentFormat
                            - citations
                            - followUpQuestions
                            - feedback
                            - referenceData
                            - createdAt
                            - updatedAt
                          properties:
                            _id:
                              type: string
                              format: objectId
                            messageType:
                              type: string
                              enum: [user_query, bot_response, error, feedback, system]
                            content:
                              type: string
                            contentFormat:
                              type: string
                              enum: [MARKDOWN, JSON, HTML]
                              default: MARKDOWN
                            confidence:
                              type: string
                              description: |
                                AI confidence in the answer. Present only on
                                `bot_response` messages, and only when the
                                model emitted a trailing confidence block.
                            citations:
                              type: array
                              description: |
                                References to source documents used in the
                                response, stored as raw citation pointers
                                (not populated on this endpoint).
                              items:
                                $ref: '#/components/schemas/CitationReference'
                            followUpQuestions:
                              type: array
                              items:
                                $ref: '#/components/schemas/FollowUpQuestion'
                            feedback:
                              type: array
                              items:
                                $ref: '#/components/schemas/MessageFeedback'
                            referenceData:
                              type: array
                              description: |
                                Reference IDs surfaced from tool responses,
                                used for follow-up queries.
                              items:
                                type: object
                                additionalProperties: false
                                properties:
                                  name:
                                    type: string
                                    description: Display name shown to the user.
                                  id:
                                    type: string
                                    description: Technical identifier (numeric ID, UUID, etc.).
                                  type:
                                    type: string
                                    description: Item type (e.g. `project`, `issue`, `file`, `notebook`, `page`).
                                  app:
                                    type: string
                                    description: |
                                      Source application (e.g. `jira`, `confluence`,
                                      `sharepoint`, `slack`, `drive`, `gmail`).
                                  webUrl:
                                    type: string
                                    description: URL to open the item in a browser.
                                  metadata:
                                    type: object
                                    additionalProperties:
                                      type: string
                                    description: |
                                      App-specific fields keyed by name (e.g. `key` for a Jira
                                      project, `siteId` for a SharePoint document).
                            modelInfo:
                              $ref: '#/components/schemas/ConversationModelInfo'
                            appliedFilters:
                              type: object
                              additionalProperties: false
                              properties:
                                apps:
                                  type: array
                                  items:
                                    $ref: '#/components/schemas/AppliedFilterNode'
                                kb:
                                  type: array
                                  items:
                                    $ref: '#/components/schemas/AppliedFilterNode'
                            metadata:
                              type: object
                              additionalProperties: false
                              properties:
                                processingTimeMs:
                                  type: number
                                modelVersion:
                                  type: string
                                aiTransactionId:
                                  type: string
                                reason:
                                  type: string
                            createdAt:
                              type: string
                              format: date-time
                            updatedAt:
                              type: string
                              format: date-time
                      status:
                        type: string
                        enum: [None, Inprogress, Complete, Failed]
                        description: |
                          Current status of the conversation:
                          - `None` — no activity yet
                          - `Inprogress` — AI is processing
                          - `Complete` — response ready
                          - `Failed` — error occurred
                      failReason:
                        type: string
                        description: |
                          Error description, populated only when `status`
                          is `Failed`.
                      modelInfo:
                        $ref: '#/components/schemas/ConversationModelInfo'
                      isShared:
                        type: boolean
                        default: false
                        description: Whether this conversation is shared with others
                      shareLink:
                        type: string
                        description: Shareable link if the conversation is shared
                      sharedWith:
                        type: array
                        description: Users this conversation is shared with
                        items:
                          type: object
                          additionalProperties: false
                          required:
                            - userId
                            - accessLevel
                          properties:
                            userId:
                              type: string
                              format: objectId
                            accessLevel:
                              type: string
                              enum: [read, write]
                              default: read
                      isArchived:
                        type: boolean
                        default: false
                        description: Whether this conversation is archived
                      archivedBy:
                        type: string
                        format: objectId
                        nullable: true
                        description: |
                          User ID of the last user who archived this row, or `null` after
                          unarchive cleared the archive state. Absent on rows that have
                          never been archived.
                      isDeleted:
                        type: boolean
                        default: false
                        description: Whether this conversation has been soft-deleted.
                      deletedBy:
                        type: string
                        format: objectId
                        description: User who soft-deleted this conversation.
                      conversationErrors:
                        type: array
                        description: |
                          Errors recorded against this conversation
                          (e.g. failed message generations).
                        items:
                          type: object
                          additionalProperties: false
                          required:
                            - _id
                            - message
                            - timestamp
                          properties:
                            _id:
                              type: string
                              format: objectId
                              description: Sub-document identifier auto-assigned by MongoDB.
                            message:
                              type: string
                            errorType:
                              type: string
                            timestamp:
                              type: string
                              format: date-time
                              description: |
                                Time the error was recorded. Server-defaulted
                                to `Date.now` when the entry is pushed, so
                                always present.
                            messageId:
                              type: string
                              format: objectId
                            stack:
                              type: string
                            metadata:
                              type: object
                              additionalProperties: true
                              description: |
                                Free-form metadata attached to this error
                                entry (Map of Mixed in the schema).
                      metadata:
                        type: object
                        additionalProperties: true
                        description: Free-form metadata attached to the conversation.
                      lastActivityAt:
                        type: integer
                        format: int64
                        description: |
                          Unix timestamp of the last activity, stored as
                          epoch milliseconds (server-side default `Date.now`).
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                      __v:
                        type: integer
                        description: Mongoose document version key.
                  meta:
                    type: object
                    additionalProperties: false
                    required:
                      - requestId
                      - timestamp
                      - duration
                    properties:
                      requestId:
                        type: string
                        description: |
                          Server-side request identifier. Read from the
                          `X-Request-ID` header when supplied, otherwise
                          auto-generated, so this field is always present.
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
                        description: Server-side processing time in milliseconds.
        '400':
          description: |
            Invalid request. Possible causes:

            - `title` missing, empty, or longer than 200 characters.
            - `conversationId` path parameter is not a valid ObjectId.
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - token is missing the `conversation:write` scope
        '404':
          description: Conversation not found, soft-deleted, or not owned by the caller.
        '500':
          description: Persistence layer failed to update the conversation document.

  /conversations/{conversationId}/archive:
    patch:
      tags:
        - Conversations
      summary: Archive conversation
      description: |
        Archive a conversation to hide it from the main list.

        **Overview:**

        Archived conversations are preserved but hidden from the default conversation list.
        Use archiving to clean up your workspace without permanently deleting conversations.

        **Access:**

        The caller must be the conversation's initiator, or be listed in `sharedWith`
        with `accessLevel: write`. Already-archived conversations return `400`.

        **Retrieval:**

        View archived conversations using `GET /conversations/show/archives`.
        Restore one with `PATCH /conversations/{conversationId}/unarchive`.
      operationId: archiveConversation
      security:
        - bearerAuth: []
        - oauth2: [conversation:write]
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Conversation identifier
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Conversation archived successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Conversation identifier
                  status:
                    type: string
                    enum: [archived]
                    description: New archive status of the conversation
                  archivedBy:
                    type: string
                    format: objectId
                    description: User who archived the conversation
                  archivedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the conversation was archived
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      requestId:
                        type: string
                        description: Request correlation identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: Response generation timestamp
                      duration:
                        type: integer
                        description: Server processing time in milliseconds
        '400':
          description: Conversation is already archived
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found or caller lacks archive permission

  /conversations/{conversationId}/unarchive:
    patch:
      tags:
        - Conversations
      summary: Unarchive conversation
      description: |
        Restore an archived conversation.

        - Path params: `conversationId`
        - Query params: none
        - Body: none
      operationId: unarchiveConversation
      security:
        - bearerAuth: []
        - oauth2: [conversation:write]
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Conversation identifier
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Conversation unarchived successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Conversation identifier
                  status:
                    type: string
                    enum: [unarchived]
                    description: New archive status of the conversation
                  unarchivedBy:
                    type: string
                    format: objectId
                    description: User who unarchived the conversation
                  unarchivedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the conversation was unarchived
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      requestId:
                        type: string
                        description: Request correlation identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: Response generation timestamp
                      duration:
                        type: integer
                        description: Server processing time in milliseconds
        '400':
          description: Conversation is not currently archived
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - token is missing the `conversation:write` scope
        '404':
          description: Conversation not found or caller lacks unarchive permission
        '500':
          description: Persistence layer failed to update the conversation document.

  /conversations/{conversationId}/message/{messageId}/regenerate:
    post:
      tags:
        - Conversations
      summary: Regenerate AI response
      description: |
        Regenerate the AI response for a specific message and stream the new
        answer over Server-Sent Events.

        **Overview:**

        If you're not satisfied with an AI response, use this endpoint to generate
        a new answer. The original user query is re-processed and a new bot
        response replaces the previous one in place.

        **Constraints:**

        - Only the *last* message of the conversation can be regenerated.
        - The target message must be of type `bot_response`.

        **Use Cases:**

        - Response was incomplete or unclear
        - Want to try a different AI model
        - New documents have been indexed since original response

        **Model Override:**

        Specify `modelKey` to use a different model for regeneration.

        **Streaming:**

        The response is delivered as an SSE (`text/event-stream`) stream. The
        exact event vocabulary depends on `chatMode`:

        - For non-agent modes (e.g. `internal_search`, `web_search`) the
          request is dispatched to the assistant chat backend.
        - For agent modes (e.g. `agent:auto`) the request is dispatched to
          the agent backend with a placeholder agent built from the caller's
          workspace, which can additionally emit `tool_result` and
          `tool_execution_complete` events.

        See `SSEEvent` for the full union of event names this endpoint can
        emit across both backends.
      operationId: regenerateAnswer
      security:
        - bearerAuth: []
        - oauth2: [conversation:chat]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
        - name: messageId
          in: path
          required: true
          description: ID of the message to regenerate response for
          schema:
            type: string
            format: objectId
      requestBody:
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegenerateRequest'
      responses:
        '200':
          description: |
            SSE stream established. The body is a sequence of
            `text/event-stream` frames using the event vocabulary described
            on `SSEEvent`. The exact subset of events emitted depends on
            `chatMode` (see the route description for routing rules).

            Lifecycle (all event names are sent verbatim on the wire):
            - `connected` — `{ "message": "SSE connection established" }`.
              Fired once on connection by the API layer.
            - `status` — progress messages from the AI backend. Possible
              `status` sub-values include `started`, `transforming`,
              `searching`, `processing`, `checking_tools`,
              `generating_answer`, `generating`, `analyzing`, `evaluating`,
              `planning`, `executing`, `retrying`, `continuing`, `success`,
              `skipped`, `pending`, `keepalive`, `cascade_error`, and
              backend-defined values that may be added over time.
            - `answer_chunk` — incremental token batches with running
              `accumulated` text, accumulated `citations`, and the
              backend-supplied `confidence` (typically null until the final
              chunk).
            - `tool_calls` / `tool_call` / `tool_success` / `tool_error` —
              emitted when the model invokes tools (agent chat modes, or the
              non-agent path when SQL / record-fetch tools are configured).
            - `tool_result` / `tool_execution_complete` — additional tool
              lifecycle events emitted only on the agent-mode path.
            - `restreaming` — emitted when the LLM is restarted with new
              context (e.g. before a citation-verification pass or
              reflection-driven retry).
            - `metadata` — `{}` keep-alive emitted by the JSON-streaming
              branch while waiting for the next safe-to-flush chunk.
            - `complete` — `{ "conversation": Conversation, "recordsUsed":
              number, "meta": { "requestId": string, "timestamp": string,
              "duration": number, "recordsUsed": number } }`. Fired once
              after the regeneration is persisted; the new bot response
              replaces the previous one in `conversation.messages` at the
              same index. The AI backend's own `complete` frame is consumed
              server-side and is **not** forwarded — clients see only this
              server-defined frame.
            - `error` — `{ "error": string, "details"?: string }`. Fired if
              the stream fails; the previous bot response is replaced with an
              error message and the conversation row is marked FAILED before
              close.

            Clients should ignore unknown event names rather than treating
            them as errors.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SSEEvent'
        '400':
          description: |
            Cannot regenerate. Common causes: target message is not the last
            message in the conversation, target message is not of type
            `bot_response`, or no preceding `user_query` exists.
        '401':
          description: Unauthorized
        '404':
          description: Conversation or message not found

  /conversations/{conversationId}/message/{messageId}/feedback:
    post:
      tags:
        - Conversations
      summary: Submit feedback on AI response
      description: |
        Append a feedback entry to a bot-response message.

        **Overview**

        Feedback helps improve AI response quality over time. You can record an
        overall helpfulness signal, per-aspect ratings, issue categories, and
        free-text comments. Each call appends a new entry to the message;
        previous entries are preserved.

        **Feedback options**

        - `isHelpful` — overall thumbs up/down.
        - `ratings` — 1–5 scores keyed by an aspect name you choose
          (e.g. `accuracy`, `relevance`, `completeness`, `clarity`).
        - `categories` — issue or positive categories from a fixed list.
        - `comments` — free-text `positive`, `negative`, and `suggestions`.
        - `metrics` — optional client-side telemetry
          (`userInteractionTime`, `feedbackSessionId`).

        **Restrictions**

        Feedback can only be submitted on `bot_response` messages — user
        queries and system messages are rejected with `400`.
      operationId: updateMessageFeedback
      security:
        - bearerAuth: []
        - oauth2: [conversation:write]
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier.
          schema:
            type: string
            format: objectId
        - name: messageId
          in: path
          required: true
          description: Identifier of the bot-response message being rated.
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              description: |
                All fields are optional. An empty object is accepted and still
                records an entry stamped with the server-side `feedbackProvider`,
                `timestamp`, and `metrics`.
              properties:
                isHelpful:
                  type: boolean
                  description: Overall helpfulness signal (thumbs up/down).
                ratings:
                  type: object
                  description: |
                    Per-aspect ratings. Keys are arbitrary aspect names chosen
                    by the client (typically `accuracy`, `relevance`,
                    `completeness`, `clarity`); values are scores in the range
                    1–5.
                  additionalProperties:
                    type: number
                    minimum: 1
                    maximum: 5
                categories:
                  type: array
                  description: Issue or positive categories that apply to the response.
                  items:
                    type: string
                    enum:
                      - incorrect_information
                      - missing_information
                      - irrelevant_information
                      - unclear_explanation
                      - poor_citations
                      - excellent_answer
                      - helpful_citations
                      - well_explained
                      - other
                comments:
                  type: object
                  additionalProperties: false
                  description: Free-text comments grouped by sentiment.
                  properties:
                    positive:
                      type: string
                      description: What was good about the response.
                    negative:
                      type: string
                      description: What could be improved.
                    suggestions:
                      type: string
                      description: Specific suggestions for improvement.
                metrics:
                  type: object
                  additionalProperties: false
                  description: Optional client-supplied telemetry.
                  properties:
                    userInteractionTime:
                      type: number
                      description: Total time the user spent reviewing the response, in milliseconds.
                    feedbackSessionId:
                      type: string
                      description: Opaque session identifier used by the client to group related feedback events.
      responses:
        '200':
          description: Feedback submitted successfully.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - conversationId
                  - messageId
                  - feedback
                  - meta
                properties:
                  conversationId:
                    type: string
                    format: objectId
                    description: Conversation the feedback was attached to.
                  messageId:
                    type: string
                    format: objectId
                    description: Message the feedback was attached to.
                  feedback:
                    type: object
                    additionalProperties: false
                    required:
                      - feedbackProvider
                      - timestamp
                      - metrics
                    description: |
                      The feedback entry just appended to the message. Echoes
                      the fields supplied in the request plus server-stamped
                      `feedbackProvider`, `timestamp`, and `metrics`.
                    properties:
                      isHelpful:
                        type: boolean
                        description: Echoed from the request when supplied.
                      ratings:
                        type: object
                        description: Echoed per-aspect ratings (values 1–5).
                        additionalProperties:
                          type: number
                          minimum: 1
                          maximum: 5
                      categories:
                        type: array
                        description: Echoed categories from the request.
                        items:
                          type: string
                          enum:
                            - incorrect_information
                            - missing_information
                            - irrelevant_information
                            - unclear_explanation
                            - poor_citations
                            - excellent_answer
                            - helpful_citations
                            - well_explained
                            - other
                      comments:
                        type: object
                        additionalProperties: false
                        description: Echoed free-text comments from the request.
                        properties:
                          positive:
                            type: string
                          negative:
                            type: string
                          suggestions:
                            type: string
                      feedbackProvider:
                        type: string
                        format: objectId
                        description: User who submitted the feedback. Always present.
                      timestamp:
                        type: integer
                        format: int64
                        description: |
                          Submission time as epoch milliseconds (not an ISO 8601
                          datetime). Always present.
                      metrics:
                        type: object
                        additionalProperties: false
                        required:
                          - timeToFeedback
                        description: |
                          Telemetry recorded server-side alongside the feedback.
                          Always present.
                        properties:
                          timeToFeedback:
                            type: number
                            description: |
                              Milliseconds between message creation and feedback
                              submission. Always present.
                          userInteractionTime:
                            type: number
                            description: Echoed from `metrics.userInteractionTime` in the request when supplied.
                          feedbackSessionId:
                            type: string
                            description: Echoed from `metrics.feedbackSessionId` in the request when supplied.
                          userAgent:
                            type: string
                            description: Value of the `User-Agent` request header captured server-side.
                  meta:
                    type: object
                    additionalProperties: false
                    required:
                      - requestId
                      - timestamp
                      - duration
                    properties:
                      requestId:
                        type: string
                        description: |
                          Server-side request identifier. Read from the
                          `X-Request-ID` header when supplied, otherwise
                          auto-generated, so this field is always present.
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
                        description: Server-side processing time in milliseconds.
        '400':
          description: |
            Invalid request. Possible causes:

            - Feedback target is not a `bot_response` message.
            - A value in `ratings` is outside the 1–5 range.
            - A `categories` value is not in the allowed list.
            - `conversationId` or `messageId` is not a valid ObjectId.
        '401':
          description: Unauthorized.
        '404':
          description: |
            Conversation or message not found, or the caller does not have
            access to this conversation.
        '500':
          description: Persistence layer failed to append the feedback entry.

  /conversations/{conversationId}/unshare:
    post:
      tags:
        - Conversations
      summary: Unshare a conversation
      description: |
        Revoke sharing for a conversation, making it private again.
      operationId: unshareConversationById
      security:
        - bearerAuth: []
        - oauth2: [conversation:write]
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - userIds
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                    format: objectId
                  minItems: 1
                  description: IDs of users to remove from the conversation's share list.
                  example: ["507f1f77bcf86cd799439011"]
      responses:
        '200':
          description: Conversation unshared successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - id
                  - isShared
                  - sharedWith
                  - unsharedUsers
                  - meta
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Conversation identifier
                  isShared:
                    type: boolean
                    description: |
                      Reset to `false` when the last user is removed; otherwise
                      remains `true`.
                  sharedWith:
                    type: array
                    description: |
                      Remaining users with access after the requested userIds
                      were removed. Empty array when no one is left.
                    items:
                      type: object
                      additionalProperties: false
                      required:
                        - userId
                        - accessLevel
                        - _id
                      properties:
                        userId:
                          type: string
                          format: objectId
                        accessLevel:
                          type: string
                          enum: [read, write]
                        _id:
                          type: string
                          format: objectId
                          description: Subdocument identifier auto-assigned by MongoDB.
                  unsharedUsers:
                    type: array
                    description: Echo of the `userIds` from the request body.
                    items:
                      type: string
                      format: objectId
                  meta:
                    type: object
                    additionalProperties: false
                    required:
                      - requestId
                      - timestamp
                      - duration
                    properties:
                      requestId:
                        type: string
                        description: |
                          Server-side request identifier. Read from the
                          `X-Request-ID` header when supplied, otherwise
                          auto-generated, so this field is always present.
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
                        description: Server-side processing time in milliseconds.
        '400':
          description: |
            Invalid request. Possible causes:

            - `userIds` empty, missing, or not an array.
            - One or more `userIds` is not a valid ObjectId.
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found, or caller is not the initiator.
        '500':
          description: Persistence layer failed to update the conversation document.

  # -------------------- Conversational Speech --------------------
  /chat/transcribe:
    post:
      tags:
        - Conversational Speech
      summary: Transcribe an audio clip (Speech-to-Text)
      description: |
        Upload a short audio recording and receive its transcript from the
        configured Speech-to-Text provider (OpenAI Whisper, `gpt-4o-transcribe`,
        a self-hosted `faster-whisper` model, Wispr Flow, or Gemini multimodal
        models such as `gemini-2.5-flash`).<br><br>
        <b>Overview:</b><br>
        The chat UI captures audio via the browser's `MediaRecorder` and
        POSTs it here as `multipart/form-data`. If no STT provider is
        configured the endpoint returns <code>409</code> and the client falls
        back to the browser's native Web Speech Recognition.<br><br>
        <b>Limits:</b><br>
        <ul>
          <li>Audio payload is capped at 25 MB (matches OpenAI's
              <code>audio.transcriptions.create</code> limit).</li>
          <li>Supported MIME types include <code>audio/webm</code>,
              <code>audio/ogg</code>, <code>audio/mp4</code>,
              <code>audio/mpeg</code>, <code>audio/wav</code>, and
              <code>audio/flac</code>.</li>
        </ul>
      operationId: transcribeChatAudio
      security:
        - bearerAuth: []
        - oauth2: [conversation:chat]
      requestBody:
        required: true
        description: Audio clip (multipart/form-data) to transcribe, with an optional language hint.
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    Recorded audio clip. Must be ≤ 25 MB. Supported MIME
                    types include `audio/webm`, `audio/ogg`, `audio/mp4`,
                    `audio/m4a`, `audio/mpeg`, `audio/wav`, and
                    `audio/flac`. The browser's `MediaRecorder` default
                    (`audio/webm;codecs=opus`) is recommended.
                language:
                  type: string
                  nullable: true
                  description: |
                    Optional ISO-639-1 language hint forwarded to the
                    provider (e.g. `en`, `fr`). When omitted the provider
                    auto-detects. The `wispr` provider treats this as a
                    property hint; Gemini appends it to the transcription
                    prompt.
                  example: "en"
      responses:
        '200':
          description: Transcription succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
              examples:
                openai:
                  summary: OpenAI `gpt-4o-mini-transcribe`
                  value:
                    text: "Turn on the office lights."
                    provider: "openAI"
                    model: "gpt-4o-mini-transcribe"
                wispr:
                  summary: Wispr Flow
                  value:
                    text: "Summarize today's standup notes."
                    provider: "wispr"
                    model: "flow"
                gemini:
                  summary: Gemini multimodal
                  value:
                    text: "Create a ticket to fix the login bug."
                    provider: "gemini"
                    model: "gemini-2.5-flash"
        '400':
          description: Empty audio payload (`file` read returned 0 bytes).
        '401':
          description: Unauthorized — valid bearer token required.
        '409':
          description: |
            No Speech-to-Text provider is configured. The client should fall
            back to the browser Web Speech API.
        '413':
          description: |
            Audio payload exceeds the 25 MB limit. This matches OpenAI's
            `audio.transcriptions.create` ceiling and the soft cap enforced
            by the node proxy (`multer` `fileSize`).
        '500':
          description: |
            Runtime error — for example the optional `faster-whisper`
            package is not installed for the `whisper` provider, or
            `ffmpeg` is missing on the host for the `wispr` provider
            (required to transcode audio to 16 kHz WAV).
        '502':
          description: Upstream provider failure (message is intentionally
            generic; see server logs for details).

  /chat/speak:
    post:
      tags:
        - Conversational Speech
      summary: Synthesize audio for a message (Text-to-Speech)
      description: |
        Generate audio for the supplied text using the configured Text-to-Speech
        provider (e.g. OpenAI `tts-1`, `gpt-4o-mini-tts`, or Gemini
        `gemini-3.1-flash-tts-preview` / `gemini-2.5-flash-preview-tts`).
        The response body is
        the raw audio bytes in the requested format.<br><br>
        <b>Overview:</b><br>
        The chat UI calls this when the user clicks "Read aloud" on an
        assistant message. If no TTS provider is configured the endpoint
        returns <code>409</code> and the client falls back to the browser's
        <code>speechSynthesis</code> API.<br><br>
        <b>Limits:</b><br>
        <ul>
          <li>Input text is capped at 4096 characters.</li>
          <li><code>speed</code> is clamped to the range
              [<code>0.25</code>, <code>4.0</code>].</li>
          <li>Unknown <code>format</code> values silently fall back to
              <code>mp3</code>.</li>
        </ul>
      operationId: synthesizeChatSpeech
      security:
        - bearerAuth: []
        - oauth2: [conversation:chat]
      requestBody:
        required: true
        description: Text to synthesize and optional voice, format, and speed parameters.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeakRequest'
      responses:
        '200':
          description: |
            Raw audio bytes in the negotiated format. Response headers
            <code>X-TTS-Provider</code> and <code>X-TTS-Model</code> identify
            the provider/model that produced the audio.
          headers:
            X-TTS-Provider:
              schema:
                type: string
              description: Provider id that produced the audio.
            X-TTS-Model:
              schema:
                type: string
              description: Model id that produced the audio.
            Cache-Control:
              schema:
                type: string
              description: Always <code>no-store</code>.
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
            audio/ogg:
              schema:
                type: string
                format: binary
            audio/aac:
              schema:
                type: string
                format: binary
            audio/flac:
              schema:
                type: string
                format: binary
            audio/wav:
              schema:
                type: string
                format: binary
            audio/pcm:
              schema:
                type: string
                format: binary
        '400':
          description: Request body missing or `text` is empty / whitespace.
        '401':
          description: Unauthorized — valid bearer token required.
        '409':
          description: |
            No Text-to-Speech provider is configured. The client should fall
            back to the browser Web Speech API.
        '413':
          description: Text exceeds the 4096-character limit.
        '502':
          description: Upstream provider failure.

  /chat/speech/capabilities:
    get:
      tags:
        - Conversational Speech
      summary: Report configured TTS/STT providers
      description: |
        Lightweight probe that tells the chat UI whether to use the server
        speech routes or the browser Web Speech API. Only public provider
        metadata is returned; API keys and organization ids are never
        exposed.
      operationId: getChatSpeechCapabilities
      security:
        - bearerAuth: []
        - oauth2: [conversation:chat]
      responses:
        '200':
          description: Current TTS/STT capability summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeechCapabilitiesResponse'
        '401':
          description: Unauthorized — valid bearer token required.

  # -------------------- Semantic Search --------------------
  /search:
    post:
      tags:
        - Semantic Search
      summary: Perform semantic search
      description: |
        Run a semantic search across your organization's knowledge base.
        Matching is meaning-based, so relevant results surface even when
        the wording differs from the query.

        Use optional `filters` to narrow the scope:

        - `filters.apps` — restrict to specific connector apps (for
          example Google Drive or Confluence).
        - `filters.kb` — restrict to specific knowledge bases.

        The response returns a `searchId` for the persisted search along
        with ranked matches, each carrying a relevance score and the
        source document's metadata. Past searches can be retrieved via
        `GET /search`.
      operationId: search
      security:
        - bearerAuth: []
        - oauth2: [semantic:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemanticSearchRequest'
            examples:
              simple:
                summary: Basic search
                value:
                  query: "company vacation policy"
                  limit: 10
      responses:
        '200':
          description: Search ID plus retrieval payload (`searchResponse`) from the AI search service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SemanticSearchExecuteResponse'
        '400':
          description: |
            Invalid request — `query` is missing, empty, or the request
            body fails validation.
        '401':
          description: |
            Missing or invalid bearer token.
        '403':
          description: |
            Bearer token lacks the `semantic:write` scope.
        '404':
          description: |
            A referenced knowledge base or app filter could not be
            resolved.
        '500':
          description: |
            Unexpected server error while executing the search, or the
            upstream AI search service was unreachable.
        '502':
          description: |
            The upstream AI search service returned an invalid response.
        '503':
          description: |
            The upstream AI search service is temporarily unavailable.
        '504':
          description: |
            The upstream AI search service timed out before returning a
            response.

    get:
      tags:
        - Semantic Search
      summary: Get search history
      description: |
        Retrieve the authenticated user's persisted search history.

        Returns searches the user owns along with searches shared with them,
        scoped to the caller's organization. Archived and deleted entries are
        excluded. Citation references on this endpoint are returned as raw
        identifier strings; use `GET /search/{searchId}` to fetch a single
        search with its citations fully expanded.

        Pagination defaults to `page=1, limit=20` (maximum `limit` is 100).
        Results are sorted by most recent activity by default.
      operationId: searchHistory
      security:
        - bearerAuth: []
        - oauth2: [semantic:read]
      parameters:
        - name: page
          in: query
          description: Page number to return. Must be within `[1, 1000]`.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 1
        - name: limit
          in: query
          description: Number of items per page. Values are clamped to the range `[1, 100]`.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          description: |
            Field used to sort results. Any value other than `createdAt`,
            `lastActivityAt`, or `title` is treated as `lastActivityAt`.
          schema:
            type: string
            enum: [createdAt, lastActivityAt, title]
            default: lastActivityAt
        - name: sortOrder
          in: query
          description: Sort direction applied to `sortBy`.
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: search
          in: query
          description: |
            Case-insensitive substring to match against a search's title and
            message content. Regex metacharacters are escaped automatically.
            Values longer than 1000 characters are rejected with `400`.
          schema:
            type: string
        - name: shared
          in: query
          description: |
            Filter results by their shared status. Accepted values are
            `'true'` / `'1'` (return only shared searches) and
            `'false'` / `'0'` (exclude shared searches). Matching is
            case-insensitive and surrounding whitespace is trimmed.
          schema:
            type: string
            enum: ['true', 'false', '1', '0']
        - name: startDate
          in: query
          description: ISO 8601 timestamp used as the lower bound for a search's creation date.
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: ISO 8601 timestamp used as the upper bound for a search's creation date.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: |
            Persisted search history plus pagination, applied/available filter
            metadata, and a request-scoped `meta` block.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SemanticSearchHistoryResponse'
        '400':
          description: |
            Invalid request, raised when
            a query parameter fails validation — for example a malformed
            `startDate` / `endDate`, a `search` value over 1000 characters,
            or a query value that trips the XSS guard.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                description: Error envelope for a failed request.
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    description: Error payload.
                    properties:
                      code:
                        type: string
                        description: |
                          Machine-readable error code. For this status the
                          value is either `VALIDATION_ERROR` (request failed
                          schema validation) or `HTTP_BAD_REQUEST` (semantic
                          validation failed — malformed date, value over the
                          allowed length, or XSS-guard trip).
                      message:
                        type: string
                        description: Human-readable description of the failure.
                    required:
                      - code
                      - message
                required:
                  - error
        '401':
          description: |
            Missing or invalid bearer token.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                description: Error envelope for a failed request.
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    description: Error payload.
                    properties:
                      code:
                        type: string
                        description: |
                          Machine-readable error code. For this status the
                          value is `HTTP_UNAUTHORIZED` (missing, invalid, or
                          expired bearer token, user no longer exists, or the
                          session has been invalidated).
                      message:
                        type: string
                        description: Human-readable description of the failure.
                    required:
                      - code
                      - message
                required:
                  - error
        '403':
          description: |
            Bearer token lacks the `semantic:read` scope.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                description: Error envelope for a failed request.
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    description: Error payload.
                    properties:
                      code:
                        type: string
                        description: |
                          Machine-readable error code. For this status the
                          value is `HTTP_FORBIDDEN` (the token is valid but
                          does not carry the `semantic:read` scope).
                      message:
                        type: string
                        description: Human-readable description of the failure.
                    required:
                      - code
                      - message
                required:
                  - error
        '500':
          description: |
            Server error. Possible causes:

            - Explicit `InternalServerError`
              or any other 500 `BaseError` thrown by the handler.
            - Non-`BaseError` exception caught by the
              global error middleware.
            - Response serializer fallback.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                description: Error envelope for a failed request.
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    description: Error payload.
                    properties:
                      code:
                        type: string
                        description: |
                          Machine-readable error code. For this status the
                          value is `HTTP_INTERNAL_SERVER_ERROR` for an
                          explicit server-side failure, or `INTERNAL_ERROR`
                          for an unhandled exception coerced by the global
                          error middleware.
                      message:
                        type: string
                        description: Human-readable description of the failure.
                    required:
                      - code
                      - message
                required:
                  - error

    delete:
      tags:
        - Semantic Search
      summary: Clear all search history
      description: |
        Permanently delete every persisted search row owned by, or shared
        with, the authenticated user, along with the citation rows those
        searches reference. The action cannot be undone.

        Scoped to the caller's org and limited to rows where
        `isDeleted: false` and `isArchived: false`. If nothing matches
        (including the case where every row is already archived), the
        endpoint returns `404` rather than a successful no-op.
      operationId: deleteSearchHistory
      security:
        - bearerAuth: []
        - oauth2: [semantic:delete]
      parameters:
        - name: search
          in: query
          description: |
            Restrict the deletion to rows whose `title` or `messages.content`
            matches this case-insensitive substring. Special regex characters
            are escaped before the lookup; values over 1000 chars are
            rejected with `400`.
          schema:
            type: string
        - name: shared
          in: query
          description: |
            Restrict the deletion to rows with this `isShared` value
            (`'true'` / `'false'`).
          schema:
            type: string
            enum: ['true', 'false']
        - name: startDate
          in: query
          description: |
            ISO 8601 lower bound for `createdAt`. Combined with `endDate`
            to scope which rows are deleted.
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: ISO 8601 upper bound for `createdAt`.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Search history deleted successfully.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - message
                properties:
                  message:
                    type: string
        '400':
          description: |
            Invalid request, raised
            from the shared filter helper when a query parameter fails
            validation — for example a malformed `startDate` / `endDate`,
            a `search` value over 1000 characters, or a `search` value
            that trips the XSS guard.
        '401':
          description: |
            Missing or invalid bearer token.
        '403':
          description: |
            Bearer token lacks the `semantic:delete` scope.
        '404':
          description: |
            No matching rows. Returned when the caller has no owned or
            shared searches that satisfy the filter.
        '500':
          description: |
            Server error. Possible causes:

            - Explicit `InternalServerError`
              or any other 500 `BaseError` thrown by the handler.
            - Non-`BaseError` exception caught by the
              global error middleware.
            - Response serializer fallback.

  /search/{searchId}:
    get:
      tags:
        - Semantic Search
      summary: Get search by ID
      description: |
        Retrieve a previously persisted search by its id, scoped to the
        caller's org.

        The response body is always an **array** containing zero or one
        persisted search document. An unknown id returns an empty array
        with a `200` status — callers should check array length rather
        than relying on a `404`.
      operationId: getSearchById
      security:
        - bearerAuth: []
        - oauth2: [semantic:read]
      parameters:
        - name: searchId
          in: path
          required: true
          description: Unique search identifier
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Array containing zero or one persisted search document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersistedSemanticSearchEnvelope'
        '400':
          description: |
            Invalid request — `searchId`
            failed Zod validation (not a valid ObjectId).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - VALIDATION_ERROR
                        description: |
                          Machine-readable error code. `VALIDATION_ERROR`
                          is emitted when the request fails Zod
                          validation.
                      message:
                        type: string
                        description: Human-readable description of the failure.
        '401':
          description: |
            Missing or invalid bearer token.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - HTTP_UNAUTHORIZED
                        description: |
                          Machine-readable error code. `HTTP_UNAUTHORIZED`
                          is emitted when the bearer token is missing,
                          invalid, or expired.
                      message:
                        type: string
                        description: Human-readable description of the failure.
        '403':
          description: |
            Bearer token lacks the `semantic:read` scope.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - HTTP_FORBIDDEN
                        description: |
                          Machine-readable error code. `HTTP_FORBIDDEN`
                          is emitted when the bearer token is valid but
                          lacks the required scope.
                      message:
                        type: string
                        description: Human-readable description of the failure.
        '404':
          description: |
            Reserved for parity with sibling routes; this endpoint
            currently returns `200` with an empty array for an unknown
            id rather than emitting `404`.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - HTTP_NOT_FOUND
                        description: |
                          Machine-readable error code. `HTTP_NOT_FOUND`
                          is emitted when the addressed resource does
                          not exist.
                      message:
                        type: string
                        description: Human-readable description of the failure.
        '500':
          description: |
            Server error. Possible causes:

            - Explicit `InternalServerError`
              or any other 500 `BaseError` thrown by the handler.
            - Non-`BaseError` exception caught by the
              global error middleware.
            - Response serializer fallback.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - HTTP_INTERNAL_SERVER_ERROR
                          - INTERNAL_ERROR
                          - MIDDLEWARE_ERROR
                        description: |
                          Machine-readable error code.

                          - `HTTP_INTERNAL_SERVER_ERROR` — explicit
                            `InternalServerError` raised by the handler.
                          - `INTERNAL_ERROR` — unhandled exception
                            caught by the global error middleware.
                          - `MIDDLEWARE_ERROR` — the error middleware
                            itself failed while serializing the
                            response.
                      message:
                        type: string
                        description: Human-readable description of the failure.

    delete:
      tags:
        - Semantic Search
      summary: Delete search by ID
      description: |
        Permanently delete a single persisted search row, plus every
        citation row referenced by its `citationIds`. The caller must
        either own the row or have it shared with them.

        Scoped to the caller's org and limited to rows where
        `isDeleted: false` and `isArchived: false`; archived or
        already-deleted rows surface as `404`.
      operationId: deleteSearchById
      security:
        - bearerAuth: []
        - oauth2: [semantic:delete]
      parameters:
        - name: searchId
          in: path
          required: true
          description: ObjectId of the persisted search row to delete.
          schema:
            type: string
            format: objectId
        - name: search
          in: query
          description: |
            Additional substring filter against `title` / `messages.content`.
            The row is only deleted if the `searchId` row also matches this
            filter; otherwise `404`. Special regex characters are escaped;
            values over 1000 chars or tripping the XSS guard yield `400`.
          schema:
            type: string
        - name: shared
          in: query
          description: |
            Additional `isShared` filter (`'true'` / `'false'`). The row is
            only deleted if it also matches this value.
          schema:
            type: string
            enum: ['true', 'false']
        - name: startDate
          in: query
          description: |
            ISO 8601 lower bound for `createdAt`. The row is only deleted
            if its `createdAt` is on or after this value.
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: |
            ISO 8601 upper bound for `createdAt`. The row is only deleted
            if its `createdAt` is on or before this value.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Search deleted successfully.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - message
                properties:
                  message:
                    type: string
        '400':
          description: |
            Invalid request. Possible causes:

            - `searchId` failed Zod validation
              (not a valid ObjectId).
            - A query parameter passed through to
              the shared filter helper failed validation, e.g. a
              malformed `startDate` / `endDate`, or a `search` value
              over 1000 characters or tripping the XSS guard.
        '401':
          description: |
            Missing or invalid bearer token.
        '403':
          description: |
            Bearer token lacks the `semantic:delete` scope.
        '404':
          description: |
            No search matched. Returned when the id does not exist for
            this caller, or when the row is archived or already deleted.
        '500':
          description: |
            Server error. Possible causes:

            - Explicit `InternalServerError`
              or any other 500 `BaseError` thrown by the handler.
            - Non-`BaseError` exception caught by the
              global error middleware.
            - Response serializer fallback.

  /search/{searchId}/archive:
    patch:
      tags:
        - Semantic Search
      summary: Archive a search
      description: |
        Archive a specific search result. Archived searches are hidden
        from the default search history view but remain retrievable via
        the archive-aware listing endpoints.
      operationId: archiveSearch
      security:
        - bearerAuth: []
        - oauth2: [semantic:write]
      parameters:
        - name: searchId
          in: path
          required: true
          description: Unique search identifier
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Search archived successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - id
                  - status
                  - archivedBy
                  - archivedAt
                  - meta
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Unique identifier of the archived search.
                    example: "65f1c0a4e2b9c4d8f3a1b2c3"
                  status:
                    type: string
                    enum:
                      - archived
                    description: Resulting status of the search after the operation.
                    example: "archived"
                  archivedBy:
                    type: string
                    format: objectId
                    description: User ID of the user who archived the search.
                    example: "65f1c0a4e2b9c4d8f3a1b2c4"
                  archivedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the search was archived.
                    example: "2026-05-10T12:34:56.789Z"
                  meta:
                    type: object
                    additionalProperties: false
                    required:
                      - timestamp
                      - duration
                    properties:
                      requestId:
                        type: string
                        description: Server-assigned request identifier for tracing. Omitted when not available.
                        example: "req_8f3a1b2c"
                      timestamp:
                        type: string
                        format: date-time
                        description: Server timestamp when the response was produced.
                        example: "2026-05-10T12:34:56.789Z"
                      duration:
                        type: integer
                        description: Time taken to process the request, in milliseconds.
                        example: 42
        '400':
          description: |
            Invalid request. Possible causes:

            - `searchId` failed Zod validation
              (not a valid ObjectId).
            - The target search is already archived.
        '401':
          description: |
            Missing or invalid bearer token.
        '403':
          description: |
            Bearer token lacks the `semantic:write` scope.
        '404':
          description: |
            Search not found, or not owned by the caller's org.
        '500':
          description: |
            Persistence layer failed to update the search document.

  /search/{searchId}/unarchive:
    patch:
      tags:
        - Semantic Search
      summary: Unarchive a search
      description: |
        Restore a previously archived search result back to the active search history.
      operationId: unarchiveSearch
      security:
        - bearerAuth: []
        - oauth2: [semantic:write]
      parameters:
        - name: searchId
          in: path
          required: true
          description: Unique search identifier
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Search unarchived successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - id
                  - status
                  - unarchivedBy
                  - unarchivedAt
                  - meta
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Unique identifier of the unarchived search.
                    example: "65f1c0a4e2b9c4d8f3a1b2c3"
                  status:
                    type: string
                    enum:
                      - unarchived
                    description: Resulting status of the search after the operation.
                    example: "unarchived"
                  unarchivedBy:
                    type: string
                    format: objectId
                    description: User ID of the user who unarchived the search.
                    example: "65f1c0a4e2b9c4d8f3a1b2c4"
                  unarchivedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the search was unarchived.
                    example: "2026-05-10T12:34:56.789Z"
                  meta:
                    type: object
                    additionalProperties: false
                    required:
                      - timestamp
                      - duration
                    properties:
                      requestId:
                        type: string
                        description: Server-assigned request identifier for tracing. Omitted when not available.
                        example: "req_8f3a1b2c"
                      timestamp:
                        type: string
                        format: date-time
                        description: Server timestamp when the response was produced.
                        example: "2026-05-10T12:34:56.789Z"
                      duration:
                        type: integer
                        description: Time taken to process the request, in milliseconds.
                        example: 42
        '400':
          description: |
            Invalid request. Possible causes:

            - `searchId` failed Zod validation
              (not a valid ObjectId).
            - The target search is not currently
              archived and therefore cannot be unarchived.
        '401':
          description: |
            Missing or invalid bearer token.
        '403':
          description: |
            Bearer token lacks the `semantic:write` scope.
        '404':
          description: |
            No archived search matches `searchId` within the caller's
            org, or the row is already active / deleted.
        '500':
          description: |
            Unexpected server error while unarchiving the search.

  /agents/template:
    get:
      tags:
        - Agent Templates
      summary: List agent templates
      description: |
        Retrieve all available agent templates.<br><br>
        <b>Overview:</b><br>
        Agent templates provide pre-configured starting points for creating
        custom AI agents. Templates include system prompts, recommended tools,
        and configuration schemas.<br><br>
        <b>Template Types:</b><br>
        <ul>
        <li>Public templates available to all organization users</li>
        <li>Private templates created by individual users</li>
        </ul>
      operationId: listAgentTemplates
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      responses:
        '200':
          description: List of agent templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentTemplate'
        '401':
          description: Unauthorized

    post:
      tags:
        - Agent Templates
      summary: Create agent template
      description: |
        Create a new reusable agent template.<br><br>
        <b>Overview:</b><br>
        Templates define the base configuration for agents including
        system prompts, tool recommendations, and customization options.<br><br>
        <b>Template Components:</b><br>
        <ul>
        <li><b>System prompt:</b> Default instructions for agents</li>
        <li><b>Recommended tools:</b> Suggested tool integrations</li>
        <li><b>Config schema:</b> JSON Schema for customization options</li>
        </ul>
      operationId: createAgentTemplate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Template name
                  example: "Customer Support Agent"
                description:
                  type: string
                  description: What agents from this template do
                category:
                  type: string
                  description: Template category
                  example: "Support"
                defaultSystemPrompt:
                  type: string
                  description: Default system instructions
                recommendedTools:
                  type: array
                  items:
                    type: string
                  description: Suggested tool keys
                configSchema:
                  type: object
                  description: JSON Schema for customization
                isPublic:
                  type: boolean
                  default: false
                  description: Make template available organization-wide
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTemplate'
        '400':
          description: Invalid template configuration
        '401':
          description: Unauthorized

  /agents/template/{templateId}:
    get:
      tags:
        - Agent Templates
      summary: Get agent template
      description: Retrieve a specific agent template by ID.
      operationId: getAgentTemplate
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: templateId
          in: path
          required: true
          description: Template identifier
          schema:
            type: string
      responses:
        '200':
          description: Template details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTemplate'
        '401':
          description: Unauthorized
        '404':
          description: Template not found

    put:
      tags:
        - Agent Templates
      summary: Update agent template
      description: |
        Update an existing agent template.<br><br>
        <b>Permissions:</b><br>
        Only the template creator can update it.
      operationId: updateAgentTemplate
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request body for Update agent template"
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                category:
                  type: string
                defaultSystemPrompt:
                  type: string
                recommendedTools:
                  type: array
                  items:
                    type: string
                configSchema:
                  type: object
                isPublic:
                  type: boolean
      responses:
        '200':
          description: Template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTemplate'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Only creator can update
        '404':
          description: Template not found

    delete:
      tags:
        - Agent Templates
      summary: Delete agent template
      description: |
        Delete an agent template.<br><br>
        <b>Note:</b><br>
        Existing agents created from this template are not affected.
      operationId: deleteAgentTemplate
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Template deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Only creator can delete
        '404':
          description: Template not found

  # -------------------- Agents --------------------
  /agents:
    get:
      tags:
        - Agents
      summary: List agents
      description: |
        Retrieve all agents available to the authenticated user.<br><br>
        <b>Overview:</b><br>
        Returns agents created by the user plus public agents in the organization.
        Each agent has unique capabilities defined by its tools and knowledge scope.
      operationId: listAgents
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
        '401':
          description: Unauthorized

  /agents/create:
    post:
      tags:
        - Agents
      summary: Create agent
      description: |
        Create a new custom AI agent.<br><br>
        <b>Overview:</b><br>
        Agents are specialized AI assistants configured for specific tasks.
        They can have custom system prompts, access to specific tools, and
        be limited to certain knowledge bases.<br><br>
        <b>Agent Configuration:</b><br>
        <ul>
        <li><b>System prompt:</b> Instructions that define agent behavior</li>
        <li><b>Tools:</b> Capabilities like web search, code execution, etc.</li>
        <li><b>Knowledge bases:</b> Data sources the agent can access</li>
        <li><b>Model config:</b> AI model settings (temperature, max tokens)</li>
        </ul>
        <b>Use Cases:</b><br>
        <ul>
        <li>Customer support bot with product knowledge</li>
        <li>Code review assistant with repository access</li>
        <li>HR assistant with policy documents</li>
        </ul>
      operationId: createAgent
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Agent display name
                  example: "Product Support Agent"
                description:
                  type: string
                  description: What the agent does
                systemPrompt:
                  type: string
                  description: System instructions for the agent
                startMessage:
                  type: string
                  description: Initial greeting shown when conversation starts
                instructions:
                  type: string
                  nullable: true
                  description: Additional agent execution instructions
                models:
                  type: array
                  description: Agent model configuration entries
                  items:
                    oneOf:
                      - type: string
                      - type: object
                        properties:
                          modelKey:
                            type: string
                          modelName:
                            type: string
                          provider:
                            type: string
                          isReasoning:
                            type: boolean
                toolsets:
                  type: array
                  description: Toolsets attached to the agent (instance-aware)
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      displayName:
                        type: string
                      type:
                        type: string
                      instanceId:
                        type: string
                        description: Admin-created toolset instance ID
                      instanceName:
                        type: string
                        description: Human-friendly instance name
                      tools:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            fullName:
                              type: string
                            description:
                              type: string
                knowledge:
                  type: array
                  description: Knowledge sources connected to the agent
                  items:
                    type: object
                    properties:
                      connectorId:
                        type: string
                      filters:
                        oneOf:
                          - type: object
                            additionalProperties: true
                          - type: string
                webSearch:
                  type: object
                  nullable: true
                  description: Web search provider to attach to the agent
                  properties:
                    provider:
                      type: string
                      description: Provider identifier (e.g. "tavily", "serper", "exa", "duckduckgo")
                    providerKey:
                      type: string
                      description: Stored provider document key (empty string for providers that don't require one)
                    providerLabel:
                      type: string
                      description: Human-readable provider label (e.g. "DuckDuckGo")
                  required:
                    - provider
                  example:
                    provider: "duckduckgo"
                    providerKey: ""
                    providerLabel: "DuckDuckGo"
                isPublic:
                  type: boolean
                  default: false
                  description: Make agent available to all org users
                shareWithOrg:
                  type: boolean
                  default: false
                  description: Share agent with the organization
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          description: Invalid agent configuration
        '401':
          description: Unauthorized

  /agents/tools/list:
    get:
      tags:
        - Agents
      summary: List available tools
      description: |
        Get all tools that can be assigned to agents.<br><br>
        <b>Overview:</b><br>
        Tools extend agent capabilities beyond basic Q&A. Each tool
        has specific inputs and outputs defined by its schema.<br><br>
        <b>Common Tools:</b><br>
        <ul>
        <li><b>web-search:</b> Search the internet</li>
        <li><b>code-interpreter:</b> Execute code snippets</li>
        <li><b>file-reader:</b> Read uploaded files</li>
        <li><b>api-caller:</b> Make external API requests</li>
        </ul>
      operationId: listAgentTools
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      responses:
        '200':
          description: List of available tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentTool'
        '401':
          description: Unauthorized

  /agents/web-search-usage/{provider}:
    get:
      tags:
        - Agents
      summary: Get web search provider usage
      description: |
        Retrieve usage statistics for a specific web search provider used by agents.<br><br>
        <b>Overview:</b><br>
        Returns information about how a particular web search provider is being used
        across agents in the organization.
      operationId: getWebSearchProviderUsage
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: The web search provider identifier (e.g. "google", "bing", "brave")
      responses:
        '200':
          description: Web search provider usage data
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request - provider or organization ID missing
        '401':
          description: Unauthorized

  /agents/model-usage/{model_key}:
    get:
      tags:
        - Agents
      summary: Get AI model usage
      description: |
        Retrieve the list of agents in the organization that reference a specific AI model.<br><br>
        <b>Overview:</b><br>
        Used as a pre-deletion check when an admin attempts to delete an AI model
        configuration. Returns the agents currently configured to use the model so
        the caller can block deletion (HTTP 409 from the deleting service) when the
        model is still in use.
      operationId: getModelUsage
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: model_key
          in: path
          required: true
          schema:
            type: string
          description: The model key (URL-encoded; typically the modelKey assigned at create time).
      responses:
        '200':
          description: List of agents using the model. Empty array when the model is not in use or the key is blank.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  agents:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        _key:
                          type: string
                        creatorName:
                          type: string
                          nullable: true
        '401':
          description: Unauthorized
        '500':
          description: Internal server error while checking model usage

  /agents/{agentKey}:
    get:
      tags:
        - Agents
      summary: Get agent
      description: Retrieve agent details by its unique key.
      operationId: getAgent
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentKey
          in: path
          required: true
          description: Unique agent identifier
          schema:
            type: string
          example: "customer-support-agent"
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '401':
          description: Unauthorized
        '404':
          description: Agent not found

    put:
      tags:
        - Agents
      summary: Update agent
      description: |
        Update an existing agent's configuration.<br><br>
        <b>Permissions:</b><br>
        Only the agent creator can update it.
      operationId: updateAgent
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request body for Update agent"
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                systemPrompt:
                  type: string
                startMessage:
                  type: string
                instructions:
                  type: string
                  nullable: true
                models:
                  type: array
                  items:
                    oneOf:
                      - type: string
                      - type: object
                        properties:
                          modelKey:
                            type: string
                          modelName:
                            type: string
                          provider:
                            type: string
                          isReasoning:
                            type: boolean
                toolsets:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      displayName:
                        type: string
                      type:
                        type: string
                      instanceId:
                        type: string
                      instanceName:
                        type: string
                      tools:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            fullName:
                              type: string
                            description:
                              type: string
                knowledge:
                  type: array
                  items:
                    type: object
                    properties:
                      connectorId:
                        type: string
                      filters:
                        oneOf:
                          - type: object
                            additionalProperties: true
                          - type: string
                webSearch:
                  type: object
                  nullable: true
                  description: Web search provider to attach to the agent
                  properties:
                    provider:
                      type: string
                      description: Provider identifier (e.g. "tavily", "serper", "exa", "duckduckgo")
                    providerKey:
                      type: string
                      description: Stored provider document key (empty string for providers that don't require one)
                    providerLabel:
                      type: string
                      description: Human-readable provider label (e.g. "DuckDuckGo")
                  required:
                    - provider
                  example:
                    provider: "duckduckgo"
                    providerKey: ""
                    providerLabel: "DuckDuckGo"
                isPublic:
                  type: boolean
                shareWithOrg:
                  type: boolean
      responses:
        '200':
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Only creator can update
        '404':
          description: Agent not found

    delete:
      tags:
        - Agents
      summary: Delete agent
      description: |
        Delete an agent.<br><br>
        <b>Warning:</b><br>
        All conversations with this agent will become inaccessible.
      operationId: deleteAgent
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Only creator can delete
        '404':
          description: Agent not found

  /agents/{agentKey}/permissions:
    get:
      tags:
        - Agents
      summary: Get agent permissions
      description: Get the current permission configuration for an agent.
      operationId: getAgentPermissions
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Permission configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  isPublic:
                    type: boolean
                  sharedWith:
                    type: array
                    items:
                      type: object
                      properties:
                        userId:
                          type: string
                        accessLevel:
                          type: string
                          enum: [read, use, edit]
        '401':
          description: Unauthorized
        '404':
          description: Agent not found

    put:
      tags:
        - Agents
      summary: Update agent permissions
      description: Update who can access and use the agent.
      operationId: updateAgentPermissions
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request body for Update agent permissions"
        content:
          application/json:
            schema:
              type: object
              properties:
                isPublic:
                  type: boolean
                sharedWith:
                  type: array
                  items:
                    type: object
                    properties:
                      userId:
                        type: string
                        format: objectId
                      accessLevel:
                        type: string
                        enum: [read, use, edit]
      responses:
        '200':
          description: Permissions updated
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Only owner can update permissions
        '404':
          description: Agent not found

  /agents/{agentKey}/share:
    post:
      tags:
        - Agents
      summary: Share agent
      description: Share an agent with specific users.
      operationId: shareAgent
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request body for Share agent"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareRequest'
      responses:
        '200':
          description: Agent shared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Only owner can share
        '404':
          description: Agent not found

  /agents/conversations/show/archives:
    get:
      tags:
        - Agents
      summary: List archived agent conversations grouped by agent
      description: |
        Returns archived agent conversations for the current user, grouped by
        `agentKey`, with pagination over agent groups. Excludes conversations
        whose agent was soft-deleted upstream.
      operationId: listAgentArchivedConversationsGrouped
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentPage
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: agentLimit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Grouped archived conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentArchivedGroupsResponse'
        '401':
          description: Unauthorized

  /agents/{agentKey}/conversations/show/archives:
    get:
      tags:
        - Agents
      summary: List archived conversations for an agent
      description: Paginated list of archived conversations for the given agent key.
      operationId: listAgentConversationArchives
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Archived conversations for the agent
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized

  /agents/{agentKey}/conversations/stream:
    post:
      tags:
        - Agents
      summary: Create agent conversation with streaming response
      description: |
        Start a new agent conversation and stream the AI response as Server-Sent
        Events (SSE), same lifecycle pattern as `POST /conversations/stream`.
      operationId: streamAgentConversation
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: Initial turn payload for the new agent conversation stream.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentStreamCreateConversationRequest'
      responses:
        '200':
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AgentStreamSSEEvent'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized

  /agents/{agentKey}/conversations/{conversationId}/messages/stream:
    post:
      tags:
        - Agents
      summary: Add message to agent conversation with streaming response
      description: |
        Append a user message to an existing agent conversation and stream the
        assistant reply over SSE.
      operationId: streamAgentConversationMessage
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: Follow-up message payload for the agent conversation stream.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentAddMessageStreamRequest'
      responses:
        '200':
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AgentMessageStreamSSEEvent'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

  /agents/{agentKey}/conversations/{conversationId}/message/{messageId}/regenerate:
    post:
      tags:
        - Agents
      summary: Regenerate agent conversation message
      description: Re-run generation for a bot message in an agent conversation (SSE).
      operationId: regenerateAgentConversationMessage
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      requestBody:
        required: false
        description: Optional filters and model overrides for regeneration.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegenerateRequest'
      responses:
        '200':
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AgentRegenerateSSEEvent'
        '401':
          description: Unauthorized
        '404':
          description: Conversation or message not found

  /agents/{agentKey}/conversations/{conversationId}/message/{messageId}/feedback:
    post:
      tags:
        - Agents
      summary: Submit feedback for an agent message
      description: Record structured feedback on a bot response in an agent conversation.
      operationId: updateAgentConversationMessageFeedback
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: Feedback payload for the agent message.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageFeedback'
      responses:
        '200':
          description: Feedback stored
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized
        '404':
          description: Conversation or message not found

  /agents/{agentKey}/conversations/{conversationId}/messages:
    post:
      tags:
        - Agents
      summary: Add message to agent conversation
      description: Append a user message and wait for the full non-streaming AI response.
      operationId: addAgentConversationMessage
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: Follow-up message body (query required).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMessageRequest'
      responses:
        '200':
          description: Updated conversation with new assistant message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddMessageResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

  /agents/{agentKey}/conversations/{conversationId}/archive:
    post:
      tags:
        - Agents
      summary: Archive an agent conversation
      description: Marks the conversation as archived for the authenticated owner.
      operationId: archiveAgentConversation
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Conversation archived
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

  /agents/{agentKey}/conversations/{conversationId}/unarchive:
    post:
      tags:
        - Agents
      summary: Unarchive an agent conversation
      description: Restores an archived agent conversation to the active list.
      operationId: unarchiveAgentConversation
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Conversation unarchived
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

  /agents/{agentKey}/conversations/{conversationId}/title:
    patch:
      tags:
        - Agents
      summary: Update agent conversation title
      description: Updates the display title for an agent conversation owned by the caller.
      operationId: updateAgentConversationTitle
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: New title for the agent conversation.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationTitleUpdateRequest'
      responses:
        '200':
          description: Title updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

  /agents/{agentKey}/conversations/{conversationId}:
    get:
      tags:
        - Agents
      summary: Get agent conversation by ID
      description: |
        Returns the conversation with paginated/sorted messages and filter metadata.
      operationId: getAgentConversationById
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Agent conversation detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversationDetailResponse'
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

    delete:
      tags:
        - Agents
      summary: Delete agent conversation
      description: Soft-deletes the agent conversation for the authenticated user.
      operationId: deleteAgentConversationById
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: Conversation deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

  /agents/{agentKey}/conversations:
    get:
      tags:
        - Agents
      summary: List agent conversations
      description: |
        Paginated list of conversations for the agent (owned and shared-with-me),
        excluding archived threads.
      operationId: listAgentConversations
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversationListResponse'
        '401':
          description: Unauthorized

    post:
      tags:
        - Agents
      summary: Create agent conversation
      description: |
        Create a new conversation with the agent using an initial user query;
        returns the persisted conversation after the first AI response (non-streaming).
      operationId: createAgentConversation
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: Initial user query and optional model or filter context.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                type: object
                required:
                  - conversation
                  - meta
                properties:
                  conversation:
                    $ref: '#/components/schemas/AgentConversation'
                  meta:
                    type: object
                    additionalProperties: true
        '400':
          description: Invalid request
        '401':
          description: Unauthorized

  /agents/{agentKey}/unshare:
    post:
      tags:
        - Agents
      summary: Unshare agent
      description: Remove share grants for the given users (proxied to the AI backend).
      operationId: unshareAgent
      security:
        - bearerAuth: []
        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: Users to remove from the agent share list.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareRequest'
      responses:
        '200':
          description: Updated agent document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '401':
          description: Unauthorized
        '404':
          description: Agent not found

  # ==================== CONNECTOR MANAGER ENDPOINTS ====================

  # -------------------- Connector Registry --------------------
  /connectors/registry:
    get:
      tags:
        - Connector Registry
      summary: List available connector types
      description: |
        Get all available connector types from the registry.<br><br>
        <b>Overview:</b><br>
        The registry contains all connector types that can be configured as instances.
        Each type has specific authentication requirements, supported scopes, and capabilities.<br><br>
        <b>Connector Types Include:</b><br>
        <ul>
        <li><b>Google Workspace:</b> Drive, Gmail, Calendar, etc.</li>
        <li><b>Microsoft 365:</b> OneDrive, Outlook, SharePoint, etc.</li>
        <li><b>Cloud Storage:</b> Dropbox, Box, AWS S3</li>
        <li><b>Collaboration:</b> Slack, Confluence, Notion, Jira</li>
        <li><b>Databases:</b> PostgreSQL, MySQL, MongoDB</li>
        </ul>
        <b>Filtering:</b><br>
        Use <code>scope</code> to filter by team or personal connectors.
        Use <code>search</code> for full-text search across connector names.
      operationId: getConnectorRegistry
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: scope
          in: query
          description: Filter by scope type
          schema:
            $ref: '#/components/schemas/ConnectorScope'
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: search
          in: query
          description: Search term for connector names
          schema:
            type: string
      responses:
        '200':
          description: Connector registry retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorType'
                  pagination:
                    $ref: '#/components/schemas/ConnectorPagination'
        '401':
          description: Unauthorized

  /connectors/registry/{connectorType}/schema:
    get:
      tags:
        - Connector Registry
      summary: Get connector configuration schema
      description: |
        Get the configuration schema for a specific connector type.<br><br>
        <b>Overview:</b><br>
        Returns JSON Schema definitions for authentication, sync settings, and
        filter options. Use this to dynamically build configuration forms.<br><br>
        <b>Schema Sections:</b><br>
        <ul>
        <li><b>authSchema:</b> Fields for authentication (credentials, tokens)</li>
        <li><b>syncSchema:</b> Sync settings (schedule, incremental options)</li>
        <li><b>filterSchema:</b> Filter field definitions</li>
        </ul>
      operationId: getConnectorSchema
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorType
          in: path
          required: true
          description: Connector type identifier
          schema:
            type: string
          example: "google-drive"
      responses:
        '200':
          description: Schema retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  schema:
                    $ref: '#/components/schemas/ConnectorSchema'
        '401':
          description: Unauthorized
        '404':
          description: Connector type not found

  # -------------------- Connector Instances --------------------
  /connectors:
    get:
      tags:
        - Connector Instances
      summary: List connector instances
      description: |
        Get all configured connector instances for your organization.<br><br>
        <b>Overview:</b><br>
        Returns instances created by users, filtered by scope and permissions.
        Team-scope connectors are visible to all org users. Personal connectors
        are only visible to their creators.<br><br>
        <b>Instance States:</b><br>
        <ul>
        <li><b>isConfigured:</b> All required settings are complete</li>
        <li><b>isAuthenticated:</b> OAuth flow complete or credentials valid</li>
        <li><b>isActive:</b> Connector is enabled for sync/agent</li>
        </ul>
      operationId: listConnectorInstances
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: scope
          in: query
          required: false
          description: Filter by scope (team or personal)
          schema:
            $ref: '#/components/schemas/ConnectorScope'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: search
          in: query
          description: Search by instance name
          schema:
            type: string
      responses:
        '200':
          description: Instances retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
                  pagination:
                    $ref: '#/components/schemas/ConnectorPagination'
        '401':
          description: Unauthorized

    post:
      tags:
        - Connector Instances
      summary: Create connector instance
      description: |
        Create a new connector instance from a registry type.<br><br>
        <b>Overview:</b><br>
        Creates a new connector instance that can then be configured and enabled.
        The instance is created in an unconfigured state and needs authentication
        and filter setup before it can be activated.<br><br>
        <b>Scope Permissions:</b><br>
        <ul>
        <li><code>team</code> scope requires admin privileges</li>
        <li><code>personal</code> scope available to all users</li>
        </ul>
        <b>Next Steps After Creation:</b><br>
        <ol>
        <li>Configure authentication via <code>PUT /{id}/config/auth</code></li>
        <li>Complete OAuth flow if needed via <code>GET /{id}/oauth/authorize</code></li>
        <li>Set up filters via <code>POST /{id}/filters</code></li>
        <li>Enable connector via <code>POST /{id}/toggle</code></li>
        </ol>
      operationId: createConnectorInstance
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConnectorRequest'
            examples:
              googleDrive:
                summary: Google Drive (Team)
                value:
                  connectorType: "google-drive"
                  instanceName: "Company Google Drive"
                  scope: "team"
                  authType: "OAUTH_ADMIN_CONSENT"
              confluence:
                summary: Confluence (Personal)
                value:
                  connectorType: "confluence"
                  instanceName: "My Confluence"
                  scope: "personal"
                  authType: "API_TOKEN"
              slackWithOAuthApp:
                summary: Slack with OAuth App (Non-Admin)
                value:
                  connectorType: "slack"
                  instanceName: "My Team Slack"
                  scope: "personal"
                  authType: "OAUTH"
                  oauthConfigId: "oauth_config_123"
      responses:
        '201':
          description: Instance created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connector:
                    $ref: '#/components/schemas/ConnectorInstance'
        '400':
          description: |
            Invalid request. Possible reasons:<br>
            <ul>
            <li>Invalid connector type</li>
            <li>Scope not supported by connector</li>
            <li>Duplicate instance name</li>
            <li>Non-admin users must select an OAuth App when creating OAuth connectors</li>
            </ul>
        '401':
          description: Unauthorized
        '403':
          description: |
            Forbidden. Possible reasons:<br>
            <ul>
            <li>Admin privileges required for team-scope connectors</li>
            <li>Non-admin users cannot provide OAuth credentials (clientId, clientSecret, etc.)</li>
            </ul>
        '404':
          description: Selected OAuth App not found or not accessible

  /connectors/active:
    get:
      tags:
        - Connector Instances
      summary: List active connector instances
      description: |
        Get all active (enabled) connector instances.<br><br>
        <b>Overview:</b><br>
        Returns only instances where <code>isActive: true</code>.
        These are connectors currently syncing data or available to AI agents.
      operationId: listActiveConnectors
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      responses:
        '200':
          description: Active connectors retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
        '401':
          description: Unauthorized

  /connectors/inactive:
    get:
      tags:
        - Connector Instances
      summary: List inactive connector instances
      description: Get all inactive (disabled) connector instances.
      operationId: listInactiveConnectors
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      responses:
        '200':
          description: Inactive connectors retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
        '401':
          description: Unauthorized

  /connectors/configured:
    get:
      tags:
        - Connector Instances
      summary: List configured connector instances
      description: |
        Get all connector instances that have completed configuration.<br><br>
        <b>Overview:</b><br>
        Returns instances where <code>isConfigured: true</code>.
