      description: |
        Retrieve root-level nodes (Apps) or search across all nodes for unified knowledge hub browsing.<br><br>
        <b>Overview:</b><br>
        Provides a unified view across all knowledge sources - Collections, connectors, and apps. Use for building file browser UIs.<br><br>
        <b>Node Types:</b><br>
        <ul>
        <li><b>Collection:</b> Local collections (formerly Knowledge Bases)</li>
        <li><b>Connector:</b> External connector instances</li>
        <li><b>App:</b> Connected applications</li>
        </ul>
      operationId: getKnowledgeHubRootNodes
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: only_containers
          in: query
          description: Only return nodes with children (for sidebar)
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          description: Page number (1-indexed)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: sort_by
          in: query
          description: Sort field (name, createdAt, updatedAt, size, type)
          schema:
            type: string
            default: updatedAt
        - name: sort_order
          in: query
          description: Sort order (asc or desc)
          schema:
            type: string
