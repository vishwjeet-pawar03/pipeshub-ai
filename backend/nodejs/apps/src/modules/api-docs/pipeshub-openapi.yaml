            type: string
      responses:
        '200':
          description: Configured connectors retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
                  pagination:
                    $ref: '#/components/schemas/ConnectorPagination'
        '401':
          description: Unauthorized

  /connectors/agents/active:
    get:
      tags:
        - Connector Instances
      summary: List active agent connectors
      description: |
        Get connector instances enabled for AI agent integration.<br><br>
        <b>Overview:</b><br>
        Returns connectors where <code>agentEnabled: true</code>.
        These are available to AI agents for querying and actions.
      operationId: listActiveAgentConnectors
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: scope
          in: query
          schema:
            $ref: '#/components/schemas/ConnectorScope'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Active agent connectors retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectorInstance'
                  pagination:
                    $ref: '#/components/schemas/ConnectorPagination'
        '401':
          description: Unauthorized

  /connectors/{connectorId}:
    get:
      tags:
        - Connector Instances
      summary: Get connector instance
      description: Retrieve a specific connector instance by ID.
      operationId: getConnectorInstance
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          description: Connector instance ID
          schema:
            type: string
          example: "conn_abc123"
      responses:
        '200':
          description: Instance retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connector:
                    $ref: '#/components/schemas/ConnectorInstance'
        '401':
          description: Unauthorized
        '403':
          description: No access to this connector
        '404':
          description: Connector not found

    delete:
      tags:
        - Connector Instances
      summary: Delete connector instance
      description: |
        Delete a connector instance and all associated data.<br><br>
        <b>Warning:</b><br>
        This permanently removes the connector configuration.
        Synced records in knowledge bases are NOT deleted.<br><br>
        <b>Permissions:</b><br>
        <ul>
        <li>Team scope: Requires admin</li>
        <li>Personal scope: Only creator can delete</li>
        </ul>
      operationId: deleteConnectorInstance
      security:
        - bearerAuth: []
        - oauth2: [connector:delete]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Connector deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '404':
          description: Connector not found

  /connectors/{connectorId}/name:
    put:
      tags:
        - Connector Instances
      summary: Update connector instance name
      description: |
        Update the display name of a connector instance.<br><br>
        <b>Note:</b> This only updates the display name, not the connector configuration.
      operationId: updateConnectorName
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
          description: Unique connector instance ID
      requestBody:
        required: true
        description: "Request body for Update connector instance name"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectorNameRequest'
      responses:
        '200':
          description: Name updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connector:
                    $ref: '#/components/schemas/ConnectorInstance'
        '400':
          description: Invalid name
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  # -------------------- Connector Configuration --------------------
  /connectors/{connectorId}/config:
    get:
      tags:
        - Connector Configuration
      summary: Get connector configuration
      description: |
        Get the current configuration for a connector instance.<br><br>
        <b>Security:</b><br>
        Sensitive data (credentials, OAuth tokens) are redacted from the response.
        Only admins can see partial credential information.
      operationId: getConnectorConfig
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Configuration retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  config:
                    $ref: '#/components/schemas/ConnectorConfig'
        '401':
          description: Unauthorized
        '403':
          description: No access to this connector
        '404':
          description: Connector not found

    put:
      tags:
        - Connector Configuration
      summary: Update connector configuration
      description: |
        Update authentication, sync, and filter configuration.<br><br>
        <b>Prerequisites:</b><br>
        Connector must be <b>disabled</b> before updating configuration.
        Disable it first using <code>POST /{id}/toggle</code>.<br><br>
        <b>Partial Updates:</b><br>
        Only provide the sections you want to update. Omitted sections
        are not modified.
      operationId: updateConnectorConfig
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectorConfigRequest'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  config:
                    $ref: '#/components/schemas/ConnectorConfig'
        '400':
          description: |
            Invalid configuration or connector is active.
            Disable connector before updating.
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  /connectors/{connectorId}/config/auth:
    put:
      tags:
        - Connector Configuration
      summary: Update authentication configuration
      description: |
        Update only the authentication configuration.<br><br>
        <b>Use Case:</b><br>
        Use this when you need to update credentials without changing
        sync or filter settings. Useful for credential rotation.<br><br>
        <b>Prerequisites:</b><br>
        Connector must be disabled. This endpoint clears OAuth state,
        requiring re-authentication for OAuth connectors.
      operationId: updateConnectorAuthConfig
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectorAuthRequest'
      responses:
        '200':
          description: Auth configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  config:
                    $ref: '#/components/schemas/ConnectorConfig'
        '400':
          description: Connector must be disabled first
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  /connectors/{connectorId}/config/filters-sync:
    put:
      tags:
        - Connector Configuration
      summary: Update filters and sync configuration
      description: |
        Update filter selections and sync settings without touching auth.<br><br>
        <b>Use Case:</b><br>
        Use this to change what data is synced or adjust sync schedule
        without re-authenticating.
      operationId: updateConnectorFiltersSyncConfig
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectorFiltersSyncRequest'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  config:
                    $ref: '#/components/schemas/ConnectorConfig'
                  message:
                    type: string
                    description: Success message
                  syncFiltersChanged:
                    type: boolean
                    description: Indicates whether sync filters changed, requiring a full resync
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  # -------------------- Connector Control --------------------
  /connectors/{connectorId}/toggle:
    post:
      tags:
        - Connector Control
      summary: Toggle connector sync or agent
      description: |
        Enable or disable a connector for sync or agent functionality.<br><br>
        <b>Toggle Types:</b><br>
        <ul>
        <li><code>sync</code> - Enable/disable data synchronization</li>
        <li><code>agent</code> - Enable/disable AI agent integration</li>
        </ul>
        <b>Prerequisites for Enabling:</b><br>
        <ul>
        <li>Connector must be configured (<code>isConfigured: true</code>)</li>
        <li>For OAuth connectors: Must be authenticated (<code>isAuthenticated: true</code>)</li>
        <li>For agent: Connector must support agent (<code>supportsAgent: true</code>)</li>
        </ul>
        <b>Permissions:</b><br>
        <ul>
        <li>Team scope: Requires admin</li>
        <li>Personal scope: Only creator can toggle</li>
        </ul>
      operationId: toggleConnector
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectorToggleRequest'
      responses:
        '200':
          description: Connector toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Sync enabled successfully"
                  connector:
                    $ref: '#/components/schemas/ConnectorInstance'
        '400':
          description: |
            Cannot toggle. Possible reasons:<br>
            <ul>
            <li>Connector not configured</li>
            <li>OAuth not authenticated</li>
            <li>Agent not supported</li>
            </ul>
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '404':
          description: Connector not found

  # -------------------- Connector OAuth --------------------
  /connectors/{connectorId}/oauth/authorize:
    get:
      tags:
        - Connector OAuth
      summary: Get OAuth authorization URL
      description: |
        Generate an OAuth authorization URL to start the OAuth flow.<br><br>
        <b>Flow:</b><br>
        <ol>
        <li>Call this endpoint to get the authorization URL</li>
        <li>Redirect user's browser to the URL</li>
        <li>User authenticates with the provider</li>
        <li>Provider redirects to callback with authorization code</li>
        <li>Callback exchanges code for tokens automatically</li>
        </ol>
        <b>State Parameter:</b><br>
        The response includes a <code>state</code> value that encodes the
        connector ID. This is validated in the callback.
      operationId: getOAuthAuthorizationUrl
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
        - name: baseUrl
          in: query
          description: Base URL for self-hosted instances
          schema:
            type: string
      responses:
        '200':
          description: Authorization URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  authorizationUrl:
                    type: string
                    description: Redirect user to this URL
                  state:
                    type: string
                    description: State parameter for validation
        '400':
          description: Connector doesn't support OAuth
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  /connectors/oauth/callback:
    get:
      tags:
        - Connector OAuth
      summary: OAuth callback handler
      description: |
        Handle the OAuth callback from the identity provider.<br><br>
        <b>Note:</b><br>
        This endpoint is called by the OAuth provider after user authentication.
        The state parameter contains the encoded connector ID.<br><br>
        <b>Success:</b><br>
        On success, tokens are stored and the connector becomes authenticated.
        User is redirected to the frontend success page.<br><br>
        <b>Error:</b><br>
        If the provider returns an error (e.g., user denied access),
        user is redirected with error information.
      operationId: handleOAuthCallback
      security: []
      parameters:
        - name: code
          in: query
          description: Authorization code from provider
          schema:
            type: string
        - name: state
          in: query
          description: State parameter (contains connector ID)
          schema:
            type: string
        - name: error
          in: query
          description: Error code if authorization failed
          schema:
            type: string
        - name: baseUrl
          in: query
          description: Base URL for redirect
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend with result
          headers:
            Location:
              description: Frontend URL with success/error params
              schema:
                type: string
        '400':
          description: Invalid or missing state parameter

  # -------------------- Connector Filters --------------------
  /connectors/{connectorId}/filters:
    get:
      tags:
        - Connector Filters
      summary: Get filter options
      description: |
        Get available filter options for a connector.<br><br>
        <b>Overview:</b><br>
        Returns filter fields that can be used to limit what data is synced.
        For example, a Google Drive connector might offer filters for
        specific folders or file types.<br><br>
        <b>Dynamic Filters:</b><br>
        Some filter fields have <code>dynamic: true</code>, meaning their
        options are loaded separately via the filter options endpoint.
      operationId: getConnectorFilters
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Filter options retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  filterOptions:
                    $ref: '#/components/schemas/FilterOptions'
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

    post:
      tags:
        - Connector Filters
      summary: Save filter selections
      description: |
        Save the user's filter selections for a connector.<br><br>
        <b>Overview:</b><br>
        After viewing filter options, use this endpoint to save the
        selected values. These determine what data will be synced.
      operationId: saveConnectorFilters
      security:
        - bearerAuth: []
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveConnectorFiltersRequest'
      responses:
        '200':
          description: Filters saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: Connector not found

  /connectors/{connectorId}/filters/{filterKey}/options:
    get:
      tags:
        - Connector Filters
      summary: Get dynamic filter options
      description: |
        Get options for a dynamic filter field with pagination.<br><br>
        <b>Overview:</b><br>
        For filters with <code>dynamic: true</code>, options are loaded
        from the connected service. This supports pagination and search.<br><br>
        <b>Examples:</b><br>
        <ul>
        <li>Google Drive folders list</li>
        <li>Slack channels list</li>
        <li>Confluence spaces list</li>
        </ul>
      operationId: getFilterFieldOptions
      security:
        - bearerAuth: []
        - oauth2: [connector:read]
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
        - name: filterKey
          in: path
          required: true
          description: Filter field key
          schema:
            type: string
          example: "folders"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: Search term for filtering options
          schema:
            type: string
        - name: cursor
          in: query
          description: Cursor for cursor-based pagination
          schema:
            type: string
      responses:
        '200':
          description: Options retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  options:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        value:
                          type: string
                        label:
                          type: string
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      hasMore:
                        type: boolean
                      cursor:
                        type: string
        '401':
          description: Unauthorized
        '404':
          description: Connector or filter not found

  # -------------------- Legacy Token Exchange --------------------
  # TODO: to remove this from backend
  /connectors/getTokenFromCode:
    post:
      tags:
        - Connector OAuth
      summary: Exchange Google authorization code for tokens
      deprecated: true
      description: |
        <b>⚠️ Deprecated:</b> Legacy Google Workspace token exchange endpoint. Use the generic
        OAuth flow via <code>/connectors/{connectorId}/oauth/authorize</code> instead.<br><br>
        <b>Overview:</b><br>
        Exchanges a Google OAuth authorization code for access and refresh tokens,
        stores the credentials, and enables the Google Workspace connector.<br><br>
        <b>What Happens:</b><br>
        <ol>
        <li>Retrieves Google Workspace OAuth config (client ID/secret)</li>
        <li>Exchanges the authorization code for tokens via Google's token endpoint</li>
        <li>Verifies the ID token</li>
        <li>Stores access and refresh tokens in configuration manager</li>
        <li>Creates or enables the Google Workspace connector</li>
        <li>Publishes an AppEnabledEvent for the sync service</li>
        </ol>
        <b>Admin Only:</b><br>
        Requires organization admin privileges.
      operationId: getTokenFromCode
      security:
        - bearerAuth: []
        - oauth2: [connector:write]
      requestBody:
        required: true
        description: Google OAuth authorization code received from the consent flow.
        content:
          application/json:
            schema:
              type: object
              required:
                - tempCode
              properties:
                tempCode:
                  type: string
                  description: Google OAuth authorization code received from the consent flow
      responses:
        '200':
          description: Existing connector enabled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Connector is now enabled
                  connector:
                    type: object
                    properties:
                      _id:
                        type: string
                      orgId:
                        type: string
                      name:
                        type: string
                      isEnabled:
                        type: boolean
                      lastUpdatedBy:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
        '201':
          description: New connector created and enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Connector google_workspace created and enabled
                  connector:
                    type: object
                    properties:
                      _id:
                        type: string
                      orgId:
                        type: string
                      name:
                        type: string
                      isEnabled:
                        type: boolean
                      lastUpdatedBy:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
        '400':
          description: Error exchanging authorization code
        '401':
          description: Unauthorized
        '404':
          description: Google Workspace configuration missing (client ID or secret)
        '500':
          description: Internal server error

