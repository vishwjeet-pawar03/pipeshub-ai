    get:
      tags:
        - Agents
      summary: Get web search provider usage
      description: |
        Retrieve usage statistics for a specific web search provider used by agents.<br><br>
        <b>Overview:</b><br>
        Returns information about how a particular web search provider is being used
        across agents in the organization.
      operationId: getWebSearchProviderUsage
      security:
        - bearerAuth: []
        - oauth2: [agent:read]
