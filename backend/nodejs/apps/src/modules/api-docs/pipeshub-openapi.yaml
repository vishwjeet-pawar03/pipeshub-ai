            Only applies to OAuth tokens. The token did not carry the `kb:read`
            scope required by this endpoint. Regular (non-OAuth) JWT bearer
            tokens are not subject to scope enforcement and will not receive
            this error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_FORBIDDEN]
                        example: HTTP_FORBIDDEN
                      message:
                        type: string
                        example: "Insufficient scope. Required: kb:read"
              example:
                error:
                  code: HTTP_FORBIDDEN
                  message: "Insufficient scope. Required: kb:read"
        '404':
          description: |
            Parent node not found.

            The `parentId` does not correspond to an existing node of the
            specified `parentType`, or the node has been deleted.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_NOT_FOUND]
                        example: HTTP_NOT_FOUND
                      message:
                        type: string
                        example: "Parent node not found"
              example:
                error:
                  code: HTTP_NOT_FOUND
                  message: "Parent node not found"
        '500':
          description: An unexpected error occurred on the server.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum: [HTTP_INTERNAL_SERVER_ERROR]
                        example: HTTP_INTERNAL_SERVER_ERROR
                      message:
                        type: string
                        example: "An unexpected error occurred"
              example:
                error:
                  code: HTTP_INTERNAL_SERVER_ERROR
                  message: "An unexpected error occurred"

  # ==================== ENTERPRISE SEARCH ENDPOINTS ====================

  # -------------------- Conversations --------------------
  /conversations/stream:
    post:
      tags:
        - Conversations
      summary: Create conversation with streaming response
      description: |
        Start a new conversation and stream the AI response over Server-Sent
        Events (SSE). Behaves like `POST /conversations` but emits tokens,
        tool activity, and status updates incrementally instead of returning
        a single JSON response at the end.

        **Lifecycle**

        1. The server validates `query`, persists an in-progress
           conversation, then opens the SSE stream with HTTP `200`.
        2. A `connected` event is emitted immediately with the new
           `conversationId` so the client can link the stream (sidebar,
           parallel tabs, deep links) without an extra request.
        3. AI-backend events stream through (token chunks, tool calls,
           status, etc.).
        4. On success a single `complete` event is emitted carrying the
           full persisted conversation.
        5. On failure an `error` event is emitted and the conversation is
           marked FAILED before the stream closes.

        **Event vocabulary**

        Three events have stable, server-defined `data` shapes:

        - `connected` — `{ "message": string, "conversationId": string,
          "title": string }`
        - `complete` — `{ "conversation": Conversation,
          "meta": { "requestId": string, "timestamp": string,
          "duration": number } }`
        - `error` — `{ "error": string, "details"?: string }`

        The forwarded events are `status`, `answer_chunk`, `tool_calls`,
        `restreaming`, `metadata`, and `tool_execution_complete`. Their
        payloads come from the Python query service and may evolve. Note
        that raw `tool_call` / `tool_success` / `tool_error` / `tool_result`
        events emitted by the LLM tool runtime are rewrapped as `status` by
        the upstream wrapper before they reach this route, so clients on
        `/conversations/stream` never see those names directly. Clients
        should ignore unknown event names rather than treating them as
        errors.

        **Agent mode**

        When `chatMode` selects an agent mode (for example `agent:auto`),
        the optional `tools` list restricts which tools the agent may
        invoke for this turn. Outside agent modes the `tools` field is
        ignored.
      operationId: streamChat
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [conversation:chat]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: |
            SSE stream established. The body is a sequence of
            `text/event-stream` frames using the event vocabulary described
            above.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AssistantStreamSSEEvent'
        '400':
          description: |
            Invalid request — `query` is missing, empty, or exceeds the
            100000-character limit, or another field fails validation
            (for example a malformed `recordIds` or `currentTime`).
        '401':
          description: Unauthorized — valid bearer token required.
        '403':
          description: |
            Forbidden — the caller's token does not include the
            `conversation:chat` OAuth scope.
        '500':
          description: |
            Internal error before the SSE stream is established (for
            example, the initial conversation row could not be persisted).
            Once the stream is open, terminal failures are surfaced as an
            `error` SSE event instead of an HTTP status change.

  /conversations/attachments/upload:
    post:
      tags:
        - Conversations
      summary: Upload chat attachments (assistant)
      description: |
        Multipart upload of **PDF**, **JPEG**, or **PNG** files for the assistant chat UI.
        The gateway validates MIME types (only those three), then forwards a JSON payload to the
        query service at `POST /api/v1/chat/attachments/upload`. **Multer** enforces at most **10**
        files and **5 MiB** per file (oversized requests fail before the handler runs).

        Form fields: required file part(s) named **`files`**; optional text field **`conversationId`**
        (existing thread id, or omit / leave empty for uploads not yet tied to a conversation).
      operationId: uploadConversationChatAttachments
      security:
        - bearerAuth: []
        - oauth2: [conversation:chat]
      requestBody:
        required: true
        description: |
          `multipart/form-data` with part name `files` (one or more files) and optional
          `conversationId` text field.
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                conversationId:
                  type: string
                  pattern: '^$|^[0-9a-fA-F]{24}$'
                  description: >
                    Optional existing conversation id. Empty string is treated as unset; any
                    non-empty value must be a 24-character ObjectId.
                files:
                  type: array
                  minItems: 1
                  maxItems: 10
                  description: >
                    One or more files; part name must be `files`. Accepted MIME types:
                    `application/pdf`, `image/jpeg`, `image/jpg`, `image/png`. Max 5 MiB each.
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: >
            Success. The gateway proxies the AI-backend JSON envelope after transforming the
            multipart upload into the backend attachment payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatAttachmentUploadResponse'
        '400':
          description: >
            Invalid `conversationId`, no files, unsupported MIME type (not PDF/JPEG/PNG), or
            Multer rejection (e.g. file too large).
        '401':
          description: Unauthorized
        '403':
          description: Missing `conversation:chat` scope
        '500':
          description: >
            Gateway fallback when the upstream call does not return a status (implementation default).

  /conversations/attachments/{recordId}:
    delete:
      tags:
        - Conversations
      summary: Delete a chat attachment (assistant)
      description: |
        Deletes a previously uploaded attachment by proxying `DELETE` to the query service
        (`/api/v1/chat/attachments/{recordId}`). The Node handler always ends the response **without
        a JSON body** on success (empty body); the **status code** is the upstream status, or **204**
        if none is returned.

        On validation failure in the gateway (missing/blank `recordId`), the response is **400**
        with a small JSON error object.
      operationId: deleteConversationChatAttachment
      security:
        - bearerAuth: []
        - oauth2: [conversation:chat]
      parameters:
        - name: recordId
          in: path
          required: true
          description: Attachment record id (from the upload response). Must be non-blank after trim.
          schema:
            type: string
      responses:
        '204':
          description: Success with no content (typical when upstream returns 204).
        '400':
          description: Missing or blank `recordId` after trim (gateway validation).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: recordId is required
        '401':
          description: Unauthorized
        '403':
          description: Missing `conversation:chat` scope
        default:
          description: >
            Other status codes are forwarded from the query service (e.g. 404) with an **empty**
            response body from this route.

  /conversations:
    get:
      tags:
        - Conversations
      summary: List all conversations
      description: |
        Retrieve paginated conversations for the authenticated user.

        **Overview:**

        Use the optional `source` query parameter to choose which list to return:
        `owned` — only conversations you own (`userId` matches the current user).
        `shared` — conversations where you have recipient access
        (`isShared` and your user appears in `sharedWith`), without the owner-only branch.
        Defaults to `owned` when omitted. Each call returns one list; call twice if you need both.

        **Filtering:**

        - Only non-archived conversations are returned by default
        - Use `/conversations/show/archives` for archived conversations

        **Sorting:**

        Conversations are sorted by last activity timestamp (most recent first) by default.
      operationId: getAllConversations
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [conversation:read]
      parameters:
        - name: source
          in: query
          required: false
          description: |
            `owned` — owner list (`userId` filter only).
            `shared` — explicit share grant list (`isShared` + `sharedWith`).
            Defaults to `owned` when omitted.
          schema:
            type: string
            enum:
              - owned
              - shared
            default: owned
        - name: page
          in: query
          required: false
          description: Page number (1-based). Defaults to 1.
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          required: false
          description: Page size. Defaults to 20; capped by the server (max 100).
          schema:
            type: integer
            minimum: 1
        - name: sortBy
          in: query
          required: false
          description: Sort field. Invalid values fall back to `lastActivityAt`.
          schema:
            type: string
            enum:
              - createdAt
              - lastActivityAt
              - title
        - name: sortOrder
          in: query
          required: false
          description: Sort direction. Defaults to `desc` unless set to `asc`.
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: conversationId
          in: query
          required: false
          description: When set, restricts results to that conversation ID (if visible under the chosen `source`).
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: Case-insensitive match on title and message content (max 1000 characters).
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          description: Filter by `createdAt` ≥ this ISO date.
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          required: false
          description: Filter by `createdAt` ≤ this ISO date.
          schema:
            type: string
            format: date-time
        - name: shared
          in: query
          required: false
          description: |
            When set, filters by `isShared`. Accepts case-insensitive
            `true`/`false`, or `1`/`0`.
          schema:
            type: string
      responses:
        '200':
          description: List of conversations for the requested source
          content:
            application/json:
              schema:
                type: object
                required:
                  - conversations
                  - source
                  - pagination
                  - filters
                  - meta
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConversationListItem'
                  source:
                    type: string
                    enum:
                      - owned
                      - shared
                    description: Echoes the requested `source` query value.
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
                      hasNextPage:
                        type: boolean
                      hasPrevPage:
                        type: boolean
                  filters:
                    type: object
                    additionalProperties: false
                    description: |
                      Filter introspection block. `applied` summarises the
                      filters active on this request; `available` catalogues
                      every supported filter with its current value and whether
                      it is applied.
                    required:
                      - applied
                      - available
                    properties:
                      applied:
                        type: object
                        additionalProperties: false
                        required:
                          - filters
                          - values
                        properties:
                          filters:
                            type: array
                            description: Names of filters currently applied.
                            items:
                              type: string
                          values:
                            type: object
                            additionalProperties: false
                            description: |
                              Current value for each applied filter. Only keys
                              present in `filters` are populated; others are
                              omitted.
                            properties:
                              search:
                                type: string
                              shared:
                                type: string
                              tags:
                                type: string
                              minMessages:
                                type: string
                              sortBy:
                                type: string
                              sortOrder:
                                type: string
                              startDate:
                                type: string
                              endDate:
                                type: string
                              messageType:
                                type: string
                              page:
                                type: integer
                              limit:
                                type: integer
                              dateRange:
                                type: object
                                additionalProperties: false
                                properties:
                                  start:
                                    type: string
                                    nullable: true
                                  end:
                                    type: string
                                    nullable: true
                      available:
                        type: object
                        additionalProperties: false
                        required:
                          - shared
                          - tags
                          - minMessages
                          - search
                          - pagination
                          - sorting
                          - dateFilters
                          - messageFilters
                          - sortingMessages
                        properties:
                          shared:
                            type: object
                            additionalProperties: false
                            properties:
                              values:
                                type: array
                                items:
                                  type: string
                                description: Accepted values for the `shared` query param.
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          tags:
                            type: object
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          minMessages:
                            type: object
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: number
                                nullable: true
                              applied:
                                type: boolean
                          search:
                            type: object
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          pagination:
                            type: object
                            additionalProperties: false
                            properties:
                              page:
                                type: object
                                additionalProperties: false
                                properties:
                                  type:
                                    type: string
                                  current:
                                    type: integer
                                  min:
                                    type: integer
                                  max:
                                    type: integer
                                  default:
                                    type: integer
                                  description:
                                    type: string
                                  applied:
                                    type: boolean
                              limit:
                                type: object
                                additionalProperties: false
                                properties:
                                  type:
                                    type: string
                                  current:
                                    type: integer
                                  min:
                                    type: integer
                                  max:
                                    type: integer
                                  default:
                                    type: integer
                                  description:
                                    type: string
                                  applied:
                                    type: boolean
                          sorting:
                            type: object
                            additionalProperties: false
                            properties:
                              sortBy:
                                type: object
                                additionalProperties: false
                                properties:
                                  values:
                                    type: array
                                    items:
                                      type: string
                                  default:
                                    type: string
                                  description:
                                    type: string
                                  current:
                                    type: string
                                  applied:
                                    type: boolean
                              sortOrder:
                                type: object
                                additionalProperties: false
                                properties:
                                  values:
                                    type: array
                                    items:
                                      type: string
                                  default:
                                    type: string
                                  description:
                                    type: string
                                  current:
                                    type: string
                                  applied:
                                    type: boolean
                          dateFilters:
                            type: object
                            additionalProperties: false
                            properties:
                              dateRange:
                                type: object
                                additionalProperties: false
                                properties:
                                  type:
                                    type: string
                                  description:
                                    type: string
                                  format:
                                    type: string
                                  current:
                                    type: object
                                    additionalProperties: false
                                    properties:
                                      start:
                                        type: string
                                        nullable: true
                                      end:
                                        type: string
                                        nullable: true
                                  applied:
                                    type: boolean
                          messageFilters:
                            type: object
                            additionalProperties: false
                            properties:
                              messageType:
                                type: object
                                additionalProperties: false
                                properties:
                                  values:
                                    type: array
                                    items:
                                      type: string
                                  description:
                                    type: string
                                  current:
                                    type: string
                                    nullable: true
                                  applied:
                                    type: boolean
                          sortingMessages:
                            type: object
                            additionalProperties: false
                            properties:
                              sortBy:
                                type: object
                                additionalProperties: false
                                properties:
                                  values:
                                    type: array
                                    items:
                                      type: string
                                  default:
                                    type: string
                                  description:
                                    type: string
                                  current:
                                    type: string
                              sortOrder:
                                type: object
                                additionalProperties: false
                                properties:
                                  values:
                                    type: array
                                    items:
                                      type: string
                                  default:
                                    type: string
                                  description:
                                    type: string
                                  current:
                                    type: string
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
        '400':
          description: |
            Bad request — for example, missing or invalid `source` (must be `owned` or `shared`),
            invalid date query params, invalid `search` shape, or search text over the length limit.
        '401':
          description: Unauthorized - Valid bearer token required

  /conversations/show/archives:
    get:
      tags:
        - Conversations
      summary: List archived conversations
      description: |
        Retrieve all archived conversations for the authenticated user.

        **Overview:**

        Archived conversations are hidden from the main list but preserved for reference.
        This endpoint returns only conversations where `isArchived: true` and `archivedBy`
        is set. Results include conversations the caller owns and those shared with them.

        **Filtering and sorting:**

        Results can be narrowed using `search`, `shared`, `startDate`, `endDate`, and
        `conversationId`. Sorting is controlled by `sortBy` and `sortOrder`. Pagination
        is controlled by `page` and `limit`.

        **Unarchiving:**

        Use `PATCH /conversations/{conversationId}/unarchive` to restore a conversation
        to the active list.
      operationId: getArchivedConversations
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [conversation:read]
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-indexed)
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 1
        - name: limit
          in: query
          required: false
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          required: false
          description: Field to sort by
          schema:
            type: string
            enum: [createdAt, lastActivityAt, title]
            default: lastActivityAt
        - name: sortOrder
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: search
          in: query
          required: false
          description: Case-insensitive substring match against title and message content (max 1000 chars)
          schema:
            type: string
            maxLength: 1000
        - name: shared
          in: query
          required: false
          description: Filter by shared status
          schema:
            type: boolean
        - name: startDate
          in: query
          required: false
          description: Include conversations created on or after this timestamp
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          required: false
          description: Include conversations created on or before this timestamp
          schema:
            type: string
            format: date-time
        - name: conversationId
          in: query
          required: false
          description: Restrict results to a single conversation by identifier
          schema:
            type: string
            format: objectId
      responses:
        '200':
          description: List of archived conversations
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  conversations:
                    type: array
                    description: Archived conversations matching the filter
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Conversation'
                        - type: object
                          properties:
                            archivedAt:
                              type: string
                              format: date-time
                              description: Timestamp when the conversation was archived
                  pagination:
                    type: object
                    additionalProperties: false
                    properties:
                      page:
                        type: integer
                        description: Current page number
                      limit:
                        type: integer
                        description: Items per page
                      totalCount:
                        type: integer
                        description: Total archived conversations matching the filter
                      totalPages:
                        type: integer
                        description: Total pages at the current limit
                      hasNextPage:
                        type: boolean
                        description: Whether a next page exists
                      hasPrevPage:
                        type: boolean
                        description: Whether a previous page exists
                  filters:
                    type: object
                    additionalProperties: false
                    description: Filters applied to this request and filters available for clients to use
                    properties:
                      applied:
                        type: object
                        additionalProperties: false
                        properties:
                          filters:
                            type: array
                            description: Names of filters that were applied
                            items:
                              type: string
                          values:
                            type: object
                            additionalProperties: true
                            description: Map of applied filter name to its current value
                      available:
                        type: object
                        additionalProperties: false
                        description: Describes filters supported by this endpoint and their current values
                        properties:
                          shared:
                            type: object
                            additionalProperties: false
                            properties:
                              values:
                                type: array
                                items:
                                  type: string
                                description: Allowed values for the `shared` filter
                              description:
