  /knowledgeBase/{kbId}/children:
    get:
      tags:
        - Records
      summary: Get KB children (alias for records)
      description: |
        Retrieve a paginated list of children (folders and records) within a specific knowledge base.<br><br>
        <b>Overview:</b><br>
        This is an alias endpoint for <code>/knowledgeBase/{kbId}/records</code>. It returns all direct children of the KB root, including both folders and records.<br><br>
        <b>Filtering:</b><br>
        <ul>
        <li><b>search:</b> Search by record name (partial match, max 1000 chars)</li>
        <li><b>recordTypes:</b> FILE, WEBPAGE, COMMENT, MESSAGE, EMAIL, TICKET</li>
        <li><b>origins:</b> UPLOAD (manual uploads) or CONNECTOR (synced)</li>
        <li><b>indexingStatus:</b> Filter by processing state</li>
        <li><b>dateFrom/dateTo:</b> Creation date range (Unix timestamps)</li>
        </ul>
        <b>Sorting:</b><br>
        Default sorts by <code>createdAtTimestamp</code> descending (newest first).
      operationId: getKBChildren
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: kbId
          in: path
          required: true
          description: Knowledge base ID
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: Search query for record names
          schema:
            type: string
            maxLength: 1000
        - name: recordTypes
          in: query
          description: Filter by record types (comma-separated)
          schema:
            type: string
        - name: origins
          in: query
          description: Filter by origin
          schema:
            type: string
        - name: indexingStatus
          in: query
          description: Filter by indexing status
          schema:
            type: string
        - name: dateFrom
          in: query
          description: Start date filter (Unix timestamp)
          schema:
            type: integer
            format: int64
        - name: dateTo
          in: query
          description: End date filter (Unix timestamp)
          schema:
            type: integer
            format: int64
        - name: sortBy
          in: query
          schema:
            type: string
            default: createdAtTimestamp
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  container:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      path:
                        type: string
                      type:
                        type: string
                      webUrl:
                        type: string
                      recordGroupId:
                        type: string
                  folders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Folder'
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/Record'
                  level:
                    type: integer
                  totalCount:
                    type: integer
                  counts:
                    type: object
                    properties:
                      folders:
                        type: integer
                      records:
                        type: integer
                      totalItems:
                        type: integer
                      totalFolders:
                        type: integer
                      totalRecords:
                        type: integer
                  availableFilters:
                    type: object
                  paginationMode:
                    type: string
                  userPermission:
                    type: object
                    properties:
                      role:
                        type: string
                      canUpload:
                        type: boolean
                      canCreateFolders:
                        type: boolean
                      canEdit:
                        type: boolean
                      canDelete:
                        type: boolean
                      canManagePermissions:
                        type: boolean
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalItems:
                        type: integer
                      totalPages:
                        type: integer
                      hasNext:
                        type: boolean
                      hasPrev:
                        type: boolean
                  filters:
                    type: object
                    description: Applied and available filters
        '401':
          description: Unauthorized
        '403':
          description: No access to this knowledge base
        '404':
          description: Knowledge base not found

  /knowledgeBase/record/{recordId}:
    get:
      tags:
        - Records
      summary: Get record by ID
      description: |
        Retrieve detailed information about a specific record.<br><br>
        <b>Overview:</b><br>
        Returns complete record metadata including name, type, indexing status, storage information, and version history.<br><br>
        <b>File Conversion:</b><br>
        Use the optional <code>convertTo</code> parameter to request file format conversion (e.g., PDF to text).
      operationId: getRecordById
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: recordId
          in: path
          required: true
          description: Record ID
          schema:
            type: string
        - name: convertTo
          in: query
          description: Optional format to convert the file to
          schema:
            type: string
            example: "txt"
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    $ref: '#/components/schemas/Record'
                  knowledgeBase:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      orgId:
                        type: string
                  folder:
                    type: object
                    nullable: true
                  metadata:
                    type: object
                    properties:
                      departments:
                        type: array
                        items:
                          type: object
                      categories:
                        type: array
                        items:
                          type: object
                      topics:
                        type: array
                        items:
                          type: object
                      languages:
                        type: array
                        items:
                          type: object
                  permissions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        type:
                          type: string
                        relationship:
                          type: string
                        accessType:
                          type: string
        '401':
          description: Unauthorized
        '404':
          description: Record not found

    put:
      tags:
        - Records
      summary: Update record
      description: |
        Update a record's name and/or file content.<br><br>
        <b>Overview:</b><br>
        Allows updating the display name and optionally replacing the file content. Triggers re-indexing when content changes.<br><br>
        <b>Required Permission:</b> WRITER or higher<br><br>
        <b>Updating File Content:</b><br>
        Include a new file in the request to replace the existing content. The file extension must match the original.<br><br>
        <b>Side Effects:</b><br>
        <ul>
        <li>Updates <code>updatedAtTimestamp</code></li>
        <li>Increments version if file content changed</li>
        <li>Triggers re-indexing for content changes</li>
        </ul>
      operationId: updateRecord
      security:
        - bearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          description: Record ID
          schema:
            type: string
      requestBody:
        description: "Request payload"
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                recordName:
                  type: string
                  description: New name for the record
                  maxLength: 255
                file:
                  type: string
                  format: binary
                  description: Replacement file content
      responses:
        '200':
          description: Record updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                      message:
                        type: string
                      record:
                        $ref: '#/components/schemas/Record'
                  - $ref: '#/components/schemas/UpdateRecordEnrichment'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Record not found

    delete:
      tags:
        - Records
      summary: Delete record
      description: |
        Permanently delete a record from the knowledge base.<br><br>
        <b>Required Permission:</b> WRITER or higher<br><br>
        <b>What Gets Deleted:</b><br>
        <ul>
        <li>Record metadata</li>
        <li>Associated storage file</li>
        <li>Indexed content and embeddings</li>
        </ul>
        <b>Warning:</b> This action is irreversible.
      operationId: deleteRecord
      security:
        - bearerAuth: []
        - oauth2: [kb:delete]
      parameters:
        - name: recordId
          in: path
          required: true
          description: Record ID
          schema:
            type: string
      responses:
        '200':
          description: Record deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Record not found

  /knowledgeBase/stream/record/{recordId}:
    get:
      tags:
        - Records
      summary: Stream record content
      description: |
        Stream the binary content of a record's file.<br><br>
        <b>Overview:</b><br>
        Returns the raw file content with appropriate Content-Type and Content-Disposition headers for download or inline viewing.<br><br>
        <b>Use Cases:</b><br>
        <ul>
        <li>File downloads</li>
        <li>Inline document preview</li>
        <li>Content extraction pipelines</li>
        </ul>
        <b>Format Conversion:</b><br>
        Use <code>convertTo</code> parameter to convert between formats (e.g., DOCX to PDF).
      operationId: streamRecordBuffer
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: recordId
          in: path
          required: true
          description: Record ID
          schema:
            type: string
        - name: convertTo
          in: query
          description: Target format for conversion
          schema:
            type: string
      responses:
        '200':
          description: File content stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
        '404':
          description: Record not found
        '409':
          description: |
            Conflict — the connector instance for this record is disabled. Enable it from Connector Settings and try again.
            Response body is JSON with a `detail` string (FastAPI error shape), not a binary stream.

  # -------------------- Folder Endpoints --------------------
  /knowledgeBase/{kbId}/folder:
    post:
      tags:
        - Folders
      summary: Create root folder
      description: |
        Create a new folder at the root level of a knowledge base.<br><br>
        <b>Required Permission:</b> FILEORGANIZER or higher<br><br>
        <b>Folder Features:</b><br>
        <ul>
        <li>Organize records hierarchically</li>
        <li>Support nested subfolders</li>
        <li>Inherit parent KB permissions</li>
        </ul>
        <b>Naming Rules:</b><br>
        <ul>
        <li>1-255 characters</li>
        <li>XSS protection applied</li>
        <li>Can contain spaces and special characters</li>
        </ul>
      operationId: createRootFolder
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: kbId
          in: path
          required: true
          description: Knowledge base ID
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                folderName:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Name of the folder
                  example: "Project Documents"
              required:
                - folderName
      responses:
        '200':
          description: Folder created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Folder'
        '400':
          description: Invalid folder name
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Knowledge base not found

  /knowledgeBase/{kbId}/folder/{folderId}:
    get:
      tags:
        - Folders
      summary: Get folder contents
      description: |
        Retrieve the contents of a folder including subfolders and records.<br><br>
        <b>Overview:</b><br>
        Returns paginated list of records within the folder, with same filtering options as KB-level record listing.<br><br>
        <b>Navigation:</b><br>
        Use this endpoint to browse folder hierarchies. Response includes folder metadata and child items.
      operationId: getFolderContents
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: kbId
          in: path
          required: true
          description: Knowledge base ID
          schema:
            type: string
        - name: folderId
          in: path
          required: true
          description: Folder ID
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            default: createdAtTimestamp
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Folder contents retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordsResponse'
        '401':
          description: Unauthorized
        '404':
          description: Folder or knowledge base not found

    put:
      tags:
        - Folders
      summary: Update folder
      description: |
        Rename a folder.<br><br>
        <b>Required Permission:</b> FILEORGANIZER or higher
      operationId: updateFolder
      security:
        - bearerAuth: []
        - oauth2: [kb:write]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              properties:
                folderName:
                  type: string
                  minLength: 1
                  maxLength: 255
              required:
                - folderName
      responses:
        '200':
          description: Folder updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Folder'
        '400':
          description: Invalid folder name
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Folder not found

    delete:
      tags:
        - Folders
      summary: Delete folder
      description: |
        Delete a folder and all its contents.<br><br>
        <b>Required Permission:</b> FILEORGANIZER or higher<br><br>
        <b>Cascade Delete:</b><br>
        All subfolders and records within will be permanently deleted.<br><br>
        <b>Warning:</b> This action is irreversible.
      operationId: deleteFolder
      security:
        - bearerAuth: []
        - oauth2: [kb:delete]
      parameters:
        - name: kbId
          in: path
          required: true
          schema:
            type: string
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Folder deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Folder not found

  /knowledgeBase/{kbId}/folder/{folderId}/children:
    get:
      tags:
