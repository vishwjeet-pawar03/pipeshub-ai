          description: Public URL
          example: "https://app.example.com"

    # Web Search Schemas
    WebSearchProviderType:
      type: string
      enum: [duckduckgo, serper, tavily, exa]
      description: Supported web search provider

    WebSearchSettingsUpdate:
      type: object
      description: Web search global settings
      required:
        - includeImages
      properties:
        includeImages:
          type: boolean
          description: Whether to include images in search results
        maxImages:
          type: integer
          minimum: 1
          maximum: 500
          description: Maximum number of images to return (required when includeImages is true)

    AddWebSearchProviderRequest:
      type: object
      description: Request to add a new web search provider
      required:
        - provider
        - configuration
      properties:
        provider:
          $ref: '#/components/schemas/WebSearchProviderType'
        configuration:
          type: object
          description: Provider-specific configuration (e.g. apiKey, cx, endpoint, engine)
          additionalProperties: true
        isDefault:
          type: boolean
          default: false
          description: Whether this provider should be the default

    UpdateWebSearchProviderRequest:
      type: object
      description: Request to update an existing web search provider
      required:
        - provider
        - configuration
      properties:
        provider:
          $ref: '#/components/schemas/WebSearchProviderType'
        configuration:
          type: object
          description: Provider-specific configuration
          additionalProperties: true
        isDefault:
          type: boolean
          default: false
          description: Whether this provider should be the default

    WebSearchProviderItem:
      type: object
      additionalProperties: false
      description: Web search provider configuration item returned by getWebSearchProviders
      required:
        - provider
        - providerKey
        - configuration
        - isDefault
      properties:
        provider:
          $ref: '#/components/schemas/WebSearchProviderType'
        providerKey:
          type: string
          description: Unique key for the provider configuration
        configuration:
          type: object
          description: |
            Provider-specific configuration as stored and returned by the gateway (open record).
            Serper, Tavily, and Exa typically include `apiKey`; additional keys may be present.
          additionalProperties: true
        isDefault:
          type: boolean

    WebSearchSettings:
      type: object
      additionalProperties: false
      description: Normalized web search global settings returned by getWebSearchProviders
      required:
        - includeImages
      properties:
        includeImages:
          type: boolean
          description: Whether to include images in search results
        maxImages:
          type: integer
          minimum: 1
          maximum: 500
          description: Maximum number of images to return when includeImages is true

    WebSearchProvidersResponse:
      type: object
      additionalProperties: false
      description: Response for getWebSearchProviders
      required:
        - status
        - providers
