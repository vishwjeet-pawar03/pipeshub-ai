  # ==================== USER GROUPS ENDPOINTS ====================
  /userGroups:
    post:
      tags:
        - User Groups
      summary: Create user group
      description: |
        Create a new user group within the organization.

        **Allowed Types:**

        - `standard` - Regular user group
        - `everyone` - Automatically includes all organization users
        - `custom` - Custom group with manual membership management

        **Note:** Groups of type `admin` cannot be created — it is a system group.

        **Validation:**

        - Both `name` and `type` are required
        - `name` must be unique across non-deleted groups in the organization
      operationId: createUserGroup
      security:
        - bearerAuth: []
        - oauth2: [usergroup:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                  description: Display name for the group
                  example: "Engineering Team"
                type:
                  type: string
                  enum: [standard, everyone, custom]
                  description: Group type
                  example: "custom"
              required:
                - name
                - type
      responses:
        '201':
          description: User group created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroup'
        '400':
          description: |
            Invalid request. Possible reasons:

            - Missing or empty `name` or `type`
            - `type` is not one of: standard, everyone, custom
            - Group name or type `admin` is not allowed
            - A group with the same name already exists
            - Requester does not have admin privileges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requester account not found (missing userId or orgId in token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database save failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - User Groups
      summary: Get all user groups
      description: |
        Retrieve all user groups in the organization.

        Returns paginated groups with their member counts (not member details).
        Soft-deleted groups are excluded. Supports filtering by name and date range.

        **Query Parameters:**

        - `page` / `limit` — pagination (defaults: 1 / 25, max limit: 100)
        - `search` — case-insensitive substring match on group name
        - `createdAfter` / `createdBefore` — filter by creation date (ISO 8601)
      operationId: getAllUserGroups
      security:
        - bearerAuth: []
        - oauth2: [usergroup:read]
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Number of groups per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: search
          in: query
          required: false
          description: Search groups by name (case-insensitive)
          schema:
            type: string
        - name: createdAfter
          in: query
          required: false
          description: Filter groups created on or after this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: createdBefore
          in: query
          required: false
          description: Filter groups created on or before this date (ISO 8601)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated list of user groups with user counts
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  groups:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        _id:
                          type: string
                          format: ObjectId
                        name:
                          type: string
                        type:
                          type: string
                          enum: [admin, standard, everyone, custom]
                        orgId:
                          type: string
                        userCount:
                          type: integer
                          description: Number of users in this group
                        slug:
                          type: string
                        isDeleted:
                          type: boolean
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
                  pagination:
                    type: object
                    additionalProperties: false
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
                      hasNextPage:
                        type: boolean
                      hasPrevPage:
                        type: boolean
        '400':
          description: Requester does not have admin privileges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requester account not found (missing userId or orgId in token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database query failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userGroups/{groupId}:
    get:
      tags:
        - User Groups
      summary: Get user group by ID
      description: |
        Retrieve a specific user group by its ID. Accessible by any authenticated user.
      operationId: getUserGroupById
      security:
        - bearerAuth: []
        - oauth2: [usergroup:read]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Unique identifier of the user group
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
            example: "507f1f77bcf86cd799439011"
      responses:
        '200':
          description: User group details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroup'
        '400':
          description: Invalid `groupId` format (must be a 24-character hex ObjectId)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database query failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - User Groups
      summary: Update user group
      description: |
        Rename an existing user group.

        Only the `name` field can be updated. Groups of type `admin` or `everyone`
        cannot be renamed.
      operationId: updateUserGroup
      security:
        - bearerAuth: []
        - oauth2: [usergroup:write]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Unique identifier of the user group to update
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                  description: New display name for the group
                  example: "Engineering Team - Updated"
              required:
                - name
      responses:
        '200':
          description: User group updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroup'
        '400':
          description: |
            Invalid request. Possible reasons:

            - Missing or empty `name`
            - Invalid `groupId` format (must be a 24-character hex ObjectId)
            - Requester does not have admin privileges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Groups of type `admin` or `everyone` cannot be renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Resource not found. Possible reasons:

            - User group not found or deleted
            - Requester account not found (missing userId or orgId in token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database save failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - User Groups
      summary: Delete user group
      description: |
        Soft-delete a user group by setting `isDeleted: true`.

        **Restriction:** Only groups of type `custom` can be deleted. Attempting to
        delete a group of any other type (`admin`, `everyone`, `standard`) returns 403.
      operationId: deleteUserGroup
      security:
        - bearerAuth: []
        - oauth2: [usergroup:write]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Unique identifier of the user group to delete
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
            example: "507f1f77bcf86cd799439011"
      responses:
        '200':
          description: User group soft-deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroup'
        '400':
          description: |
            Invalid request. Possible reasons:

            - Invalid `groupId` format (must be a 24-character hex ObjectId)
            - Requester does not have admin privileges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Only custom groups can be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Resource not found. Possible reasons:

            - User group not found or already deleted
            - Requester account not found (missing userId or orgId in token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database save failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userGroups/add-users:
    post:
      tags:
        - User Groups
      summary: Add users to group
      description: |
        Add one or more users to one or more groups.

        **Request validation** (Zod at route layer): `userIds` and `groupIds` are required
        non-empty arrays; each entry must be a 24-character hex MongoDB ObjectId.

        Uses `$addToSet` — users already in a group are silently skipped.
        If none of the provided `groupIds` match active groups in the organization,
        a 400 is returned.
      operationId: addUsersToGroup
      security:
        - bearerAuth: []
        - oauth2: [usergroup:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                groupIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    pattern: '^[a-fA-F0-9]{24}$'
                  description: IDs of groups to add users to
                userIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    pattern: '^[a-fA-F0-9]{24}$'
                  description: User IDs to add
              required:
                - groupIds
                - userIds
      responses:
        '200':
          description: Users added to groups successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - message
                properties:
                  message:
                    type: string
                    example: "Users added to groups successfully"
        '400':
          description: |
            Invalid request. Possible reasons:

            - Invalid request body (Zod validation — missing/empty `userIds` or `groupIds`, malformed ObjectIds)
            - No matching groups found or updated
            - Requester does not have admin privileges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requester account not found (missing userId or orgId in token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database update failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userGroups/remove-users:
    post:
      tags:
        - User Groups
      summary: Remove users from group
      description: |
        Remove one or more users from one or more groups.

        **Request validation** (Zod at route layer): same as `POST /userGroups/add-users` —
        `userIds` and `groupIds` required non-empty arrays of 24-character hex ObjectIds.

        Uses `$pullAll` — users not in a group are silently skipped.
        If none of the provided `groupIds` match active groups in the organization,
        a 400 is returned.
      operationId: removeUsersFromGroup
      security:
        - bearerAuth: []
        - oauth2: [usergroup:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                groupIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    pattern: '^[a-fA-F0-9]{24}$'
                userIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    pattern: '^[a-fA-F0-9]{24}$'
              required:
                - groupIds
                - userIds
      responses:
        '200':
          description: Users removed from groups successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - message
                properties:
                  message:
                    type: string
                    example: "Users removed from groups successfully"
        '400':
          description: |
            Invalid request. Possible reasons:

            - Invalid request body (Zod validation — missing/empty `userIds` or `groupIds`, malformed ObjectIds)
            - No matching groups found or updated
            - Requester does not have admin privileges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requester account not found (missing userId or orgId in token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database update failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userGroups/users/{userId}:
    get:
      tags:
        - User Groups
      summary: Get groups for a user
      description: |
        Retrieve all groups that a specific user belongs to. Returns an array of
        group objects with `name` and `type` fields. Returns an empty array if the
        user is not in any groups — no 404 is raised.

        **Path validation:** `userId` must be a 24-character hex MongoDB ObjectId (Zod at route layer).

        Accessible by any authenticated user (no admin check).
      operationId: getGroupsForUser
      security:
        - bearerAuth: []
        - oauth2: [usergroup:read]
      parameters:
        - name: userId
          in: path
          required: true
          description: Unique identifier of the user
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
            example: "507f1f77bcf86cd799439012"
      responses:
        '200':
          description: User's groups retrieved successfully (empty array if none)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - _id
                    - name
                    - type
                  properties:
                    _id:
                      type: string
                      format: ObjectId
                    name:
                      type: string
                    type:
                      type: string
                      enum:
                        - admin
                        - standard
                        - everyone
                        - custom
        '400':
          description: Invalid `userId` path parameter (Zod validation)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database query failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userGroups/{groupId}/users:
    get:
      tags:
        - User Groups
      summary: Get users in group
      description: |
        Retrieve paginated users that belong to a specific user group, with profile pictures.

        Returns user details (`fullName`, `email`) with profile picture data URIs.
        Supports pagination and search by name or email. Accessible by any authenticated user.
      operationId: getUsersInGroup
      security:
        - bearerAuth: []
        - oauth2: [usergroup:read]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Unique identifier of the user group
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: search
          in: query
          required: false
          description: Search users by name or email
          schema:
            type: string
      responses:
        '200':
          description: Paginated users in group with profile pictures
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        _id:
                          type: string
                          format: ObjectId
                        fullName:
                          type: string
                          nullable: true
                        email:
                          type: string
                          nullable: true
                        profilePicture:
                          type: string
                          nullable: true
                          description: Base64 data URI or null
                  pagination:
                    type: object
                    additionalProperties: false
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
                      hasNextPage:
                        type: boolean
                      hasPrevPage:
                        type: boolean
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid `groupId` format (must be a 24-character hex ObjectId)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User group not found or already deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database query failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userGroups/stats/list:
    get:
      tags:
        - User Groups
      summary: Get group statistics
      description: |
        Retrieve aggregated statistics for all non-deleted user groups in the
        organization. Groups by group name and returns the group count, total user
        count, and average users per group. Accessible by any authenticated user.
      operationId: getGroupStatistics
      security:
        - bearerAuth: []
        - oauth2: [usergroup:read]
      responses:
        '200':
          description: Group statistics retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - _id
                    - count
                    - totalUsers
                    - avgUsers
                  properties:
                    _id:
                      type: string
                      description: Group name (aggregation key)
                    count:
                      type: integer
                    totalUsers:
                      type: integer
                    avgUsers:
                      type: number
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database aggregation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userGroups/health:
    get:
      tags:
        - User Groups
      summary: User groups module health check
      description: Returns the health status of the user groups module. No authentication required.
      operationId: getUserGroupsHealth
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - status
                  - timestamp
                properties:
                  status:
                    type: string
                    enum:
                      - healthy
                  timestamp:
                    type: string
                    format: date-time

  /document/{documentId}/download:
    get:
      tags:
        - Document Management
      summary: Download document
      description: |
        Get a time-limited signed URL to download the document, or receive the file directly for local storage.<br><br>
        <b>Overview:</b><br>
        This endpoint generates secure download access to documents. For cloud storage (S3/Azure), it returns a presigned URL. For local storage, it streams the file directly.<br><br>
        <b>Download Behavior by Storage:</b><br>
        <ul>
        <li><b>S3/Azure:</b> Returns presigned URL valid for specified duration</li>
        <li><b>Local:</b> Streams file directly with appropriate headers</li>
        </ul>
        <b>Version Download:</b><br>
        Specify the <code>version</code> parameter to download a specific historical version. Only available for versioned documents.<br><br>
        <b>URL Expiration:</b><br>
        <ul>
        <li>Default: 3600 seconds (1 hour)</li>
        <li>Configurable via <code>expirationTimeInSeconds</code></li>
        <li>Maximum depends on storage provider limits</li>
        </ul>
        <b>Security:</b><br>
        Signed URLs are single-use and time-limited. They can be safely shared for temporary access.
      operationId: downloadDocument
      security:
        - bearerAuth: []
        - oauth2: [kb:read]
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID (24-character MongoDB ObjectId)
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
            example: "507f1f77bcf86cd799439011"
        - name: version
          in: query
          required: false
          description: Version number to download (0-indexed). Must be less than total versions.
          schema:
            type: integer
            minimum: 0
            example: 2
        - name: expirationTimeInSeconds
          in: query
          required: false
          description: Signed URL validity duration in seconds
          schema:
            type: integer
            minimum: 1
            maximum: 86400
            default: 3600
            example: 7200
      responses:
        '200':
          description: Download URL generated or file stream
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  signedUrl:
                    type: string
                    format: uri
                    description: Presigned URL for download (S3/Azure only)
                    example: "https://bucket.s3.amazonaws.com/docs/file.pdf?X-Amz-Signature=..."
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: Direct file stream (local storage only)
        '400':
          description: |
            Invalid request. Possible reasons:<br>
            <ul>
            <li>Invalid version number</li>
            <li>Version requested for non-versioned document</li>
            <li>Version exceeds available versions</li>
            </ul>
        '401':
          description: Unauthorized - Valid bearer token required
        '404':
          description: Document not found
