                  type: array
                  items:
                    type: string
                    pattern: '^[a-fA-F0-9]{24}$'
                  minItems: 1
                  description: Array of MongoDB ObjectId strings
                  example: ["507f1f77bcf86cd799439011", "507f1f77bcf86cd799439012"]
      responses:
