    # ==================== CRAWLING MANAGER SCHEMAS ====================
    CrawlingScheduleType:
      type: string
      enum: [hourly, daily, weekly, monthly, custom, once, interval]
      description: |
        Type of crawling schedule that determines how often the connector data is synced.<br>
        <ul>
        <li><b>hourly</b>: Run at specified minute every X hours</li>
        <li><b>daily</b>: Run once per day at specified hour and minute</li>
        <li><b>weekly</b>: Run on specified days of the week at specified time</li>
        <li><b>monthly</b>: Run on specified day of month at specified time</li>
        <li><b>custom</b>: Use cron expression for complex schedules</li>
        <li><b>once</b>: Run once at a specific future datetime</li>
        <li><b>interval</b>: Repeat every N minutes regardless of clock time (BullMQ <code>every</code>-based)</li>
        </ul>


    # Base schedule configuration (common fields)
    BaseScheduleConfig:
      type: object
      description: Base configuration fields common to all schedule types
      properties:
        scheduleType:
          $ref: '#/components/schemas/CrawlingScheduleType'
        isEnabled:
          type: boolean
          default: true
          description: Whether the schedule is active. Disabled schedules won't create new jobs.
        timezone:
          type: string
          default: "UTC"
          description: IANA timezone identifier (e.g., "America/New_York", "Europe/London", "Asia/Tokyo")
          example: "UTC"
      required:
        - scheduleType

    # Hourly schedule configuration
    HourlyScheduleConfig:
      allOf:
        - $ref: '#/components/schemas/BaseScheduleConfig'
        - type: object
          description: Run crawling job every X hours at a specified minute
          properties:
            scheduleType:
              type: string
              enum: [hourly]
            minute:
              type: integer
              minimum: 0
              maximum: 59
              description: Minute of the hour to run (0-59)
              example: 30
            interval:
              type: integer
              minimum: 1
              maximum: 24
              default: 1
              description: Run every X hours (1 = every hour, 2 = every 2 hours, etc.)
              example: 1
          required:
            - minute

    # Daily schedule configuration
    DailyScheduleConfig:
      allOf:
        - $ref: '#/components/schemas/BaseScheduleConfig'
        - type: object
          description: Run crawling job once per day at a specified time
          properties:
            scheduleType:
              type: string
              enum: [daily]
            hour:
              type: integer
              minimum: 0
              maximum: 23
              description: Hour of the day to run (0-23, 24-hour format)
              example: 2
            minute:
              type: integer
              minimum: 0
              maximum: 59
              description: Minute of the hour to run (0-59)
              example: 0
          required:
            - hour
            - minute

    # Weekly schedule configuration
    WeeklyScheduleConfig:
      allOf:
        - $ref: '#/components/schemas/BaseScheduleConfig'
        - type: object
          description: Run crawling job on specified days of the week
          properties:
            scheduleType:
              type: string
              enum: [weekly]
            daysOfWeek:
              type: array
              items:
                type: integer
                minimum: 0
                maximum: 6
              minItems: 1
              description: |
                Days of the week to run (0=Sunday, 1=Monday, ..., 6=Saturday).<br>
                Example: [1, 3, 5] runs on Monday, Wednesday, Friday
              example: [1, 3, 5]
            hour:
              type: integer
              minimum: 0
              maximum: 23
              description: Hour of the day to run (0-23)
              example: 3
            minute:
              type: integer
              minimum: 0
              maximum: 59
              description: Minute of the hour to run (0-59)
              example: 0
          required:
            - daysOfWeek
            - hour
            - minute

    # Monthly schedule configuration
    MonthlyScheduleConfig:
      allOf:
        - $ref: '#/components/schemas/BaseScheduleConfig'
        - type: object
          description: Run crawling job on a specified day of each month
          properties:
            scheduleType:
              type: string
              enum: [monthly]
            dayOfMonth:
              type: integer
              minimum: 1
              maximum: 31
              description: Day of the month to run (1-31). If day doesn't exist in month, job runs on last day.
              example: 1
            hour:
              type: integer
              minimum: 0
              maximum: 23
              description: Hour of the day to run (0-23)
              example: 4
            minute:
              type: integer
              minimum: 0
              maximum: 59
              description: Minute of the hour to run (0-59)
              example: 0
          required:
            - dayOfMonth
            - hour
            - minute

    # Custom (cron) schedule configuration
    CustomScheduleConfig:
      allOf:
        - $ref: '#/components/schemas/BaseScheduleConfig'
        - type: object
          description: Run crawling job using a custom cron expression for complex schedules
          properties:
            scheduleType:
              type: string
              enum: [custom]
            cronExpression:
              type: string
              pattern: "^(\\S+\\s+){4}\\S+$"
              description: |
                Standard 5-field cron expression: minute hour day-of-month month day-of-week.<br>
                Examples:<br>
                <ul>
                <li><code>0 2 * * *</code> - Every day at 2:00 AM</li>
                <li><code>30 */4 * * *</code> - Every 4 hours at minute 30</li>
                <li><code>0 9 * * 1-5</code> - Weekdays at 9:00 AM</li>
                <li><code>0 0 1,15 * *</code> - 1st and 15th of each month at midnight</li>
                </ul>
              example: "0 2 * * *"
            description:
              type: string
              description: Human-readable description of the cron schedule
              example: "Run daily at 2:00 AM"
          required:
            - cronExpression

    # One-time schedule configuration
    OnceScheduleConfig:
      allOf:
        - $ref: '#/components/schemas/BaseScheduleConfig'
        - type: object
          description: Run crawling job once at a specific future datetime
          properties:
            scheduleType:
              type: string
              enum: [once]
            scheduledTime:
              type: string
              format: date-time
              description: ISO 8601 datetime when the job should run. Must be in the future.
              example: "2024-12-25T10:00:00Z"
          required:
            - scheduledTime

    # Interval schedule configuration
    IntervalScheduleConfig:
      allOf:
        - $ref: '#/components/schemas/BaseScheduleConfig'
        - type: object
          description: |
            Repeat every N minutes using BullMQ's millisecond-based <code>every</code> repeat option.
            Unlike cron-based schedules this fires relative to the previous run, not at a fixed
            wall-clock time. Used by the connector sync scheduler when
            <code>selectedStrategy = SCHEDULED</code> with an <code>intervalMinutes</code> config.
          properties:
            scheduleType:
              type: string
              enum: [interval]
            intervalMinutes:
              type: integer
              minimum: 1
              maximum: 525600
              description: |
                How often to repeat, in minutes. Maximum is 525 600 (one year).
                BullMQ stores this as <code>every: intervalMinutes * 60 * 1000</code> ms;
                the <code>pattern</code> field will be <code>null</code> on repeatable-job
                listings for this schedule type.
              example: 5
          required:
            - intervalMinutes

    # Unified ScheduleConfig using oneOf for discriminated union
    ScheduleConfig:
      description: |
        Schedule configuration for crawling jobs. The structure varies based on <code>scheduleType</code>.<br><br>
        <b>Schedule Type Configurations:</b><br>
        <ul>
        <li><b>hourly:</b> <code>minute</code>, <code>interval</code> (optional)</li>
        <li><b>daily:</b> <code>hour</code>, <code>minute</code></li>
        <li><b>weekly:</b> <code>daysOfWeek</code>, <code>hour</code>, <code>minute</code></li>
        <li><b>monthly:</b> <code>dayOfMonth</code>, <code>hour</code>, <code>minute</code></li>
        <li><b>custom:</b> <code>cronExpression</code>, <code>description</code> (optional)</li>
        <li><b>once:</b> <code>scheduledTime</code></li>
        <li><b>interval:</b> <code>intervalMinutes</code> — repeats every N minutes (BullMQ <code>every</code>-based)</li>
        </ul>
      oneOf:
        - $ref: '#/components/schemas/HourlyScheduleConfig'
        - $ref: '#/components/schemas/DailyScheduleConfig'
        - $ref: '#/components/schemas/WeeklyScheduleConfig'
        - $ref: '#/components/schemas/MonthlyScheduleConfig'
        - $ref: '#/components/schemas/CustomScheduleConfig'
        - $ref: '#/components/schemas/OnceScheduleConfig'
        - $ref: '#/components/schemas/IntervalScheduleConfig'
      discriminator:
        propertyName: scheduleType
        mapping:
          hourly: '#/components/schemas/HourlyScheduleConfig'
          daily: '#/components/schemas/DailyScheduleConfig'
          weekly: '#/components/schemas/WeeklyScheduleConfig'
          monthly: '#/components/schemas/MonthlyScheduleConfig'
          custom: '#/components/schemas/CustomScheduleConfig'
          once: '#/components/schemas/OnceScheduleConfig'
          interval: '#/components/schemas/IntervalScheduleConfig'

    # Crawling Job Data (stored with each job)
    CrawlingJobData:
      type: object
      description: Data payload stored with each crawling job in the queue
      properties:
        connector:
          type: string
          description: Connector type identifier (e.g., "drive", "onedrive", "slack")
          example: "drive"
        connectorId:
          type: string
          description: Unique identifier of the connector instance
          example: "507f1f77bcf86cd799439011"
        scheduleConfig:
          $ref: '#/components/schemas/ScheduleConfig'
        orgId:
          type: string
          description: Organization ID that owns this crawling job
          example: "507f1f77bcf86cd799439012"
        userId:
          type: string
          description: User ID who created/scheduled this job
          example: "507f1f77bcf86cd799439013"
        timestamp:
          type: string
          format: date-time
          description: When the job was created/scheduled
        metadata:
          type: object
          additionalProperties: true
          description: Optional additional metadata for the job
      required:
        - connector
        - connectorId
        - scheduleConfig
        - orgId
        - userId
        - timestamp

    # Job Status (returned by status endpoints)
    JobStatus:
      type: object
      description: Complete status information for a crawling job
      properties:
        id:
          type: string
          nullable: true
          description: Unique job ID assigned by BullMQ
          example: "crawl-drive-507f1f77bcf86cd799439011-507f1f77bcf86cd799439012"
        name:
          type: string
          description: Job name (format crawl-{connector}-{connectorId})
          example: "crawl-drive-507f1f77bcf86cd799439011"
        data:
          $ref: '#/components/schemas/CrawlingJobData'
        progress:
          description: Job progress information (can be number 0-100 or object with percentage/current/total)
          oneOf:
            - type: number
              minimum: 0
              maximum: 100
              description: Progress percentage (0-100)
            - type: object
              description: Detailed progress object
              properties:
                percentage:
                  type: number
                  minimum: 0
                  maximum: 100
                current:
                  type: integer
                  description: Current items processed
                total:
                  type: integer
                  description: Total items to process
        delay:
          type: integer
          nullable: true
          description: Delay in milliseconds before job starts (for delayed/scheduled jobs)
          example: 3600000
        timestamp:
          type: integer
          description: Unix timestamp when job was created (milliseconds)
          example: 1703520000000
        attemptsMade:
          type: integer
          description: Number of execution attempts made (increments on retry)
          example: 0
        finishedOn:
          type: integer
          nullable: true
          description: Unix timestamp when job completed (null if not finished)
        processedOn:
          type: integer
          nullable: true
          description: Unix timestamp when job started processing (null if not started)
        failedReason:
          type: string
          nullable: true
          description: Error message if job failed
          example: null
        state:
          type: string
          enum: [waiting, active, completed, failed, delayed, paused, stuck]
          description: |
            Current state of the job in the queue:<br>
            <ul>
            <li><b>waiting</b>: Queued and waiting to be processed</li>
            <li><b>active</b>: Currently being processed by a worker</li>
            <li><b>completed</b>: Successfully finished</li>
            <li><b>failed</b>: Failed after all retry attempts</li>
            <li><b>delayed</b>: Scheduled to run at a future time</li>
            <li><b>paused</b>: Manually paused by user</li>
            <li><b>stuck</b>: Job is stuck (worker crashed mid-processing)</li>
            </ul>
          example: "waiting"
      required:
        - name
        - data
        - timestamp
        - attemptsMade
        - state

    # Queue Statistics
    QueueStats:
      type: object
      description: Aggregate statistics for the crawling job queue
      properties:
        waiting:
          type: integer
          description: Number of jobs waiting to be processed
          example: 5
        active:
          type: integer
          description: Number of jobs currently being processed
          example: 2
        completed:
          type: integer
          description: Number of successfully completed jobs (limited to recent)
          example: 150
        failed:
          type: integer
          description: Number of failed jobs (limited to recent)
          example: 3
        delayed:
          type: integer
          description: Number of jobs scheduled for future execution
          example: 10
        paused:
          type: integer
          description: Number of manually paused jobs
          example: 1
        repeatable:
          type: integer
          description: Number of repeatable job configurations (recurring schedules)
          example: 8
        total:
          type: integer
          description: Total count of all jobs across all states
          example: 171
      required:
        - waiting
        - active
        - completed
        - failed
        - delayed
        - paused
        - repeatable
        - total

    # ==================== MAIL SERVICE SCHEMAS ====================
    MailBody:
      type: object
      description: |
        Request body for sending transactional emails via pre-defined templates.

        **Template-specific templateData requirements:**

        | Template | Required Fields | Description |
        |----------|----------------|-------------|
        | `loginWithOTP` | `name`, `otp` | User's name and 6-digit OTP code |
        | `resetPassword` | `name`, `link` | User's name and password reset URL |
        | `accountCreation` | `orgName`, `link` | Organization name and login URL |
        | `appuserInvite` | `invitee`, `orgName`, `link` | Inviter name, org name, and invitation URL |
        | `suspiciousLoginAttempt` | `link` | Support contact URL |

        **Note:** The actual "From" address is taken from the SMTP configuration, not from `fromEmailDomain`.
        The `fromEmailDomain` field is stored for audit purposes only.
      properties:
        productName:
          type: string
          description: Name of the product sending the email (used in templates for branding)
          example: "PipesHub"
        emailTemplateType:
          type: string
          enum: [loginWithOTP, resetPassword, accountCreation, appuserInvite, suspiciousLoginAttempt]
          description: |
            Type of email template to use. Each template has specific `templateData` requirements:
            - `loginWithOTP`: OTP authentication email
            - `resetPassword`: Password reset link email
            - `accountCreation`: Welcome email for new organizations
            - `appuserInvite`: Invitation email to join an organization
            - `suspiciousLoginAttempt`: Security alert for multiple failed OTP attempts
          example: "loginWithOTP"
        isAutoEmail:
          type: boolean
          description: Flag indicating if this is an automated system email (for tracking/filtering purposes)
          default: false
        fromEmailDomain:
          type: string
          format: email
          description: |
            Sender email address for audit logging. **Note:** The actual "From" address used
            in the email is taken from the SMTP server configuration (`smtpConfig.fromEmail`),
            not this field. This field is stored in the database for record-keeping.
          example: "noreply@company.com"
        sendEmailTo:
          type: array
          items:
            type: string
            format: email
          minItems: 1
          description: List of recipient email addresses (at least one required)
          example: ["user@example.com"]
        subject:
          type: string
          description: Email subject line
          example: "Your OTP Code for PipesHub"
        templateData:
          description: |
            Dynamic data to populate the email template. Required fields depend on <code>emailTemplateType</code>.<br><br>
            <b>Template Data Requirements:</b><br>
            <ul>
            <li><b>loginWithOTP:</b> See <code>LoginWithOTPTemplateData</code> - requires <code>name</code>, <code>otp</code></li>
            <li><b>resetPassword:</b> See <code>ResetPasswordTemplateData</code> - requires <code>name</code>, <code>link</code></li>
            <li><b>accountCreation:</b> See <code>AccountCreationTemplateData</code> - requires <code>orgName</code>, <code>link</code></li>
            <li><b>appuserInvite:</b> See <code>AppUserInviteTemplateData</code> - requires <code>invitee</code>, <code>orgName</code>, <code>link</code></li>
            <li><b>suspiciousLoginAttempt:</b> See <code>SuspiciousLoginTemplateData</code> - requires <code>link</code></li>
            </ul>
          oneOf:
            - $ref: '#/components/schemas/LoginWithOTPTemplateData'
            - $ref: '#/components/schemas/ResetPasswordTemplateData'
            - $ref: '#/components/schemas/AccountCreationTemplateData'
            - $ref: '#/components/schemas/AppUserInviteTemplateData'
            - $ref: '#/components/schemas/SuspiciousLoginTemplateData'
        sendCcTo:
          type: array
          items:
            type: string
            format: email
          description: Optional list of CC recipient email addresses
          example: ["manager@example.com"]
        attachments:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
                description: Name of the attachment file
                example: "report.pdf"
              content:
                type: string
                description: Base64-encoded file content or raw string content
              contentType:
                type: string
                description: MIME type of the attachment
                example: "application/pdf"
          description: Optional email attachments (uses nodemailer attachment format)
      required:
        - emailTemplateType
        - sendEmailTo

    # Template Data Schemas for each email template type
    LoginWithOTPTemplateData:
      type: object
      description: Template data for OTP login email
      additionalProperties: false
      properties:
        name:
          type: string
          description: User's display name shown in the email greeting
          example: "John Doe"
        otp:
          type: string
          description: 6-digit one-time password code
          pattern: "^[0-9]{6}$"
          example: "123456"
      required:
        - name
        - otp

    ResetPasswordTemplateData:
      type: object
      description: Template data for password reset email
      additionalProperties: false
      properties:
        name:
          type: string
          description: User's display name shown in the email greeting
          example: "John Doe"
        link:
          type: string
          format: uri
          description: Password reset URL with secure token
          example: "https://app.pipeshub.com/reset-password?token=abc123xyz"
      required:
        - name
        - link

    AccountCreationTemplateData:
      type: object
      description: Template data for organization account creation welcome email
      additionalProperties: false
      properties:
        orgName:
          type: string
          description: Name of the newly created organization
          example: "Acme Corporation"
        link:
          type: string
          format: uri
          description: Login URL for the platform
          example: "https://app.pipeshub.com/login"
      required:
        - orgName
        - link

    AppUserInviteTemplateData:
      type: object
      description: Template data for user invitation email
      additionalProperties: false
      properties:
        invitee:
          type: string
          description: Name of the person who sent the invitation
          example: "Admin User"
        orgName:
          type: string
          description: Name of the organization the user is being invited to
          example: "Acme Corporation"
        link:
          type: string
          format: uri
          description: Invitation acceptance URL with secure token
          example: "https://app.pipeshub.com/invite?token=invite123abc"
      required:
        - invitee
        - orgName
        - link

    SuspiciousLoginTemplateData:
      type: object
      description: Template data for suspicious login attempt security alert email
      additionalProperties: false
      properties:
        link:
          type: string
          format: uri
          description: Support contact URL for reporting unauthorized access
          example: "https://app.pipeshub.com/support"
      required:
        - link

    InAppNotification:
      type: object
      description: |
        A user notification record persisted by `NotificationConsumer` in MongoDB
        (`notification.schema.ts`). The document is scoped to a single user via
        `assignedTo` and expires automatically after 30 days (TTL index).
      required:
        - _id
        - orgId
        - type
        - status
        - assignedTo
        - isDeleted
        - createdAt
        - updatedAt
      properties:
        _id:
          type: string
          format: objectId
          description: MongoDB ObjectId of the notification document
          example: "507f1f77bcf86cd799439011"
        orgId:
          type: string
          format: objectId
          description: Organisation the notification belongs to
          example: "507f191e810c19729de860ea"
        type:
          type: string
          description: |
            Notification type discriminator. Connector-originated values include
            `CONNECTOR_AUTH_ERROR`, `CONNECTOR_SYNC_ERROR`, `CONNECTOR_WARNING`,
            `CONNECTOR_INFO`, `CONNECTOR_SUCCESS`, etc.
          example: "CONNECTOR_SYNC_ERROR"
        title:
          type: string
          description: Short human-readable heading
          example: "S3: Bucket access denied"
        message:
          type: string
          description: Full notification body text
          example: "The S3 connector could not access bucket 'my-bucket'. Check IAM permissions."
        severity:
          type: string
          enum: [info, warning, error, critical, success]
          description: Visual severity level
          example: "error"
        status:
          type: string
          enum: [read, unread, archived]
          default: unread
          description: Read/unread state of the notification for this user
          example: "unread"
        originService:
          type: string
          enum:
            - Connector Service
            - Indexing Service
            - AI Service
            - External Service
          description: Service that generated the notification
          example: "Connector Service"
        assignedTo:
          type: string
          format: objectId
          description: MongoDB ObjectId of the user this notification is assigned to
          example: "507f1f77bcf86cd799439011"
        redirectLink:
          type: string
          description: Optional deep-link URL the user should be sent to when clicking the notification
          example: "/connectors/workspace/?connectorType=Gmail"
        payload:
          type: object
          additionalProperties: true
          description: |
            Arbitrary structured data attached by the originating service.
            Connector notifications typically include `connectorId`, `connectorName`,
            and `errorCode` keys.
          example:
            connectorId: "conn-abc123"
            connectorName: "S3"
            errorCode: "FORBIDDEN"
        isDeleted:
          type: boolean
          default: false
          description: Soft-delete flag; deleted notifications are excluded from all list queries
        deletedBy:
          type: string
          format: objectId
          description: ObjectId of the user who dismissed the notification (set on soft-delete)
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp — documents are TTL-expired 30 days after this value
        updatedAt:
          type: string
          format: date-time

    # ==================== PAGINATION ====================
    PaginationInfo:
      type: object
      properties:
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Items per page
        totalCount:
          type: integer
          description: Total number of items
        totalPages:
          type: integer
          description: Total number of pages

security:
  - bearerAuth: []
  - oauth2: []

paths:
  # ==================== IN-APP NOTIFICATIONS ====================
  /notifications:
    get:
      tags:
        - Notifications
      summary: List in-app notifications for the current user
      description: |
        Returns a cursor-paginated list of notifications assigned to the authenticated user
        from the last 30 days. Default page size is 20 (max 50).
      operationId: listInAppNotifications
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: |
            Filter by notification status. When omitted (or any value other than
            `read`, `unread`, or `archived`), all non-deleted notifications are returned.
          schema:
            type: string
            enum: [read, unread, archived]
        - name: limit
          in: query
          required: false
          description: Page size (default 20, max 50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          in: query
          required: false
          description: Opaque base64url cursor from a previous response's `cursor` field
          schema:
            type: string
      responses:
        '200':
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - notifications
                  - hasMore
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/InAppNotification'
                  cursor:
                    type: string
                    nullable: true
                    description: Pass as cursor query param to fetch the next page
                  hasMore:
                    type: boolean
        '400':
          description: Invalid cursor
        '401':
          description: Unauthorized — missing or invalid access token
        '429':
          description: Rate limit exceeded — global per-user/IP limiter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitErrorResponse'
        '500':
          description: Internal server error (e.g. MongoDB unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/stats:
    get:
      tags:
        - Notifications
      summary: Get notification counts for the current user
      description: |
        Returns per-status notification counts for the authenticated user within the
        30-day retention window. Counts are always global — independent of the `status`
        filter used on the list endpoint.
      operationId: getNotificationStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Counts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - unreadCount
                  - readCount
                  - archivedCount
                properties:
                  unreadCount:
                    type: integer
                    description: Notifications with status `unread` within the retention window
                  readCount:
                    type: integer
                    description: Notifications with status `read` within the retention window
                  archivedCount:
                    type: integer
                    description: Notifications with status `archived` within the retention window
        '401':
          description: Unauthorized — missing or invalid access token
        '429':
          description: Rate limit exceeded — global per-user/IP limiter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitErrorResponse'
        '500':
          description: Internal server error (e.g. MongoDB unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/read-all:
    patch:
      tags:
        - Notifications
      summary: Mark all unread notifications as read
      description: |
        Marks every unread notification assigned to the authenticated user within the
        30-day retention window as read.
      operationId: markAllInAppNotificationsRead
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notifications updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - modifiedCount
                properties:
                  success:
                    type: boolean
                    example: true
                  modifiedCount:
                    type: integer
                    description: Number of notifications updated
        '401':
          description: Unauthorized — missing or invalid access token
        '429':
          description: Rate limit exceeded — global per-user/IP limiter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitErrorResponse'
        '500':
          description: Internal server error (e.g. MongoDB unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}/read:
    patch:
      tags:
        - Notifications
      summary: Mark a notification as read
      description: |
        Marks a single notification as read when it belongs to the authenticated user.
      operationId: markInAppNotificationRead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Notification document ID (MongoDB ObjectId)
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
      responses:
        '200':
          description: Notification updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - notification
                properties:
                  notification:
                    $ref: '#/components/schemas/InAppNotification'
        '400':
          description: Invalid user or notification id
        '401':
          description: Unauthorized — missing or invalid access token
        '404':
          description: Notification not found
        '429':
          description: Rate limit exceeded — global per-user/IP limiter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitErrorResponse'
        '500':
          description: Internal server error (e.g. MongoDB unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}/unread:
    patch:
      tags:
        - Notifications
      summary: Mark a notification as unread
      description: |
        Marks a single notification as unread when it belongs to the authenticated user.
      operationId: markInAppNotificationUnread
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Notification document ID (MongoDB ObjectId)
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
      responses:
        '200':
          description: Notification updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - notification
                properties:
                  notification:
                    $ref: '#/components/schemas/InAppNotification'
        '400':
          description: Invalid user or notification id
        '401':
          description: Unauthorized — missing or invalid access token
        '404':
          description: Notification not found
        '429':
          description: Rate limit exceeded — global per-user/IP limiter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitErrorResponse'
        '500':
          description: Internal server error (e.g. MongoDB unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}/archive:
    patch:
      tags:
        - Notifications
      summary: Archive a notification
      description: |
        Moves a single non-archived notification to `archived` status.
        Archived notifications are excluded from the default list query and counts but
        can be retrieved by passing `status=archived`.
      operationId: archiveInAppNotification
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Notification document ID (MongoDB ObjectId)
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
      responses:
        '200':
          description: Notification archived
          content:
            application/json:
              schema:
                type: object
                required:
                  - notification
                properties:
                  notification:
                    $ref: '#/components/schemas/InAppNotification'
        '400':
          description: Invalid user or notification id
        '401':
          description: Unauthorized — missing or invalid access token
        '404':
          description: Notification not found (or already archived)
        '429':
          description: Rate limit exceeded — global per-user/IP limiter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitErrorResponse'
        '500':
          description: Internal server error (e.g. MongoDB unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}/unarchive:
    patch:
      tags:
        - Notifications
      summary: Unarchive a notification
      description: |
        Restores an archived notification to `read` status.
        Because the original pre-archive status is not stored, unarchived notifications
        always land in `read` rather than `unread`.
      operationId: unarchiveInAppNotification
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Notification document ID (MongoDB ObjectId)
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
      responses:
        '200':
          description: Notification unarchived (status set to `read`)
          content:
            application/json:
              schema:
                type: object
                required:
                  - notification
                properties:
                  notification:
                    $ref: '#/components/schemas/InAppNotification'
        '400':
          description: Invalid user or notification id
        '401':
          description: Unauthorized — missing or invalid access token
        '404':
          description: Notification not found or not currently archived
        '429':
          description: Rate limit exceeded — global per-user/IP limiter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitErrorResponse'
        '500':
          description: Internal server error (e.g. MongoDB unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}:
    delete:
      tags:
        - Notifications
      summary: Dismiss (soft-delete) a notification
      description: Soft-deletes the notification for the current user.
      operationId: dismissInAppNotification
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Notification document ID (MongoDB ObjectId)
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
      responses:
        '200':
          description: Notification dismissed
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                properties:
                  success:
                    type: boolean
                    example: true
        '400':
          description: Invalid user or notification id
        '401':
          description: Unauthorized — missing or invalid access token
        '404':
          description: Notification not found
        '429':
          description: Rate limit exceeded — global per-user/IP limiter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitErrorResponse'
        '500':
          description: Internal server error (e.g. MongoDB unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== OAUTH PROVIDER ENDPOINTS ====================
  /oauth2/authorize:
    get:
      tags:
        - OAuth Provider
      summary: Initiate OAuth authorization flow
      description: |
        OAuth 2.0 Authorization Endpoint (RFC 6749 Section 4.1.1).

        Initiates the authorization code flow. Users are redirected here by OAuth clients
        to authorize access to their account.

        **Flow:**
        1. Client redirects user to this endpoint with required parameters
        2. If not logged in, user is redirected to PipesHub login
        3. User sees consent page with requested scopes
        4. User grants or denies consent
        5. User is redirected back to client with authorization code

        **PKCE Support (RFC 7636):**
        - Required for public clients (SPA, mobile apps)
        - Recommended for confidential clients
        - Use S256 method (SHA256 hash of code_verifier)

        **Security:**
        - Always use HTTPS in production
        - State parameter provides CSRF protection
        - Redirect URI must match registered URIs exactly
      operationId: oauthAuthorize
      security: []
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
          description: Must be "code" for authorization code grant
        - name: client_id
          in: query
          required: true
          schema:
            type: string
          description: OAuth app client ID
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
          description: Callback URI (must match registered URI)
        - name: scope
          in: query
          required: true
          schema:
            type: string
          description: Space-separated list of requested scopes
          example: "openid profile email read:records"
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: Random string for CSRF protection
        - name: code_challenge
          in: query
          required: false
          schema:
            type: string
          description: PKCE code challenge (base64url-encoded)
        - name: code_challenge_method
          in: query
          required: false
          schema:
            type: string
            enum: [S256, plain]
          description: PKCE method (S256 recommended)
        - name: nonce
          in: query
          required: false
          schema:
            type: string
          description: Nonce for ID token binding
      responses:
        '302':
          description: |
            Redirects to either:
            - Login page (if user not authenticated)
            - Consent page (if user authenticated)
            - Redirect URI with code (if consent already granted)
            - Redirect URI with error (if request invalid)
          headers:
            Location:
              schema:
                type: string
              description: Redirect URL
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - OAuth Provider
      summary: Submit authorization consent
      description: |
        Submit user's consent decision for OAuth authorization.

        Called after user reviews the consent page and makes a decision.
        This endpoint generates an authorization code if consent is granted.

        **Responses:**
        - Consent granted: Redirects to client with authorization code
        - Consent denied: Redirects to client with `access_denied` error
      operationId: oauthAuthorizeConsent
      security:
        - bearerAuth: []
      requestBody:
        description: "Request body for Submit authorization consent"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthConsentRequest'
        required: true
      responses:
        '200':
          description: Consent processed, returns redirect URL with authorization code
          content:
            application/json:
              schema:
                type: object
                properties:
                  redirect_uri:
                    type: string
                    format: uri
                    description: URL to redirect user (includes code and state)
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: User not authenticated
        '403':
          description: Client not authorized or invalid redirect URI

  /oauth2/token:
    post:
      tags:
        - OAuth Provider
      summary: Exchange authorization code for tokens
      description: |
        OAuth 2.0 Token Endpoint (RFC 6749 Section 4.1.3).

        Exchanges an authorization code, client credentials, or refresh token for access tokens.

        **Grant Types:**
        - `authorization_code`: Exchange auth code for tokens (user-based)
        - `client_credentials`: Get tokens for machine-to-machine auth
        - `refresh_token`: Get new access token using refresh token

        For **`client_credentials`**, access tokens represent the **OAuth app creator** (the user who registered the client). The JWT may encode **`userId === client_id`**; the **Node API gateway** resolves the creator (**`createdBy`** claim or OAuth app lookup) and must not trust client-supplied **`x-oauth-user-id`** (stripped on ingress). Downstream Python services accept **`x-oauth-user-id`** only when set by the gateway — see **OAuth Provider** tag.

        **Client Authentication:**
        Can be provided via:
        - HTTP Basic auth: `Authorization: Basic base64(client_id:client_secret)`
        - Request body: `client_id` and `client_secret` parameters

        **PKCE Verification:**
        If authorization used PKCE, the `code_verifier` must be provided and will be
        verified against the stored code challenge.
      operationId: oauthToken
      x-pipeshub-sdk: true
      security: []
      requestBody:
        description: "Request payload"
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
        required: true
      responses:
        '200':
          description: Tokens issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'
              example:
                access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                token_type: "Bearer"
                expires_in: 3600
                refresh_token: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
                scope: "openid profile email"
                id_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '400':
          description: Invalid request (missing parameters, invalid code, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Client authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

  /oauth2/revoke:
    post:
      tags:
        - OAuth Provider
      summary: Revoke an access or refresh token
      description: |
        OAuth 2.0 Token Revocation Endpoint (RFC 7009).

        Revokes an access token or refresh token, preventing further use.
        Revoking a refresh token also invalidates associated access tokens.

        **Use Cases:**
        - User logs out of third-party app
        - User revokes app access from account settings
        - Security incident response

        **Note:** Returns 200 OK even if token was already revoked or invalid
        (per RFC 7009, to prevent token enumeration).
      operationId: oauthRevoke
      x-pipeshub-sdk: true
      security: []
      requestBody:
        description: "Request payload"
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OAuthRevokeRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthRevokeRequest'
        required: true
      responses:
        '200':
          description: Token revoked (or was already invalid)
        '401':
          description: Client authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

  /oauth2/introspect:
    post:
      tags:
        - OAuth Provider
      summary: Introspect a token
      description: |
        OAuth 2.0 Token Introspection Endpoint (RFC 7662).

        Check if a token is active and retrieve its metadata.

        **Use Cases:**
        - Resource servers validating tokens
        - Debugging token issues
        - Checking token scopes before processing requests

        **Response:**
        - Active token: Returns `active: true` with token metadata
        - Invalid/expired/revoked token: Returns only `active: false`
      operationId: oauthIntrospect
      x-pipeshub-sdk: true
      security: []
      requestBody:
        description: "Request payload"
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OAuthIntrospectRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthIntrospectRequest'
        required: true
      responses:
        '200':
          description: Token introspection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthIntrospectResponse'
              examples:
                active:
                  summary: Active token
                  value:
                    active: true
                    scope: "openid profile email"
                    client_id: "abc123"
                    username: "user@example.com"
                    token_type: "Bearer"
                    exp: 1735686000
                    iat: 1735682400
                    user_id: "user-id-123"
                    iss: "https://api.pipeshub.com"
                inactive:
                  summary: Inactive/invalid token
                  value:
                    active: false
        '401':
          description: Client authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

  /oauth2/userinfo:
    get:
      tags:
        - OpenID Connect
      summary: Get authenticated user information
      description: |
        OpenID Connect UserInfo Endpoint.

        Returns claims about the authenticated user. Requires a valid access token
        with the `openid` scope.

        **Available Claims:**
        - `user_id` - User identifier
        - `name`, `given_name`, `family_name` - Name claims (with `profile` scope)
        - `email`, `email_verified` - Email claims (with `email` scope)

        **Authentication:**
        Pass the access token as a Bearer token: `Authorization: Bearer {access_token}`
      operationId: oauthUserInfo
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthUserInfoResponse'
              example:
                user_id: "user-id-123"
                name: "John Doe"
                given_name: "John"
                family_name: "Doe"
                email: "john.doe@example.com"
                email_verified: true
        '401':
          description: Invalid or missing access token
        '403':
          description: Token does not have openid scope

  # ==================== OPENID CONNECT DISCOVERY ENDPOINTS ====================
  /.well-known/openid-configuration:
    get:
      tags:
        - OpenID Connect
      summary: OpenID Connect Discovery
      description: |
        OpenID Connect Discovery Endpoint (RFC 8414).
        <br><br>
        Returns metadata about the OAuth/OIDC authorization server including
        endpoint URLs, supported features, and capabilities.
        <br><br>
        <b>Use Cases:</b><br>
        - Automatic client configuration<br>
        - Discovering supported features<br>
        - Getting endpoint URLs without hardcoding
        <br><br>
        <b>Note:</b> This endpoint does not require authentication.
      operationId: openidConfiguration
      security: []
      servers:
        - url: /
          description: Root URL (not /api/v1)
      responses:
        '200':
          description: Authorization server metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenIDConfiguration'
              example:
                issuer: "https://api.pipeshub.com"
                authorization_endpoint: "https://api.pipeshub.com/oauth2/authorize"
                token_endpoint: "https://api.pipeshub.com/oauth2/token"
                userinfo_endpoint: "https://api.pipeshub.com/oauth2/userinfo"
                revocation_endpoint: "https://api.pipeshub.com/oauth2/revoke"
                introspection_endpoint: "https://api.pipeshub.com/oauth2/introspect"
                jwks_uri: "https://api.pipeshub.com/.well-known/jwks.json"
                scopes_supported: ["openid", "profile", "email", "read:records", "write:records"]
                response_types_supported: ["code"]
                grant_types_supported: ["authorization_code", "client_credentials", "refresh_token"]
                token_endpoint_auth_methods_supported: ["client_secret_basic", "client_secret_post"]
                code_challenge_methods_supported: ["S256", "plain"]

  /.well-known/oauth-authorization-server:
    get:
      tags:
        - OpenID Connect
      summary: OAuth 2.0 Authorization Server Metadata
      description: |
        OAuth 2.0 Authorization Server Metadata Endpoint (RFC 8414).
        <br><br>
        Returns the same metadata as the OpenID Connect Discovery endpoint
        but at the RFC 8414 standard path. MCP clients like Claude Code use
        this endpoint for discovery instead of openid-configuration.
        <br><br>
        <b>Note:</b> This endpoint does not require authentication.
      operationId: oauthAuthorizationServerMetadata
      security: []
      servers:
        - url: /
          description: Root URL (not /api/v1)
      responses:
        '200':
          description: Authorization server metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenIDConfiguration'
              example:
                issuer: "https://api.pipeshub.com"
                authorization_endpoint: "https://api.pipeshub.com/oauth2/authorize"
                token_endpoint: "https://api.pipeshub.com/oauth2/token"
                userinfo_endpoint: "https://api.pipeshub.com/oauth2/userinfo"
                revocation_endpoint: "https://api.pipeshub.com/oauth2/revoke"
                introspection_endpoint: "https://api.pipeshub.com/oauth2/introspect"
                jwks_uri: "https://api.pipeshub.com/.well-known/jwks.json"
                scopes_supported: ["openid", "profile", "email", "read:records", "write:records"]
                response_types_supported: ["code"]
                grant_types_supported: ["authorization_code", "client_credentials", "refresh_token"]
                token_endpoint_auth_methods_supported: ["client_secret_basic", "client_secret_post"]
                code_challenge_methods_supported: ["S256", "plain"]

  /.well-known/jwks.json:
    get:
      tags:
        - OpenID Connect
      summary: JSON Web Key Set
      description: |
        JSON Web Key Set Endpoint (RFC 7517).
        <br><br>
        Returns the public keys used to verify JWT signatures for ID tokens
        and access tokens.
        <br><br>
        <b>Use Cases:</b><br>
        - Verifying ID token signatures<br>
        - Verifying access token signatures (if JWT-based)
        <br><br>
        <b>Note:</b><br>
        - For HS256 (symmetric) signing, this returns empty keys<br>
        - For RS256 (asymmetric) signing, returns public RSA keys<br>
        - Keys should be cached with appropriate TTL
      operationId: jwks
      security: []
      servers:
        - url: /
          description: Root URL (not /api/v1)
      responses:
        '200':
          description: JSON Web Key Set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKS'
              example:
                keys:
                  - kty: "RSA"
                    use: "sig"
                    alg: "RS256"
                    kid: "key-1"
                    n: "0vx7agoebG..."
                    e: "AQAB"

  /.well-known/oauth-protected-resource/mcp:
    get:
      tags:
        - OpenID Connect
      summary: OAuth Protected Resource Metadata
      description: |
        OAuth Protected Resource Metadata Endpoint (RFC 9728).
        <br><br>
        Returns metadata about the protected resource including the resource
        identifier, authorization servers, supported scopes, and bearer token methods.
        <br><br>
        <b>Use Cases:</b><br>
        - Discovering which authorization server to use for this resource<br>
        - Determining supported scopes and bearer token methods<br>
        - MCP client auto-configuration
        <br><br>
        <b>Note:</b> This endpoint does not require authentication.
      operationId: oauthProtectedResource
      security: []
      servers:
        - url: /
          description: Root URL (not /api/v1)
      responses:
        '200':
          description: Protected resource metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthProtectedResourceMetadata'
              example:
                resource: "https://api.pipeshub.com/mcp"
                authorization_servers: ["https://api.pipeshub.com"]
                scopes_supported: ["read:records", "write:records", "admin:connectors"]
                bearer_methods_supported: ["header"]
                resource_documentation: "https://api.pipeshub.com/api/v1/docs"

  # ==================== OAUTH APP MANAGEMENT ENDPOINTS ====================
  /oauth-clients:
    get:
      tags:
        - OAuth Apps
      summary: List OAuth apps
      description: |
        Returns a paginated list of OAuth apps registered by the signed-in user. Access is creator-scoped — even org admins only see apps they created themselves, so this endpoint is safe to use for per-user developer dashboards without leaking org-wide app metadata.

        Each entry carries the full app configuration except the client secret, which is only ever returned at creation time and immediately after a regeneration.

        Use the `status` query parameter to filter by lifecycle state (`active`, `suspended`, `revoked`) and `search` for a case-insensitive substring match against `name` or `description`.
      operationId: listOAuthApps
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: |
            Page number (matches `listAppsQuerySchema`: defaults to `1` when omitted or empty).
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: |
            Items per page (defaults to `20` when omitted or empty; max 100).
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, revoked]
          description: Filter by status
        - name: search
          in: query
          schema:
            type: string
          description: Search by app name or description (case-insensitive)
      responses:
        '200':
          description: List of OAuth apps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthAppListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '403':
          description: Forbidden — insufficient workspace permission to list OAuth apps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

    post:
      tags:
        - OAuth Apps
      summary: Create OAuth app
      description: |
        Register a new OAuth app for the organization. Any authenticated org member may create apps; the creator is recorded as the app's owner and is the only user who can subsequently read, update, suspend, activate, regenerate the secret of, or delete it.

        The `clientSecret` is returned in this response **only** — it is stored hashed server-side and cannot be retrieved later. Persist it before exiting the create flow; if it is ever lost, rotate via `POST /oauth-clients/{appId}/regenerate-secret`.

        `allowedScopes` is validated against the caller's role-aware scope set (see `GET /oauth-clients/scopes`). Org admins may include admin-only scopes; non-admins requesting a restricted scope receive `400`.

        All `/oauth-clients/*` routes share a per-user rate limiter (default 1000 req/min, configurable via the `MAX_OAUTH_CLIENT_REQUESTS_PER_MINUTE` env var).
      operationId: createOAuthApp
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      requestBody:
        description: "Request body for Create OAuth app"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOAuthAppRequest'
        required: true
      responses:
        '201':
          description: OAuth app created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOAuthAppResponse'
        '400':
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '403':
          description: Forbidden — insufficient workspace permission to create OAuth apps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

  /oauth-clients/scopes:
    get:
      tags:
        - OAuth Apps
      summary: List available scopes
      description: |
        Returns the OAuth scopes the signed-in user is permitted to register on new or updated apps, grouped by category. Use this to populate scope-picker UIs and to validate `allowedScopes` client-side before submitting to `createOAuthApp` / `updateOAuthApp`.

        The result is role-aware. Org admins (members of an admin user group) receive every registered scope; everyone else is filtered to exclude admin-only scopes: `org:write`, `org:admin`, `user:invite`, `user:delete`, `usergroup:write`, `team:write`, `config:write`, `crawl:write`, `crawl:delete`.

        Each key in the `scopes` map matches the `category` field on the `OAuthScopeInfo` entries it contains. A category may appear with an empty array when every scope it contains is restricted for the caller — treat empty buckets as "no permitted scopes in this group", not as a missing category.

        Shares the per-user rate limiter applied to every `/oauth-clients/*` route (default 1000 req/min, `MAX_OAUTH_CLIENT_REQUESTS_PER_MINUTE`).
      operationId: listOAuthScopes
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of available scopes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthScopesGroupedResponse'
              example:
                scopes:
                  Identity:
                    - name: openid
                      description: OpenID Connect authentication
                      category: Identity
                      requiresUserConsent: false
                    - name: profile
                      description: User profile information (name, picture)
                      category: Identity
                      requiresUserConsent: true
                  Knowledge Base:
                    - name: kb:read
                      description: Read knowledge bases and records
                      category: Knowledge Base
                      requiresUserConsent: true
        '401':
          description: Unauthorized — missing/invalid token, or session invalidated (e.g. password change after token issuance)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '429':
          description: Rate limit exceeded for OAuth client management routes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'
              example:
                error:
                  code: TOO_MANY_REQUESTS
                  message: Too many OAuth client requests. Please try again later.
                  retryAfter: 45

  /oauth-clients/{appId}:
    get:
      tags:
        - OAuth Apps
      summary: Get OAuth app details
      description: |
        Returns the full configuration of an OAuth app you registered. The `clientSecret` is never echoed back here; if you need a new one, call `POST /oauth-clients/{appId}/regenerate-secret`.

        Access is creator-scoped: even org admins receive `404` for apps owned by other users. This avoids leaking app metadata across org members and keeps the read surface symmetric with `listOAuthApps`.
      operationId: getOAuthApp
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          description: OAuth app ID (MongoDB ObjectId)
      responses:
        '200':
          description: OAuth app details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthAppResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '403':
          description: Forbidden — caller cannot access this OAuth app (creator-only; see OAuth Apps tag).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '404':
          description: OAuth app not found or not visible to this caller (each user only sees apps they created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

    put:
      tags:
        - OAuth Apps
      summary: Update OAuth app
      description: |
        Update an OAuth app's configuration. All body fields are optional — supply only what should change. URL fields (`homepageUrl`, `privacyPolicyUrl`, `termsOfServiceUrl`) accept `null` to clear them.

        Creator-only: even org admins cannot edit apps owned by other users.

        When modifying `allowedScopes`, the new set must remain a subset of the caller's role-aware scope list (same rule as `GET /oauth-clients/scopes`). When adding `authorization_code` to `allowedGrantTypes`, `redirectUris` becomes required and must contain at least one URI; otherwise the request is rejected with `400` by the Zod refine on `updateAppSchema`.

        This endpoint never rotates the client secret — use `POST /oauth-clients/{appId}/regenerate-secret` for that.
      operationId: updateOAuthApp
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          description: OAuth app ID
      requestBody:
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOAuthAppRequest'
        required: true
      responses:
        '200':
          description: OAuth app updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateOAuthAppResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '403':
          description: Forbidden — caller cannot access this OAuth app (creator-only; see OAuth Apps tag).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '404':
          description: OAuth app not found or not visible to this caller (each user only sees apps they created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

    delete:
      tags:
        - OAuth Apps
      summary: Delete OAuth app
      description: |
        Soft-deletes an OAuth app. The app is flagged `isDeleted=true` on the `OAuthApp` document, removed from list/get responses for every caller, and all of its access and refresh tokens are revoked in the same operation. There is no restore endpoint — deletion is final.

        Creator-only: even org admins cannot delete apps owned by other users.
      operationId: deleteOAuthApp
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          description: OAuth app ID
      responses:
        '200':
          description: OAuth app deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OAuth app deleted successfully"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '403':
          description: Forbidden — caller cannot access this OAuth app (creator-only; see OAuth Apps tag).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '404':
          description: OAuth app not found or not visible to this caller (each user only sees apps they created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

  /oauth-clients/{appId}/regenerate-secret:
    post:
      tags:
        - OAuth Apps
      summary: Regenerate client secret
      description: |
        Generates a fresh client secret for an OAuth app. The previous secret is invalidated immediately — any client still presenting it will fail token exchange at `POST /oauth2/token` until updated.

        The new secret is returned in this response **only** and cannot be retrieved later. Pair this call with credential propagation to every integration that uses the app. If the rotation was triggered by a suspected leak, also call `POST /oauth-clients/{appId}/revoke-all-tokens` to invalidate already-issued access and refresh tokens instead of waiting for their natural expiry.

        Creator-only: even org admins cannot rotate secrets for other users' apps.
      operationId: regenerateOAuthAppSecret
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          description: OAuth app ID
      responses:
        '200':
          description: New client secret generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegenerateOAuthAppSecretResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '403':
          description: Forbidden — caller cannot access this OAuth app (creator-only; see OAuth Apps tag).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '404':
          description: OAuth app not found or not visible to this caller (each user only sees apps they created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

  /oauth-clients/{appId}/suspend:
    post:
      tags:
        - OAuth Apps
      summary: Suspend OAuth app
      description: |
        Moves an OAuth app to `status: "suspended"`, blocking new token issuance at `POST /oauth2/token` and the authorization-code consent flow. Tokens that have already been issued remain valid until their natural expiry — call `POST /oauth-clients/{appId}/revoke-all-tokens` immediately afterwards if you need an immediate lockout.

        Use this for temporary suspensions where you intend to reactivate later. For permanent removal, use `DELETE /oauth-clients/{appId}`. Suspending an app that is already suspended returns `400`.

        Creator-only.
      operationId: suspendOAuthApp
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          description: OAuth app ID
      responses:
        '200':
          description: OAuth app suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuspendOAuthAppResponse'
        '400':
          description: Bad request — e.g. OAuth app is already suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '403':
          description: Forbidden — caller cannot access this OAuth app (creator-only; see OAuth Apps tag).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '404':
          description: OAuth app not found or not visible to this caller (each user only sees apps they created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

  /oauth-clients/{appId}/activate:
    post:
      tags:
        - OAuth Apps
      summary: Activate suspended OAuth app
      description: |
        Moves a suspended OAuth app back to `status: "active"`, restoring its ability to authenticate and obtain new tokens via `POST /oauth2/token`.

        A revoked app cannot be reactivated (returns `400`); the only path back is to register a new app. Activating an app that is already active also returns `400`.

        Creator-only.
      operationId: activateOAuthApp
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          description: OAuth app ID
      responses:
        '200':
          description: OAuth app activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivateOAuthAppResponse'
        '400':
          description: Bad request — e.g. app is already active, or cannot activate a revoked app
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '403':
          description: Forbidden — caller cannot access this OAuth app (creator-only; see OAuth Apps tag).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '404':
          description: OAuth app not found or not visible to this caller (each user only sees apps they created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

  /oauth-clients/{appId}/tokens:
    get:
      tags:
        - OAuth Apps
      summary: List app tokens
      description: |
        Lists active access and refresh tokens currently issued to an OAuth app, sorted newest first. Useful for auditing app usage and picking specific tokens to investigate before a targeted revocation.

        Each entry includes the token type (`access` or `refresh`), the user the token was issued for (omitted for client-credentials access tokens), the granted scopes, the issuance and expiry timestamps, and the revocation flag. Each type is capped at 100 most-recent rows server-side (`listTokensForApp` in `oauth_token.service.ts`); revoked and expired tokens are excluded.

        Creator-only.
      operationId: listOAuthAppTokens
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          description: OAuth app ID
      responses:
        '200':
          description: List of tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthAppTokensListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '403':
          description: Forbidden — caller cannot access this OAuth app (creator-only; see OAuth Apps tag).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '404':
          description: OAuth app not found or not visible to this caller (each user only sees apps they created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

  /oauth-clients/{appId}/revoke-all-tokens:
    post:
      tags:
        - OAuth Apps
      summary: Revoke all app tokens
      description: |
        Revokes every access and refresh token currently issued to an OAuth app, in a single operation. Use this for emergency credential rotation, suspected secret leaks, or as a follow-up to `POST /oauth-clients/{appId}/regenerate-secret` when you want existing sessions invalidated immediately rather than letting them expire naturally.

        The response `count` is the total number of tokens revoked across both types. Clients of this app must then obtain new tokens via the standard OAuth flow.

        Creator-only.
      operationId: revokeAllOAuthAppTokens
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          description: OAuth app ID
      responses:
        '200':
          description: All tokens revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "All tokens revoked successfully"
                  count:
                    type: integer
                    description: Number of tokens revoked
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '403':
          description: Forbidden — caller cannot access this OAuth app (creator-only; see OAuth Apps tag).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '404':
          description: OAuth app not found or not visible to this caller (each user only sees apps they created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationJsonErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClientManagementRateLimitError'

  # ==================== AUTHENTICATION ENDPOINTS ====================
  /userAccount/initAuth:
    post:
      tags:
        - User Account
      summary: Initialize authentication session
      description: |
        Start a server-side authentication session and discover which sign-in methods are
        configured for the organization. This is the first step in the multi-step login flow.

        **Request body (optional)**

        - You may omit the body, send an empty JSON object `{}`, or send `{ "email": "..." }`.
        - `email` in the body is optional and kept for legacy reasons; omitting it does not prevent
          initialization. The web client typically calls this endpoint without a body and sends
          `email` on `/authenticate` instead.
        - When provided, `email` is stored on the session for correlation with subsequent steps.

        **Flow:**

        1. Call this endpoint (optional JSON body as above).
        2. Receive a session token in the `x-session-token` response header.
        3. Send that token on subsequent `/authenticate` requests (`x-session-token` header).
        4. Use `allowedMethods` and `authProviders` from the response to render the login UI.

        **Session token**

        - Returned as header `x-session-token`.
        - Required for `/authenticate` (and related steps) until it expires.

        **Multi-factor authentication**

        If the organization has MFA, complete multiple authentication steps; each step may
        return the next step's allowed methods.
      operationId: initAuth
      x-pipeshub-sdk: true
      security: []
      requestBody:
        description: >
          Optional. Omit entirely or send `{}`. You may include `email` for legacy compatibility
          (pre-fills the session); invalid `email` format is rejected when the field is present.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitAuthRequest'
        required: false
      responses:
        '200':
          description: Authentication session initialized successfully
          headers:
            x-session-token:
              schema:
                type: string
              description: Session token for subsequent authentication requests. Store this securely.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitAuthResponse'
        '400':
          description: Invalid request (e.g. malformed `email` when that property is sent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userAccount/authenticate:
    post:
      tags:
        - User Account
      summary: Authenticate user with credentials
      description: |
        Authenticate a user using the specified method and credentials.
        Requires a valid session token from `/initAuth`.

        **Credential Formats by Method:**

        - `password`: `{ "credentials": { "password": "your-password" } }`
        - `otp`: `{ "credentials": { "otp": "123456" } }` (6-digit code, valid for 10 minutes)
        - `google`: `{ "credentials": "google-id-token-string" }`
        - `microsoft`: `{ "credentials": { "accessToken": "...", "idToken": "..." } }`
        - `azureAd`: `{ "credentials": { "accessToken": "...", "idToken": "..." } }`
        - `oauth`: `{ "credentials": { "accessToken": "...", "idToken": "..." } }`
        - `samlSso`: Handled via redirect flow (use `/saml/signIn` instead)

        **Multi-Step Response:**

        If organization uses MFA, successful authentication returns:
        - `status: "success"` with `nextStep` and `allowedMethods` for next step

        **Fully Authenticated Response:**

        After completing all steps:
        - `message: "Fully authenticated"` with `accessToken` (1hr) and `refreshToken` (7d)

        **Security:**

        - Account locks after 5 consecutive failed attempts
        - CAPTCHA may be required if enabled (pass `cf-turnstile-response`)
      operationId: authenticate
      x-pipeshub-sdk: true
      security: []
      parameters:
        - name: x-session-token
          in: header
          required: true
          description: Session token received from `/initAuth` endpoint
          schema:
            type: string
      requestBody:
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthenticateRequest'
        required: true
      responses:
        '200':
          description: Authentication step successful or fully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticateResponse'
        '400':
          description: Invalid request, method not allowed, invalid credential format or Account blocked due to too many failed attempts (5 attempts max)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials (wrong password, expired OTP, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session expired or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: OTP has expired (valid for 10 minutes)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userAccount/login/otp/generate:
    post:
      tags:
        - User Account
      summary: Generate and send OTP for login
      description: |
        Generate and send a 6-digit one-time password (OTP) to the user's email.
        Use this endpoint before authenticating with the `otp` method.

        **OTP Details:**

        - 6 digits numeric code
        - Valid for **10 minutes** after generation
        - Sent to user's registered email address

        **Rate Limiting:**

        - Multiple OTP requests may be rate-limited
        - Wait for the current OTP to expire before requesting a new one

        **CAPTCHA:**

        If Cloudflare Turnstile is enabled, include `cf-turnstile-response` in the request body.

        **Success response body**

        - `200` returns a **plain string** (`OTP sent`).
      operationId: generateLoginOtp
      security: []
      requestBody:
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpGenerateRequest'
        required: true
      responses:
        '200':
          description: OTP generated and sent successfully
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/LoginOtpGenerateResponse'
        '400':
          description: Invalid request or malformed email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account is blocked due to too many failed attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userAccount/password/forgot:
    post:
      tags:
        - User Account
      summary: Request password reset email
      description: |
        Send a password reset link to the user's email.
        The link contains a time-limited token that can be used to reset the password.

        **Note:** To prevent account enumeration, this endpoint always returns
        200 with the same generic message regardless of whether the supplied
        email is registered. If the account exists a reset link is sent;
        otherwise the request is silently ignored. Internal lookup or mail
        delivery failures are logged server-side and do not change the response.
      operationId: forgotPassword
      security: []
      requestBody:
        description: "Request body for Request password reset email"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '200':
          description: Request accepted. Same response is returned whether the email is registered or not.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataStringResponse'
        '400':
          description: Missing or invalid email in the request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: CAPTCHA verification failed (when Turnstile is configured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userAccount/password/reset/token:
    post:
      tags:
        - User Account
      summary: Reset password with email token
      description: |
        Reset password using a token received via email from the forgot password flow.

        **Password Requirements:**

        - Minimum 8 characters
        - At least 1 uppercase letter
        - At least 1 lowercase letter
        - At least 1 number
        - At least 1 special character (#?!@$%^&*-)

        **Security Notes:**

        - Token is single-use and expires after a set time
        - Response body contains a confirmation string in `data`
      operationId: resetPasswordWithToken
      security:
        - scopedToken: []
      requestBody:
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenPasswordResetRequest'
        required: true
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataStringResponse'
        '400':
          description: Invalid request or password doesn't meet requirements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing, invalid or expired password reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userAccount/oauth/exchange:
    post:
      tags:
        - OAuth
      summary: Exchange OAuth authorization code for tokens
      description: |
        Exchange an OAuth authorization code for access and ID tokens.
        Used after the OAuth authorization flow redirects back to the application.

        **Supported Providers:**

        - Generic OAuth 2.0 providers configured in org settings

        **Flow:**

        1. User is redirected to OAuth provider's authorization URL
        2. User authorizes and is redirected back with a code
        3. This endpoint exchanges the code for tokens
        4. Tokens can then be used with the `/userAccount/authenticate` endpoint
      operationId: exchangeOAuthCode
      security: []
      requestBody:
        description: "Request payload"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthExchangeRequest'
        required: true
      responses:
        '200':
          description: Tokens retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthExchangeResponse'
        '400':
          description: |
            Bad request. Possible causes: missing required parameters (code, provider, redirectUri),
            no organization found in the system, OAuth not configured (missing tokenEndpoint or
            clientSecret), token exchange HTTP error from the provider, or email not present in
            the OAuth provider's userInfo response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Failed to fetch user information from the OAuth provider using the exchanged access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User account not found and JIT provisioning is disabled — contact your administrator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userAccount/validateEmailChange:
    put:
      tags:
        - User Account
      summary: Validate email change token
      description: |
        Validate a token for changing the user's email address.
        This is used in the email change flow to verify the token before allowing the change.

        **Flow:**

        1. User requests email change and receives a token via email
        2. This endpoint validates the token and returns success if valid
        3. If valid, user can proceed to change their email address
      operationId: validateEmailChangeToken
      security:
        - scopedToken: []
      responses:
        '200':
          description: Email change token is valid and email is updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateEmailChangeResponse'
        '400':
          description: New email address is already in use by another account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: |
            Missing, expired, invalid-scope, or already-consumed token
            (link was previously used to complete an email change)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        

  /userAccount/refresh/token:
    post:
      tags:
        - User Account
      summary: Refresh access token
      description: |
        Get a new access token using a valid refresh token.

        **Usage:**

        - Pass the refresh token as a Bearer token in the Authorization header
        - Returns a new access token and basic user information

        **Token Lifetimes:**

        - Access token: 24 hours (configurable via `ACCESS_TOKEN_EXPIRY` environment variable)
        - Refresh token: 30 days (configurable via `REFRESH_TOKEN_EXPIRY` environment variable)

        **Best Practices:**

        - Call this endpoint before the access token expires
        - Store the new access token and continue using it for authenticated requests
        - If refresh fails with 401, redirect user to login flow
      operationId: refreshToken
      x-pipeshub-sdk: true
      security:
        - scopedToken: []
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '400':
          description: Disabled user account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token - user must re-authenticate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found (account may have been deleted), User credentials not found, or Organization not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userAccount/logout/manual:
    post:
      tags:
        - User Account
      summary: Logout current session
      description: |
        Log out the current user session.

        **Effects:**

        - Records a logout activity entry for the user
        - Client should clear stored tokens locally after calling this endpoint

        **Note:** This endpoint requires the access token, not the refresh token.
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out successfully (empty response body)
        '401':
          description: Unauthorized - invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Auth container not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /userAccount/password/reset:
    post:
      tags:
        - User Account
      summary: Reset password
      description: |
        Reset the password for the currently authenticated user.

        **Overview:**

        Allows a logged-in user to change their password by providing the current password and a new password.
      operationId: resetPassword
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                cf-turnstile-response:
                  type: string
                  description: Cloudflare Turnstile CAPTCHA token (required when Turnstile is configured server-side)
      responses:
        '200':
          description: Password reset successfully - returns new access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedPasswordResetResponse'
        '400':
          description: |
            Bad request. Possible causes:
            - `currentPassword` or `newPassword` missing from request body
            - Current and new password are the same (plain-text comparison)
            - New password does not meet strength requirements (min 8 chars, uppercase, lowercase, number, special character)
            - Old and new password are the same (hash comparison against stored password)
            - Account is blocked due to too many incorrect login attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: |
            Unauthorized. Possible causes:
            - Invalid or expired access token
            - Current password is incorrect
            - Invalid CAPTCHA verification (when Turnstile is configured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Not found. Possible causes:
            - Auth container not found
            - User credentials not found (no password set for account)
            - User not found in IAM service
            - Organization not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== ORGANIZATION AUTH CONFIG ENDPOINTS ====================
  /orgAuthConfig/authMethods:
    get:
      tags:
        - Organization Auth Config
      summary: Get organization authentication methods
      description: |
        Retrieve the configured authentication methods for the organization.

        **Response Structure:**

        Returns an array of authentication steps, each containing:
        - `order`: Step number (1-3)
        - `allowedMethods`: Array of methods allowed for that step

        **Example Response:**

        ```json
        {
          "authMethods": [
            { "order": 1, "allowedMethods": [{ "type": "password" }, { "type": "google" }] },
            { "order": 2, "allowedMethods": [{ "type": "otp" }] }
          ]
        }
        ```

        **Admin Access Required:** Only organization admins can view auth configuration.
      operationId: getAuthMethods
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authentication methods retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfig'
        '400':
          description: |
            Bad request. Possible causes:
            - User is not an organization admin
            - User not authenticated (token decoded but `req.user` is null)
            - Organization ID missing from token payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Not found. Possible causes:
            - Auth container not found
            - Account not found (userId or orgId missing)
            - Admin check failed in IAM service
            - Organization auth configuration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orgAuthConfig/updateAuthMethod:
    post:
      tags:
        - Organization Auth Config
      summary: Update organization authentication methods
      description: |
        Update the authentication methods configuration for an organization.
        This allows admins to configure single or multi-factor authentication.

        **Validation Rules:**
        - Minimum 1 step, maximum 3 steps
        - Each step must have a unique order (1, 2, or 3)
        - No duplicate methods within the same step
        - No method can appear in multiple steps
        - Each step must have at least one allowed method

        **Available Methods:**
        - `password`: Email/password authentication
        - `otp`: One-time password via email
        - `google`: Google OAuth 2.0
        - `microsoft`: Microsoft OAuth 2.0
        - `azureAd`: Azure Active Directory
        - `samlSso`: SAML 2.0 Single Sign-On
        - `oauth`: Generic OAuth 2.0 provider

        **Example - Single Factor (Password or Google):**

        ```json
        {
          "authMethod": [
            { "order": 1, "allowedMethods": [{ "type": "password" }, { "type": "google" }] }
          ]
        }
        ```

        **Example - Two Factor (Password + OTP):**

        ```json
        {
          "authMethod": [
            { "order": 1, "allowedMethods": [{ "type": "password" }] },
            { "order": 2, "allowedMethods": [{ "type": "otp" }] }
          ]
        }
        ```

        **Admin Access Required:** Only organization admins can update auth configuration.
      operationId: updateAuthMethod
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
      requestBody:
        description: "Request payload"
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - authMethod
              properties:
                authMethod:
                  type: array
                  description: Authentication steps to set for the organization (1-3 steps)
                  minItems: 1
                  maxItems: 3
                  items:
                    $ref: '#/components/schemas/AuthStep'
      responses:
        '200':
          description: Authentication methods updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateAuthMethodResponse'
        '400':
          description: |
            Bad request. Possible causes:
            - User is not an organization admin
            - `authMethod` field missing from request body
            - Validation failure (duplicate steps, duplicate methods, out-of-range order, empty methods array)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: |
            Unauthorized. Possible causes:
            - Invalid or expired access token
            - User not authenticated (token decoded but `req.user` is null)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Not found. Possible causes:
            - Auth container not found
            - Account not found (userId or orgId missing)
            - Admin check failed in IAM service
