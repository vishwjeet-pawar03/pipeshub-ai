    AIModelProviderResponse:
      type: object
      additionalProperties: false
      description: Success response from addAIModelProvider
      required:
        - status
        - message
        - details
      properties:
        status:
          type: string
          enum: [success]
        message:
          type: string
          example: "LLM provider added successfully"
        details:
          $ref: '#/components/schemas/AIModelProviderAddedDetails'

    AIModelProviderSimpleError:
      type: object
      additionalProperties: false
      description: |
        Controller validation error returned before the Python health-check
        (e.g. missing required fields or invalid modelType).
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum: [error]
        message:
          type: string

    AIModelProviderHealthCheckBackendDetails:
      type: object
      additionalProperties: false
      description: |
        Nested diagnostics from the Python query service health-check response
        (`content.details`). Present on credential, timeout, and embedding-policy failures.
      properties:
        provider:
          type: string
          description: Provider registry ID (e.g. openai, azure-openai)
        model:
          type: string
          description: Model name from the configuration under test
        error:
          type: string
          description: Underlying provider or multimodal probe error text
        error_type:
          type: string
          description: Python exception class name (e.g. AuthenticationError)
        timeout_seconds:
          type: integer
          description: Health-check invoke timeout in seconds
        existing_vector_size:
          type: integer
          description: Vector dimension of the existing Qdrant collection
        new_embedding_size:
          type: integer
          description: Dimension produced by the candidate embedding model
        points_count:
          type: integer
          description: Number of points in the existing collection
        current_model:
          type: string
          description: Embedding model name already stored for the org collection
        new_model:
          type: string
          description: Candidate embedding model name
        new_provider:
          type: string
          description: Candidate embedding provider ID
        embedding_model:
          type: string
          description: Embedding subsystem status (HTTPException detail payloads)
        vector_store:
          type: string
          description: Vector store subsystem status (HTTPException detail payloads)
        llm:
          type: string
          description: LLM subsystem status (HTTPException detail payloads)

    AIModelProviderHealthCheckBackendPayload:
      type: object
      additionalProperties: false
      description: |
        Raw JSON body from `POST /api/v1/health-check/{modelType}` on the Python query
        service, forwarded unchanged as `error.details` by addAIModelProvider and
        updateAIModelProvider when the health check fails.
      properties:
        status:
          type: string
          description: Health outcome from Python (e.g. error, not healthy)
          example: error
        message:
          type: string
          description: Primary human-readable failure reason from Python
          example: "LLM health check failed: Incorrect API key provided"
        error:
          type: string
          description: Alternate top-level error field (legacy envelopes and HTTPException detail)
          example: "Health check failed: Connection refused"
        timestamp:
          type: integer
          format: int64
          description: Epoch milliseconds when the check completed
        details:
          $ref: '#/components/schemas/AIModelProviderHealthCheckBackendDetails'
      example:
        status: error
        message: "LLM health check failed: Incorrect API key provided"
        details:
          provider: openai
          model: gpt-4o-mini
          error_type: AuthenticationError

    AIModelProviderHealthCheckErrorEnvelope:
      type: object
      additionalProperties: false
      description: Health-check failure from the Python AI backend
      required:
        - error
      properties:
        error:
          type: object
          additionalProperties: false
          required:
            - status
            - message
          properties:
            status:
              type: string
              enum: [error]
            message:
              type: string
              description: |
                User-facing reason from the Node controller, derived from the Python
                body (`message`, or `error` / `error.message` when present).
            details:
              $ref: '#/components/schemas/AIModelProviderHealthCheckBackendPayload'

    AddAIModelProviderErrorResponse:
      oneOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - $ref: '#/components/schemas/AIModelProviderSimpleError'
        - $ref: '#/components/schemas/AIModelProviderHealthCheckErrorEnvelope'

    UpdateAIModelProviderDetails:
