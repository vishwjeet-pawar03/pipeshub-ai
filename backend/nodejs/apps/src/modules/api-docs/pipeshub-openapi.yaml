  # ==================== SAML ENDPOINTS ====================
  /saml/signIn:
    get:
      tags:
        - SAML
      summary: Initiate SAML sign-in flow
      description: |
        Initiate SAML Single Sign-On authentication by redirecting to the Identity Provider (IDP).
        <br><br>
        <b>Usage:</b><br>
        1. Call <code>/userAccount/initAuth</code> to get a session token<br>
        2. If <code>samlSso</code> is in the allowed methods, redirect the user to this endpoint<br>
        3. User authenticates with their IDP<br>
        4. IDP redirects back to <code>/saml/signIn/callback</code> with SAML response<br>
        5. Callback completes authentication and returns tokens
        <br><br>
        <b>Note:</b> This is a browser redirect endpoint, not a typical API call.
        The user's browser should be redirected to this URL.
        <br><br>
        <b>Prerequisites:</b><br>
        - Organization must have SAML SSO configured via <code>/saml/updateAppConfig</code><br>
        - User must belong to an organization with SAML enabled
      operationId: signInViaSAML
      security: []
      parameters:
        - name: email
          in: query
          required: true
          description: User's email address
          schema:
            type: string
            format: email
        - name: sessionToken
          in: query
          required: false
          description: |
            Session token from `/userAccount/initAuth`. Optional but recommended
            for maintaining authentication state across the SAML flow.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to SAML Identity Provider login page
          headers:
            Location:
              description: IDP SSO URL
              schema:
                type: string
        '400':
          description: Invalid request (missing or malformed parameters)
        '404':
          description: User not found or SAML not configured for organization

  /saml/signIn/callback:
    post:
      tags:
        - SAML
      summary: SAML sign-in callback
      operationId: samlSignInCallback
      description: |
        Handles the callback from the SAML Identity Provider (IDP)
        after successful user authentication.

        This endpoint is invoked by the IDP and not directly by clients.

        Flow:
        1. IDP posts SAMLResponse and RelayState
        2. Server validates the SAML assertion signature
        3. Server extracts user identity
        4. Server completes authentication
        5. Redirects to frontend with authentication result

        RelayState contains the session token or state used to resume
        the authentication process.

        **Important:** All outcomes — both success and failure — are delivered
        as `302` redirects. This endpoint does not return JSON error bodies.
        Errors are communicated via a `saml_error` query parameter on the
        redirect URL. Clients should inspect this parameter after landing on
        the frontend login page.

      security: []

      requestBody:
        description: "SAML response from Identity Provider"
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                SAMLResponse:
                  type: string
                  description: Base64-encoded SAML response
                RelayState:
                  type: string
                  description: Relay state from the original request
      responses:
        '302':
          description: |
            Redirect to the frontend. All outcomes use this status code.

            **Success:** Redirects to `{frontendUrl}/auth/sign-in/samlSso/success`.
            Access and refresh tokens are delivered as `Secure; SameSite=None` cookies.

            **Failure:** Redirects to `{frontendUrl}/login?saml_error=<code>`.

            | `saml_error` value  | Meaning                                                                 |
            |---------------------|-------------------------------------------------------------------------|
            | `auth_failed`       | Passport rejected the SAML assertion (invalid signature, expired, etc.) |
            | `saml_sso_disabled` | SAML SSO is not enabled for this organization                           |
            | `jit_disabled`      | User has no account and Just-In-Time provisioning is disabled           |
            | `unknown`           | Unexpected server-side error during callback processing                 |
            | *(raw message)*     | Passport parse error surfaced before the custom callback fired          |
          headers:
            Location:
              description: |
                Frontend success URL or `{frontendUrl}/login?saml_error=<code>` on failure.
              schema:
                type: string
                examples:
                  success:
                    value: "https://app.example.com/auth/sign-in/samlSso/success"
                  error_sso_disabled:
                    value: "https://app.example.com/login?saml_error=saml_sso_disabled"
                  error_jit_disabled:
                    value: "https://app.example.com/login?saml_error=jit_disabled"
                  error_auth_failed:
                    value: "https://app.example.com/login?saml_error=auth_failed"
            Set-Cookie:
              description: |
                Set on successful authentication only.
                - `accessToken`: JWT access token, expires in 1 hour (`Secure; SameSite=None`)
                - `refreshToken`: JWT refresh token, expires in 7 days (`Secure; SameSite=None`)
              schema:
                type: string

        '400':
          description: Invalid or malformed SAML response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'

        '401':
          description: SAML assertion validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'

        '404':
          description: Session expired or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'

        '500':
          description: Internal server error during SAML processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'

  /saml/updateAppConfig:
    post:
      tags:
        - SAML
      summary: Reload SAML application configuration (Internal)
      description: |
        Internal endpoint to reload SAML configuration from the configuration manager.
        This is called by other services when SAML settings are updated.<br><br>
        <b>Purpose:</b><br>
        When SAML configuration is updated in the Configuration Manager, this endpoint
        is called to reload the settings into the authentication service without restart.<br><br>
        <b>Effects:</b><br>
        <ul>
        <li>Reloads AppConfig from configuration files</li>
        <li>Rebinds authentication controllers with new config</li>
        <li>Updates SAML passport strategy settings</li>
        </ul>
        <b>Note:</b> This is an internal service-to-service endpoint.
      operationId: updateSamlAppConfig
      security:
        - scopedToken: []
      responses:
        '200':
          description: Configuration reloaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '400':
          description: Invalid SAML response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /users/health:
    get:
      tags:
        - Users
      summary: Users module health check
      description: Returns the health status of the users module. No authentication required.
      operationId: getUsersHealth
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - status
                  - timestamp
                properties:
                  status:
                    type: string
                    enum:
                      - healthy
                  timestamp:
                    type: string
                    format: date-time

  /users:
    get:
      tags:
        - Users
      summary: Get all users
      description: |
        Retrieve users in the organization. Behavior depends on query parameters:

        **Default / paginated mode**: Returns enriched user objects with profile pictures, group
        memberships, and blocked status, wrapped in a `{ users, pagination }` envelope. Defaults
        to `page=1, limit=25` when no pagination params are supplied.

        **Blocked users mode** (when `blocked=true`): Returns an array of blocked users with
        basic profile fields only (no pagination envelope).

        Deleted users are always excluded. Requires `user:read` OAuth scope.
      operationId: getAllUsers
      security:
        - bearerAuth: []
        - oauth2: [user:read]
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-based). Defaults to 1 when omitted.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Number of users per page. Defaults to 25, capped at 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: search
          in: query
          required: false
          description: Search users by name or email (case-insensitive regex).
          schema:
            type: string
        - name: hasLoggedIn
          in: query
          required: false
          description: Filter by login status (`true` or `false`).
          schema:
            type: boolean
        - name: isBlocked
          in: query
          required: false
          description: Filter by blocked status (`true` or `false`).
          schema:
            type: boolean
        - name: groupIds
          in: query
          required: false
          description: Comma-separated group IDs to filter users by group membership.
          schema:
            type: string
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - users
                  - pagination
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      required:
                        - id
                        - userId
                        - isActive
                        - hasLoggedIn
                        - isBlocked
                        - role
                        - groupCount
                        - userGroups
                      properties:
                        id:
                          type: string
                          format: ObjectId
                        userId:
                          type: string
                          format: ObjectId
                        orgId:
                          type: string
                          format: ObjectId
                        name:
                          type: string
                          description: User's fullName (may be absent if not set)
                        email:
                          type: string
                          format: email
                        isActive:
                          type: boolean
                          description: "`true` only when not blocked AND `hasLoggedIn: true`"
                        hasLoggedIn:
                          type: boolean
                        isBlocked:
                          type: boolean
                        createdAtTimestamp:
                          type: integer
                          description: "Epoch milliseconds of `createdAt` (absent if field is null)"
                        updatedAtTimestamp:
                          type: integer
                          description: "Epoch milliseconds of `updatedAt` (absent if field is null)"
                        profilePicture:
                          type: string
                          description: "Base64 data URI (`data:image/jpeg;base64,...`). Absent when no picture uploaded."
                        role:
                          type: string
                          enum: [Admin, Member]
                        groupCount:
                          type: integer
                          description: Number of groups the user belongs to, excluding the `everyone` group
                        userGroups:
                          type: array
                          items:
                            type: object
                            additionalProperties: false
                            required:
                              - _id
                              - name
                              - type
                            properties:
                              _id:
                                type: string
                                format: ObjectId
                              name:
                                type: string
                              type:
                                type: string
                                enum: [admin, standard, everyone, custom]
                  pagination:
                    $ref: '#/components/schemas/PaginationMetadata'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Users
      summary: Create a new user
      description: |
        Create a new user account in the organization.

        **Validation rules** (enforced by Zod — extra fields are stripped):

        - `fullName`: Required, non-empty string
        - `email`: Required, valid email format
        - `mobile`: Optional, must match `^\+?[0-9]{10,15}$`
        - `designation`: Optional string

        **Side effects:**

        - User is automatically added to the "everyone" group via `$addToSet`
        - A `NewUserEvent` is published to the event bus

        **Authorization:** Admin privileges required (`userAdminCheck` middleware).
      operationId: createUser
      security:
        - bearerAuth: []
        - oauth2: [user:invite]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - fullName
                - email
              properties:
                fullName:
                  type: string
                  minLength: 1
                  description: User's full display name
                  example: "John Smith"
                email:
                  type: string
                  format: email
                  description: User's email address
                  example: "john.smith@company.com"
                mobile:
                  type: string
                  pattern: '^$|^\+?[0-9]{10,15}$'
                  description: Mobile phone number with optional country code
                  example: "+15551234567"
                designation:
                  type: string
                  description: Job title or designation
                  example: "Software Engineer"
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: |
            Invalid request. Possible reasons:

            - Missing required fields (`fullName`, `email`)
            - Invalid email format
            - Invalid mobile number format
            - Requester does not have admin privileges (`userAdminCheck`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found - `userId` or `orgId` missing from token (`userAdminCheck`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error (DB save failure or event publish failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: |
        Retrieve a specific user's profile by their MongoDB ObjectId.

        The `id` path parameter is validated as a 24-character hex string. If the organization
        or user does not exist (checked by `userExists` middleware), a `404` is returned before
        the controller runs.

        The email field may be omitted from the response if the `HIDE_EMAIL` environment variable
        is set to `true`.
      operationId: getUserById
      security:
        - bearerAuth: []
        - oauth2: [user:read]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID (24-character MongoDB ObjectId)
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
            example: "507f1f77bcf86cd799439011"
      responses:
        '200':
          description: User details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid user ID format (Zod validation)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Organization or user not found (`userExists` middleware)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Users
      summary: Update user
      description: |
        Update user profile fields. The Zod schema uses `.strict()` mode, so any unknown
        fields in the request body cause a `400` validation error.

        **Updatable fields:** `fullName`, `firstName`, `lastName`, `middleName`, `email`,
        `designation`, `mobile`, `address`, `dataCollectionConsent`, `hasLoggedIn`.

        Restricted system fields (`_id`, `orgId`, `slug`, `__v`) cannot be updated and
        cause a `400` if included.

        **Email change:** When `email` is changed, a verification email is sent to the
        new address. The response includes a `meta.emailChangeMailStatus` field:
        `notNeeded` | `sent` | `failed`.

        **Authorization:** Admin can update any user; non-admin can only update themselves
        (`userAdminOrSelfCheck` middleware, throws `400` not `403`).
      operationId: updateUser
      security:
        - bearerAuth: []
        - oauth2: [user:write]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID (24-character MongoDB ObjectId)
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                fullName:
                  type: string
                  minLength: 1
                  description: Full display name
                  example: "John Smith"
                firstName:
                  type: string
                  description: First name only
                  example: "John"
                lastName:
                  type: string
                  description: Last name only
                  example: "Smith"
                middleName:
                  type: string
                  description: Middle name
                  example: "Alan"
                email:
                  type: string
                  format: email
                  description: Email address (triggers verification email to new address)
                  example: "john.smith@company.com"
                mobile:
                  type: string
                  pattern: '^$|^\+?[0-9]{10,15}$'
                  description: Mobile phone with optional country code
                  example: "+15551234567"
                designation:
                  type: string
                  description: Job title or role
                  example: "Senior Software Engineer"
                address:
                  $ref: '#/components/schemas/Address'
                dataCollectionConsent:
                  type: boolean
                  description: User's data collection consent flag
                hasLoggedIn:
                  type: boolean
                  description: Whether user has completed first login
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserResponse'
        '400':
          description: |
            Invalid request. Possible reasons:

            - Unknown fields in request body (Zod strict mode)
            - Invalid email format or mobile format
            - No valid fields provided for update
            - Restricted fields (`_id`, `orgId`, `slug`, `__v`) included
            - Email already in use by another user
            - Requester is not admin and is trying to update a different user
          content:  
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Not found. Possible reasons:

            - `userId` or `orgId` missing from token (`userAdminOrSelfCheck`)
            - Organization or user not found (`userExists`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error (DB save or event publish failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Users
      summary: Delete user
      description: |
        Soft-delete a user from the organization. Sets `isDeleted: true` and `hasLoggedIn: false`,
        removes the user from all user groups, clears the hashed password, and publishes a
        `DeleteUserEvent`.

        **Restrictions:**

        - Cannot delete a user who is in the `admin` group — demote them first
        - The `userAdminCheck` middleware enforces that only org admins can call this endpoint

        **Note:** There is no recovery mechanism via API — a deleted user can be re-invited via
        `POST /users/bulk/invite`, which restores the account.
      operationId: deleteUser
      security:
        - bearerAuth: []
        - oauth2: [user:delete]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID (24-character MongoDB ObjectId)
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
            example: "507f1f77bcf86cd799439011"
      responses:
        '200':
          description: User soft-deleted successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - message
                properties:
                  message:
                    type: string
                    example: "User deleted successfully"
        '400':
          description: |
            Invalid request. Possible reasons:

            - Invalid user ID format (Zod validation)
            - Requester does not have admin privileges (`userAdminCheck`)
            - Target user is in the admin group and cannot be deleted directly
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Not found. Possible reasons:

            - `userId` or `orgId` missing from token (`userAdminCheck`)
            - Organization or user not found (`userExists`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}/email:
    get:
      tags:
        - Users
      summary: Get user email by ID
      description: |
        Retrieve the email address for a specific user. Requires admin privileges.

        The `id` path parameter is validated as a 24-character hex string. The `userAdminCheck`
        middleware runs before `userExists`, so missing token context returns `404` before the
        admin check can throw `400`.

        Returns `{ email }` for the matched user.
