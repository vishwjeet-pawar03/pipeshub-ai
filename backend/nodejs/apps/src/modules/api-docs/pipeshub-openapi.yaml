        status:
          type: string
          enum: [success]
        providers:
          type: array
          items:
            $ref: '#/components/schemas/WebSearchProviderItem'
        settings:
          $ref: '#/components/schemas/WebSearchSettings'
        message:
          type: string
          description: Human-readable status (empty list vs populated providers)

    # Metrics Collection Schemas
    MetricsCollectionConfig:
      type: object
      description: |
        Configuration for application telemetry and metrics collection.
        Metrics are collected anonymously and pushed to a remote server for analytics.
      properties:
        enableMetricCollection:
          type: string
          description: |
            Master switch for metrics collection. When disabled, no metrics are collected or pushed.
            Default: "true"
          example: "true"
        pushIntervalMs:
          type: string
          description: |
            Interval in milliseconds between metrics pushes to the remote server.
            Minimum: 1000ms (1 second), Default: 60000ms (1 minute)
          example: "60000"
        serverUrl:
          type: string
          format: uri
          description: |
            URL of the metrics collection server. For self-hosted analytics, point this
            to your own Prometheus-compatible endpoint.
          example: "https://metrics-collector.example.com/collect-metrics"
        apiKey:
          type: string
          description: |
            API key for authenticating with the metrics server. Auto-generated if not provided.
          example: "54523f794e23d96e"
        appVersion:
          type: string
          description: Current application version for metrics tagging.
          example: "1.0.0"
      example:
        enableMetricCollection: "true"
        pushIntervalMs: "60000"
        serverUrl: "https://metrics-collector.example.com/collect-metrics"
        apiKey: "54523f794e23d96e"
        appVersion: "1.0.0"

    # Feature Flags Schema
    FeatureFlag:
      type: object
      description: Platform feature flag definition
      properties:
        key:
          type: string
          description: Unique feature flag key
          example: "ENABLE_BETA_CONNECTORS"
        label:
          type: string
          description: Display label
          example: "Enable Beta Connectors"
        description:
          type: string
          description: Feature flag description
        defaultEnabled:
          type: boolean
          description: Default enabled state

    # Custom System Prompt Schema
    CustomSystemPrompt:
      type: object
      description: Custom system prompt configuration
      properties:
        customSystemPrompt:
          type: string
          description: Custom system prompt text for AI models

    # AI Model Provider Management Schemas
    AIModelProviderConfiguration:
      type: object
      description: |
        Provider-specific configuration stored on each AI model entry.

        **Passthrough contract:** `additionalProperties` is intentionally `true` at this
        level only. Node validation uses Zod `configurationSchema` with `.passthrough()`
        so provider-specific keys reach the Python backend unchanged. The canonical field
        list for each provider lives in `backend/python/app/config/ai_models/providers/`;
        new providers may add keys without updating this spec. Do not set
        `additionalProperties: false` here unless every registry field is enumerated.

        Properties below are the documented union of the Zod base shape and registry-defined
        configuration keys (all optional unless required by a given provider at runtime).
      additionalProperties: false
      properties:
        model:
          type: string
          description: |
            Model name/identifier. May be comma-separated for multiple models
            (e.g. `gpt-4o, gpt-4o-mini`).
          example: "gpt-4"
        modelFriendlyName:
          type: string
          description: |
            Display name for the model. Only allowed when `model` is a single name
            (not comma-separated).
        apiKey:
          type: string
          description: API key for the provider
        endpoint:
          type: string
          description: Custom endpoint URL (Azure OpenAI, self-hosted, Wispr override)
        organizationId:
          type: string
          description: Organization ID (OpenAI)
        deploymentName:
          type: string
          description: Deployment name (Azure OpenAI)
        provider:
          type: string
          description: Bedrock model vendor (e.g. anthropic, cohere) or provider name override
        customProvider:
          type: string
          description: Custom Bedrock vendor name when `provider` is `other`
        awsAccessKeyId:
          type: string
          description: AWS access key (Bedrock). Optional - omit to use IAM role credentials.
        awsAccessSecretKey:
          type: string
          description: AWS secret key (Bedrock). Optional - omit to use IAM role credentials.
        region:
          type: string
          description: AWS region (Bedrock)
        project:
          type: string
          description: GCP project ID (Vertex AI)
        location:
          type: string
          description: Vertex AI region (e.g. us-central1)
        serviceAccountJson:
          type: string
          description: |
            Google Cloud service account JSON key (Vertex AI). Uploaded as a string;
            treated as a secret at runtime.
        dimensions:
          description: |
            Embedding output dimensions override (when supported by the model).
            Stored configs may use an empty string when unset (registry default).
          anyOf:
            - type: integer
            - type: string
              enum: ['']
        voice:
          type: string
          description: Default TTS voice (OpenAI / Gemini audio)
        responseFormat:
          type: string
          description: TTS audio format (e.g. mp3, wav)
        device:
          type: string
          description: Whisper runtime device (auto, cpu, cuda)
        computeType:
          type: string
          description: Whisper numeric precision (e.g. int8, float16)
        modelDir:
          type: string
          description: Whisper model weights cache directory
        language:
          type: string
          description: Wispr Flow default language (ISO 639-1) or empty for auto-detect
        appType:
          type: string
          description: Wispr Flow output formatting (e.g. ai, email)
        model_kwargs:
          type: object
          description: |
            Optional keyword arguments forwarded to LangChain embedding/LLM clients
            (mirrors Zod `z.record(z.any())`). Used by HuggingFace (`device`, `api_key`)
            and Bedrock (`max_tokens`) paths in Python; values are typically string,
            number, or boolean. Omitted when not configured.
          additionalProperties: {}
        encode_kwargs:
          type: object
          description: |
            Optional encoding kwargs for embedding models (mirrors Zod
            `z.record(z.any())`). Commonly `normalize_embeddings` (boolean) for
            HuggingFace and SentenceTransformer providers. Omitted when not configured.
          additionalProperties: {}
        cache_folder:
          type: string
          description: Cache folder for models

    AddAIModelProviderRequest:
      type: object
      description: Request to add a new AI model provider
      additionalProperties: false
      required:
        - modelType
        - provider
        - configuration
      properties:
        modelType:
          $ref: '#/components/schemas/ModelType'
        provider:
          type: string
          minLength: 1
          description: Provider registry ID (e.g. openAI, gemini, azureOpenAI, groq)
          example: "openAI"
        configuration:
          $ref: '#/components/schemas/AIModelProviderConfiguration'
        isMultimodal:
          type: boolean
