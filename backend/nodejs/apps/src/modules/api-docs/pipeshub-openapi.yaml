        Same as POST /agents/{agentKey}/conversations but with real-time streaming.
      operationId: streamAgentConversation
      security:
        - bearerAuth: []
        - oauth2: [agent:execute]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request body for Create agent conversation with streaming"
