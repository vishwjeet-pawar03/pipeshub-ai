  /conversations/show/archives/search:
    get:
      tags:
        - Conversations
      summary: Search archived conversations
      description: |
        Search across all archived conversations (assistant and agent) for the authenticated user.

        **Overview:**

        Performs a case-insensitive substring match against conversation titles and message content
        across both assistant (`Conversation`) and agent (`AgentConversation`) archived collections.
        Results are merged server-side and sorted by `lastActivityAt` descending.

        **Search parameter:**

        The `search` query parameter is required, must be a non-empty string, and is capped at
        1000 characters. Requests that omit it or exceed the cap return `400`.

        **Pagination:**

        Results are paginated using `page` and `limit`. The response includes a `pagination`
        block with total counts and a `summary` block that breaks matches down by source.

        **Item shape:**

        Each item is a conversation list entry (no `messages` payload — that field is omitted
        for performance) tagged with `source`, plus computed `isOwner`, `accessLevel`,
        `archivedAt`, and `archivedBy`. `agentKey` is present only when `source` is `agent`.
      operationId: searchArchivedConversations
      security:
        - bearerAuth: []
        - oauth2: [conversation:read]
      parameters:
        - name: search
          in: query
          required: true
          description: Search term to match against conversation titles and message content (max 1000 chars)
          schema:
            type: string
            minLength: 1
            maxLength: 1000
        - name: page
          in: query
          required: false
          description: Page number (1-indexed)
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 1
        - name: limit
          in: query
          required: false
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Search results across archived conversations
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  conversations:
                    type: array
                    description: Archived conversations (assistant and agent) matching the search term
                    items:
                      allOf:
                        - $ref: '#/components/schemas/ConversationListItem'
                        - type: object
                          properties:
                            source:
                              type: string
                              enum: [assistant, agent]
                              description: Origin collection of the conversation
                            agentKey:
                              type: string
                              description: Agent identifier — present only when `source` is `agent`
                            archivedAt:
                              type: string
                              format: date-time
                              description: Timestamp when the conversation was archived
                  pagination:
                    type: object
                    additionalProperties: false
                    properties:
                      page:
                        type: integer
                        description: Current page number
                      limit:
                        type: integer
                        description: Items per page
                      totalCount:
                        type: integer
                        description: Total matches across assistant and agent archives
                      totalPages:
                        type: integer
                        description: Total pages at the current limit
                      hasNextPage:
                        type: boolean
                        description: Whether a next page exists
                      hasPrevPage:
                        type: boolean
                        description: Whether a previous page exists
                  summary:
                    type: object
                    additionalProperties: false
                    properties:
                      totalMatches:
                        type: integer
                        description: Combined match count across both collections
                      assistantMatches:
                        type: integer
                        description: Match count in the assistant (`Conversation`) collection
                      agentMatches:
                        type: integer
                        description: Match count in the agent (`AgentConversation`) collection
                      searchQuery:
                        type: string
                        description: Trimmed search term that was applied
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      requestId:
                        type: string
                        description: Request correlation identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: Response generation timestamp
                      duration:
                        type: integer
                        description: Server processing time in milliseconds
        '400':
          description: Search parameter missing, empty, not a string, or longer than 1000 characters
        '401':
          description: Unauthorized

  /conversations/{conversationId}:
    get:
      tags:
        - Conversations
      summary: Get conversation by ID
      description: |
        Retrieve a specific conversation with its full message history.

        **Overview:**

        Returns the complete conversation including all messages, citations,
        feedback, and metadata. Messages can be paginated for long conversations.

        **Message Pagination:**

        For conversations with many messages, use pagination parameters:

        - `page`: Page number (default: 1)
        - `limit`: Messages per page (default: 10)
        - `sortBy`: Sort field (default: createdAt)
        - `sortOrder`: 'asc' or 'desc' (default: desc)

        **Access Control:**

        Users can access conversations they own or that have been shared with them.
      operationId: getConversationById
      security:
        - bearerAuth: []
        - oauth2: [conversation:read]
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier
          schema:
            type: string
            format: objectId
          example: "507f1f77bcf86cd799439011"
        - name: page
          in: query
          description: Page number for message pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of messages per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          description: Field to sort messages by
          schema:
            type: string
            enum: [createdAt, messageType, content]
            default: createdAt
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: search
          in: query
          description: Case-insensitive search across conversation title and message content
          schema:
            type: string
            maxLength: 1000
        - name: startDate
          in: query
          description: Filter messages created on or after this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: Filter messages created on or before this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: shared
          in: query
          description: Filter by shared status of the conversation
          schema:
            type: boolean
        - name: messageType
          in: query
          description: Filter messages by type
          schema:
            type: string
            enum: [user_query, bot_response, error, feedback, system]
      responses:
        '200':
          description: Conversation with paginated messages, applied filter metadata, and request metadata
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  conversation:
                    type: object
                    additionalProperties: false
                    properties:
                      id:
                        type: string
                        format: objectId
                        description: Unique conversation identifier
                      title:
                        type: string
                        description: Conversation title
                      initiator:
                        type: string
                        format: objectId
                        description: User who started the conversation
                      createdAt:
                        type: string
                        format: date-time
                      isShared:
                        type: boolean
                      sharedWith:
                        type: array
                        items:
                          type: object
                          additionalProperties: false
                          properties:
                            userId:
                              type: string
                              format: objectId
                            accessLevel:
                              type: string
                              enum: [read, write]
                      status:
                        type: string
                        enum: [None, Inprogress, Complete, Failed]
                      failReason:
                        type: string
                        description: Populated only when `status` is `Failed`
                      messages:
                        type: array
                        description: Page of messages, sliced by `pagination` and ordered by `sortingMessages`
                        items:
                          type: object
                          additionalProperties: false
                          properties:
                            _id:
                              type: string
                              format: objectId
                            messageType:
                              type: string
                              enum: [user_query, bot_response, error, feedback, system]
                            content:
                              type: string
                            contentFormat:
                              type: string
                              enum: [MARKDOWN, JSON, HTML]
                            confidence:
                              type: string
                              enum: ['Very High', 'High', 'Medium', 'Low', 'Unknown']
                              description: AI confidence in the answer. Present only on `bot_response` messages, and only when the model emitted a trailing confidence block.
                            citations:
                              type: array
                              description: Citations attached to this message. `citationData` is the populated citation document.
                              items:
                                type: object
                                additionalProperties: false
                                properties:
                                  citationId:
                                    type: string
                                    format: objectId
                                  citationData:
                                    $ref: '#/components/schemas/Citation'
                            followUpQuestions:
                              type: array
                              items:
                                $ref: '#/components/schemas/FollowUpQuestion'
                            feedback:
                              type: array
                              items:
                                $ref: '#/components/schemas/MessageFeedback'
                            referenceData:
                              type: array
                              description: Reference IDs surfaced from tool responses, used for follow-up queries
                              items:
                                type: object
                                additionalProperties: false
                                properties:
                                  name:
                                    type: string
                                    description: Display name shown to the user.
                                  id:
                                    type: string
                                    description: Technical identifier (numeric ID, UUID, etc.).
                                  type:
                                    type: string
                                    description: Item type (e.g. `project`, `issue`, `file`, `notebook`, `page`).
                                  app:
                                    type: string
                                    description: |
                                      Source application (e.g. `jira`, `confluence`,
                                      `sharepoint`, `slack`, `drive`, `gmail`).
                                  webUrl:
                                    type: string
                                    description: URL to open the item in a browser.
                                  metadata:
                                    type: object
                                    additionalProperties:
                                      type: string
                                    description: |
                                      App-specific fields keyed by name (e.g. `key` for a Jira
                                      project, `siteId` for a SharePoint document).
                            modelInfo:
                              $ref: '#/components/schemas/ConversationModelInfo'
                            appliedFilters:
                              type: object
                              additionalProperties: false
                              properties:
                                apps:
                                  type: array
                                  items:
                                    $ref: '#/components/schemas/AppliedFilterNode'
                                kb:
                                  type: array
                                  items:
                                    $ref: '#/components/schemas/AppliedFilterNode'
                            metadata:
                              type: object
                              additionalProperties: false
                              properties:
                                processingTimeMs:
                                  type: number
                                modelVersion:
                                  type: string
                                aiTransactionId:
                                  type: string
                            createdAt:
                              type: string
                              format: date-time
                            updatedAt:
                              type: string
                              format: date-time
                      modelInfo:
                        $ref: '#/components/schemas/ConversationModelInfo'
                      pagination:
                        type: object
                        additionalProperties: false
                        description: |
                          Pagination over the conversation's messages. Messages are paginated backwards
                          (newest first), so `messageRange.start`/`messageRange.end` refer to 1-based
                          positions within the full message list.
                        properties:
                          page:
                            type: integer
                          limit:
                            type: integer
                          totalCount:
                            type: integer
                            description: Total number of messages in the conversation
                          totalPages:
                            type: integer
                          hasNextPage:
                            type: boolean
                            description: True if there are older messages available
                          hasPrevPage:
                            type: boolean
                            description: True if there are newer messages available
                          messageRange:
                            type: object
                            additionalProperties: false
                            properties:
                              start:
                                type: integer
                              end:
                                type: integer
                      access:
                        type: object
                        additionalProperties: false
                        properties:
                          isOwner:
                            type: boolean
                          accessLevel:
                            type: string
                            enum: [read, write]
                  filters:
                    type: object
                    additionalProperties: false
                    description: Summary of which filter/sort/pagination parameters were applied to this request, plus the catalog of options available on this endpoint.
                    properties:
                      applied:
                        type: object
                        additionalProperties: false
                        properties:
                          filters:
                            type: array
                            description: Names of the filters/parameters that were actually applied
                            items:
                              type: string
                          values:
                            type: object
                            additionalProperties: true
                            description: Map of applied filter name to the value that was applied
                      available:
                        type: object
                        additionalProperties: false
                        properties:
                          shared:
                            type: object
                            additionalProperties: false
                            properties:
                              values:
                                type: array
                                items:
                                  type: string
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          tags:
                            type: object
                            additionalProperties: false
                            description: Advertised in the `available` catalog but not currently applied as a filter by the server.
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          minMessages:
                            type: object
                            additionalProperties: false
                            description: Advertised in the `available` catalog but not currently applied as a filter by the server.
                            properties:
                              type:
                                type: string
                              description:
                                type: string
