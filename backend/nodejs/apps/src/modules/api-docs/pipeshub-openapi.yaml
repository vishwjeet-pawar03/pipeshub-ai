        - oauth2: [agent:write]
      parameters:
        - name: agentKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: "Request body for Share agent"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareRequest'
      responses:
        '200':
          description: Agent shared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '401':
