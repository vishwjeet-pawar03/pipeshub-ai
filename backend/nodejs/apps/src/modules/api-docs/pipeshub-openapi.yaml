  /org/exists:
    get:
      tags:
        - Organizations
      summary: Check if organization exists
      description: |
        Check if any organization has been created in the system. This is typically the first API call made during initial setup.

        **Overview:**

        This public endpoint determines whether the system has been initialized with an organization. Used by the frontend to decide whether to show the setup wizard or the login screen.

        **Use Cases:**

        - First-time setup detection
        - Onboarding flow decisions
        - System initialization checks

        **Response:**

        - `exists: true` — Organization exists, show login
        - `exists: false` — No organization, show setup wizard

        **Note:** This endpoint requires no authentication and is publicly accessible.
      operationId: checkOrgExists
      security: []
      responses:
        '200':
          description: Organization existence check completed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  exists:
                    type: boolean
                    description: Whether an organization has been created
                    example: true

  /org/health:
    get:
      tags:
        - Organizations
      summary: Organization module health check
      description: Returns the health status of the organization module. No authentication required.
      operationId: getOrgHealth
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - status
                  - timestamp
                properties:
                  status:
                    type: string
                    enum:
                      - healthy
                  timestamp:
                    type: string
                    format: date-time

  /org:
    post:
      tags:
        - Organizations
      summary: Create organization
      description: |
        Create a new organization and its first admin user. This is the initial setup endpoint for new PipesHub installations.

        **Overview:**

        This endpoint performs the complete initial setup of a PipesHub instance, including creating the organization entity and its first administrator account. Should only be called once during initial setup.

        **Setup Flow:**

        1. Frontend calls `/org/exists` to check if setup is needed
        2. If no organization exists, show setup wizard
        3. Collect organization and admin details
        4. Call this endpoint to create organization

        **What Gets Created:**

        - Organization entity with provided details
        - Admin user account with provided credentials
        - Default user groups (admin, everyone, standard)
        - Initial authentication configuration (password-based)

        **Account Types:**

        - `individual`: Single-user account, limited team features
        - `business`: Multi-user organization with full features

        **Security:**

        - This endpoint only works if no organization exists
        - Password must meet complexity requirements (min 8 characters, uppercase, lowercase, number, and special character)
      operationId: createOrganization
      security: []
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                accountType:
                  type: string
                  enum: [individual, business]
                  description: Type of organization account
                  example: "business"
                shortName:
                  type: string
                  description: Short display name for the organization
                  example: "Acme"
                registeredName:
                  type: string
                  description: Official registered name (for business accounts)
                  example: "Acme Corporation Inc."
                contactEmail:
                  type: string
                  format: email
                  description: Primary contact email (also used as admin email)
                  example: "admin@acme.com"
                adminFullName:
                  type: string
                  description: Full name of the first admin user
                  example: "John Smith"
                password:
                  type: string
                  format: password
                  minLength: 8
                  description: Password for the admin account (min 8 chars)
                  example: "SecurePassword123!"
              required:
                - accountType
                - contactEmail
                - adminFullName
                - password
      responses:
        '200':
          description: Organization created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          description: |
            Request validation failed. Possible reasons:

            - Missing required fields (accountType, contactEmail, adminFullName, password)
            - accountType is not one of: individual, business
            - contactEmail is not a valid email address
            - password is shorter than 8 characters
            - registeredName is required when accountType is business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: |
            Internal server error. Possible reasons:

            - Organization already exists
            - Password does not meet complexity requirements (requires uppercase, lowercase, number, and special character)
            - Database save failure
            - Event service error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Organizations
      summary: Get current organization
      description: |
        Retrieve details about the authenticated user's organization.

        **Overview:**

        This endpoint returns the organization document for the current user's org, including profile data and configuration.

        **Response Includes:**

        - Organization profile (registeredName, shortName, contactEmail, domain)
        - Account type
        - Onboarding status
        - Permanent address
        - Creation and modification timestamps

        **Use Cases:**

        - Organization profile pages
        - Settings and configuration screens
      operationId: getCurrentOrganization
      x-pipeshub-sdk: true
      security:
        - bearerAuth: []
        - oauth2: [org:read]
      responses:
        '200':
          description: Organization details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Organization not found - User's organization does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database query failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Organizations
      summary: Update organization
      description: |
        Update organization profile and settings information.

        **Overview:**

        This endpoint allows administrators to update the organization's profile information and contact details.

        **Updatable Fields:**

        - `contactEmail`: Primary contact email for the organization
        - `registeredName`: Official registered/legal name of the organization
        - `shortName`: Short display name used in UI
        - `permanentAddress`: Full address object with street, city, state, country, postal code

        **Request validation** (Zod at route layer): `contactEmail` must be a valid email when
        provided; `registeredName`, `shortName`, and `permanentAddress` are optional. Address
        sub-fields (`addressLine1`, `city`, `state`, `country`, `postCode`) are optional strings.
        An empty JSON object `{}` is valid (no-op partial update).

        **Restrictions:**

        - Only organization admins can perform updates
        - Account type cannot be changed after creation

        **Side Effects:**

        - Organization updated event is published
      operationId: updateOrganization
      security:
        - bearerAuth: []
        - oauth2: [org:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                contactEmail:
                  type: string
                  format: email
                  description: Primary contact email for the organization
                  example: "admin@acme.com"
                registeredName:
                  type: string
                  description: Official registered/legal name
                  example: "Acme Corporation Inc."
                shortName:
                  type: string
                  description: Short display name for UI
                  example: "Acme Corp"
                permanentAddress:
                  $ref: '#/components/schemas/Address'
      responses:
        '200':
          description: Organization updated successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: "Organization updated successfully"
                  data:
                    $ref: '#/components/schemas/Organization'
        '400':
          description: |
            Invalid request. Possible reasons:

            - Invalid request body (Zod validation — malformed `contactEmail`, wrong types, invalid `permanentAddress` shape)
            - Requester does not have admin privileges (`userAdminCheck`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Organization not found or user account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Organizations
      summary: Delete organization
      description: |
        Soft-delete the current organization by marking it as deleted.

        **Note:** This is a soft delete — the organization record is retained in the
        database with `isDeleted: true`. The organization is no longer accessible after
        this operation.

        **Requirements:**

        - Must be authenticated
        - Must be an organization admin
      operationId: deleteOrganization
      security:
        - bearerAuth: []
        - oauth2: [org:admin]
      responses:
        '200':
          description: Organization marked as deleted successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: "Organization marked as deleted successfully"
                  data:
                    $ref: '#/components/schemas/Organization'
        '400':
          description: Requester does not have admin privileges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Resource not found. Possible reasons:

            - Organization not found or already deleted
            - Requester account not found (missing userId or orgId in token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database save failure or event service error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /org/logo:
    put:
      tags:
        - Organizations
      summary: Upload organization logo
      description: |
        Upload or update the organization's logo image.

        **Supported Formats:**

        - PNG
        - JPG/JPEG
        - SVG
        - WebP
        - GIF

        **Requirements:**

        - Maximum file size: 2MB
        - Must be an organization admin
        - SVG files are validated — script tags, event handlers, javascript: protocols, and embedded iframes are rejected

      operationId: uploadOrganizationLogo
      security:
        - bearerAuth: []
        - oauth2: [org:write]
      requestBody:
        required: true
        description: "Request payload"
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              properties:
                file:
                  type: string
                  format: binary
                  description: Logo image file
              required:
                - file
      responses:
        '201':
          description: Logo uploaded successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - message
                  - mimeType
                properties:
                  message:
                    type: string
                    example: "Logo updated successfully"
                  mimeType:
                    type: string
                    enum:
                      - image/jpeg
                      - image/svg+xml
        '400':
          description: |
            Invalid request. Possible reasons:

            - No file provided
            - File type not allowed (must be PNG, JPEG, WebP, GIF, or SVG)
            - File exceeds 2MB size limit
            - SVG contains dangerous content (script tags, event handlers, javascript: protocols, iframe/object/embed tags)
            - Requester does not have admin privileges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requester account not found (missing userId or orgId in token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database save failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Organizations
      summary: Get organization logo
      description: |
        Retrieve the organization's logo as a raw binary image.

        Returns the image buffer directly with the appropriate `Content-Type` header
        (`image/jpeg` or `image/svg+xml`). If no logo has been uploaded, responds with
        `204 No Content`.
      operationId: getOrganizationLogo
      security:
        - bearerAuth: []
        - oauth2: [org:read]
      responses:
        '200':
          description: Logo image returned as binary data
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string
                format: binary
        '204':
          description: No logo has been uploaded for this organization
        '401':
          description: Unauthorized - Valid bearer token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - Database query failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Organizations
      summary: Delete organization logo
      description: |
        Remove the organization's custom logo.

