[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --timeout=30
markers =
    integration: marks tests as integration tests (requires running Docker services)
    unit: marks tests as unit tests (default)
    confluence_datacenter: marks tests specific to the Confluence Data Center connector
