name: PR Validations

on:
  pull_request:
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/nodejs/apps/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend/nodejs/apps
          npm install

      - name: Lint backend (changed files)
        run: |
          git fetch origin main
          MERGE_BASE=$(git merge-base origin/main HEAD)
          CHANGED_FILES=$(git diff --name-only $MERGE_BASE -- 'backend/nodejs/apps/src/**/*.ts' || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "Linting changed TypeScript files:"
            echo "$CHANGED_FILES"
            RELATIVE_FILES=$(echo "$CHANGED_FILES" | sed 's|^backend/nodejs/apps/||')
            cd backend/nodejs/apps
            echo "$RELATIVE_FILES" | xargs npx eslint || echo "::warning::ESLint found linting issues (non-fatal)"
          else
            echo "No TypeScript files changed in backend, skipping ESLint."
          fi

      - name: Build backend
        run: |
          cd backend/nodejs/apps
          npm run build

      # - name: Run backend tests
      #   run: |
      #     cd backend/nodejs/apps
      #     npm test

  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  ruff-lint-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run all ruff rules on changed Python files
        run: |
          git fetch origin main
          MERGE_BASE=$(git merge-base origin/main HEAD)
          CHANGED_FILES=$(git diff --diff-filter=d --name-only $MERGE_BASE -- 'backend/python/**/*.py' | sed 's|^backend/python/||' || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "Linting changed Python files with full ruleset:"
            echo "$CHANGED_FILES"
            echo "---"
            cd backend/python
            echo "$CHANGED_FILES" | xargs ruff check || echo "::warning::Ruff found linting issues (non-fatal)"
          else
            echo "No Python files changed, skipping ruff."
          fi

  pyright-type-check-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmariadb-dev

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          cd backend/python
          uv pip install --system pyright
          uv pip install --system -e . 2>&1 || true

      - name: Run pyright on changed Python files
        run: |
          git fetch origin main
          MERGE_BASE=$(git merge-base origin/main HEAD)
          CHANGED_FILES=$(git diff --diff-filter=d --name-only $MERGE_BASE -- 'backend/python/**/*.py' | grep -v 'code-generator/' | grep -v 'example\.py$' | sed 's|^backend/python/||' || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "Type-checking changed Python files:"
            echo "$CHANGED_FILES"
            echo "---"
            cd backend/python
            echo "$CHANGED_FILES" | xargs pyright || echo "::warning::Pyright found type errors (non-fatal)"
          else
            echo "No Python files changed in backend/python, skipping pyright."
          fi

  validate-docker-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed deployment files
        id: changes
        run: |
          git fetch origin main
          MERGE_BASE=$(git merge-base origin/main HEAD)
          CHANGED_FILES=$(git diff --diff-filter=d --name-only "$MERGE_BASE" -- \
            'deployment/docker-compose/**' \
            '.github/workflows/main.yml' || true)

          if [ -n "$CHANGED_FILES" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Docker Compose validation will run for:"
            echo "$CHANGED_FILES"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Docker Compose deployment files changed, skipping validation."
          fi

      - name: Validate MongoDB compose stability settings
        if: steps.changes.outputs.changed == 'true'
        run: bash deployment/docker-compose/tests/mongodb_stability_test.sh
